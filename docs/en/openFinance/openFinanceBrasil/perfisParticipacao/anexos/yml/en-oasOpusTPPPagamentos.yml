  /opus-open-finance/authorization-result:
    post:
      tags:
        - Opus Open Finance
      operationId: oofcAppToAppAuthorizationResult
      description: Method used in the App-To-App flow to exchange the returned authorization code for tokens or to handle any authorization errors.
      summary: Send the OIDC flow result to the Opus TPP.
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AppToAppAuthorizationResultRequest'
      responses:
        '204':
          description: Success in the authorization process
        '422':
          description: Error in the authorization process
          headers:
            x-origin-error:
              $ref: '#/components/headers/xOriginError'
            x-error-source-url:
              $ref: '#/components/headers/xErrorSourceUrl'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AppToAppAuthorizationErrorResponse'
components:
  schemas:
    PutDcmRequest:
      type: object
      required:
        - data
      properties:
        data:
          type: object
          required:
            - version
          properties:
            version:
              description: 'There is no fixed standard for the value of this field: it can be a date, a name, a number, or any string defined by the person responsible for the change in the directory. The version serves only as an internal reference for control and traceability of the changes applied via DCM, with no validation or automatic lookup by other systems. **Important**: if a request is made with a version value equal to that of a previous request, no DCM request will be made to any participant.'
              type: string
              maxLength: 20
              example: '2.0'
    RetryPaymentConsentRequest:
      type: object
      required:
        - data
      properties:
        data:
          type: object
          required:
            - callbackApplicationUri
          properties:
            callbackApplicationUri:
              type: string
              format: uri
              maxLength: 2000
              description: Application callback URI after the authentication process
              example: 'https://aplicativo.instituicao.com.br'
              pattern: '^(https?:\/\/)?(www\.)?[-a-zA-Z0-9@:%._\+~#=]{2,256}\.[a-z]{2,6}\b([-a-zA-Z0-9@:%_\+.~#?&\/\/=]*)$'
    RetryPaymentConsentResponse:
      type: object
      required:
        - data
      properties:
        data:
          type: object
          required:
            - redirectUrl
            - consentId
            - consent
          properties:
            redirectUrl:
              type: string
              format: uri
              maxLength: 2000
