      schema:
        $ref: '#/components/schemas/UUID'
    headerConsentId:
      name: x-consent-id
      required: true
      in: header
      description: Identifier of the consent to be used in this operation, obtained in the response to its creation
      schema:
        type: string
        pattern: '^urn:[a-zA-Z0-9][a-zA-Z0-9-]{0,31}:[a-zA-Z0-9()+,\-.:=@;$_!*''%\/?#]+$'
        maxLength: 256
      example: 'urn:bancox:f865cd66-392a-420b-9ff0-1b6d7cc60ee0'
    consentId:
      name: consentId
      required: true
      in: path
      description: |
        The consentId is the unique identifier of the consent and must be a URN - Uniform Resource Name.
        A URN, as defined in [RFC8141](https://tools.ietf.org/html/rfc8141), is a Uniform Resource
        Identifier - URI - assigned under the "urn" URI scheme and a specific URN namespace, with the intention that the URN
        be a persistent and location-independent resource identifier.
        Considering the string urn:prudential:C1DD93123 as an example for consentId we have:
        - the namespace (urn)
        - the identifier associated with the namespace of the transmitting institution (bancox)
        - the specific identifier within the namespace (f865cd66-392a-420b-9ff0-1b6d7cc60ee0).
        More detailed information about the construction of namespaces should be consulted in [RFC8141](https://tools.ietf.org/html/rfc8141).
      schema:
        type: string
        pattern: '^urn:[a-zA-Z0-9][a-zA-Z0-9-]{0,31}:[a-zA-Z0-9()+,\-.:=@;$_!*''%\/?#]+$'
        maxLength: 256
      example: 'urn:bancox:f865cd66-392a-420b-9ff0-1b6d7cc60ee0'
    authorisationFlowIntent:
      name: x-authorisation-flow-intent
      required: false
      description: Indicator of which will be the approval model for the payment consent
      in: header
      schema:
        $ref: '#/components/schemas/EnumAuthorisationFlowIntent'
    regulatoryV:
        name: x-regulatory-v
        required: false
        description: Desired regulatory version for the call to the participant (available only on non-proxy routes).
        in: header
        schema:
          $ref: '#/components/schemas/RegulatoryVersion'
