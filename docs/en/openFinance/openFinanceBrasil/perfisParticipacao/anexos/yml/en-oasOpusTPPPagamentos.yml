        - $ref: '#/components/parameters/authorisationServerId'
        - $ref: '#/components/parameters/consentId'
        - $ref: '#/components/parameters/regulatoryV'
      responses:
        '502':
          description: Error in Opus Open Client while communicating with the account-holding institution
          headers:
            x-origin-error:
              $ref: '#/components/headers/xOriginError'
            x-error-source-url:
              $ref: '#/components/headers/xErrorSourceUrl'
            x-selected-regulatory-v:
              $ref: '#/components/headers/xSelectedRegulatoryV'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResponseError'
        '504':
          description: Connection timeout exceeded while communicating with the account-holding institution
          headers:
            x-origin-error:
              $ref: '#/components/headers/xOriginError'
            x-error-source-url:
              $ref: '#/components/headers/xErrorSourceUrl'
            x-selected-regulatory-v:
              $ref: '#/components/headers/xSelectedRegulatoryV'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResponseError'
        '200':
          description: Successful response
          headers:
            x-selected-regulatory-v:
              $ref: '#/components/headers/xSelectedRegulatoryV'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RetryPaymentConsentResponse'
  /opus-open-finance/payments/v1/consents/{consentId}:
    get:
      operationId: oofcPaymentsGetConsentsConsentId
      description: Method for obtaining the details of the payment consent identified by consentId
      tags:
