    EnumAccountPaymentsType:
      type: string
      maxLength: 4
      enum:
        - CACC
        - SLRY
        - SVGS
        - TRAN
      example: CACC
      description: |
        Types of accounts used for payment via Pix.
        Traditional modalities provided for by Resolution 4.753, not covering linked accounts,
        accounts of persons domiciled abroad, accounts in foreign currencies, and electronic-money correspondent accounts.
        Below is the description of each ENUM value for the Pix scope.
        CACC - Current - Current Account.
        SLRY - Salary - Salary Account.
        SVGS - Savings - Savings Account.
        TRAN - TransactingAccount - Prepaid Payment Account.
    EnumRole:
      type: string
      maxLength: 5
      enum:
        - DADOS
        - PAGTO
        - CONTA
        - CCORR
      example: CONTA
      description: |
        Regulatory role of the institution. The role types are subject to change.
