                type: string
                pattern: '[\w\W\s]*'
                example: '4XX'
                maxLength: 255
              title:
                description: Human-readable title of this specific error
                type: string
                example: 'Human-readable title of this specific error'
                pattern: '[\w\W\s]*'
                maxLength: 255
              detail:
                description: Human-readable description of this specific error
                type: string
                example: 'Human-readable description of this specific error'
                pattern: '[\w\W\s]*'
                maxLength: 2048
