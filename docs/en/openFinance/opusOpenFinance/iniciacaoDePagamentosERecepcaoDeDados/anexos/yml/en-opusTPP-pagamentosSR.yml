        - $ref: '#/components/parameters/authorisationServerId'
        - $ref: '#/components/parameters/enrollmentId'
      responses:
        '502':
          description: Error in the Opus Open Client when communicating with the account holder
          headers:
            x-origin-error:
              $ref: '#/components/headers/xOriginError'
            x-error-source-url:
              $ref: '#/components/headers/xErrorSourceUrl'
            x-selected-regulatory-v:
                $ref: '#/components/headers/xSelectedRegulatoryV'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResponseError'
        '504':
          description: Connection timeout exceeded when communicating with the account holder
          headers:
            x-origin-error:
              $ref: '#/components/headers/xOriginError'
            x-error-source-url:
              $ref: '#/components/headers/xErrorSourceUrl'
            x-selected-regulatory-v:
                $ref: '#/components/headers/xSelectedRegulatoryV'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResponseError'
        '204':
          description: Account link successfully revoked.
          headers:
              x-selected-regulatory-v:
                $ref: '#/components/headers/xSelectedRegulatoryV'
        '400':
          description: Error sent by the account holder, complying with the standard defined by BACEN
          headers:
            x-origin-error:
              $ref: '#/components/headers/xOriginError'
            x-error-source-url:
              $ref: '#/components/headers/xErrorSourceUrl'
            x-selected-regulatory-v:
                $ref: '#/components/headers/xSelectedRegulatoryV'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResponseError'
        default:
          description: Error sent by the account holder, complying with the standard defined by BACEN
          headers:
