    patch:
      tags:
        - Vínculo de dispositivo
      operationId: deleteEnrollment
      description: |
        Method to revoke or reject an account link. After the successful execution of this irreversible method, the account link
        can no longer be used for authentication or for authorizing payment initiations.
        The concepts of revocation and rejection are associated with the account link state machine\:
        
        • Revocation: Cancellation of an account link in the "AUTHORISED" status;
        
        • Rejection: Cancellation of the account link in the "AWATING_RISK_SIGNALS", "AWATING_ENROLLMENT" and "AWAITING_ACCOUNT_HOLDER_VALIDATION" statuses
        
        It is up to the client of this API to distinguish between the two scenarios in order to determine the appropriate reason.
      summary: Revoke or reject account link.
      externalDocs:
        description: Open Finance - API Enrollments for Payment Initiation
        url: https://openfinancebrasil.atlassian.net/wiki/spaces/OF/pages/141557761/SV+API+-+Pagamentos+sem+Redirecionamento
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PatchEnrollmentRequest'
      parameters:
