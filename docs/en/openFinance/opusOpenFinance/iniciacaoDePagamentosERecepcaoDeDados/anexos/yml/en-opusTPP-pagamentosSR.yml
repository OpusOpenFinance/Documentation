        - the specific identifier within the namespace (C1DD33123).
        More detailed information about the construction of namespaces should be consulted in [RFC8141](https://tools.ietf.org/html/rfc8141).
      schema:
        $ref: '#/components/schemas/enrollmentId'
    consentId:
      name: consentId
      in: path
      description: |
        The consentId is the unique identifier of the consent and it must be a URN - Uniform Resource Name.  
        A URN, as defined in [RFC8141](https://tools.ietf.org/html/rfc8141), is a Uniform Resource 
        Identifier - URI - that is assigned under the "urn" URI scheme and a specific URN namespace, with the intention that the URN 
        be a persistent, location-independent resource identifier.  
        Considering the string urn:bancoex:C1DD33123 as an example for consentId we have:
        - the namespace(urn)
        - the identifier associated with the namespace of the account-holding institution (bancoex) 
