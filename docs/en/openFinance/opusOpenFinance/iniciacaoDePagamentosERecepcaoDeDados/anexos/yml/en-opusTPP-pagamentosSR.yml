        The account link must be in the "AWAITING_ENROLLMENT" status. 
        After successful registration, the account link must transition to the "AUTHORISED" status.
        A FIDO2 credential verification failure must cause the account holder to reject the account link, since the same "challenge" cannot be reused for more than one registration.
