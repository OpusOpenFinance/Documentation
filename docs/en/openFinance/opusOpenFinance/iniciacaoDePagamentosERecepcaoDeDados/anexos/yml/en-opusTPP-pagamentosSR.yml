openapi: 3.0.0
info:
  title: OpusTPP - Payments without Redirection
  description: |-
    OpusTPP - Core for managing devices linked to accounts

    # Payment Transaction Initiation without redirection

    API family to enable payment without redirection via Open Finance Brasil.  
    It allows both the management of devices linked to accounts and the authorization of consents created via the flow without redirection.

  version: 1.0.0
tags:
  - name: Vínculo de dispositivo
    description: |-
      Management of devices linked to accounts
  - name: Consentimento
    description: |-
      Authorization of consents created via the flow without redirection.
  - name: Pix Automático
    description: |-
      Authorization of Automatic Pix consents created via the flow without redirection.
servers:
  - url: https://open-finance-core.instituicao.com.br
paths:
  /opus-open-finance/enrollments/v1/enrollments:
    post:
      tags:
        - Vínculo de dispositivo
      operationId: postEnrollments
      description: Method to create a new account link. Returns an enrollment in AWAITING_RISK_SIGNALS status.
      summary: Create account link.
      externalDocs:
        description: Open Finance - API Enrollments for Payment Initiation
        url: https://openfinancebrasil.atlassian.net/wiki/spaces/OF/pages/141557761/SV+API+-+Pagamentos+sem+Redirecionamento
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateEnrollmentRequest'
      parameters:
        - $ref: '#/components/parameters/applicationId'
        - $ref: '#/components/parameters/authorisationServerId'
        - $ref: '#/components/parameters/regulatoryV'
      responses:
        '502':
          description: Error in the Opus Open Client when communicating with the account holder
          headers:
            x-origin-error:
              $ref: '#/components/headers/xOriginError'
            x-error-source-url:
              $ref: '#/components/headers/xErrorSourceUrl'
            x-selected-regulatory-v:
                $ref: '#/components/headers/xSelectedRegulatoryV'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResponseError'
        '504':
          description: Connection timeout exceeded when communicating with the account holder
          headers:
            x-origin-error:
              $ref: '#/components/headers/xOriginError'
            x-error-source-url:
              $ref: '#/components/headers/xErrorSourceUrl'
            x-selected-regulatory-v:
                $ref: '#/components/headers/xSelectedRegulatoryV'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResponseError'
        '201':
          description: Account link data successfully obtained.
          headers:
            x-selected-regulatory-v:
                $ref: '#/components/headers/xSelectedRegulatoryV'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CreateEnrollmentResponse'
        '400':
          description: Error sent by the account holder, complying with the standard defined by BACEN
          headers:
            x-origin-error:
              $ref: '#/components/headers/xOriginError'
            x-error-source-url:
              $ref: '#/components/headers/xErrorSourceUrl'
            x-selected-regulatory-v:
                $ref: '#/components/headers/xSelectedRegulatoryV'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResponseError'
        default:
          description: Error sent by the account holder, complying with the standard defined by BACEN
          headers:
            x-origin-error:
              $ref: '#/components/headers/xOriginError'
            x-error-source-url:
              $ref: '#/components/headers/xErrorSourceUrl'
            x-selected-regulatory-v:
                $ref: '#/components/headers/xSelectedRegulatoryV'
          content:
            application/jwt:
              schema:
                $ref: '#/components/schemas/ResponseError'
