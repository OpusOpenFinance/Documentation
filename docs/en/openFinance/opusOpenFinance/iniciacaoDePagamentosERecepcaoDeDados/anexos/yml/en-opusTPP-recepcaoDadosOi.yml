openapi: 3.0.0
info:
  title: OpusTPP - Data Reception
  description: |-
    OpusTPP - Consent management core

    # Registration and Transactional Data

  version: 1.0.0
tags:
  - name: Opus Open Insurance
    description: |-
      Consent management endpoints
  - name: Resources
    description: |-
      Endpoints for listing resources linked to the consent. The expected and returned data models are the same as those defined by the official documentation ([Open Insurance - API Resources](https://br-openinsurance.github.io/areadesenvolvedor/#api-resources)).
  - name: Dados Cadastrais
    description: |-
      Endpoints for querying customer registration data. The expected and returned data models are the same as those defined by the official documentation ([Open Insurance - API Customers](https://br-openinsurance.github.io/areadesenvolvedor/#api-customers)).
  - name: Aceitação e Sucursal
    description: |-
      Endpoints for querying policy, premium and claim information data. The expected and returned data models are the same as those defined by the official documentation ([Open Insurance - API AcceptanceAndBranchesAbroad](https://br-openinsurance.github.io/areadesenvolvedor/#api-acceptance-and-branches-abroad)).
  - name: Automóvel
    description: |-
      Endpoints for querying policy, premium and claim information data. The expected and returned data models are the same as those defined by the official documentation ([Open Insurance - API Auto](https://br-openinsurance.github.io/areadesenvolvedor/#api-insurance-auto)).
  - name: Riscos Financeiros
    description: |-
      Endpoints for querying policy, premium and claim information data. The expected and returned data models are the same as those defined by the official documentation ([Open Insurance - API FinancialRisk](https://br-openinsurance.github.io/areadesenvolvedor/#api-insurance-financial-risk)).
  - name: Habitacional
    description: |-
      Endpoints for querying policy, premium and claim information data. The expected and returned data models are the same as those defined by the official documentation ([Open Insurance - API Housing](https://br-openinsurance.github.io/areadesenvolvedor/#api-insurance-housing)).
  - name: Patrimonial
    description: |-
      Endpoints for querying policy, premium and claim information data. The expected and returned data models are the same as those defined by the official documentation ([Open Insurance - API Patrimonial](https://br-openinsurance.github.io/areadesenvolvedor/#api-insurance-patrimonial)).
  - name: Transportes
    description: |-
      Endpoints for querying policy, premium and claim information data. The expected and returned data models are the same as those defined by the official documentation ([Open Insurance - API Transport](https://br-openinsurance.github.io/areadesenvolvedor/#api-insurance-transport)).
  - name: Responsabilidade
    description: |-
      Endpoints for querying policy, premium and claim information data. The expected and returned data models are the same as those defined by the official documentation ([Open Insurance - API Responsibility](https://br-openinsurance.github.io/areadesenvolvedor/#api-insurance-responsibility)).
  - name: Rural
    description: |-
      Endpoints for querying policy, premium and claim information data. The expected and returned data models are the same as those defined by the official documentation ([Open Insurance - API Rural](https://br-openinsurance.github.io/areadesenvolvedor/#api-insurance-rural)).
  - name: Previdência Risco
    description: |-
      Endpoints for querying policy, premium and claim information data. The expected and returned data models are the same as those defined by the official documentation ([Open Insurance - API PensionPlan](https://br-openinsurance.github.io/areadesenvolvedor/#api-insurance-pension-plan)).
  - name: Previdência Sobrevivência
    description: |-
      Endpoints for querying policy, premium and claim information data. The expected and returned data models are the same as those defined by the official documentation ([Open Insurance - API LifePension](https://br-openinsurance.github.io/areadesenvolvedor/#api-insurance-life-pension)).
  - name: Pessoas
    description: |-
      Endpoints for querying policy, premium and claim information data. The expected and returned data models are the same as those defined by the official documentation ([Open Insurance - API Person](https://br-openinsurance.github.io/areadesenvolvedor/#api-insurance-person)).
  - name: Deeplinks
    description: |-
      Endpoints for obtaining the iOS Universal Links and Android App Links configurations so that the receiving Institution's application can intercept URLs.
servers:
  - url: https://open-insurance-core.instituicao.com.br
paths:
  /.well-known/assetlinks.json:
    get:
      tags:
        - Deeplinks
      operationId: ooicDeeplinksGetAssetLinks
      description: Method for obtaining the content of the assetlinks.json file
      summary: Obtain Android App Links configuration file
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AssetLinks'
  /.well-known/apple-app-site-association:
    get:
      tags:
        - Deeplinks
      operationId: ooicDeeplinksGetAppleAppSiteAssociation
      description: Method for obtaining the content of the apple-app-site-association file
      summary: Obtain Apple App Site Association configuration file
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AppleAppSiteAssociation'
  /opus-open-insurance/open-insurance/consents/v1/consents:
    post:
      tags:
        - Opus Open Insurance
      operationId: ooicConsentsPostConsents
      description: Method for creating a new consent request.
      summary: Create a new consent request.
      externalDocs:
        description: Open Insurance - Consent API
        url: https://br-openinsurance.github.io/areadesenvolvedor/#api-consents
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateConsentRequest'
      parameters:
        - $ref: '#/components/parameters/applicationId'
        - $ref: '#/components/parameters/authorisationServerId'
        - $ref: '#/components/parameters/regulatoryV'
      responses:
        '502':
          description: Error in the Opus Open Client when communicating with the transmitting institution
          headers:
            x-origin-error:
              $ref: '#/components/headers/xOriginError'
            x-error-source-url:
              $ref: '#/components/headers/xErrorSourceUrl'
            x-selected-regulatory-v:
                $ref: '#/components/headers/xSelectedRegulatoryV'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResponseError'
        '504':
          description: Connection timeout exceeded when communicating with the transmitting institution
          headers:
            x-origin-error:
              $ref: '#/components/headers/xOriginError'
            x-error-source-url:
              $ref: '#/components/headers/xErrorSourceUrl'
            x-selected-regulatory-v:
                $ref: '#/components/headers/xSelectedRegulatoryV'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResponseError'
        '201':
          description: Successful response
          headers:
              x-selected-regulatory-v:
                $ref: '#/components/headers/xSelectedRegulatoryV'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CreateConsentResponse'
        default:
          description: Error sent by the transmitting institution, following the standard defined by Susep
          headers:
            x-origin-error:
              $ref: '#/components/headers/xOriginError'
            x-error-source-url:
              $ref: '#/components/headers/xErrorSourceUrl'
            x-selected-regulatory-v:
                $ref: '#/components/headers/xSelectedRegulatoryV'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResponseError'
  /opus-open-insurance/open-insurance/consents/v1/consents/{consentId}/authorisation-retry:
    post:
      tags:
        - Opus Open Insurance
      operationId: ooicConsentsPostConsentsConsentIdAuthorisationRetry
      description: Method for generating a new authorization URL for the consent identified by consentId
      summary: Generate a new authorization URL for the consent identified by consentId.
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RetryConsentRequest'
      parameters:
        - $ref: '#/components/parameters/applicationId'
        - $ref: '#/components/parameters/authorisationServerId'
        - $ref: '#/components/parameters/consentId'
        - $ref: '#/components/parameters/regulatoryV'
      responses:
        '502':
          description: Error in the Opus Open Client when communicating with the transmitting institution
          headers:
            x-origin-error:
              $ref: '#/components/headers/xOriginError'
            x-error-source-url:
              $ref: '#/components/headers/xErrorSourceUrl'
            x-selected-regulatory-v:
                $ref: '#/components/headers/xSelectedRegulatoryV'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResponseError'
        '504':
          description: Connection timeout exceeded when communicating with the transmitting institution
          headers:
            x-origin-error:
              $ref: '#/components/headers/xOriginError'
            x-error-source-url:
              $ref: '#/components/headers/xErrorSourceUrl'
            x-selected-regulatory-v:
                $ref: '#/components/headers/xSelectedRegulatoryV'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResponseError'
        '200':
          description: Successful response
          headers:
              x-selected-regulatory-v:
                $ref: '#/components/headers/xSelectedRegulatoryV'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RetryConsentResponse'
  /opus-open-insurance/open-insurance/consents/v1/consents/{consentId}:
    get:
      tags:
        - Opus Open Insurance
      operationId: ooicConsentsGetConsentsConsentId
      description: Method for detailing a consent identified by consentId
      summary: Obtain details of the consent identified by consentId.
      externalDocs:
        description: Open Insurance - Consent API
        url: https://br-openinsurance.github.io/areadesenvolvedor/#api-consents
      parameters:
        - $ref: '#/components/parameters/applicationId'
        - $ref: '#/components/parameters/authorisationServerId'
        - $ref: '#/components/parameters/consentId'
        - $ref: '#/components/parameters/regulatoryV'
      responses:
        '200':
          description: Consent queried successfully.
          headers:
              x-selected-regulatory-v:
                $ref: '#/components/headers/xSelectedRegulatoryV'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GetConsentResponse'
        '502':
          description: Error in the Opus Open Client when communicating with the transmitting institution
          headers:
            x-origin-error:
              $ref: '#/components/headers/xOriginError'
            x-error-source-url:
              $ref: '#/components/headers/xErrorSourceUrl'
            x-selected-regulatory-v:
                $ref: '#/components/headers/xSelectedRegulatoryV'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResponseError'
        '504':
          description: Connection timeout exceeded when communicating with the transmitting institution
          headers:
            x-origin-error:
              $ref: '#/components/headers/xOriginError'
            x-error-source-url:
              $ref: '#/components/headers/xErrorSourceUrl'
            x-selected-regulatory-v:
                $ref: '#/components/headers/xSelectedRegulatoryV'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResponseError'
        default:
          description: Error sent by the transmitting institution, following the standard defined by Susep
          headers:
            x-origin-error:
              $ref: '#/components/headers/xOriginError'
            x-error-source-url:
              $ref: '#/components/headers/xErrorSourceUrl'
            x-selected-regulatory-v:
                $ref: '#/components/headers/xSelectedRegulatoryV'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResponseError'
    delete:
      tags:
        - Opus Open Insurance
      operationId: ooicConsentsDeleteConsentsConsentId
      description: Method for deleting / revoking the consent identified by consentId
      summary: Delete / Revoke the consent identified by consentId.
      externalDocs:
        description: Open Insurance - Consent API
        url: https://br-openinsurance.github.io/areadesenvolvedor/#api-consents
      parameters:
        - $ref: '#/components/parameters/applicationId'
        - $ref: '#/components/parameters/authorisationServerId'
        - $ref: '#/components/parameters/consentId'
      responses:
        '204':
          description: Consent revoked successfully.
          headers:
              x-selected-regulatory-v:
                $ref: '#/components/headers/xSelectedRegulatoryV'
        '502':
          description: Error in the Opus Open Client when communicating with the transmitting institution
          headers:
            x-origin-error:
              $ref: '#/components/headers/xOriginError'
            x-error-source-url:
              $ref: '#/components/headers/xErrorSourceUrl'
            x-selected-regulatory-v:
                $ref: '#/components/headers/xSelectedRegulatoryV'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResponseError'
        '504':
          description: Connection timeout exceeded when communicating with the transmitting institution
          headers:
            x-origin-error:
              $ref: '#/components/headers/xOriginError'
            x-error-source-url:
              $ref: '#/components/headers/xErrorSourceUrl'
            x-selected-regulatory-v:
                $ref: '#/components/headers/xSelectedRegulatoryV'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResponseError'
        default:
          description: Error sent by the transmitting institution, following the standard defined by Susep
          headers:
            x-origin-error:
              $ref: '#/components/headers/xOriginError'
            x-error-source-url:
              $ref: '#/components/headers/xErrorSourceUrl'
            x-selected-regulatory-v:
                $ref: '#/components/headers/xSelectedRegulatoryV'
          content:
            application/jwt:
              schema:
                $ref: '#/components/schemas/ResponseError'
  /opus-open-insurance/participants:
    get:
      tags:
        - Opus Open Insurance
      operationId: ooicGetParticipants
      description: Method for obtaining the participants registered in the directory
      summary: Detailing of the participants registered in the directory, identifying their APIs
      parameters:
       - in: query
         name: role
         schema:
           type: string
         description: Filters OrgDomainRoleClaims containing the provided role. Role types are subject to change.
       - in: query
         name: familyType
         schema:
           type: string
         description: Filters ApiResources containing the provided familyType
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ParticipantsResponse'
        '502':
          description: Error in the Opus Open Client when communicating with the Susep participants API
          headers:
            x-origin-error:
              $ref: '#/components/headers/xOriginError'
            x-error-source-url:
              $ref: '#/components/headers/xErrorSourceUrl'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResponseError'
        '504':
          description: Connection timeout exceeded when communicating with the Susep participants API
          headers:
            x-origin-error:
              $ref: '#/components/headers/xOriginError'
            x-error-source-url:
              $ref: '#/components/headers/xErrorSourceUrl'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResponseError'
  /opus-open-insurance/dcm:
    get:
      operationId: oofiGetDcm
      description: Method for obtaining the dcm data of all the application's brand clients.
      tags:
        - Opus Open Insurance
      summary: Detailing of the dcm status of the brand clients.
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DcmData'
        '502':
          description: Error in the Opus Open Client when communicating with the account holder
          headers:
            x-origin-error:
              $ref: '#/components/headers/xOriginError'
            x-error-source-url:
              $ref: '#/components/headers/xErrorSourceUrl'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResponseError'
        '504':
          description: Connection timeout exceeded when communicating with the BACEN participants API
          headers:
            x-origin-error:
              $ref: '#/components/headers/xOriginError'
            x-error-source-url:
              $ref: '#/components/headers/xErrorSourceUrl'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResponseError'
    put:
      operationId: ooicPutDcm
      description: Method for updating the dcm data of all the application's brand clients.
      tags:
        - Opus Open Insurance
      summary: Update of the brand clients' dcm data.
      parameters:
        - $ref: '#/components/parameters/applicationId'
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PutDcmRequest'
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DcmData'
        '502':
          description: Error in the Opus Open Client when communicating with the account holder
          headers:
            x-origin-error:
              $ref: '#/components/headers/xOriginError'
            x-error-source-url:
              $ref: '#/components/headers/xErrorSourceUrl'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResponseError'
        '504':
          description: Connection timeout exceeded when communicating with the BACEN participants API
          headers:
            x-origin-error:
              $ref: '#/components/headers/xOriginError'
            x-error-source-url:
              $ref: '#/components/headers/xErrorSourceUrl'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResponseError'
  /opus-open-insurance/authorization-result:
    post:
      tags:
        - Opus Open Insurance
      operationId: ooicAppToAppAuthorizationResult
      description: Method used in the App-To-App flow to exchange the returned authorization code for tokens or to handle any authorization errors.
      summary: Send the OIDC flow return to the Opus TPP.
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AppToAppAuthorizationResultRequest'
      responses:
        '204':
          description: Success in the authorization process
        '422':
          description: Error in the authorization process
          headers:
            x-origin-error:
              $ref: '#/components/headers/xOriginError'
            x-error-source-url:
              $ref: '#/components/headers/xErrorSourceUrl'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AppToAppAuthorizationErrorResponse'
  /proxy/open-insurance/resources/v1/resources:
    get:
      tags:
        - Resources
      parameters:
        - $ref: '#/components/parameters/applicationId'
        - $ref: '#/components/parameters/authorisationServerId'
        - $ref: '#/components/parameters/headerConsentId'
      description: Proxy method for obtaining the list of resources held by the customer at the transmitting institution and for which they have granted consent.
      responses:
        '502':
          description: Error in the Opus Open Client when communicating with the transmitting institution
          headers:
            x-origin-error:
              $ref: '#/components/headers/xOriginError'
            x-error-source-url:
              $ref: '#/components/headers/xErrorSourceUrl'
            x-selected-regulatory-v:
                $ref: '#/components/headers/xSelectedRegulatoryV'
          content:
