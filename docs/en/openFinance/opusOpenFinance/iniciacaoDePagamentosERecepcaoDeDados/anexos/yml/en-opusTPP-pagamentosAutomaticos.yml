openapi: 3.0.0
info:
  title: OpusTPP - Automatic Payments
  description: |-
    OpusTPP - Consent management core

    # Automatic Payment Transaction Initiation

  version: 1.0.0
tags:
  - name: Opus Open Finance
    description: |-
      Consent management endpoints
  - name: Pagamento Automático
    description: |-
      Payment initiation endpoints related to the consent. The expected and returned data models are the same as those defined by the official documentation ([Open Finance - API Payment Initiation](https://openfinancebrasil.atlassian.net/wiki/spaces/OF/pages/198410569/SV+API+-+Pagamentos+Autom+ticos)).
  - name: Deeplinks
    description: |-
      Endpoints for obtaining the iOS Universal Links and Android App Links configurations so that the receiving Institution's application can intercept URLs.
servers:
  - url: https://open-finance-core.instituicao.com.br
paths:
  /.well-known/assetlinks.json:
    get:
      tags:
        - Deeplinks
      operationId: oofcDeeplinksGetAssetLinks
      description: Method for obtaining the content of the assetlinks.json file
      summary: Obtain Android App Links configuration file
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AssetLinks'
  /.well-known/apple-app-site-association:
    get:
      tags:
        - Deeplinks
      operationId: oofcDeeplinksGetAppleAppSiteAssociation
      description: Method for obtaining the content of the apple-app-site-association file
      summary: Obtain Apple App Site Association configuration file
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AppleAppSiteAssociation'
  /opus-open-finance/automatic-payments/v1/recurring-consents:
    post:
      tags:
        - Opus Open Finance
      operationId: automaticPaymentsPostRecurringConsents
      description: Method for creating a long-lived consent. Returns a `recurringConsentId` with status AWAITING_AUTHORISATION.
      summary: Creates a consent for payment transactions.
      externalDocs:
        description: Open Finance - API Payment Initiation
        url: https://openfinancebrasil.atlassian.net/wiki/spaces/OF/pages/198410569/SV+API+-+Pagamentos+Autom+ticos
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateRecurringConsentRequest'
      parameters:
        - $ref: '#/components/parameters/applicationId'
        - $ref: '#/components/parameters/authorisationServerId'
        - $ref: '#/components/parameters/authorisationFlowIntent'
        - $ref: '#/components/parameters/regulatoryV'
      responses:
        '502':
          description: Error in the Opus Open Client while communicating with the account holder
          headers:
            x-origin-error:
              $ref: '#/components/headers/xOriginError'
            x-error-source-url:
              $ref: '#/components/headers/xErrorSourceUrl'
            x-selected-regulatory-v:
                $ref: '#/components/headers/xSelectedRegulatoryV'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResponseError'
        '504':
          description: Connection timeout exceeded while communicating with the account holder
          headers:
            x-origin-error:
              $ref: '#/components/headers/xOriginError'
            x-error-source-url:
              $ref: '#/components/headers/xErrorSourceUrl'
            x-selected-regulatory-v:
                $ref: '#/components/headers/xSelectedRegulatoryV'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResponseError'
        '201':
          description: Payment consent created successfully.
          headers:
              x-selected-regulatory-v:
                $ref: '#/components/headers/xSelectedRegulatoryV'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CreateRecurringConsentResponse'
        '400':
          description: Error sent by the account holder, complying with the standard defined by BACEN
          headers:
            x-origin-error:
              $ref: '#/components/headers/xOriginError'
            x-error-source-url:
              $ref: '#/components/headers/xErrorSourceUrl'
            x-selected-regulatory-v:
                $ref: '#/components/headers/xSelectedRegulatoryV'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResponseError'
        default:
          description: Error sent by the account holder, complying with the standard defined by BACEN
          headers:
            x-origin-error:
              $ref: '#/components/headers/xOriginError'
            x-error-source-url:
              $ref: '#/components/headers/xErrorSourceUrl'
            x-selected-regulatory-v:
                $ref: '#/components/headers/xSelectedRegulatoryV'
          content:
            application/jwt:
              schema:
                $ref: '#/components/schemas/ResponseError'
  /opus-open-finance/automatic-payments/v1/recurring-consents/{recurringConsentId}/authorisation-retry:
    post:
      tags:
        - Opus Open Finance
      operationId: oofcAutomaticPaymentsPostRecurringConsentsConsentIdAuthorisationRetry
      description: Method for generating a new authorisation URL for the consent identified by consentId
      summary: Generate a new authorisation URL for the consent identified by consentId.
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RetryPaymentConsentRequest'
      parameters:
        - $ref: '#/components/parameters/applicationId'
        - $ref: '#/components/parameters/authorisationServerId'
        - $ref: '#/components/parameters/recurringConsentId'
        - $ref: '#/components/parameters/regulatoryV'
      responses:
        '502':
          description: Error in the Opus Open Client while communicating with the account holder
          headers:
            x-origin-error:
              $ref: '#/components/headers/xOriginError'
            x-error-source-url:
              $ref: '#/components/headers/xErrorSourceUrl'
            x-selected-regulatory-v:
                $ref: '#/components/headers/xSelectedRegulatoryV'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResponseError'
        '504':
          description: Connection timeout exceeded while communicating with the account holder
          headers:
            x-origin-error:
              $ref: '#/components/headers/xOriginError'
            x-error-source-url:
              $ref: '#/components/headers/xErrorSourceUrl'
            x-selected-regulatory-v:
                $ref: '#/components/headers/xSelectedRegulatoryV'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResponseError'
        '200':
          description: Successful response
          headers:
              x-selected-regulatory-v:
                $ref: '#/components/headers/xSelectedRegulatoryV'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RetryPaymentConsentResponse'
  /opus-open-finance/automatic-payments/v1/recurring-consents/{recurringConsentId}:
    get:
      operationId: oofcAutomaticPaymentsGetRecurringConsentsConsentId
      description: Method for retrieving information about a long-lived consent.
      tags:
        - Opus Open Finance
      summary:  Retrieves information of a consent.
      externalDocs:
        description: Open Finance - API Payment Initiation
        url: https://openfinancebrasil.atlassian.net/wiki/spaces/OF/pages/198410569/SV+API+-+Pagamentos+Autom+ticos
      parameters:
        - $ref: '#/components/parameters/applicationId'
        - $ref: '#/components/parameters/authorisationServerId'
        - $ref: '#/components/parameters/recurringConsentId'
        - $ref: '#/components/parameters/regulatoryV'
      responses:
        '502':
          description: Error in the Opus Open Client while communicating with the account holder
          headers:
            x-origin-error:
              $ref: '#/components/headers/xOriginError'
            x-error-source-url:
              $ref: '#/components/headers/xErrorSourceUrl'
            x-selected-regulatory-v:
                $ref: '#/components/headers/xSelectedRegulatoryV'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResponseError'
        '504':
          description: Connection timeout exceeded while communicating with the account holder
          headers:
            x-origin-error:
              $ref: '#/components/headers/xOriginError'
            x-error-source-url:
              $ref: '#/components/headers/xErrorSourceUrl'
            x-selected-regulatory-v:
                $ref: '#/components/headers/xSelectedRegulatoryV'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResponseError'
        '200':
          description: Successful response
          headers:
              x-selected-regulatory-v:
                $ref: '#/components/headers/xSelectedRegulatoryV'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GetAutomaticPaymentRecurringConsentResponse'
        '400':
          description: Error sent by the account holder, complying with the standard defined by BACEN
          headers:
            x-origin-error:
              $ref: '#/components/headers/xOriginError'
            x-error-source-url:
              $ref: '#/components/headers/xErrorSourceUrl'
            x-selected-regulatory-v:
                $ref: '#/components/headers/xSelectedRegulatoryV'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResponseError'
        default:
          description: Error sent by the account holder, complying with the standard defined by BACEN
          headers:
            x-origin-error:
              $ref: '#/components/headers/xOriginError'
            x-error-source-url:
              $ref: '#/components/headers/xErrorSourceUrl'
            x-selected-regulatory-v:
                $ref: '#/components/headers/xSelectedRegulatoryV'
          content:
            application/jwt:
              schema:
                $ref: '#/components/schemas/ResponseError'
    patch:
      operationId: oofcAutomaticPaymentsPatchRecurringConsentsConsentId
      description: |
        Method for rejecting, revoking or editing a long-lived consent:
        1 - Information about revocation:
        - If successful, the consent moves to the “REVOKED” status;
        - Only consents with status “AUTHORISED” can be revoked;
        - Automatic payments associated with the consent and scheduled to occur until 11:59 PM of the next day (from the day of
        the revocation request) must be kept. Payments scheduled to occur after this period must be cancelled.
        - Further guidance regarding revocation can be found in the API header, section “Validations”, item 3.

        2 - Information about editing:
        - The fields that can be edited and their rules can be found through the [link](https://openfinancebrasil.atlassian.net/wiki/spaces/OF/pages/198410772);
        - Editing is only possible in cases of consent for Automatic Pix (“automatic” chosen in the oneOf of the “recurringConfiguration” object);
        - Sending the item "/data/creditors/name" will update the recipient's name in all elements of the array.

        3 - Information about rejection:
        - If it is necessary to cancel a consent that has not yet been authorised, the initiator may call the endpoint to move the consent to REJECTED.
      tags:
        - Opus Open Finance
      summary:  Rejects, revokes or edits a consent.
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PatchRecurringConsentRequest'
      externalDocs:
        description: Open Finance - API Payment Initiation
        url: https://openfinancebrasil.atlassian.net/wiki/spaces/OF/pages/198410569/SV+API+-+Pagamentos+Autom+ticos
      parameters:
        - $ref: '#/components/parameters/applicationId'
        - $ref: '#/components/parameters/authorisationServerId'
        - $ref: '#/components/parameters/recurringConsentId'
      responses:
        '502':
          description: Error in the Opus Open Client while communicating with the account holder
          headers:
            x-origin-error:
              $ref: '#/components/headers/xOriginError'
            x-error-source-url:
              $ref: '#/components/headers/xErrorSourceUrl'
            x-selected-regulatory-v:
                $ref: '#/components/headers/xSelectedRegulatoryV'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResponseError'
        '504':
          description: Connection timeout exceeded while communicating with the account holder
          headers:
            x-origin-error:
              $ref: '#/components/headers/xOriginError'
            x-error-source-url:
              $ref: '#/components/headers/xErrorSourceUrl'
            x-selected-regulatory-v:
                $ref: '#/components/headers/xSelectedRegulatoryV'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResponseError'
        '200':
          description: Successful response
          headers:
