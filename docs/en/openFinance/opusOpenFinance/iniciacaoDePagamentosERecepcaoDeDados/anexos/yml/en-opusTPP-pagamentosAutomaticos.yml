        - Pagamento Automático
      parameters:
        - $ref: '#/components/parameters/applicationId'
        - $ref: '#/components/parameters/authorisationServerId'
        - $ref: '#/components/parameters/headerRecurringConsentId'
      description: |
        Method for retrieving information about a set of payments associated with the same recurringConsentId.
        It is also possible to send a start date (startDate) and end date (endDate), if the search is for transactions within a specific time window.
