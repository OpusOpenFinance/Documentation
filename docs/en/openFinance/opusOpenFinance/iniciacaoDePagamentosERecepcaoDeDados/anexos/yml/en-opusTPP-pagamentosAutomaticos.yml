        - $ref: '#/components/parameters/authorisationServerId'
        - $ref: '#/components/parameters/headerRecurringConsentId'
        - $ref: '#/components/parameters/authorisationFlowIntent'
      description: 'Method for creating a payment transaction. Returns a recurringPaymentId.'
      requestBody:
        content:
          application/json:
            schema:
              description: 'Follows the request standard defined in the official documentation ([Open Finance - API Payment Initiation](https://openfinancebrasil.atlassian.net/wiki/spaces/OF/pages/345178397/Informa+es+T+cnicas+-+SV+Pagamentos+Autom+ticos+-+v1.0.0)).'
              example: {}
      responses:
