  /opus-open-finance/participants:
    get:
      operationId: oofcGetParticipants
      description: Method for obtaining the participants registered in the directory
      tags:
        - Opus Open Finance
      summary: Details of the participants registered in the directory, identifying their APIs
      externalDocs:
        description: Open Finance - Regulatory roles for OpenID and OAuth 2.0 mappings
        url: https://openbanking-brasil.github.io/specs-seguranca/open-banking-brasil-dynamic-client-registration-1_ID2-ptbr.html#section-7.2
      parameters:
       - in: query
         name: role
         schema:
           type: string
         description: Filters OrgDomainRoleClaims containing the provided role. Role types are subject to change, check the externalDocs described.
       - in: query
         name: familyType
         schema:
           type: string
         description: Filters ApiResources containing the provided familyType
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ParticipantsResponse'
        '502':
          description: Error in the Opus Open Client while communicating with the BACEN participants API
          headers:
            x-origin-error:
              $ref: '#/components/headers/xOriginError'
            x-error-source-url:
              $ref: '#/components/headers/xErrorSourceUrl'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResponseError'
        '504':
          description: Connection timeout exceeded while communicating with the BACEN participants API
          headers:
            x-origin-error:
              $ref: '#/components/headers/xOriginError'
            x-error-source-url:
              $ref: '#/components/headers/xErrorSourceUrl'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResponseError'
  /proxy/open-banking/automatic-payments/v1/pix/recurring-payments:
