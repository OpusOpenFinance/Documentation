                maxLength: 255
              title:
                description: Human-readable title of this specific error
                type: string
                example: 'Human-readable title of this specific error'
                pattern: '[\w\W\s]*'
                maxLength: 255
              detail:
                description: Human-readable description of this specific error
                type: string
                example: 'Human-readable description of this specific error'
                pattern: '[\w\W\s]*'
                maxLength: 2048
            additionalProperties: false
        meta:
          $ref: '#/components/schemas/Meta'
      additionalProperties: false
    EnumOriginError:
      type: string
      enum:
        - opus-tpp
        - participant
        - directory
        - unknown
      example: opus-tpp
      description: |
        Origin of the reported error:
        - **opus-tpp**: error originated in the Opus TPP.
        - **participant**: error originated in the transmitting or holding institution.
        - **directory**: error originated in the Participants Directory.
        - **unknown**: unidentified origin.
    EnumAuthorisationFlowIntent:
      type: string
      enum:
        - hybrid
        - fido
        - ciba
      example: hybrid
      default: hybrid
      description: |
        Types of payment consent approval models
    RegulatoryVersion:
      type: string
      description: |
        Desired regulatory version for the call to the participant (available only on non-proxy routes).

        **Behavior:**
        - If not sent: the most current version available at the participant will be used.
        - If sent with an existing exact version: uses the requested version.
        - If sent with a non-existent version: the most recent version of the same major will be used, if available. Otherwise, the most current version available will be used.

        **Accepted format:** It is valid to use the full version (e.g.: "4.0.0") or only the major (e.g.: "4").

        **Note:** This header is not accepted on proxy routes. On proxy routes, the version will always be the most current of the major indicated in the OpusTPP endpoint.
      example: '4.0.0'
    SelectedRegulatoryVersion:
      type: string
      description: |
        Regulatory version actually used in the request to the participant.

        This header is returned in all responses (proxy and non-proxy routes) to indicate which version of the participant's endpoint was used to process the request.
      example: '4.0.0'
  headers:
    xOriginError:
      description: Indicates the origin of the error.
      schema:
        $ref: '#/components/schemas/EnumOriginError'
      required: false
    xErrorSourceUrl:
      description: URL of the call that originated the error, present only when `x-origin-error` = `participant`.
      schema:
        type: string
      required: false
    xRegulatoryV:
      description: Desired regulatory version for the call to the participant (available only on non-proxy routes).
      schema:
        $ref: '#/components/schemas/RegulatoryVersion'
      required: false
    xSelectedRegulatoryV:
      description: Regulatory version actually used in the request to the participant.
      schema:
        $ref: '#/components/schemas/SelectedRegulatoryVersion'
      required: true
  parameters:
    applicationId:
      name: x-application-id
      in: header
      required: true
      description: Identifier of the application making the request
      schema:
        $ref: '#/components/schemas/UUID'
    authorisationServerId:
      name: x-authorisation-server-id
      required: true
      description: Identifier of the Authorisation Server of the consent transmitter, obtained by querying the list of participants
      in: header
      schema:
        $ref: '#/components/schemas/UUID'
    headerRecurringConsentId:
      name: x-recurring-consent-id
      required: true
      in: header
      description: Identifier of the consent to be used in this operation, obtained in the response of its creation
      schema:
        type: string
        pattern: '^urn:[a-zA-Z0-9][a-zA-Z0-9-]{0,31}:[a-zA-Z0-9()+,\-.:=@;$_!*''%\/?#]+$'
        maxLength: 256
      example: 'urn:bancox:f865cd66-392a-420b-9ff0-1b6d7cc60ee0'
    recurringConsentId:
      name: recurringConsentId
      required: true
      in: path
      description: |
        The recurringConsentId is the unique identifier of the long-lived consent and must be a URN - Uniform Resource Name.
        A URN, as defined in RFC8141, is a Uniform Resource Identifier - URI - that is assigned under the "urn" URI scheme and a specific URN namespace, with the intent that the URN be a persistent, location-independent resource identifier.
        Considering the string urn:bancoex:C1DD33123 as an example for recurringConsentId we have:
        - namespace(urn)
        - identifier associated with the namespace of the holding institution (bancoex).
        - specific identifier within the namespace (C1DD33123).
        More detailed information about the construction of namespaces should be consulted in RFC8141.
      schema:
        type: string
        pattern: '^urn:[a-zA-Z0-9][a-zA-Z0-9-]{0,31}:[a-zA-Z0-9()+,\-.:=@;$_!*''%\/?#]+$'
        maxLength: 256
      example: 'urn:bancox:f865cd66-392a-420b-9ff0-1b6d7cc60ee0'
    authorisationFlowIntent:
      name: x-authorisation-flow-intent
      required: false
      description: Indicator of which payment consent approval model will be used
      in: header
      schema:
        $ref: '#/components/schemas/EnumAuthorisationFlowIntent'
    regulatoryV:
        name: x-regulatory-v
        required: false
        description: Desired regulatory version for the call to the participant (available only on non-proxy routes).
        in: header
        schema:
          $ref: '#/components/schemas/RegulatoryVersion'
