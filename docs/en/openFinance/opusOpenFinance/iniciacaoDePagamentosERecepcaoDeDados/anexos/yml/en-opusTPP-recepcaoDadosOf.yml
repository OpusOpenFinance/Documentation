    EnumCreditCardTransactionType:
      type: string
      description: Provides the transaction types
      enum:
        - PAGAMENTO
        - TARIFA
        - OPERACOES_CREDITO_CONTRATADAS_CARTAO
        - ESTORNO
        - CASHBACK
        - OUTROS
      example: CASHBACK
    EnumAccountType:
      type: string
      enum:
        - CONTA_DEPOSITO_A_VISTA
        - CONTA_POUPANCA
        - CONTA_PAGAMENTO_PRE_PAGA
      description: |
        Account types. Traditional modalities provided for by Resolution 4,753, not covering linked accounts, accounts of persons domiciled abroad, accounts in foreign currencies and electronic money correspondent accounts. See Enum
        Demand deposit account or Checking account - it is the most common type. In it, the money is at your disposal to be withdrawn at any time. This account does not generate income for the depositor
        Savings account - it was created to encourage people to save. Money that stays in the account for thirty days starts to generate income, with income tax exemption for those who declare. That is, the money “grows” (yields) while it stays in the account. Each deposit will yield income month by month, always on the day of the month on which the money was deposited
        Prepaid payment account: according to CIRCULAR No. 3,680, BCB of 2013, it is the account 'intended for the execution of payment transactions in electronic money carried out based on funds denominated in reais previously contributed'
      example: CONTA_DEPOSITO_A_VISTA
    EnumCreditDebitIndicator:
      type: string
      description: |
        Indicator of the entry type: 
        Debit (on the statement) On a bank statement, debits, marked with the letter “D” next to the recorded amount, report the outflows of money in the checking account.
        Credit (on the statement) On a bank statement, credits, marked with the letter “C” next to the recorded amount, report the inflows of money in the checking account.
      enum:
        - CREDITO
        - DEBITO
      example: DEBITO
    EnumPartiePersonType:
      type: string
      enum:
        - PESSOA_NATURAL
        - PESSOA_JURIDICA
      example: PESSOA_NATURAL
      description: |
        Identification of the Person Type of the person involved in the transaction.   
        Natural Person - Inform CPF in the “partieCnpjCpf” field.   
        Legal Entity - Inform CNPJ in the “partieCnpjCpf” field.
    EnumOriginError:
      type: string
      enum:
        - opus-tpp
        - participant
        - directory
        - unknown
      example: opus-tpp
      description: |
        Origin of the reported error:
        - **opus-tpp**: error originated in Opus TPP.
        - **participant**: error originated in the data transmitting or holding institution.
        - **directory**: error originated in the Participants Directory.
        - **unknown**: unidentified origin.
    RegulatoryVersion:
      type: string
      description: |
        Desired regulatory version for the call to the participant (available only on non-proxy routes).
        
        **Behavior:**
        - If not sent: the most current version available at the participant will be used.
        - If sent with an exact existing version: uses the requested version.
        - If sent with a non-existent version: the most recent version of the same major will be used, if available. Otherwise, the most current version available will be used.
        
        **Accepted format:** It is valid to use the full version (e.g. "4.0.0") or just the major (e.g. "4").
        
        **Note:** This header is not accepted on proxy routes. On proxy routes, the version will always be the most current of the major indicated in the OpusTPP endpoint.
      example: '4.0.0'
    SelectedRegulatoryVersion:
      type: string
      description: |
        Regulatory version actually used in the request to the participant.
        
        This header is returned in all responses (proxy and non-proxy routes) to indicate which version of the participant's endpoint was used to process the request.
        
        **Examples:**
        - Client requested "4.0.0" and the participant has it: returns "4.0.0"
        - Client requested "4.1.0" but the participant only has "4.0.0": returns "4.0.0"
        - Client did not inform the header: returns the most current version available (e.g. "4.2.0")
      example: '4.0.0'
  headers:
    xOriginError:
      description: Indicates the origin of the error.
      schema:
        $ref: '#/components/schemas/EnumOriginError'
      required: false
    xErrorSourceUrl:
      description: URL of the call that originated the error, present only when `x-origin-error` = `participant`.
      schema:
        type: string
      required: false
    xRegulatoryV:
      description: Desired regulatory version for the call to the participant (available only on non-proxy routes).
      schema:
        $ref: '#/components/schemas/RegulatoryVersion'
      required: false
    xSelectedRegulatoryV:
      description: Regulatory version actually used in the request to the participant.
      schema:
        $ref: '#/components/schemas/SelectedRegulatoryVersion'
      required: true
  parameters:
    applicationId:
      name: x-application-id
      in: header
      required: true
      description: Identifier of the application making the request
      schema:
        $ref: '#/components/schemas/UUID'
    customerUserAgent:
      name: x-customer-user-agent
      in: header
      required: true
      description: Indicates the user-agent used by the user.
      schema:
        type: string
        pattern: '[\w\W\s]*'
        minLength: 1
        maxLength: 100
    fapiCustomerIpAddress:
      name: x-fapi-customer-ip-address
      in: header
      required: true
      description: The user's IP address if currently logged in with the receiver.
      schema:
        type: string
        pattern: '[\w\W\s]*'
    authorisationServerId:
      name: x-authorisation-server-id
      required: true
      description: Identifier of the Authorisation Server of the consent's data transmitter, obtained by querying the list of participants
      in: header
      schema:
        $ref: '#/components/schemas/UUID'
    regulatoryV:
      name: x-regulatory-v
      required: false
      description: Desired regulatory version for the call to the participant (available only on non-proxy routes).
      in: header
      schema:
        $ref: '#/components/schemas/RegulatoryVersion'
    headerConsentId:
      name: x-consent-id
      required: true
      in: header
      description: Identifier of the consent to be used in this operation, obtained in the response of its creation
      schema:
        type: string
        pattern: '^urn:[a-zA-Z0-9][a-zA-Z0-9-]{0,31}:[a-zA-Z0-9()+,\-.:=@;$_!*''%\/?#]+$'
        maxLength: 256
      example: 'urn:bancox:f865cd66-392a-420b-9ff0-1b6d7cc60ee0'
    consentId:
      name: consentId
      required: true
      in: path
      description: |
        The consentId is the unique identifier of the consent and must be a URN - Uniform Resource Name.
        A URN, as defined in [RFC8141](https://tools.ietf.org/html/rfc8141), is a Uniform Resource
        Identifier - URI - that is assigned under the "urn" URI scheme and a specific URN namespace, with the intention that the URN
        is a persistent, location-independent resource identifier.
        Considering the string urn:prudential:C1DD93123 as an example for consentId we have:
        - the namespace (urn)
        - the identifier associated with the data transmitting institution's namespace (bancox)
        - the specific identifier within the namespace (f865cd66-392a-420b-9ff0-1b6d7cc60ee0).
        More detailed information on the construction of namespaces should be consulted in [RFC8141](https://tools.ietf.org/html/rfc8141).
      schema:
        type: string
        pattern: '^urn:[a-zA-Z0-9][a-zA-Z0-9-]{0,31}:[a-zA-Z0-9()+,\-.:=@;$_!*''%\/?#]+$'
        maxLength: 256
      example: 'urn:bancox:f865cd66-392a-420b-9ff0-1b6d7cc60ee0'
    creditCardAccountId:
      name: creditCardAccountId
      description: 'Uniquely identifies the customer''s post-paid payment account, maintaining the immutability rules within the data transmitting institution'
      in: path
      schema:
        type: string
      required: true
    accountId:
      name: accountId
      description: 'Identifier of the demand deposit, savings or prepaid payment account.'
      in: path
      schema:
        type: string
      required: true
    contractId:
      name: contractId
      description: 'Contract identifier for all types of credit operation.'
      in: path
      schema:
        type: string
      required: true
    investmentId:
      name: investmentId
      description: 'Uniquely identifies the customer''s relationship with the product, maintaining the immutability rules within the data transmitting institution'
      in: path
      schema:
        type: string
      required: true
    brokerNoteId:
      name: brokerNoteId
      description: 'Uniquely identifies the customer''s relationship with the product, maintaining the immutability rules within the data transmitting institution'
      in: path
      schema:
        type: string
      required: true
    operationId:
      name: operationId
      description: 'Uniquely identifies the customer''s relationship with the product, maintaining the immutability rules within the data transmitting institution'
      in: path
      schema:
        type: string
      required: true
    page:
      name: page
      in: query
      description: Number of the page being requested (the value of the first page is 1).
      schema:
        type: integer
        default: 1
        minimum: 1
        maximum: 2147483647
        format: int32
    pageSize:
      name: page-size
      in: query
      description: Total number of records per page. The data transmitter must consider the input as 25, if a smaller value is informed by the receiver. As long as there are more than 25 records to send, the data transmitter must consider the minimum per page as 25. Only the last returned page (or the first, in the case of a single page) may contain fewer than 25 records. For more information, go to API Specifications > Standards > Pagination.
      schema:
        type: integer
        default: 25
        minimum: 25
        format: int32
        maximum: 1000
    creditCardPayeeMCC:
