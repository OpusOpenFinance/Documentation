    PurposeAdditionalInfo:
      description: Free text to complement information related to the purpose field.
        [Constraint] Fill in when purpose equals OUTROS.
      type: string
      pattern: "[\\w\\W\\s]*"
      maxLength: 100
      example: Additional information
    TedTefPaymentConsent:
      allOf:
        - $ref: "#/components/schemas/PaymentConsent"
      type: object
      description: Only for TED payment consents. Object containing payment data for
        consent.
      required:
        - creditorAccount
      properties:
        creditorAccount:
          $ref: "#/components/schemas/CreditorAccount"
        purpose:
          $ref: "#/components/schemas/EnumPurpose"
        purposeAdditionalInfo:
          $ref: "#/components/schemas/PurposeAdditionalInfo"
    DebtorAccount:
      type: object
      description: "Object containing the identification of the payer's source
        account. \ 


        Information regarding the payer's source account may be brought in the
        consent to the holder, if the initiator has collected this information
        from the customer. Otherwise, it will be collected at the holder and
        brought to the initiator as a response to the payment creation.

        \n"
      required:
        - ispb
        - number
        - accountType
      properties:
        ispb:
          type: string
          minLength: 8
          maxLength: 8
          pattern: ^[0-9A-Z]{8}$
          description: "Must be filled with the ISPB (Identifier of the Brazilian Payment
            System) of the SPI participant (Instant Payment System) using only
            numbers.

            \n"
          example: "12345678"
        issuer:
          type: string
          minLength: 1
          maxLength: 4
          pattern: ^[0-9]{1,4}$
          description: "Issuing agency code of the account without digit. \ 


            (Agency is the branch intended for customer service, the general
            public, and members of credit cooperatives, \ 


            in the exercise of the institution's activities, and cannot be
            mobile or temporary). \ 


            [Constraint] Mandatory filling for the following account types: CACC
            (CONTA_DEPOSITO_A_VISTA), SVGS (CONTA_POUPANCA) and SLRY
            (CONTA_SALARIO).

            \n"
          example: "1774"
        number:
          type: string
          minLength: 1
          maxLength: 20
          pattern: ^[0-9]{1,20}$
          description: "Must be filled with the payer user's transactional account number,
            with a check digit (if it exists), \ 


            if there is an alphanumeric value, it must be converted to 0.

            \n"
          example: "1234567890"
        accountType:
          $ref: "#/components/schemas/EnumAccountPaymentsType"
      additionalProperties: false
    AuthExtraData:
      type: array
      description: Array of key and value with institution data, this data will be
        sent to the discovery connector and can be used as filters for resource
        selection.
      items:
        type: object
        required:
          - key
          - value
        properties:
          key:
            type: string
            example: branch
          value:
            type: string
            example: "0011"
    ConsentOwner:
      type: array
      description: Array of key and value with identification data related to the
        consent owner. This data will be sent to the discovery connector.
      items:
        type: object
        required:
          - key
          - value
        properties:
          key:
            type: string
            example: branch
          value:
            type: string
            example: "0011"
    ConsentPayment:
      description: Payment consent.
      type: object
      required:
        - brandId
        - creationDateTime
        - tpp
        - externalId
        - loggedUser
        - expirationDateTime
        - creditor
        - payment
      properties:
        brandId:
          $ref: "#/components/schemas/BrandId"
        creationDateTime:
          $ref: "#/components/schemas/CreationDateTime"
        tpp:
          $ref: "#/components/schemas/TPP"
        externalId:
          $ref: "#/components/schemas/ExternalId"
        loggedUser:
          $ref: "#/components/schemas/LoggedUser"
        businessDocumentType:
          $ref: "#/components/schemas/BusinessEntity"
        resources:
          $ref: "#/components/schemas/AcceptedResources"
        version:
          $ref: "#/components/schemas/Version"
        expirationDateTime:
          $ref: "#/components/schemas/ExpirationDateTime"
        creditor:
          $ref: "#/components/schemas/Identification"
        payment:
          oneOf:
            - $ref: "#/components/schemas/PixPaymentConsent"
            - $ref: "#/components/schemas/TedTefPaymentConsent"
        debtorAccount:
          $ref: "#/components/schemas/DebtorAccount"
        authExtraData:
          $ref: "#/components/schemas/AuthExtraData"
        consentOwner:
          $ref: "#/components/schemas/ConsentOwner"
      additionalProperties: false
    StartDateTime:
      description: Date and time when the consent should become valid. A string with
        date and time according to RFC-3339 specification, always using UTC
        timezone (UTC time format).
      type: string
      maxLength: 20
      pattern: ^(\d{4})-(1[0-2]|0?[1-9])-(3[01]|[12][0-9]|0?[1-9])T(?:[01]\d|2[0123]):(?:[012345]\d):(?:[012345]\d)Z$
      example: "2021-05-21T08:30:00Z"
    Creditors:
      type: array
      minItems: 1
      items:
        type: object
        description: Object containing the creditor's data.
        required:
          - personType
          - cpfCnpj
          - name
        properties:
          personType:
            $ref: "#/components/schemas/EnumPaymentPersonType"
          cpfCnpj:
            type: string
            minLength: 11
            maxLength: 14
            pattern: ^([0-9]{11})$|^([0-9A-Z]{12}[0-9]{2})$
            example: "58764789000137"
            description: "Identification of the person involved in the transaction. \ 


              Fill with CPF or CNPJ, according to the value chosen in the type
              field. \ 


              CPF will be used with 11 numbers and must be informed without dots
              or dashes. \ 


              CNPJ will be used with 14 numbers and must be informed without
              dots or dashes.

              \n"
          name:
            type: string
            pattern: ^([A-Za-zÀ-ÖØ-öø-ÿ,.@:&*+_<>()!?/\\$%\d' -]+)$
            maxLength: 120
            example: Marco Antonio de Brito
            description: "In case of a natural person, the full name of the creditor's
              account holder must be provided. \ 


              In case of a legal entity, the corporate name or trade name of the
              creditor's account must be provided.

              \n"
    ContractDebtor:
      type: object
      description: Information about the contract debtor client.
      required:
        - name
        - document
      properties:
        name:
          type: string
          description: In case of a natural person, the full name of the contract debtor
            holder must be provided.
          maxLength: 120
          pattern: ^([A-Za-zÀ-ÖØ-öø-ÿ,.@:&*+_<>()!?/\\$%\d' -]+)$
          example: Policarpo Quaresma
        document:
          type: object
          description: Official identification document of the contract debtor client.
          required:
            - identification
            - rel
          properties:
            identification:
              type: string
              description: Official identification document number of the contract debtor
                client.
              maxLength: 14
              pattern: ^([0-9]{11})$|^([0-9A-Z]{12}[0-9]{2})$
              example: "11111111111111"
            rel:
              type: string
              description: Type of the official identification document of the contract debtor
                client.
              enum:
                - CPF
                - CNPJ
          additionalProperties: false
      additionalProperties: false
    ImmediatePayment:
      type: object
      description: Definitions for immediate transaction.
      required:
        - type
        - date
        - currency
        - amount
        - creditorAccount
      properties:
        type:
          $ref: "#/components/schemas/EnumPaymentType"
        date:
          type: string
          format: date
          maxLength: 10
          pattern: ^(\d{4})-(1[0-2]|0?[1-9])-(3[01]|[12][0-9]|0?[1-9])$
          example: "2021-01-01"
          description: "Defines the target settlement date of the payment.


            Brasília timezone must be used for creation and reasoning about the
            data in this field.

            \n"
        currency:
          type: string
          maxLength: 3
          pattern: ^([A-Z]{3})$
          example: BRL
          description: "National currency code according to ISO-4217 standard, i.e.,
            'BRL'.


            All monetary values informed are represented with Brazil's current
            currency.

            \n"
        amount:
          type: string
          minLength: 4
          maxLength: 19
          pattern: ^((\d{1,16}\.\d{2}))$
          example: "100000.12"
          description: "Transaction amount with 2 decimal places.

            \n"
        remittanceInformation:
          type: string
          maxLength: 140
          pattern: "[\\w\\W\\s]*"
          example: Payment of invoice RSTO035-002
          description: "Must be filled whenever the payer user inserts additional
            information in a payment, to be sent to the creditor.

            \n"
        creditorAccount:
          $ref: "#/components/schemas/CreditorAccount"
    AutomaticV1:
      type: object
      description: Recurrence configuration definition for automatic payments.
      required:
        - contractId
        - period
        - contractDebtor
      properties:
        contractId:
          type: string
          pattern: ^[a-zA-Z0-9]{1,35}$
          minLength: 1
          maxLength: 35
          example: XE00038166201907261559y6j6
          description: Transaction contract identifier.
        amount:
          type: string
          pattern: ^((\d{1,16}\.\d{2}))$
          minLength: 4
          maxLength: 19
          example: "100000.12"
          description: Transaction amount with 2 decimal places.
        transactionLimit:
          type: string
          pattern: ^((\d{1,16}\.\d{2}))$
          minLength: 4
          maxLength: 19
          example: "1000000.12"
          description: Transaction amount with 2 decimal places.
        period:
          type: string
          enum:
            - DIARIO
            - SEMANAL
            - MENSAL
            - ANUAL
          example: DIARIO
          description: "Defines the allowed periodicity for carrying out transactions


            - DAILY


            - WEEKLY


            - MONTHLY


            - YEARLY

            \n"
        dayOfMonth:
          type: integer
          format: int32
          minimum: 1
          maximum: 31
          example: 10
          description: "Fixed day of the month on which the transaction is scheduled.




            [Constraint] Field must be sent when the
            `/data/recurringConfiguration/automatic/period` field is equal to
            MONTHLY or YEARLY.

            \n"
        dayOfWeek:
          type: string
          enum:
            - SEGUNDA_FEIRA
            - TERCA_FEIRA
            - QUARTA_FEIRA
            - QUINTA_FEIRA
            - SEXTA_FEIRA
          example: SEGUNDA_FEIRA
          description: "Day of the week on which the transaction is scheduled.


            - MONDAY


            - TUESDAY


            - WEDNESDAY


            - THURSDAY


            - FRIDAY




            [Constraint] Field must be sent when the
            `/data/recurringConfiguration/automatic/period` field is equal to
            WEEKLY.

            \n"
        month:
          type: string
          enum:
            - JANEIRO
            - FEVEREIRO
            - MARCO
            - ABRIL
            - MAIO
            - JUNHO
            - JULHO
            - AGOSTO
            - SETEMBRO
            - OUTUBRO
            - NOVEMBRO
            - DEZEMBRO
          example: JANEIRO
          description: "Months scheduled for transactions to occur.


            - JANUARY


            - FEBRUARY


            - MARCH


            - APRIL


            - MAY


            - JUNE


            - JULY


            - AUGUST


            - SEPTEMBER


            - OCTOBER


            - NOVEMBER


            - DECEMBER




            [Constraint] Field must be sent when the
            `/data/recurringConfiguration/automatic/period` field is equal to
            YEARLY

            \n"
        contractDebtor:
          $ref: "#/components/schemas/ContractDebtor"
        immediatePayment:
          $ref: "#/components/schemas/ImmediatePayment"
      additionalProperties: false
    AutomaticV2:
      type: object
      description: Recurrence configuration definition for automatic payments.
      required:
        - contractId
        - interval
        - contractDebtor
        - isRetryAccepted
        - useOverdraftLimit
        - referenceStartDate
      properties:
        contractId:
          type: string
          pattern: ^[a-zA-Z0-9]{1,35}$
          minLength: 1
          maxLength: 35
          example: XE00038166201907261559y6j6
          description: Transaction contract identifier.
        fixedAmount:
          type: string
          pattern: ^((\d{1,16}\.\d{2}))$
          minLength: 4
          maxLength: 19
          example: "100000.12"
          description: "Fixed charge amount, if filled, represents a consent for payments
            of fixed amounts, or not subject to change during the consent
            period.\ 




            [Constraint] Mutually exclusive with the field
            “/data/recurringConfiguration/automatic/maximumVariableAmount”

            \n"
        maximumVariableAmount:
          type: string
          pattern: ^((\d{1,16}\.\d{2}))$
          minLength: 4
          maxLength: 19
          example: "1000000.12"
          description: "Maximum amount allowed per charge, if filled, represents a consent
            for payments of variable amounts.\ 




            [Constraint] Mutually exclusive with the field
            “/data/recurringConfiguration/automatic/fixedAmount”

            \n"
        interval:
          type: string
          enum:
            - SEMANAL
            - MENSAL
            - ANUAL
            - SEMESTRAL
            - TRIMESTRAL
          example: SEMANAL
          description: "Defines the allowed periodicity for carrying out transactions


            - WEEKLY


            - MONTHLY


            - YEARLY


            - SEMIANNUALLY


            - QUARTERLY

            \n"
        contractDebtor:
          $ref: "#/components/schemas/ContractDebtor"
        firstPayment:
          $ref: "#/components/schemas/ImmediatePayment"
        minimumVariableAmount:
          type: string
          pattern: ^((\d{1,16}\.\d{2}))$
          minLength: 4
          maxLength: 19
          example: "100000.12"
          description: "Value defined by the creditor user.\ 


            If the payer user assigns a maximum value for the payments of that
            authorization, it cannot be lower than the minimum value (floor)
            defined by the creditor user.\ 


            Cannot be filled in fixed value authorizations.

            \n"
        isRetryAccepted:
          type: boolean
          description: Indicates if it is allowed by the creditor client to make payment
            attempts (extraday), according to the rules established by the Pix
            arrangement.
          example: false
        useOverdraftLimit:
          type: boolean
          default: true
          example: true
          description: Indicates if the payer user authorized the use of a pre-approved
            limit (overdraft) in their account for making payments, if the
            customer has the product.
        referenceStartDate:
          type: string
          format: date
          pattern: ^(\d{4})-(1[0-2]|0?[1-9])-(3[01]|[12][0-9]|0?[1-9])$
          description: "Represents the expected date for the start of the billing cycle
            for payments associated with the recurrence. It is a string with
            date according to RFC-3339 specification, following Brasília time."
          example: "2023-05-21"
      additionalProperties: false
    Automatic:
      type: object
      required:
        - automatic
      properties:
        automatic:
          oneOf:
            - $ref: "#/components/schemas/AutomaticV1"
            - $ref: "#/components/schemas/AutomaticV2"
      additionalProperties: false
    Day:
      type: object
      description: "Configure daily transactional limit determined by the payer user.




        [Constraint] If the object is sent, at least one of the fields
        (`quantityLimit` or `transactionLimit`) must be filled.

        \n"
      properties:
        quantityLimit:
          type: integer
          example: 2
          description: Quantity limit of transactions allowed to occur during a day.
        transactionLimit:
          type: string
          pattern: ^((\d{1,16}\.\d{2}))$
          minLength: 4
          maxLength: 19
          example: "100000.12"
          description: Maximum amount to be transacted daily.
    Week:
      type: object
      description: "Configure weekly transactional limit determined by the payer user.




        [Constraint] If the object is sent, at least one of the fields
        (`quantityLimit` or `transactionLimit`) must be filled.

        \n"
      properties:
        quantityLimit:
          type: integer
          example: 10
          description: Quantity limit of transactions allowed to occur during a week.
        transactionLimit:
          type: string
          pattern: ^((\d{1,16}\.\d{2}))$
          minLength: 4
          maxLength: 19
          example: "100000.12"
          description: Maximum amount to be transacted weekly.
    Month:
      type: object
      description: "Configure monthly transactional limit determined by the payer
        user.




        [Constraint] If the object is sent, at least one of the fields
        (`quantityLimit` or `transactionLimit`) must be filled.

        \n"
      properties:
        quantityLimit:
          type: integer
          example: 30
          description: Quantity limit of transactions allowed to occur during a month.
        transactionLimit:
          type: string
          pattern: ^((\d{1,16}\.\d{2}))$
          minLength: 4
          maxLength: 19
          example: "100000.12"
          description: Maximum amount to be transacted monthly.
    Year:
      type: object
      description: "Configure yearly transactional limit determined by the payer user.




        [Constraint] If the object is sent, at least one of the fields
        (`quantityLimit` or `transactionLimit`) must be filled.

        \n"
      properties:
        quantityLimit:
          type: integer
          example: 100
          description: Quantity limit of transactions allowed to occur during a year.
        transactionLimit:
          type: string
          pattern: ^((\d{1,16}\.\d{2}))$
          minLength: 4
          maxLength: 19
          example: "100000.12"
          description: Maximum amount to be transacted per year, from the date defined in
            the `/data/startDateTime` field.
    PeriodicLimits:
      type: object
      description: Transactional limits per period determined by the payer user.
      properties:
        day:
          $ref: "#/components/schemas/Day"
        week:
          $ref: "#/components/schemas/Week"
        month:
          $ref: "#/components/schemas/Month"
        year:
          $ref: "#/components/schemas/Year"
    PostSweeping:
      type: object
      required:
        - sweeping
      properties:
        sweeping:
          type: object
          description: Recurrence configuration definition for automatic fund transfers.
          properties:
            totalAllowedAmount:
              type: string
              minLength: 4
              maxLength: 19
              pattern: ^((\d{1,16}\.\d{2}))$
              example: "100000.12"
              description: Maximum amount to be reached by the sum of all transactions using
                the consent authorized by the customer. If the amount is
                exceeded, the account holder must deny the transaction requested
                by the initiator.
            transactionLimit:
              type: string
              pattern: ^((\d{1,16}\.\d{2}))$
              minLength: 4
              maxLength: 19
              example: "1000000.12"
              description: Maximum amount for each payment transaction associated with this
                consent. If the payment amount is greater than this limit, the
                account holder must reject the payment transaction.
            periodicLimits:
              $ref: "#/components/schemas/PeriodicLimits"
      additionalProperties: false
    Vrp:
      type: object
      required:
        - vrp
      properties:
        vrp:
          type: object
          description: Recurrence configuration definition for carrying out variable value
            transactions.
          properties:
            transactionLimit:
              type: string
              pattern: ^((\d{1,16}\.\d{2}))$
              minLength: 4
              maxLength: 19
              example: "100000.12"
              description: Maximum amount limit allowed for each payment transaction.
            globalLimits:
              type: object
              description: Maximum transactional limit for payments, after reaching this
                value, the consent must go to the "CONSUMED" status.
              properties:
                quantityLimit:
                  type: integer
                  example: 10
                  description: Maximum quantity of payment occurrences, after reaching this value,
                    the consent must go to the "CONSUMED" status.
                transactionLimit:
                  type: string
                  pattern: ^((\d{1,16}\.\d{2}))$
                  minLength: 4
                  maxLength: 19
                  example: "100000.12"
                  description: Maximum transactional value for payments under this consent, after
                    reaching this value, the consent must go to the "CONSUMED"
                    status.
            periodicLimits:
              type: object
              description: Transactional limits per period determined by the payer user.
              properties:
                day:
                  $ref: "#/components/schemas/Day"
                week:
                  $ref: "#/components/schemas/Week"
                month:
                  $ref: "#/components/schemas/Month"
                year:
                  $ref: "#/components/schemas/Year"
      additionalProperties: false
    AdditionalInformation:
      description: Must be filled whenever the payer user inserts additional
        information in the consent.
      type: string
      example: My recurrence
      pattern: "[\\w\\W\\s]*"
      maxLength: 140
    ConsentRecurringPayment:
      description: Recurring payment consent.
      type: object
      required:
        - brandId
        - creationDateTime
        - tpp
        - externalId
        - loggedUser
        - creditors
        - recurringConfiguration
      properties:
        brandId:
          $ref: "#/components/schemas/BrandId"
        creationDateTime:
          $ref: "#/components/schemas/CreationDateTime"
        tpp:
          $ref: "#/components/schemas/TPP"
        externalId:
          $ref: "#/components/schemas/ExternalId"
        loggedUser:
          $ref: "#/components/schemas/LoggedUser"
        businessDocumentType:
          $ref: "#/components/schemas/BusinessEntity"
        resources:
          $ref: "#/components/schemas/AcceptedResources"
        version:
          $ref: "#/components/schemas/Version"
        startDateTime:
          $ref: "#/components/schemas/StartDateTime"
        expirationDateTime:
          $ref: "#/components/schemas/ExpirationDateTime"
        creditors:
          $ref: "#/components/schemas/Creditors"
        recurringConfiguration:
          oneOf:
            - $ref: "#/components/schemas/Automatic"
            - $ref: "#/components/schemas/PostSweeping"
            - $ref: "#/components/schemas/Vrp"
        cancellation:
          $ref: "#/components/schemas/PixPaymentCancellation"
        additionalInformation:
          $ref: "#/components/schemas/AdditionalInformation"
        debtorAccount:
          $ref: "#/components/schemas/DebtorAccount"
        authExtraData:
          $ref: "#/components/schemas/AuthExtraData"
        consentOwner:
          $ref: "#/components/schemas/ConsentOwner"
      additionalProperties: false
    Permissions:
      type: array
      items:
        description: Permissions assigned to the account link.
        type: string
        enum:
          - PAYMENTS_INITIATE
      minItems: 1
      example:
        - PAYMENTS_INITIATE
    PaymentType:
      type: string
      description: Payment type indicator.
      maxLength: 25
      enum:
        - PAYMENT_CONSENT
        - PAYMENT_RECURRING_CONSENT
        - PAYMENT_ENROLLMENT_CONSENT
      example: PAYMENT_CONSENT
    DiscoveryAccountsPayment:
      type: object
      required:
        - requestMeta
        - consent
      properties:
        requestMeta:
          $ref: "#/components/schemas/RequestMeta"
        consent:
          oneOf:
            - $ref: "#/components/schemas/ConsentPaymentDiscoveryAccountsPayment"
            - $ref: "#/components/schemas/ConsentRecurringPaymentDiscoveryAccountsPayment"
            - $ref: "#/components/schemas/ConsentEnrollmentDiscoveryAccountsPayment"
        paymentType:
          $ref: "#/components/schemas/PaymentType"
      additionalProperties: false
    EndToEndIdWithoutRestriction:
      type: string
      minLength: 32
      maxLength: 32
      description: "Must be filled in the standard format
        ExxxxxxxxyyyyMMddHHmmkkkkkkkkkkk (32 characters; “case sensitive”, i.e.,
        differentiates between uppercase and lowercase letters), with: “E” –
        fixed (1 character); xxxxxxxx – identification of the agent that
        generated the ´EndToEndId´, which can be: the ISPB of the direct
        participant or the ISPB of the indirect participant (8 numeric
        characters [0-9]); yyyyMMddHHmm – date, hour, and minute (12
        characters), following UTC time, of the submission of the payment order,
        if settlement is priority, or scheduled for sending the order to the
        settlement system, in case of scheduling. For priority and non-priority
        orders, filling by the agent that generated the ´EndToEndId´ is
        accepted, with a maximum tolerance of 12 hours, for the future and for
        the past, in relation to the effective processing time of the order by
        the SPI; kkkkkkkkkkk – sequence created by the agent that generated the
        ´EndToEndId´ (11 alphanumeric characters [a-z/A-Z/0-9]). Must be unique
        within each “yyyyMMddHHmm”. It is allowed for the ´EndToEndId´ to be
        generated by the direct participant, the indirect participant, or the
        payment initiator. It must be unique, cannot be repeated in any other
        operation sent to the SPI."
      pattern: ^([E])([0-9A-Z]{8})([0-9]{4})(0[1-9]|1[0-2])(0[1-9]|[1-2][0-9]|3[0-1])(2[0-3]|[01][0-9])([0-5][0-9])([a-zA-Z0-9]{11})$
      example: E9040088820241225150000123873170
    RemittanceInformation:
      description: Must be filled whenever the payer user inserts additional
        information in a payment, to be sent to the creditor.
      type: string
      pattern: "[\\w\\W\\s]*"
      maxLength: 140
      example: Payment of invoice XPTO035-002.
    CnpjInitiator:
      type: string
      pattern: ^[0-9A-Z]{12}[0-9]{2}$
      maxLength: 14
      description: CNPJ of the Payment Initiator duly qualified to provide the Payment
        Initiation Service in Pix.
      example: "50685362000135"
    TransactionIdentification:
      description: "This is a transaction identifier that must be retransmitted intact
        by the payer's PSP when generating the payment order.




        [Constraint] The holder must mandatorily return the field with the same
        value received from the initiator, if it was sent in the payment
        initiation request.

        \n"
      type: string
      maxLength: 35
      pattern: ^[a-zA-Z0-9]{1,35}$
      example: E00038166201907261559y6j6
    EnumValidationStage:
      type: string
      enum:
        - POST_CONSENT
        - POST_PAYMENT
      example: POST_CONSENT
      description: "Moment referring to the payment validation call.




        \ Description of each ENUM value.








        - POST_CONSENT - Validation called at the time of post consent.




        - POST_PAYMENT - Validation called at the time of post payment.



        \n"
    PixPaymentRecurringConsent:
      type: object
      description: Only for pix payment consents. Object containing payment data for
        consent.
      properties:
        cancellation:
          $ref: "#/components/schemas/PixPaymentCancellation"
        ibgeTownCode:
          $ref: "#/components/schemas/IbgeTownCode"
        recurringConfiguration:
          oneOf:
            - $ref: "#/components/schemas/Automatic"
            - $ref: "#/components/schemas/PostSweeping"
            - $ref: "#/components/schemas/Vrp"
    ValidatePaymentRecurringConsent:
      type: object
      description: Object containing consent information for individual payment initiation.
      required:
        - tpp
        - loggedUser
        - creditors
        - payment
      properties:
        tpp:
          $ref: "#/components/schemas/TPP"
        loggedUser:
          $ref: "#/components/schemas/LoggedUser"
        creditors:
          $ref: "#/components/schemas/Creditors"
        payment:
          allOf:
            - $ref: "#/components/schemas/PixPaymentRecurringConsent"
            - type: object
              properties:
                endToEndId:
                  $ref: "#/components/schemas/EndToEndIdWithoutRestriction"
                remittanceInformation:
                  $ref: "#/components/schemas/RemittanceInformation"
                cnpjInitiator:
                  $ref: "#/components/schemas/CnpjInitiator"
                transactionIdentification:
                  $ref: "#/components/schemas/TransactionIdentification"
        debtorAccount:
          $ref: "#/components/schemas/DebtorAccount"
        externalId:
          $ref: "#/components/schemas/ExternalId"
        validationStage:
          $ref: "#/components/schemas/EnumValidationStage"
        businessEntity:
          $ref: "#/components/schemas/BusinessEntity"
      additionalProperties: false
    PaymentValidation:
      type: object
      required:
        - requestMeta
        - requestBody
      properties:
        requestMeta:
          $ref: "#/components/schemas/RequestMeta"
        requestBody:
          type: object
          description: Payload for payment validation.
          required:
            - data
          properties:
            data:
              oneOf:
                - $ref: "#/components/schemas/ValidatePaymentConsentPaymentValidation"
                - $ref: "#/components/schemas/ValidatePaymentRecurringConsent"
            paymentType:
              $ref: "#/components/schemas/PaymentType"
      additionalProperties: false
    RequestMetaPayment:
      type: object
      description: Object containing data regarding the context in which the request
        was received.
      required:
        - correlationId
        - brandId
      properties:
        correlationId:
          type: string
          description: UUID that identifies the correlation ID of the request made. Must
            be propagated to all calls made between systems and logged whenever
            possible to facilitate error tracing.
          pattern: ^(localID:)?[0-9a-fA-F]{8}-[0-9a-fA-F]{4}-[0-9a-fA-F]{4}-[0-9a-fA-F]{4}-[0-9a-fA-F]{12}$
          example: 97623ed1-4732-4bf2-8d4b-ae7aced5443b
        brandId:
          $ref: "#/components/schemas/BrandId"
        nfcHeader:
          type: string
          description: The field represents a transaction initiated via NFC. Sending this
            field is mandatory in this scenario. Holders must store the
            information and correlate it with the consent and the originated
            payment.
          example: "true"
      additionalProperties: false
    RecurringConsentId:
      type: string
      pattern: ^urn:[a-zA-Z0-9][a-zA-Z0-9\-]{0,31}:[a-zA-Z0-9()+,\-.:=@;$_!*'%\/?#]+$
      maxLength: 256
      description: "Unique identifier of the long-term consent created for the
        requested payment initiation. It must be a URN - Uniform Resource
        Name.\ 


        A URN, as defined in [RFC8141](https://tools.ietf.org/html/rfc8141), is
        a Uniform Resource Identifier - URI - that is assigned under the URI
        scheme \"urn\" and a specific URN namespace, with the intention that the
        URN\ 


        is a persistent and location-independent resource identifier.\ 


        Considering the string urn:bancoex:C1DD33123 as an example for
        `recurringConsentId` we have:


        - the namespace(urn)


        - the identifier associated with the namespace of the transmitting
        institution (bancoex)


        - the specific identifier within the namespace (C1DD33123).


        More detailed information about constructing namespaces can be found in
        [RFC8141](https://tools.ietf.org/html/rfc8141).




        [Constraint] This field is mandatory when the value of the
        authorisationFlow field is equal to FIDO_FLOW.

        \n"
    PaymentData:
      type: object
      description: Object containing payment data such as currency and amount.
      required:
        - amount
        - currency
      properties:
        amount:
          description: "Transaction amount with 2 decimal places. The amount must be the
            same as sent in the consent.\ 




            For static QR Code with a predetermined value in the QR Code or for
            dynamic QR Code indicating that the value cannot be changed: The
            amount field must be filled with the value established in the QR
            Code.\ 


            If filled with a value divergent from the QR Code, an HTTP Status
            422 error must be returned.

            \n"
          type: string
          pattern: ^((\d{1,16}\.\d{2}))$
          minLength: 4
          maxLength: 19
          example: "100000.04"
        currency:
          type: string
          maxLength: 3
          description: National currency code according to ISO-4217 standard, i.e., 'BRL'.
            All monetary values informed are represented with Brazil's current
            currency.
          pattern: ^([A-Z]{3})$
          example: BRL
      additionalProperties: false
    Date:
      type: string
      description: "Date on which the payment will be made. A string using UTC-3
        timezone (UTC time format).

        \n"
      format: date
      maxLength: 10
      example: "2021-01-01"
    Document:
      type: object
      description: "Information of the identifying document of the transaction's
        creditor.

        \n"
      required:
        - identification
        - rel
      properties:
        identification:
          type: string
          minLength: 11
          maxLength: 14
          description: Official identification document number of the natural or legal
            person holder.
          example: "11111111111111"
          pattern: ^([0-9]{11})$|^([0-9A-Z]{12}[0-9]{2})$
        rel:
          type: string
          enum:
            - CPF
            - CNPJ
          example: CNPJ
          description: Type of the official identification document of the natural or
            legal person holder.
    RiskSignalsPayments:
      type: object
      description: "Risk signals for automatic payment initiation.




        [Constraint] Must be sent when the consent is for the Sweeping Accounts
        product (The object \"/data/recurringConfiguration/sweeping\" used in
        the oneOf)

        \n"
      properties:
        manual:
          type: object
          required:
            - deviceId
            - isRootedDevice
            - screenBrightness
            - elapsedTimeSinceBoot
            - osVersion
            - userTimeZoneOffset
            - language
            - screenDimensions
            - accountTenure
          description: "Represents the collection of risk signals with the user present.




            [Constraint] Mandatory to be sent when the transaction occurs in the
            presence of the user.

            \n"
          properties:
            deviceId:
              type: string
              description: Unique device ID generated by the platform.
              example: 00000000-54b3-e7c7-0000-000046bffd97
            isRootedDevice:
              type: boolean
              description: Indicates whether the device is currently rooted.
              example: false
            screenBrightness:
              type: number
              format: double
              description: "Indicates the screen brightness level of the device. \ 


                On Android devices, the value is an integer between 0 and 255,
                inclusive; \ 


                On iOS devices, the value is a floating point number between 0.0
                and 1.0.

                \n"
            elapsedTimeSinceBoot:
              type: integer
              format: int64
              description: Indicates how long (in milliseconds) the device has been on.
            osVersion:
              type: string
              description: Operating system version.
            userTimeZoneOffset:
              type: string
              description: "Indicates the user's device time zone setting, in UTC offset
                format: ±hh[:mm]

                \n"
            language:
              type: string
              description: Indicates the device language in ISO 639-1 format.
            screenDimensions:
              type: object
              description: Device screen dimensions.
              required:
                - height
                - width
              properties:
                height:
                  type: integer
                  format: int64
                  description: Screen height, in pixels.
                width:
                  type: integer
                  format: int64
                  description: Screen width, in pixels.
            accountTenure:
              type: string
              format: date
              pattern: ^(\d{4})-(1[0-2]|0?[1-9])-(3[01]|[12][0-9]|0?[1-9])$
              description: Customer registration date at the initiator.
            geolocation:
              type: object
              description: Geolocation data of the customer while logged into the initiator.
              properties:
                latitude:
                  type: number
                  format: double
                  description: Latitudinal coordinate of the customer while logged into the
                    initiator.
                longitude:
                  type: number
                  format: double
                  description: Longitudinal coordinate of the customer while logged into the
                    initiator.
                type:
                  type: string
                  description: "Type of mechanism used to generate the geolocation.

                    \n"
                  enum:
                    - COARSE
                    - FINE
                    - INFERRED
            isCallInProgress:
              type: boolean
              description: "Indicates an active call at the time of the link.




                [Constraint] If the risk signal is available (customer allowed
                it to be collected), it must be sent.

                \n"
            isDevModeEnabled:
              type: boolean
              description: Indicates if the device is in developer mode.
            isMockGPS:
              type: boolean
              description: Indicates if the device is using a fake GPS.
            isEmulated:
              type: boolean
              description: Indicates if the device is emulated or real.
            isMonkeyRunner:
              type: boolean
              description: Indicates the use of MonkeyRunner.
            isCharging:
              type: boolean
              description: Indicates if the device battery is being charged.
            antennaInformation:
              type: string
              description: Indicates which antenna the device is connected to.
            isUsbConnected:
              type: boolean
              description: Indicates if the device is connected to another device via USB.
            integrity:
              type: object
              description: "Informs the integrity of the device and app. \ 


                On Android, according to Play API Integrity documentation -
                [Android](https://developer.android.com/google/play/integrity/o\
                verview?hl=en). \ 


                On iOS, according to App Attest documentation
                [iOS](https://developer.apple.com/documentation/devicecheck/est\
                ablishing_your_app_s_integrity)

                \n"
              properties:
                appRecognitionVerdict:
                  type: string
                  description: Informs the integrity of the app.
                deviceRecognitionVerdict:
                  type: string
                  description: Informs the integrity of the device.
        automatic:
          type: object
          required:
            - lastLoginDateTime
            - pixKeyRegistrationDateTime
          description: "Represents the collection of risk signals without the user
            present.




            [Constraint] Mandatory to be sent when the transaction does not
            occur in the presence of the user.

            \n"
          properties:
            lastLoginDateTime:
              type: string
              description: Date and time of the customer's last login at the initiator.
              pattern: ^(\d{4})-(1[0-2]|0?[1-9])-(3[01]|[12][0-9]|0?[1-9])T(?:[01]\d|2[0123]):(?:[012345]\d):(?:[012345]\d)Z$
            pixKeyRegistrationDateTime:
              type: string
              description: Date and time of the creditor's Pix key registration at the
                initiator.
              pattern: ^(\d{4})-(1[0-2]|0?[1-9])-(3[01]|[12][0-9]|0?[1-9])T(?:[01]\d|2[0123]):(?:[012345]\d):(?:[012345]\d)Z$
    LegacyId:
      description: Array of key and value with the resource identification key in the
        legacy system, allowing composite keys.
      type: array
      items:
        type: object
        required:
          - key
        properties:
          key:
            description: Name of the identifier field in the legacy system.
            type: string
            example: internalPaymentId
          value:
            description: Value of the identifier field in the legacy system.
            type: string
            example: "1234"
      minItems: 1
      maxItems: 10
    PaymentReference:
      type: string
      example: 23-07-2025/P1W
      minLength: 4
      maxLength: 14
      pattern: ^zero$|^\d{2}-\d{2}-\d{4}/P(1W|1M|3M|6M|1Y)$|^W\d{1,2}-\d{4}$|^M\d{2}-\d{4}$|^Q\d-\d{4}$|^S\d-\d{4}$|^Y\d{4}$
      description: "[Constraint] Mandatory field if it is an automatic Pix payment and
        must be sent for ecosystem metric collection criteria. If this rule is
        not respected, the account holding institution must return an HTTP 422
        error with the code DETALHE_PAGAMENTO_INVALIDO. \ 


        - Filling must follow the following logic: \ 


        \  - First Payment: If it is the initial one-off payment, specified in
        the field “/data/firstPayment”, the value of this field must be filled
        with the fixed string \"zero\". \ 


        \  - Recurring Payments (Subsequent): For all recurring payments made
        after the initial payment, the paymentReference field must be filled
        with an ISO 8601 Interval string in the format ```<start>/<duration>```,
        which represents the exact cycle to which the payment refers. \ 


        \    - The ```<start>``` component must indicate the start date of the
        specific cycle to which the sent payment refers. \ 


        \    - The ```<duration>``` component must correspond to the recurrence
        periodicity code (P1W for weekly, P1M for monthly, P3M for quarterly,
        P6M for semi-annually, and P1Y for annually). \ 


        \    - Examples:


        \      - 1: Cycle start date defined in the consent: 23/07/25


        \        - Periodicity defined in the consent: Weekly


        \        - PaymentReference filling:


        \        - First cycle: 23-07-2025/P1W


        \        - Second cycle: 30-07-2025/P1W


        \        - Third cycle: 06-07-2025/P1W


        \      - 2: Cycle start date defined in the consent: 23/07/25


        \        - Periodicity defined in the consent: Monthly


        \        - PaymentReference filling:


        \        - First cycle: 23-07-2025/P1M


        \        - Second cycle: 23-08-2025/P1M


        \        - Third cycle: 23-09-2025/P1M

        \n"
    CreatePixPaymentData:
      type: object
      description: Object containing payment data and creditor data.
      required:
        - localInstrument
        - payment
        - cnpjInitiator
        - endToEndId
        - creditorAccount
      properties:
        endToEndId:
          $ref: "#/components/schemas/EndToEndIdWithoutRestriction"
        recurringConsentId:
          $ref: "#/components/schemas/RecurringConsentId"
        localInstrument:
          $ref: "#/components/schemas/EnumLocalInstrument"
        payment:
          $ref: "#/components/schemas/PaymentData"
        creditorAccount:
          $ref: "#/components/schemas/CreditorAccount"
        remittanceInformation:
          $ref: "#/components/schemas/RemittanceInformation"
        qrCode:
          $ref: "#/components/schemas/QrCode"
        proxy:
          $ref: "#/components/schemas/Proxy"
        cnpjInitiator:
          $ref: "#/components/schemas/CnpjInitiator"
        transactionIdentification:
          $ref: "#/components/schemas/TransactionIdentification"
        ibgeTownCode:
          $ref: "#/components/schemas/IbgeTownCode"
        date:
          $ref: "#/components/schemas/Date"
        document:
          $ref: "#/components/schemas/Document"
        authorisationFlow:
          type: string
          enum:
            - HYBRID_FLOW
            - CIBA_FLOW
            - FIDO_FLOW
          example: HYBRID_FLOW
          description: "Conditional field used to identify the authorization flow in which
            the payment was requested.




            [Constraint] If CIBA or FIDO, mandatory filling. If the field is not
            present in the payload, it is understood that the authorization flow
            used is HYBRID_FLOW.

            \n"
        riskSignals:
          $ref: "#/components/schemas/RiskSignalsPayments"
        originalRecurringPaymentId:
          $ref: "#/components/schemas/LegacyId"
        paymentReference:
          $ref: "#/components/schemas/PaymentReference"
      additionalProperties: false
    CreatePixPayment:
      type: object
      required:
        - requestMeta
        - consent
        - idempotencyKey
        - requestBody
      properties:
        requestMeta:
          $ref: "#/components/schemas/RequestMetaPayment"
        consent:
          oneOf:
            - $ref: "#/components/schemas/ConsentPayment"
            - $ref: "#/components/schemas/ConsentRecurringPayment"
        idempotencyKey:
          type: string
          description: Unique request identifier to support idempotency sent by the ITP.
          maxLength: 40
          pattern: ^(?!\s)(.*)(\S)$
          example: TXpRMU9UQTROMWhZV2xSU1FUazJSMDl
        internalIdempotencyKey:
          type: string
          description: Internal request identifier that, if present, must be used to
            handle retries of creating the same payment. Will always be sent for
            scheduled payments with multiple installments as a way to identify
            each one. If the environment variable
            feature.all-payments-async.enabled is active, this field will be
            sent for all payment types.
          maxLength: 40
          pattern: ^(?!\s)(.*)(\S)$
          example: TXpRMU9UQTROMWhZV2xSU1FUazJSMDl
        requestBody:
          type: object
          required:
            - data
          properties:
            data:
              $ref: "#/components/schemas/CreatePixPaymentData"
        paymentType:
          $ref: "#/components/schemas/PaymentType"
      additionalProperties: false
    PaymentId:
      description: Array of key and value with the resource identification key in the
        legacy system, allowing composite keys.
      type: array
      items:
        type: object
        required:
          - key
        properties:
          key:
            description: Name of the identifier field in the legacy system.
            type: string
            example: internalPaymentId
          value:
            description: Value of the identifier field in the legacy system.
            type: string
            example: "1234"
      minItems: 1
      maxItems: 10
    FindPixPayment:
      type: object
      required:
        - requestMeta
        - consent
        - paymentId
      properties:
        requestMeta:
          $ref: "#/components/schemas/RequestMeta"
        paymentId:
          $ref: "#/components/schemas/PaymentId"
        consent:
          oneOf:
            - $ref: "#/components/schemas/ConsentPayment"
            - $ref: "#/components/schemas/ConsentRecurringPayment"
        paymentType:
          $ref: "#/components/schemas/PaymentType"
        requestBody:
          type: object
          required:
            - data
          properties:
            data:
              $ref: "#/components/schemas/PatchPixRecurringPaymentData"
          additionalProperties: false
      additionalProperties: false
    EnumPaymentCancellationStatusType:
      type: string
      enum:
        - CANC
        - REJECTED
      example: CANC
      description: "Used to inform which state the payment should go to. \ 


        Currently the only possible value is CANC.

        \n"
    PatchPixPaymentData:
      type: object
      required:
        - status
        - cancellation
      properties:
        status:
          $ref: "#/components/schemas/EnumPaymentCancellationStatusType"
        cancellation:
          type: object
          description: "Object that groups information about which payer user requested
            the transaction cancellation. \ 


            Note: this field is necessary because, in cases of multiple approval
            levels, it is possible that the payment is requested by one payer
            user and cancelled by another.

            \n"
          required:
            - cancelledBy
          properties:
            cancelledBy:
              type: object
              description: Information related to the payer user who requested the payment
                cancellation.
              required:
                - document
              properties:
                document:
                  type: object
                  description: Object that consolidates the document data of the user who
                    requested the cancellation.
                  required:
                    - identification
                    - rel
                  properties:
                    identification:
                      type: string
                      maxLength: 11
                      description: Document number of the payer user responsible for the payment
                        cancellation.
                      example: "11111111111"
                      pattern: ^\d{11}$
                    rel:
                      type: string
                      maxLength: 3
                      description: Type of document of the payer user responsible for the payment
                        cancellation.
                      example: CPF
                      pattern: ^[A-Z]{3}$
    EnumRecurringPaymentCancellationStatusType:
      type: string
      enum:
        - REJECTED
      example: REJECTED
      description: "State to which the payment should transition.

        \n"
    PatchPixRecurringPaymentData:
      type: object
      required:
        - status
        - cancellation
      properties:
        status:
          $ref: "#/components/schemas/EnumRecurringPaymentCancellationStatusType"
        cancellation:
          type: object
          description: "General information about the cancellation.

            \n"
          required:
            - cancelledBy
          properties:
            cancelledBy:
              type: object
              description: General information about the user who requested the cancellation.
              required:
                - document
              properties:
                document:
                  type: object
                  description: Object that consolidates the document data of the user who
                    requested the cancellation.
                  required:
                    - identification
                    - rel
                  properties:
                    identification:
                      type: string
                      maxLength: 14
                      description: Official user identification document number.
                      example: "11111111111"
                      pattern: ^([0-9]{11})$|^([0-9A-Z]{12}[0-9]{2})$
                    rel:
                      type: string
                      maxLength: 3
                      description: Type of the user's official identification document.
                      example: CPF
                      pattern: ^[A-Z]{3}$
    CancellationPixPayment:
      type: object
      required:
        - requestMeta
        - consent
        - paymentId
      properties:
        requestMeta:
          $ref: "#/components/schemas/RequestMeta"
        paymentId:
          $ref: "#/components/schemas/PaymentId"
        idempotencyKey:
          type: string
          description: Unique request identifier to support idempotency.
          maxLength: 40
          pattern: ^(?!\s)(.*)(\S)$
          example: TXpRMU9UQTROMWhZV2xSU1FUazJSMDl
        consent:
          oneOf:
            - $ref: "#/components/schemas/ConsentPayment"
            - $ref: "#/components/schemas/ConsentRecurringPayment"
        paymentType:
          $ref: "#/components/schemas/PaymentType"
        requestBody:
          type: object
          required:
            - data
          properties:
            data:
              oneOf:
                - $ref: "#/components/schemas/PatchPixPaymentData"
                - $ref: "#/components/schemas/PatchPixRecurringPaymentData"
      additionalProperties: false
    DiscoveryPaymentsResponse:
      description: Resource discovery return.
      type: object
      required:
        - resources
      properties:
        resources:
          description: List of resources related to the discovery.
          type: array
          items:
            type: object
            required:
              - resourceName
              - resourceLegacyId
              - authorizers
              - debtorAccount
            properties:
              resourceName:
                description: "Array of key and value with the resource name, this data will be
                  presented in the frontends in the format: 'Key1: Value1 Key2:
                  Value2 ...'"
                type: array
                items:
                  type: object
                  required:
                    - key
                  properties:
                    key:
                      description: Key of the resource name caption.
                      type: string
                      example: Account Number
                    value:
                      description: Value of the resource name caption.
                      type: string
                      example: 1234-5
                minItems: 1
                maxItems: 10
              resourceLegacyId:
                description: Array of key and value with the resource identification key in the
                  legacy system, allowing composite keys.
                type: array
                items:
                  type: object
                  required:
                    - key
                  properties:
                    key:
                      description: Name of the identifier field in the legacy system.
                      type: string
                      example: internalAccountId
                    value:
                      description: Value of the identifier field in the legacy system.
                      type: string
                      example: "1234"
                minItems: 1
                maxItems: 10
              resourceBalanceCurrency:
                description: Currency of the resource balance. Optional for presentation when
                  selecting the resource in the payment consent.
                type: string
                maxLength: 3
                pattern: ^([A-Z]{3})$
                example: BRL
              resourceBalanceAmount:
                description: Amount of the resource balance. Optional for presentation when
                  selecting the resource in the payment consent.
                type: string
                pattern: ^((\d{1,16}\.\d{2}))$
                minLength: 4
                maxLength: 19
                example: "100000.04"
              authorizers:
                description: List of authorizers for the resource for multi-approval cases. If
                  the resource is selected, all authorizers must accept the
                  consent that the resource is part of.
                type: array
                items:
                  type: object
                  required:
                    - cpf
                    - name
                  properties:
                    cpf:
                      description: Authorizer's CPF.
                      type: string
                      minLength: 11
                      maxLength: 11
                      pattern: ^\d{11}$
                      example: "11111111111"
                    name:
                      description: Authorizer's name.
                      type: string
                      example: Marco Antonio de Brito
                minItems: 1
              defaultSelected:
                description: "Indicates whether the resource should be selected by default on
                  the consent screen. Default value: false"
                type: boolean
                example: "false"
              debtorAccount:
                type: object
                description: "Object containing the identification of the payer's source
                  account. \ 




                  Information regarding the payer's source account may be
                  brought in the consent to the holder, if the initiator has
                  collected this information from the customer. Otherwise, it
                  will be collected at the holder and brought to the initiator
                  as a response to the payment creation.



                  \n"
                required:
                  - ispb
                  - number
                  - accountType
                properties:
                  ispb:
                    type: string
                    minLength: 8
                    maxLength: 8
                    pattern: ^[0-9A-Z]{8}$
                    example: "12345678"
                    description: "Must be filled with the ISPB (Identifier of the Brazilian Payment
                      System) of the SPI participant (Instant Payment System)
                      using only numbers.



                      \n"
                  issuer:
                    type: string
                    minLength: 1
                    maxLength: 4
                    pattern: ^[0-9]{1,4}$
                    example: "1774"
                    description: "Issuing agency code of the account without digit. \ 




                      (Agency is the branch intended for customer service, the
                      general public, and members of credit cooperatives,\ 




                      in the exercise of the institution's activities, and
                      cannot be mobile or temporary).








                      [Constraint] Mandatory filling for the following account
                      types: CACC (CONTA_DEPOSITO_A_VISTA) and SVGS
                      (CONTA_POUPANCA).



                      \n"
                  number:
                    type: string
                    minLength: 1
                    maxLength: 20
                    pattern: ^[0-9]{1,20}$
                    example: "1234567890"
                    description: "Must be filled with the payer user's transactional account number,
                      with a check digit (if it exists), \ 




                      if there is an alphanumeric value, it must be converted to
                      0.



                      \n"
                  accountType:
                    type: string
                    enum:
                      - CACC
                      - SVGS
                      - TRAN
                    example: CACC
                    description: "Types of accounts used for payment.




                      Traditional modalities provided by Resolution 4.753, not
                      including linked accounts,\ 




                      accounts for residents abroad, foreign currency accounts,
                      and electronic money correspondent accounts.




                      Description of each ENUM value.








                      - CACC - Current - Checking Account.




                      - SVGS - Savings - Savings Account.




                      - TRAN - TransactingAccount - Prepaid Payment Account.



                      \n"
              useOverdraftLimit:
                type: boolean
                default: true
                example: true
                description: Indicates if the payer user authorized the use of a pre-approved
                  limit (overdraft) in their account for making payments, if the
                  customer has the product.
    ResponseDiscoveryAccountsPayment:
      type: object
      required:
        - data
      properties:
        data:
          $ref: "#/components/schemas/DiscoveryPaymentsResponse"
      additionalProperties: false
    ResponsePaymentValidation:
      type: object
      additionalProperties: false
    ResponseCreatePixPayment:
      type: object
      required:
        - data
      properties:
        data:
          type: object
          description: Object containing payment data and creditor account data.
          required:
            - paymentId
            - endToEndId
            - creationDateTime
            - statusUpdateDateTime
            - status
            - localInstrument
            - payment
            - creditorAccount
            - cnpjInitiator
            - debtorAccount
          properties:
            paymentId:
              description: Array of key and value with the resource identification key in the
                legacy system, allowing composite keys.
              type: array
              items:
                type: object
                properties:
                  key:
                    description: Name of the identifier field in the legacy system.
                    type: string
                  value:
                    description: Value of the identifier field in the legacy system.
                    type: string
                required:
                  - key
              example:
                - key: pk_FieldOne
                  value: ABC
                - key: pk_FieldTwo
                  value: "123"
            endToEndId:
              type: string
              minLength: 32
              maxLength: 32
              pattern: ^([E])([0-9]{8})([0-9]{4})(0[1-9]|1[0-2])(0[1-9]|[1-2][0-9]|3[0-1])(2[0-3]|[01][0-9])([0-5][0-9])([a-zA-Z0-9]{11})$
              example: E9040088820210128000800123873170
              description: "This is a unique identifier, generated at the payment initiating
                institution and received at the account holding institution,
                permeating the entire Pix payment journey.




                [Constraint] The holder must mandatorily return the field with
                the same value received from the initiator.

                \n"
            creationDateTime:
              type: string
              pattern: ^(\d{4})-(1[0-2]|0?[1-9])-(3[01]|[12][0-9]|0?[1-9])T(?:[01]\d|2[0123]):(?:[012345]\d):(?:[012345]\d)Z$
              example: "2020-07-21T08:30:00Z"
              description: "Date and time when the resource was created.


                A string with date and time according to RFC-3339 specification,


                always using UTC timezone (UTC time format).

                \n"
            statusUpdateDateTime:
              type: string
              pattern: ^(\d{4})-(1[0-2]|0?[1-9])-(3[01]|[12][0-9]|0?[1-9])T(?:[01]\d|2[0123]):(?:[012345]\d):(?:[012345]\d)Z$
              example: "2020-07-21T08:30:00Z"
              description: "Date and time of the last update of the payment initiation.


                A string with date and time according to RFC-3339 specification,


                always using UTC timezone (UTC time format).

                \n"
            proxy:
              type: string
              maxLength: 77
              pattern: "[\\w\\W\\s]*"
              example: "12345678901"
              description: "Key registered in the DICT belonging to the creditor. Key types
                can be: phone, email, cpf/cnpj, or random key.


                In case of a mobile phone, it must be entered in E.1641 format.


                For email, it must be in the format xxxxxxxx@xxxxxxx.xxx(.xx)
                and a maximum of 77 characters.


                In case of CPF, it must be entered with 11 numbers, without dots
                or dashes.


                In case of CNPJ, it must be entered with 14 numbers, without
                dots or dashes.


                In case of a random key, the UUID generated by DICT must be
                entered, according to the format specified in RFC41223.


                If informed, the account holder must validate the proxy in DICT
                when localInstrument is equal to DICT, QRDN, or QRES and
                validate the creditorAccount field.


                This validation is optional if localInstrument is equal to INIC.


                [Constraint] If localInstrument is equal to MANU, the proxy
                field must not be filled. If localInstrument is equal to INIC,
                DICT, QRDN, or QRES, the proxy field must always be filled with
                the Pix key.

                \n"
            ibgeTownCode:
              type: string
              minLength: 7
              maxLength: 7
              pattern: ^\d{7}$
              example: "5300108"
              description: "Provides the city code according to IBGE (Brazilian Institute of
                Geography and Statistics).


                To fill this field, the Payment Initiator must follow the
                guidance of the payment method arrangement.


                Filling the field in both pix/payments and /consents must be the
                same. If there is a divergence in values, the institution must
                return HTTP 422 with the error code
                PAGAMENTO_DIVERGENTE_DO_CONSENTIMENTO.


                This field refers to the CodMun field of the Pix arrangement.




                [Constraint] Must mandatorily return the field with the same
                value received from the initiator, if it was sent in the payment
                request.

                \n"
            status:
              type: string
              enum:
                - RCVD
                - PATC
                - CANC
                - ACCP
                - ACPD
                - RJCT
                - ACSC
                - PDNG
                - SCHD
              example: PDNG
              description: "Current status of the payment initiation. The status evolves in
                the following order: \ 




                1.  RCVD (Received) - Indicates that the payment request was
                successfully received by the holder, but there are still
                validations to be made before it is submitted for settlement.




                2.  PATC (Partially Accepted Technical Correct) - Indicates that
                the transaction needs confirmation from more authorizers for the
                payment processing to proceed. \ 




                3.  CANC (Cancelled) - Indicates that the pending Pix
                transaction was successfully cancelled by the user before it was
                confirmed (ACCP) or rejected (RJCT) by the holder.




                4.  ACCP( Accepted Customer Profile) - Indicates that all
                necessary checks have been carried out by the holder and that
                the transaction is ready to be sent for settlement (to the SPI
                if it is Pix to another institution or internally if it is to
                another account in the same institution).




                5.  ACPD (Accepted Clearing Processed) - Indicates that the
                holder has already submitted the transaction for settlement, but
                does not yet have confirmation whether it was settled or
                rejected.




                6.  RJCT (Rejected) Indicates that the transaction was rejected
                by the holder or the SPI.




                7.  ACSC (Accepted Settlement Completed Debitor Account) -
                Indicates that the transaction was settled by the holder or the
                SPI.




                8.  PDNG (Pending) - Indicates that the holder has temporarily
                retained the Pix transaction for analysis.




                9.  SCHD (Scheduled) - Indicates that the Pix transaction was
                successfully scheduled at the holder.




                In case of failure:\ 


                \\ 


                RJCT (REJECTED) - Payment instruction rejected.


                [Constraint] The PATC status should not be returned for consent
                payments with a version greater than V4.

                \n"
            rejectionReason:
              type: object
              description: "Reason for payment rejection. Complementary information about the
                reason for the status.


                [Constraint] This reason must be sent when the /data/status
                field is equal to RJCT (REJECTED)."
              required:
                - code
                - detail
              properties:
                code:
                  type: string
                  enum:
                    - SALDO_INSUFICIENTE
                    - VALOR_ACIMA_LIMITE
                    - VALOR_INVALIDO
                    - COBRANCA_INVALIDA
                    - NAO_INFORMADO
                    - PAGAMENTO_DIVERGENTE_CONSENTIMENTO
                    - DETALHE_PAGAMENTO_INVALIDO
                    - PAGAMENTO_RECUSADO_DETENTORA
                    - PAGAMENTO_RECUSADO_SPI
                    - FALHA_INFRAESTRUTURA
                    - FALHA_INFRAESTRUTURA_SPI
                    - FALHA_INFRAESTRUTURA_DICT
                    - FALHA_INFRAESTRUTURA_ICP
                    - FALHA_INFRAESTRUTURA_PSP_RECEBEDOR
                    - FALHA_INFRAESTRUTURA_DETENTORA
                    - CONTAS_ORIGEM_DESTINO_IGUAIS
                  example: SALDO_INSUFICIENTE
                  description: "Defines the reason code why the payment was rejected.




                    - SALDO_INSUFICIENTE - The selected account does not have
                    sufficient balance to make the payment.




                    - VALOR_ACIMA_LIMITE - The amount exceeds the limit
                    established [at the institution/in the arrangement/other] to
                    allow the customer to carry out transactions.




                    - VALOR_INVALIDO - The sent amount is not valid for the
                    informed QR Code.




                    - COBRANCA_INVALIDA - Expiration validation, due date
                    validation, or Valid Status.




                    - NAO_INFORMADO - Not reported/identified by the account
                    holding institution.




                    - PAGAMENTO_DIVERGENTE_CONSENTIMENTO - Payment data diverges
                    from consent data.




                    - DETALHE_PAGAMENTO_INVALIDO - Parameter [field_name] does
                    not comply with business rules.




                    - PAGAMENTO_RECUSADO_DETENTORA - [Description of the refusal
                    reason].




                    - PAGAMENTO_RECUSADO_SPI - [Error code according to the
                    PACS.002 reason domain table].




                    - FALHA_INFRAESTRUTURA - [Description of which
                    infrastructure failure made processing unfeasible].




                    - FALHA_INFRAESTRUTURA_SPI - Indicates a failure in the
