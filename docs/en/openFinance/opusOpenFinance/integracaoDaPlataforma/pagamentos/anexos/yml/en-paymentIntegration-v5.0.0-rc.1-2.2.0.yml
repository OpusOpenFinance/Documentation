              description: "Specifies the payment initiation method:


                - MANU - Manual entry of transactional account data


                - DICT - Manual entry of Pix key


                - QRDN - Dynamic QR code


                - QRES - Static QR code


                - INIC - Indicates that the creditor has specifically hired the
