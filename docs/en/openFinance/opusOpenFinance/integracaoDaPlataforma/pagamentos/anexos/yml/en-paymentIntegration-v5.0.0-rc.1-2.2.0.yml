paths:
  /account-discovery:
    post:
      tags:
        - Consent
      summary: Discover Pix payment accounts.
      description: Method to discover accounts for Pix payment.
      requestBody:
        content:
          application/jwt:
            schema:
              $ref: "#/components/schemas/DiscoveryAccountsPayment"
        description: Payload for discovering accounts for Pix payment.
        required: true
      responses:
        "200":
          $ref: "#/components/responses/200ResponseDiscoveryAccountsPayment"
        default:
          description: Unexpected error.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ResponseError"
  /payment-validation:
    post:
      tags:
        - Consent
      summary: Validate Pix payment data.
      description: Method to validate data for Pix payment.
      requestBody:
        content:
          application/jwt:
            schema:
              $ref: "#/components/schemas/PaymentValidation"
        description: Payload for validating data for Pix payment.
        required: true
      responses:
        "200":
          $ref: "#/components/responses/200ResponsePaymentValidation"
        "422":
          $ref: "#/components/responses/422ResponseErrorPaymentValidation"
        default:
          description: Unexpected error.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ResponseError"
