                description: Human-readable title for this specific error.
                minLength: 1
                maxLength: 255
                pattern: \w+(\W\w+)*
                example: Internal error
              detail:
                type: string
                description: Human-readable description of this specific error.
                minLength: 1
                maxLength: 2048
                pattern: \w+(\W\w+)*
                example: An internal error occurred while processing the request, please try
                  again later.
            additionalProperties: false
      additionalProperties: false
