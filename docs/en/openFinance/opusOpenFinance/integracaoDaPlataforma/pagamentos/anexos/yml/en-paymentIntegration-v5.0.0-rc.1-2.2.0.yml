                validations to be made before it is submitted for settlement.




                2.  PATC (Partially Accepted Technical Correct) - Indicates that
                the transaction needs confirmation from more authorizers for the
                payment processing to proceed. \ 




                3.  CANC (Cancelled) - Indicates that the pending Pix
                transaction was successfully cancelled by the user before it was
                confirmed (ACCP) or rejected (RJCT) by the holder.




                4.  ACCP( Accepted Customer Profile) - Indicates that all
                necessary checks have been carried out by the holder and that
                the transaction is ready to be sent for settlement (to the SPI
