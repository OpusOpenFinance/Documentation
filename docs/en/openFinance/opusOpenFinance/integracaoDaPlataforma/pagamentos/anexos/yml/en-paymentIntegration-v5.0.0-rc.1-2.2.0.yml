  /cancellation:
    post:
      tags:
        - Payments
      summary: Cancel payment initiation.
      description: "This endpoint should be used to cancel, at the payer customer's
        request, transactions that are in one of the following situations:
        Successfully scheduled (SCHD) or pending analysis (PDNG).




        - If the request is successful, the transaction goes to the CANC status.




        - If the payment status is different from SCHD/PDNG or any other
        business rule prevents cancellation, the request returns HTTP Status 422
        with the code PAGAMENTO_NAO_PERMITE_CANCELAMENTO.

        \\ 



        - If a 422 is received, the initiator will make a find request on the
        payment to check its current status, as well as associated details.




        \ Cancellation of a scheduled payment (SCHD) can be sent until 11:59 PM
        (Brasília time) on the day before the payment effective date.

        \n"
      requestBody:
        content:
          application/jwt:
            schema:
              $ref: "#/components/schemas/CancellationPixPayment"
            examples:
              SimpleScheduledPFDictCancellationRequest:
                $ref: "#/components/examples/SimpleScheduledPFDictCancellationRequest"
              SimpleScheduledPFInicCancellationRequest:
                $ref: "#/components/examples/SimpleScheduledPFInicCancellationRequest"
