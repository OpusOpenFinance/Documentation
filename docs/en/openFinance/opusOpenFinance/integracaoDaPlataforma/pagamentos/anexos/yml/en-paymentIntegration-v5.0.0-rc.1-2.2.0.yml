            requestDateTime:
              description: Date and time of the query, according to RFC-3339 specification,
                UTC format.
              type: string
              maxLength: 20
              format: date-time
              example: "2021-05-21T08:30:00Z"
    BaseResponseErrorPaymentValidation:
