              description: "Object containing the identification of the payer's source
                account. \ 


                Information regarding the payer's source account may be brought
                in the consent to the holder, if the initiator has collected
                this information from the customer. Otherwise, it will be
                collected at the holder and brought to the initiator as a
                response to the payment creation.

                \n"
              required:
                - ispb
                - number
                - accountType
              properties:
                ispb:
                  type: string
                  minLength: 8
                  maxLength: 8
                  pattern: ^[0-9A-Z]{8}$
                  example: "12345678"
                  description: "Must be filled with the ISPB (Identifier of the Brazilian Payment
                    System) of the SPI participant (Instant Payment System)
                    using only numbers.

                    \n"
                issuer:
                  type: string
                  minLength: 1
                  maxLength: 4
                  pattern: ^[0-9]{1,4}$
                  example: "1774"
                  description: "Issuing agency code of the account without digit.\ 


                    (Agency is the branch intended for customer service, the
                    general public, and members of credit cooperatives,\ 


                    in the exercise of the institution's activities, and cannot
                    be mobile or temporary).




                    [Constraint] Mandatory filling for the following account
                    types: CACC (CONTA_DEPOSITO_A_VISTA) and SVGS
                    (CONTA_POUPANCA).

                    \n"
                number:
                  type: string
                  minLength: 1
                  maxLength: 20
                  pattern: ^[0-9]{1,20}$
                  example: "1234567890"
                  description: "Must be filled with the payer user's transactional account number,
                    with a check digit (if it exists), \ 


                    if there is an alphanumeric value, it must be converted to
                    0.

                    \n"
                accountType:
                  type: string
                  enum:
                    - CACC
                    - SVGS
                    - TRAN
                  example: CACC
                  description: "Types of accounts used for payment.


                    Traditional modalities provided by Resolution 4.753, not
                    including linked accounts,\ 


                    accounts for residents abroad, foreign currency accounts,
                    and electronic money correspondent accounts.


                    Description of each ENUM value.




                    - CACC - Current - Checking Account.


                    - SVGS - Savings - Savings Account.


                    - TRAN - TransactingAccount - Prepaid Payment Account.

                    \n"
            authorisationFlow:
              type: string
              enum:
                - HYBRID_FLOW
                - CIBA_FLOW
                - FIDO_FLOW
              example: HYBRID_FLOW
              description: "Conditional field used to identify the authorization flow in which
                the payment was requested.




                [Constraint] If CIBA or FIDO, mandatory filling. If the field is
                not present in the payload, it is understood that the
                authorization flow used is HYBRID_FLOW.

                \n"
        meta:
          type: object
          description: Meta information regarding the requested API.
          required:
            - hasMoreRecords
            - requestDateTime
          properties:
            hasMoreRecords:
              type: boolean
              description: Indicates whether there are more records to return (true) or not
                (false).
              example: true
    ResponseCancellationPixPayment:
      type: object
      required:
        - data
      properties:
        data:
          type: object
          description: Object containing payment data and creditor account data.
          required:
            - paymentId
            - endToEndId
            - creationDateTime
            - statusUpdateDateTime
            - status
            - localInstrument
            - payment
            - cnpjInitiator
            - debtorAccount
            - creditorAccount
          properties:
            paymentId:
              description: Array of key and value with the resource identification key in the
                legacy system, allowing composite keys.
              type: array
              items:
                type: object
                properties:
                  key:
                    description: Name of the identifier field in the legacy system.
                    type: string
                  value:
                    description: Value of the identifier field in the legacy system.
                    type: string
                required:
                  - key
              example:
                - key: pk_FieldOne
                  value: ABC
                - key: pk_FieldTwo
                  value: "123"
            date:
              type: string
              description: "Date on which the payment will be made. A string using UTC-3
                timezone (UTC time format).




                [Constraint] Must be sent only if the `paymentType` field of the
                request body is PAYMENT_RECURRING_CONSENT."
              format: date
              maxLength: 10
              example: "2021-01-01"
            document:
              type: object
              description: "Information of the identifying document of the transaction's
                creditor.




                [Constraint] Must be sent only if the `paymentType` field of the
                request body is PAYMENT_RECURRING_CONSENT."
              required:
                - identification
                - rel
              properties:
                identification:
                  type: string
                  minLength: 11
                  maxLength: 14
                  description: Official identification document number of the natural or legal
                    person holder.
                  example: "11111111111111"
                  pattern: ^([0-9]{11})$|^([0-9A-Z]{12}[0-9]{2})$
                rel:
                  type: string
                  enum:
                    - CPF
                    - CNPJ
                  example: CNPJ
                  description: Type of the official identification document of the natural or
                    legal person holder.
            endToEndId:
              type: string
              minLength: 32
              maxLength: 32
              pattern: ^([E])([0-9]{8})([0-9]{4})(0[1-9]|1[0-2])(0[1-9]|[1-2][0-9]|3[0-1])(2[0-3]|[01][0-9])([0-5][0-9])([a-zA-Z0-9]{11})$
              example: E9040088820210128000800123873170
              description: "This is a unique identifier, generated at the payment initiating
                institution and received at the account holding institution,
                permeating the entire Pix payment journey.




                [Constraint] The holder must mandatorily return the field with
                the same value received from the initiator.

                \n"
            creationDateTime:
              type: string
              pattern: ^(\d{4})-(1[0-2]|0?[1-9])-(3[01]|[12][0-9]|0?[1-9])T(?:[01]\d|2[0123]):(?:[012345]\d):(?:[012345]\d)Z$
              example: "2020-07-21T08:30:00Z"
              description: "Date and time when the resource was created.


                A string with date and time according to RFC-3339 specification,


                always using UTC timezone (UTC time format).

                \n"
            statusUpdateDateTime:
              type: string
              pattern: ^(\d{4})-(1[0-2]|0?[1-9])-(3[01]|[12][0-9]|0?[1-9])T(?:[01]\d|2[0123]):(?:[012345]\d):(?:[012345]\d)Z$
              example: "2020-07-21T08:30:00Z"
              description: "Date and time of the last update of the payment initiation.


                A string with date and time according to RFC-3339 specification,


                always using UTC timezone (UTC time format).

                \n"
            proxy:
              type: string
              maxLength: 77
              pattern: "[\\w\\W\\s]*"
              example: "12345678901"
              description: "Key registered in the DICT belonging to the creditor. Key types
                can be: phone, email, cpf/cnpj, or random key.


                In case of a mobile phone, it must be entered in E.1641 format.


                For email, it must be in the format xxxxxxxx@xxxxxxx.xxx(.xx)
                and a maximum of 77 characters.


                In case of CPF, it must be entered with 11 numbers, without dots
                or dashes.


                In case of CNPJ, it must be entered with 14 numbers, without
                dots or dashes.


                In case of a random key, the UUID generated by DICT must be
                entered, according to the format specified in RFC41223.


                If informed, the account holder must validate the proxy in DICT
                when localInstrument is equal to DICT, QRDN, or QRES and
                validate the creditorAccount field.


                This validation is optional if localInstrument is equal to INIC.


                [Constraint] If localInstrument is equal to MANU, the proxy
                field must not be filled. If localInstrument is equal to INIC,
                DICT, QRDN, or QRES, the proxy field must always be filled with
                the Pix key.

                \n"
            ibgeTownCode:
              type: string
              minLength: 7
              maxLength: 7
              pattern: ^\d{7}$
              example: "5300108"
              description: "Provides the city code according to IBGE (Brazilian Institute of
                Geography and Statistics).


                To fill this field, the Payment Initiator must follow the
                guidance of the payment method arrangement.


                Filling the field in both pix/payments and /consents must be the
                same. If there is a divergence in values, the institution must
                return HTTP 422 with the error code
                PAGAMENTO_DIVERGENTE_DO_CONSENTIMENTO.


                This field refers to the CodMun field of the Pix arrangement.




                [Constraint] Must mandatorily return the field with the same
                value received from the initiator, if it was sent in the payment
                request.

                \n"
            status:
              type: string
              enum:
                - RCVD
                - PATC
                - CANC
                - ACCP
                - ACPD
                - RJCT
                - ACSC
                - PDNG
                - SCHD
              example: PDNG
              description: "Current status of the payment initiation. The status evolves in
                the following order: \ 




                1.  RCVD (Received) - Indicates that the payment request was
                successfully received by the holder, but there are still
                validations to be made before it is submitted for settlement.




                2.  PATC (Partially Accepted Technical Correct) - Indicates that
                the transaction needs confirmation from more authorizers for the
                payment processing to proceed. \ 




                3.  CANC (Cancelled) - Indicates that the pending Pix
                transaction was successfully cancelled by the user before it was
                confirmed (ACCP) or rejected (RJCT) by the holder.




                4.  ACCP( Accepted Customer Profile) - Indicates that all
                necessary checks have been carried out by the holder and that
                the transaction is ready to be sent for settlement (to the SPI
                if it is Pix to another institution or internally if it is to
                another account in the same institution).




                5.  ACPD (Accepted Clearing Processed) - Indicates that the
                holder has already submitted the transaction for settlement, but
                does not yet have confirmation whether it was settled or
                rejected.




                6.  RJCT (Rejected) Indicates that the transaction was rejected
                by the holder or the SPI.




                7.  ACSC (Accepted Settlement Completed Debitor Account) -
                Indicates that the transaction was settled by the holder or the
                SPI.




                8.  PDNG (Pending) - Indicates that the holder has temporarily
                retained the Pix transaction for analysis.




                9.  SCHD (Scheduled) - Indicates that the Pix transaction was
                successfully scheduled at the holder.




                In case of failure:\ 


                \\ 


                RJCT (REJECTED) - Payment instruction rejected.


                [Constraint] The PATC status should not be returned for consent
                payments with a version greater than V4.

                \n"
            rejectionReason:
              type: object
              description: "Reason for payment rejection. Complementary information about the
                reason for the status.


                [Constraint] This reason must be sent when the /data/status
                field is equal to RJCT (REJECTED)."
              required:
                - code
                - detail
              properties:
                code:
                  type: string
                  enum:
                    - SALDO_INSUFICIENTE
                    - VALOR_ACIMA_LIMITE
                    - VALOR_INVALIDO
                    - COBRANCA_INVALIDA
                    - NAO_INFORMADO
                    - PAGAMENTO_DIVERGENTE_CONSENTIMENTO
                    - DETALHE_PAGAMENTO_INVALIDO
                    - PAGAMENTO_RECUSADO_DETENTORA
                    - PAGAMENTO_RECUSADO_SPI
                    - FALHA_INFRAESTRUTURA
                    - FALHA_INFRAESTRUTURA_SPI
                    - FALHA_INFRAESTRUTURA_DICT
                    - FALHA_INFRAESTRUTURA_ICP
                    - FALHA_INFRAESTRUTURA_PSP_RECEBEDOR
                    - FALHA_INFRAESTRUTURA_DETENTORA
                    - CONTAS_ORIGEM_DESTINO_IGUAIS
                  example: SALDO_INSUFICIENTE
                  description: "Defines the reason code why the payment was rejected.




                    - SALDO_INSUFICIENTE - The selected account does not have
                    sufficient balance to make the payment.




                    - VALOR_ACIMA_LIMITE - The amount exceeds the limit
                    established [at the institution/in the arrangement/other] to
                    allow the customer to carry out transactions.




                    - VALOR_INVALIDO - The sent amount is not valid for the
                    informed QR Code.




                    - COBRANCA_INVALIDA - Expiration validation, due date
                    validation, or Valid Status.




                    - NAO_INFORMADO - Not reported/identified by the account
                    holding institution.




                    - PAGAMENTO_DIVERGENTE_CONSENTIMENTO - Payment data diverges
                    from consent data.




                    - DETALHE_PAGAMENTO_INVALIDO - Parameter [field_name] does
                    not comply with business rules.




                    - PAGAMENTO_RECUSADO_DETENTORA - [Description of the refusal
                    reason].




                    - PAGAMENTO_RECUSADO_SPI - [Error code according to the
                    PACS.002 reason domain table].




                    - FALHA_INFRAESTRUTURA - [Description of which
                    infrastructure failure made processing unfeasible].




                    - FALHA_INFRAESTRUTURA_SPI - Indicates a failure in the
                    Instant Payment System (SPI).




                    - FALHA_INFRAESTRUTURA_DICT - Indicates a failure in the
                    Directory of Transactional Account Identifiers (DICT).




                    - FALHA_INFRAESTRUTURA_ICP - Indicates a failure in the
                    Public Key Infrastructure (ICP).




                    - FALHA_INFRAESTRUTURA_PSP_RECEBEDOR - Indicates a failure
                    in the infrastructure of the Payment Service Provider (PSP)
                    that receives the payment.




                    - FALHA_INFRAESTRUTURA_DETENTORA - Indicates a failure in
                    the infrastructure of the institution holding the
                    information or resources.




                    - CONTAS_ORIGEM_DESTINO_IGUAIS - Indicates a payment attempt
                    where the source account and the destination account are the
                    same.




                    The rejectionReason FALHA_INFRAESTRUTURA will not be
                    excluded, it will just no longer be used, thus allowing
                    backward compatibility and integrity between participants.

                    \n"
                detail:
                  type: string
                  pattern: "[\\w\\W\\s]*"
                  maxLength: 2048
                  description: Contains additional information about the rejected payment.
            localInstrument:
              type: string
              enum:
                - MANU
                - DICT
                - QRDN
                - QRES
                - INIC
                - AUTO
              example: DICT
              description: "Specifies the payment initiation method:


                - MANU - Manual entry of transactional account data


                - DICT - Manual entry of Pix key


                - QRDN - Dynamic QR code


                - QRES - Static QR code


                - INIC - Indicates that the creditor has specifically hired the
                Payment Initiator to carry out payment initiations where the
                beneficiary is previously known.


                \ AUTO - Indicates the payment of an automatic Pix recurrence,
                where the consent was previously authorized by the payer and the
                payment is automatically made by the Payment Initiator at the
                creditor's command.


                [Constraint] If /data/payment/schedule sent with a value
                different from single during consent creation, only MANU, DICT
                or QRES methods are allowed.

                \n"
            cnpjInitiator:
              type: string
              pattern: ^[0-9A-Z]{12}[0-9]{2}$
              maxLength: 14
              example: "50685362000135"
              description: CNPJ of the Payment Initiator duly qualified to provide the Payment
                Initiation Service in Pix.
            payment:
