    CodeConsentStage:
      type: string
      maxLength: 30
      enum:
        - VALOR_INVALIDO
        - NAO_INFORMADO
        - FALHA_INFRAESTRUTURA
        - CONTA_NAO_PERMITE_PAGAMENTO
        - SALDO_INSUFICIENTE
        - VALOR_ACIMA_LIMITE
        - QRCODE_INVALIDO
      example: VALOR_INVALIDO
      description: Error codes foreseen in payment validation during post consent.
    CodePaymentStage:
      type: string
      maxLength: 30
      enum:
        - COBRANCA_INVALIDA
        - DETALHE_PAGAMENTO_INVALIDO
        - NAO_INFORMADO
        - PAGAMENTO_RECUSADO_DETENTORA
        - PAGAMENTO_RECUSADO_SPI
        - SALDO_INSUFICIENTE
        - VALOR_ACIMA_LIMITE
        - VALOR_INVALIDO
      example: COBRANCA_INVALIDA
      description: Error codes foreseen in payment validation during post payment.
    ResponseErrorValidatePaymentData:
      type: object
      description: List of errors that occurred while processing the PIX payment
        creation request.
      required:
        - errors
      properties:
        errors:
          type: array
          minItems: 1
          maxItems: 5
          items:
            type: object
            required:
              - code
              - title
              - detail
            properties:
              code:
                oneOf:
                  - $ref: "#/components/schemas/CodeConsentStage"
                  - $ref: "#/components/schemas/CodePaymentStage"
              title:
                type: string
                maxLength: 255
                pattern: "[\\w\\W\\s]*"
                example: Invalid charge.
                description: "Specific title of the reported error, according to the code sent
                  (The allowed values depend on the validationStage as indicated
                  in the two enums of code CodeConsentStage and
                  CodePaymentStage): \ 




                  • COBRANCA_INVALIDA: Invalid charge. \ 




                  • DETALHE_PAGAMENTO_INVALIDO: Invalid payment detail. \ 




                  • NAO_INFORMADO: Not informed. \ 




                  • PAGAMENTO_RECUSADO_DETENTORA: Payment refused by holder. \ 




                  • PAGAMENTO_RECUSADO_SPI: Payment refused by SPI. \ 




                  • SALDO_INSUFICIENTE: Insufficient balance. \ 




                  • VALOR_ACIMA_LIMITE: Value above limit.




                  • VALOR_INVALIDO: Invalid value.




                  • FALHA_INFRAESTRUTURA: Infrastructure failure.




                  • CONTA_NAO_PERMITE_PAGAMENTO: Account does not allow payment.




                  • QRCODE_INVALIDO: Invalid QR Code.



                  \n"
              detail:
                type: string
                maxLength: 2048
                pattern: "[\\w\\W\\s]*"
                example: Payment method [Modality] not supported.
                description: "Specific description of the error according to the reported code
                  (The allowed values depend on the validationStage as indicated
                  in the two enums of code CodeConsentStage and
                  CodePaymentStage): \ 




                  • COBRANCA_INVALIDA – Expiration validation, due date
                  validation, Valid Status.




                  • DETALHE_PAGAMENTO_INVALIDO: Parameter [field_name] does not
                  comply with business rules.




                  \ • NAO_INFORMADO: Not reported by the account holder.




                  \ • PAGAMENTO_RECUSADO_DETENTORA: [description of the refusal
                  reason].




                  \ • PAGAMENTO_RECUSADO_SPI: [error code according to the
                  PACS.002 reason domain table].




                  \ • SALDO_INSUFICIENTE: The selected account does not have
                  sufficient balance to make the payment.




                  \ • VALOR_ACIMA_LIMITE: Above the established limit.




                  \ • VALOR_INVALIDO: The sent amount is not valid for the
                  informed QR Code.




                  \ • FALHA_INFRAESTRUTURA: [Description of which infrastructure
                  failure made processing unfeasible].




                  \ • CONTA_NAO_PERMITE_PAGAMENTO: [Description of the reason
                  the account does not allow payment].




                  \ • QRCODE_INVALIDO: [Description of the reason the QR code is
                  invalid].



                  \n"
            additionalProperties: false
      additionalProperties: false
    ErrorPaymentValidation:
      description: Object with details of the error that occurred. Must be an object
        of type ResponseErrorCreatePixConsent if the consent cannot be created
        due to a business restriction. Must be a standard responseError if it is
        a system error.
      oneOf:
        - $ref: "#/components/schemas/ResponseErrorValidatePaymentData"
        - $ref: "#/components/schemas/BaseResponseErrorPaymentValidation"
      additionalProperties: false
    ResponseErrorCreatePixPayment:
      type: object
      required:
        - errors
      properties:
        errors:
          type: array
          minItems: 1
          maxItems: 9
          items:
            type: object
            required:
              - code
              - title
              - detail
            properties:
              code:
                type: string
                enum:
                  - SALDO_INSUFICIENTE
                  - VALOR_ACIMA_LIMITE
                  - VALOR_INVALIDO
                  - COBRANCA_INVALIDA
                  - CONSENTIMENTO_INVALIDO
                  - PARAMETRO_NAO_INFORMADO
                  - PARAMETRO_INVALIDO
                  - NAO_INFORMADO
                  - PAGAMENTO_DIVERGENTE_CONSENTIMENTO
                  - DETALHE_PAGAMENTO_INVALIDO
                  - PAGAMENTO_RECUSADO_DETENTORA
                  - PAGAMENTO_RECUSADO_SPI
                  - ERRO_IDEMPOTENCIA
                  - LIMITE_PERIODO_VALOR_EXCEDIDO
                  - LIMITE_PERIODO_QUANTIDADE_EXCEDIDO
                example: SALDO_INSUFICIENTE
                description: "Error codes foreseen in the creation of payment initiation:








                  • SALDO_INSUFICIENTE: This account does not have sufficient
                  balance to make the payment.








                  • VALOR_ACIMA_LIMITE: The value (or quantity of transactions)
                  exceeds the limit range parameterized at the holder to allow
                  the customer to carry out transactions.








                  • VALOR_INVALIDO: The sent amount is not valid for the
                  informed QR Code.








                  • COBRANCA_INVALIDA: Expiration validation, due date
                  validation, Valid Status.








                  • CONSENTIMENTO_INVALIDO: Invalid consent (status is not
                  \"authorised\" or is expired).








                  • PARAMETRO_NAO_INFORMADO: Parameter not informed. \ 








                  • PARAMETRO_INVALIDO: Invalid parameter.








                  • NAO_INFORMADO: Not reported by the account holder.








                  • PAGAMENTO_DIVERGENTE_CONSENTIMENTO: Payment data diverges
                  from consent data.








                  • DETALHE_PAGAMENTO_INVALIDO: Invalid payment detail.








                  • PAGAMENTO_RECUSADO_DETENTORA: Payment refused by the account
                  holder.








                  • PAGAMENTO_RECUSADO_SPI: Payment refused in the Instant
                  Payment System (SPI).








                  • ERRO_IDEMPOTENCIA: Idempotency error.



                  \n"
              title:
                type: string
                maxLength: 255
                pattern: "[\\w\\W\\s]*"
                example: Payment does not allow cancellation.
                description: "Specific title of the reported error, according to the code sent:








                  • PAGAMENTO_NAO_PERMITE_CANCELAMENTO: Payment does not allow
                  cancellation.



                  \n"
              detail:
                type: string
                maxLength: 2048
                pattern: "[\\w\\W\\s]*"
                example: Payment does not allow cancellation.
                description: "Specific description of the error according to the reported code:








                  • PAGAMENTO_NAO_PERMITE_CANCELAMENTO: Payment does not allow
                  cancellation.



                  \n"
    ErrorCreatePixPayment:
