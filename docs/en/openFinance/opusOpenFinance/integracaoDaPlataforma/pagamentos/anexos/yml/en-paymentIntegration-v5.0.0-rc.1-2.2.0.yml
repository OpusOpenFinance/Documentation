              example: "12345678901"
              description: "Key registered in the DICT belonging to the creditor. Key types
                can be: phone, email, cpf/cnpj, or random key.


                In case of a mobile phone, it must be entered in E.1641 format.


                For email, it must be in the format xxxxxxxx@xxxxxxx.xxx(.xx)
                and a maximum of 77 characters.


                In case of CPF, it must be entered with 11 numbers, without dots
                or dashes.


                In case of CNPJ, it must be entered with 14 numbers, without
                dots or dashes.


                In case of a random key, the UUID generated by DICT must be
                entered, according to the format specified in RFC41223.


                If informed, the account holder must validate the proxy in DICT
                when localInstrument is equal to DICT, QRDN, or QRES and
                validate the creditorAccount field.


                This validation is optional if localInstrument is equal to INIC.


