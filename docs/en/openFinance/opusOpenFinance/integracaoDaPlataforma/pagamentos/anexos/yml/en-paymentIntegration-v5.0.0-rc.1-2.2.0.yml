components:
  schemas:
    BrandId:
      type: string
      description: Identifier of the brand reported by the Open Banking participant.
      minLength: 1
      maxLength: 50
      example: cbanco
    RequestMeta:
      type: object
      description: Object containing data regarding the context in which the request
        was received.
      required:
        - correlationId
        - brandId
      properties:
        correlationId:
          type: string
          description: UUID that identifies the correlation ID of the request made. Must
            be propagated to all calls made between systems and logged whenever
            possible to facilitate error tracing.
          pattern: ^(localID:)?[0-9a-fA-F]{8}-[0-9a-fA-F]{4}-[0-9a-fA-F]{4}-[0-9a-fA-F]{4}-[0-9a-fA-F]{12}$
          example: 97623ed1-4732-4bf2-8d4b-ae7aced5443b
        brandId:
          $ref: "#/components/schemas/BrandId"
      additionalProperties: false
    CreationDateTime:
      description: Date and time when the consent was created. A string with date and
        time according to RFC-3339 specification, always using UTC timezone (UTC
        time format).
      type: string
      pattern: ^(\d{4})-(1[0-2]|0?[1-9])-(3[01]|[12][0-9]|0?[1-9])T(?:[01]\d|2[0123]):(?:[012345]\d):(?:[012345]\d)Z$
      maxLength: 20
      example: "2021-05-21T08:30:00Z"
    TPP:
      type: object
      description: Details of the TPP that requested the consent.
      additionalProperties: false
      required:
        - name
      properties:
        name:
          type: string
          description: Name of the TPP that requested the consent.
          maxLength: 100
          example: GuiaBolsa
    ExternalId:
      type: string
      description: Consent identifier used outside the OOB platform.
      maxLength: 100
      example: urn:oob-bank:2f710909-4ccd-4998-8679-3d8de00e5ccf
    LoggedUser:
      type: object
      description: User (natural person) who is logged into the Payment Initiator
        institution.
      additionalProperties: false
      required:
        - document
      properties:
        document:
          type: object
          description: Official identification document of the user.
          additionalProperties: false
          required:
            - identification
            - rel
          properties:
            identification:
              type: string
              maxLength: 11
              description: Official user identification document number.
              pattern: ^\d{11}$
              example: "11111111111"
            rel:
              type: string
              maxLength: 3
              description: Type of the user's official identification document.
              pattern: ^[A-Z]{3}$
              example: CPF
    BusinessEntity:
      type: object
      description: User (legal entity) who is logged into the Payment Initiator
        institution. [Constraint] Mandatory filling if the logged-in user at the
        Payment Initiator institution is a CNPJ (legal entity).
      additionalProperties: false
      required:
        - document
      properties:
        document:
          type: object
          description: Official identification document of the legal entity holder.
          additionalProperties: false
          required:
            - identification
            - rel
          properties:
            identification:
              type: string
              maxLength: 14
              description: Official identification document number of the legal entity holder.
              pattern: ^\d{14}$
              example: "11111111111111"
            rel:
              type: string
              maxLength: 4
              description: Type of the official identification document of the legal entity
                holder.
              pattern: ^[A-Z]{4}$
              example: CNPJ
    AcceptedResources:
      description: List of resources allowed by the customer to be used in the
        consent. Internal use object, in connectors.
      type: array
      items:
        type: object
        description: Resources selected by the customer.
        required:
          - type
          - resourceLegacyId
        properties:
          type:
            description: Resource type.
            type: string
            enum:
              - ACCOUNT
              - CREDIT_CARD_ACCOUNT
              - LOAN
              - FINANCING
              - UNARRANGED_ACCOUNT_OVERDRAFT
              - INVOICE_FINANCING
              - PAYMENT
              - BANK_FIXED_INCOME
              - CREDIT_FIXED_INCOME
              - VARIABLE_INCOME
              - TREASURE_TITLE
              - FUND
            example: PAYMENT
          resourceLegacyId:
            description: Array of key and value with the resource identification key in the
              legacy system, allowing composite keys.
            type: array
            items:
              type: object
              required:
                - key
              properties:
                key:
                  description: Name of the identifier field in the legacy system.
                  type: string
                  example: internalAccountId
                value:
                  description: Value of the identifier field in the legacy system.
                  type: string
                  example: "1234"
            minItems: 1
            maxItems: 10
          authorizers:
            deprecated: true
            description: List of authorizers for the resource for multi-approval cases. If
              the resource is selected, all authorizers must accept the consent
              that the resource is part of.
            type: array
            items:
              type: object
              required:
                - cpf
                - name
              properties:
                cpf:
                  description: Authorizer's CPF.
                  type: string
                  minLength: 11
                  maxLength: 11
                  pattern: ^\d{11}$
                  example: "11111111111"
                name:
                  description: Authorizer's name.
                  type: string
                  example: Marco Antonio de Brito
            minItems: 1
          hasMultipleAuthorisers:
            deprecated: true
            type: boolean
            example: "false"
        additionalProperties: false
      maxItems: 1000
    Version:
      type: string
      description: Version of the consent related to the payment.
      enum:
        - V1
        - V2
        - V3
        - V4
      example: V1
    ExpirationDateTime:
      description: Expiration date and time of the permission. Mandatory field,
        reflects the consent's expiration date. A string with date and time
        according to RFC-3339 specification, always using UTC timezone (UTC time
        format).
      type: string
      maxLength: 20
      pattern: ^(\d{4})-(1[0-2]|0?[1-9])-(3[01]|[12][0-9]|0?[1-9])T(?:[01]\d|2[0123]):(?:[012345]\d):(?:[012345]\d)Z$
      example: "2021-05-21T08:30:00Z"
    EnumPaymentPersonType:
      type: string
      maxLength: 15
      enum:
        - PESSOA_NATURAL
        - PESSOA_JURIDICA
      description: "Holder, natural or legal person to whom the creditor data refers.

        \n"
      example: PESSOA_NATURAL
    Identification:
      type: object
      description: Only for payment consents. Object containing the creditor's data.
      required:
        - personType
        - cpfCnpj
        - name
      properties:
        personType:
          $ref: "#/components/schemas/EnumPaymentPersonType"
        cpfCnpj:
          type: string
          minLength: 11
          maxLength: 14
          pattern: ^\d{11}$|^\d{14}$
          description: "Identification of the person involved in the transaction. \ 


            Fill with CPF or CNPJ, according to the value chosen in the type
            field. \ 


            \ CPF will be used with 11 numbers and must be informed without dots
            or dashes. \ 


            CNPJ will be used with 14 numbers and must be informed without dots
            or dashes.

            \n"
          example: "58764789000137"
        name:
          type: string
          maxLength: 140
          pattern: ^([A-Za-z\u00C0-\u00D6\u00D8-\u00F6\u00F8-\u00FF,.@:&*+_<>()!?/\\$%\d'
            -]+)$
          description: "In case of a natural person, the full name of the creditor's
            account holder must be provided. \ 


            In case of a legal entity, the corporate name or trade name of the
            creditor's account must be provided.

            \n"
          example: Marco Antonio de Brito
      additionalProperties: false
    EnumPaymentType:
      type: string
      maxLength: 3
      enum:
        - PIX
      description: "This field defines the type of payment that will be initiated
        after the consent is authorized.

        \n"
      example: PIX
    Schedule:
      type: object
      required:
        - single
      properties:
        single:
          type: object
          description: Defines the single scheduling policy.
          required:
            - date
          properties:
            date:
              type: string
              format: date
              maxLength: 10
              example: "2021-01-01"
              description: "Defines the target settlement date of the payment.


                Brasília timezone must be used for creation and reasoning about
                the data in this field.




                [Constraint] This field must always be at least D+1 calendar
                day, i.e., the day immediately following the consent date
                considering the Brasília timezone and must be at most D+730
                calendar days from the consent date, also considering the
                Brasília timezone."
    ScheduleDaily:
      type: object
      required:
        - daily
      properties:
        daily:
          type: object
          description: Defines the daily scheduling policy.
          required:
            - startDate
            - quantity
          properties:
            startDate:
              type: string
              format: date
              pattern: ^(\d{4})-(1[0-2]|0?[1-9])-(3[01]|[12][0-9]|0?[1-9])$
              maxLength: 10
              example: "2023-08-23"
              description: Defines the date of the first daily recurring payment.
            quantity:
              type: integer
              format: int32
              minimum: 2
              maximum: 60
              example: 3
              description: Defines the number of payments that will be sent for settlement.
    ScheduleWeekly:
      type: object
      required:
        - weekly
      properties:
        weekly:
          type: object
          description: Defines the weekly scheduling policy.
          required:
            - dayOfWeek
            - startDate
            - quantity
          properties:
            dayOfWeek:
              type: string
              description: Day of the week when the payment will occur.
              enum:
                - SEGUNDA_FEIRA
                - TERCA_FEIRA
                - QUARTA_FEIRA
                - QUINTA_FEIRA
                - SEXTA_FEIRA
                - SABADO
                - DOMINGO
              example: QUINTA_FEIRA
            startDate:
              type: string
              format: date
              pattern: ^(\d{4})-(1[0-2]|0?[1-9])-(3[01]|[12][0-9]|0?[1-9])$
              maxLength: 10
              example: "2023-08-23"
            quantity:
              type: integer
              format: int32
              minimum: 2
              maximum: 60
              example: 10
              description: Defines the number of payments that will be sent for settlement.
    ScheduleMonthly:
      type: object
      required:
        - monthly
      properties:
        monthly:
          type: object
          description: Defines the monthly scheduling policy.
          required:
            - dayOfMonth
            - startDate
            - quantity
          properties:
            dayOfMonth:
              type: integer
              minimum: 1
              maximum: 31
              example: 10
            startDate:
              type: string
              format: date
              pattern: ^(\d{4})-(1[0-2]|0?[1-9])-(3[01]|[12][0-9]|0?[1-9])$
              maxLength: 10
              example: "2023-08-23"
            quantity:
              type: integer
              format: int32
              minimum: 2
              maximum: 24
              example: 24
              description: Defines the number of payments that will be sent for settlement.
    ScheduleCustom:
      type: object
      required:
        - custom
      properties:
        custom:
          type: object
          description: "[Constraint] The dates sent in the dates list (array “dates”)
            cannot be repeated.


            If repeated dates are sent, the holder must reject the consent
            creation, informing the error PARAMETRO_INVALIDO."
          required:
            - dates
            - additionalInformation
          properties:
            dates:
              type: array
              maxItems: 60
              minItems: 2
              example:
                - "2023-08-23"
                - "2023-09-26"
              items:
                type: string
                format: date
                pattern: ^(\d{4})-(1[0-2]|0?[1-9])-(3[01]|[12][0-9]|0?[1-9])$
                maxLength: 10
                example: "2023-08-23"
            additionalInformation:
              type: string
              description: "Free text for the Initiator to fill in a way understandable to the
                approver/payer user.


                The text can be used by the holder to display the transaction
                summary during the approver/payer user's approval."
              pattern: "[\\w\\W\\s]*"
              maxLength: 255
              example: Todas quintas e domingos por 6 meses
    PaymentConsent:
      type: object
      description: Only for payment consents. Object containing payment data for consent.
      required:
        - type
        - currency
        - amount
      properties:
        type:
          $ref: "#/components/schemas/EnumPaymentType"
        date:
          type: string
          format: date
          maxLength: 10
          description: "[Constraint] Mutually exclusive with the schedule object.\ 

            \\ 



            This field is mandatory in the case of a single payment.\ 




            In this case, the schedule object must not be informed.

            \n"
          example: "2021-01-01"
        currency:
          type: string
          maxLength: 3
          pattern: ^([A-Z]{3})$
          description: "National currency code according to ISO-4217 standard, i.e.,
            'BRL'.


            All monetary values informed are represented with Brazil's current
            currency.

            \n"
          example: BRL
        amount:
          type: string
          minLength: 4
          maxLength: 19
          pattern: ^((\d{1,16}\.\d{2}))$
          description: "Transaction amount with 2 decimal places. The amount must be the
            same as sent in the consent.\ 




            For static QR Code with a predetermined value in the QR Code or for
            dynamic QR Code indicating that the value cannot be changed: The
            amount field must be filled with the value established in the QR
            Code.\ 


            If filled with a value divergent from the QR Code, an HTTP Status
            422 error must be returned.

            \n"
          example: "100000.12"
        schedule:
          description: "[Constraint] Mutually exclusive with the date field.\ 



            \\ 

            This field is mandatory in case of scheduling.\ 




            In this case, the date field must not be informed.

            \n"
          oneOf:
            - $ref: "#/components/schemas/Schedule"
            - $ref: "#/components/schemas/ScheduleDaily"
            - $ref: "#/components/schemas/ScheduleWeekly"
            - $ref: "#/components/schemas/ScheduleMonthly"
            - $ref: "#/components/schemas/ScheduleCustom"
    EnumPaymentCancellationReasonType:
      type: string
      enum:
        - CANCELADO_PENDENCIA
        - CANCELADO_AGENDAMENTO
        - CANCELADO_MULTIPLAS_ALCADAS
      example: CANCELADO_PENDENCIA
      description: "Filling this field for the response must be done by the account
        holder based on the status the payment is in at the time of the
        cancellation request (e.g., Payment status = PDNG, field must be filled
        with enum CANCELADO_PENDENCIA)




        Possible values:




        CANCELADO_PENDENCIA - Payment cancelled while in PDNG status




        CANCELADO_AGENDAMENTO - Payment cancelled while in SCHD status




        CANCELADO_MULTIPLAS_ALCADAS - Payment cancelled while in PATC status

        \n"
    EnumPaymentCancellationFromType:
      type: string
      enum:
        - INICIADORA
        - DETENTORA
      example: INICIADORA
      description: "Field used to inform the means by which the cancellation was
        performed.




        Possible values:




        INICIADORA - Payment cancelled by the payer user in the initiator's
        channels




        DETENTORA - Payment cancelled by the payer user in the holder's channels

        \n"
    PixPaymentCancellation:
      type: object
      description: "Object containing data regarding the payer user who requested the
        cancellation, the channel used by them, and the reason. \ 




        [Constraint] The cancellation object will only be mandatory when the
        status field value is equal to CANC.\ 

        \n"
      required:
        - cancelledAt
        - cancelledBy
        - reason
        - cancelledFrom
      properties:
        reason:
          $ref: "#/components/schemas/EnumPaymentCancellationReasonType"
        cancelledFrom:
          $ref: "#/components/schemas/EnumPaymentCancellationFromType"
        cancelledAt:
          type: string
          description: Date and time the cancellation was performed, according to RFC-3339
            specification, UTC format.
          format: date-time
          maxLength: 20
          example: "2021-05-21T08:30:00Z"
        cancelledBy:
          type: object
          description: Information related to the payer user who requested the payment
            cancellation.
          required:
            - document
          properties:
            document:
              type: object
              description: Object that consolidates the document data of the user who
                requested the cancellation.
              required:
                - identification
                - rel
              properties:
                identification:
                  type: string
                  maxLength: 11
                  description: Document number of the payer user responsible for the payment
                    cancellation.
                  example: "11111111111"
                  pattern: ^\d{11}$
                rel:
                  type: string
                  maxLength: 3
                  description: Type of document of the payer user responsible for the payment
                    cancellation.
                  example: CPF
                  pattern: ^[A-Z]{3}$
    IbgeTownCode:
      type: string
      minLength: 7
      maxLength: 7
      pattern: ^\d{7}$
      description: "Provides the city code according to IBGE (Brazilian Institute of
        Geography and Statistics).


        To fill this field, the Payment Initiator must follow the guidance of
        the payment method arrangement.


        Filling the field in both pix/payments and /consents must be the same.
        If there is a divergence in values, the institution must return HTTP 422
        with the error code PAGAMENTO_DIVERGENTE_DO_CONSENTIMENTO.


        This field refers to the CodMun field of the Pix arrangement.

        \n"
      example: "5300108"
    EnumLocalInstrument:
      type: string
      maxLength: 4
      enum:
        - MANU
        - DICT
        - QRDN
        - QRES
        - INIC
        - AUTO
      description: "Specifies the payment initiation method:


        - MANU - Manual entry of transactional account data


        - DICT - Manual entry of Pix key


        - QRDN - Dynamic QR code


        - QRES - Static QR code


        - INIC - Indicates that the creditor has specifically hired the Payment
        Initiator to carry out payment initiations where the beneficiary is
        previously known.


        \ AUTO - Indicates the payment of an automatic Pix recurrence, where the
        consent was previously authorized by the payer and the payment is
        automatically made by the Payment Initiator at the creditor's command

        \\ 

        [Constraint] If /data/payment/schedule sent with a value different from
        single during consent creation, only MANU, DICT or QRES methods are
        allowed.

        \n"
      example: DICT
    QrCode:
      type: string
      maxLength: 512
      pattern: "[\\w\\W\\s]*"
      description: "String of characters corresponding to the QR Code made available
        to the payer.


        It is the string of characters that would be read by the QR Code reader,
        and should allow the return of the payer's data after querying the DICT.


        This functionality is possible for both static and dynamic QR Codes.


        In the Pix arrangement, this is the same string generated and/or read by
        the Pix Copy and Paste functionality.


        This field must be in UTF-8 format.


        [Constraint] Mandatory filling for payments via QR Code, observing the
        maximum size of 512 bytes.

        \n"
      example: "00020104141234567890123426660014BR.GOV.BCB.PIX014466756C616E6F3230313\
        9406578616D706C652E636F6D27300012


        BR.COM.OUTRO011001234567895204000053039865406123.455802BR5915NOMEDORECE\
        BEDOR6008BRASILIA61087007490062


        530515RP12345678-201950300017BR.GOV.BCB.BRCODE01051.0.080450014BR.GOV.B\
        CB.PIX0123PADRAO.URL.PIX/0123AB


        CD81390012BR.COM.OUTRO01190123.ABCD.3456.WXYZ6304EB76

        \n"
    Proxy:
      description: "Key registered in the DICT belonging to the creditor. Key types
        can be: phone, email, cpf/cnpj, or random key. For mobile phones, it
        must be entered in E.1641 format. For email, it must be in the format
        xxxxxxxx@xxxxxxx.xxx(.xx) and a maximum of 77 characters. For CPF, it
        must be entered with 11 numbers, without dots or dashes. For CNPJ, it
        must be entered with 14 numbers, without dots or dashes. For random
        keys, the UUID generated by DICT must be entered, according to the
        format specified in RFC41223. [Constraint] Mandatory when the
        localInstrument field is equal to DICT."
      type: string
      pattern: "[\\w\\W\\s]*"
      maxLength: 77
      example: "12345678901"
    EnumAccountPaymentsType:
      type: string
      enum:
        - CACC
        - SVGS
        - TRAN
      example: CACC
      description: "Types of accounts used for payment.


        Traditional modalities provided by Resolution 4.753, not including
        linked accounts,\ 


        accounts for residents abroad, foreign currency accounts, and electronic
        money correspondent accounts.


        Description of each ENUM value.




        - CACC - Current - Checking Account.


        - SVGS - Savings - Savings Account.


        - TRAN - TransactingAccount - Prepaid Payment Account.

        \n"
    CreditorAccount:
      type: object
      description: "Object containing the identification of the beneficiary/creditor's
        destination account. \ 

        \n"
      required:
        - ispb
        - number
        - accountType
      properties:
        ispb:
          type: string
          minLength: 8
          maxLength: 8
          pattern: ^[0-9A-Z]{8}$
          description: "Must be filled with the ISPB (Identifier of the Brazilian Payment
            System) of the SPI participant (Instant Payment System) using only
            numbers.

            \n"
          example: "12345678"
        issuer:
          type: string
          minLength: 1
          maxLength: 4
          pattern: ^[0-9]{1,4}$
          description: "Issuing agency code of the account without digit. \ 


            (Agency is the branch intended for customer service, the general
            public, and members of credit cooperatives, \ 


            in the exercise of the institution's activities, and cannot be
            mobile or temporary). \ 


            [Constraint] Mandatory filling for the following account types: CACC
            (CONTA_DEPOSITO_A_VISTA), SVGS (CONTA_POUPANCA) and SLRY
            (CONTA_SALARIO).

            \n"
          example: "1774"
        number:
          type: string
          minLength: 1
          maxLength: 20
          pattern: ^[0-9]{1,20}$
          description: "Must be filled with the creditor user's account number, with a
            check digit (if it exists), \ 


            if there is an alphanumeric value, it must be converted to 0.

            \n"
          example: "1234567890"
        accountType:
          $ref: "#/components/schemas/EnumAccountPaymentsType"
      additionalProperties: false
    Details:
      type: object
      description: "Object containing payment details.

        \n"
      required:
        - localInstrument
        - creditorAccount
      properties:
        localInstrument:
          $ref: "#/components/schemas/EnumLocalInstrument"
        qrCode:
          $ref: "#/components/schemas/QrCode"
        proxy:
          $ref: "#/components/schemas/Proxy"
        creditorAccount:
          $ref: "#/components/schemas/CreditorAccount"
      additionalProperties: false
    PixPaymentConsent:
      allOf:
        - $ref: "#/components/schemas/PaymentConsent"
      type: object
      description: Only for pix payment consents. Object containing payment data for
        consent.
      required:
        - details
      properties:
        cancellation:
          $ref: "#/components/schemas/PixPaymentCancellation"
        ibgeTownCode:
          $ref: "#/components/schemas/IbgeTownCode"
        details:
          $ref: "#/components/schemas/Details"
