    PurposeV5:
      description: |
        Representa qual a finalidade da transação recebida.
        - IMMEDIATE: Deve ser utilizado quando o pagamento gerado pelo consentimento for único e imediato e não for um Pix    Saque ou Pix Troco;
        - SINGLE_SCHEDULED: Deve ser utilizado quando o pagamento gerado pelo consentimento for único e agendado;
        - RECURRENT_SCHEDULED: Deve ser utilizado quando o pagamento gerado pelo consentimento não é único e é agendado;
        - WITHDRAW: Deve ser utilizado quando o pagamento for único, imediato e representar uma operação de saque;
        - CHANGE: Deve ser utilizado quando o pagamento for único, imediato e representar uma operação de troco.

        [Restrições]
        - Campo de envio obrigatório quando o valor do campo /data/payment/type for igual a PIX, e;
        - Se preenchido o objetivo /data/payment/scheduled/single, apenas o valor SINGLE_SCHEDULED é permitidos, ou;
        - Se preenchido um dos objetos /data/payment/scheduled/daily, /data/payment/scheduled/weekly, /data/payment/scheduled/monthly ou /data/payment/scheduled/custom, apenas o valor RECURRENT_SCHEDULED é permitido.
      type: string
      enum:
        - IMMEDIATE
        - SINGLE_SCHEDULED
        - RECURRENT_SCHEDULED
        - WITHDRAW
        - CHANGE
    AmountV4:
      type: string
      minLength: 4
      maxLength: 19
      pattern: '^((\d{1,16}\.\d{2}))$'
      example: '100000.12'
      description: |
        Valor da transação com 2 casas decimais. O valor deve ser o mesmo enviado no consentimento.

        Para QR Code estático com valor pré-determinado no QR Code ou para QR Code dinâmico com indicação de que o valor não pode ser alterado: O campo amount deve ser preenchido com o valor estabelecido no QR Code.
        Caso seja preenchido com valor divergente do QR Code, deve ser retornado um erro HTTP Status 422.
    AmountV5:
      type: string
      minLength: 4
      maxLength: 19
      pattern: '^((\d{1,16}\.\d{2}))$'
      example: '100000.12'
      description: |
       Valor da transação com 2 casas decimais. Para pagamento de QRCodes, a composição do valor segue as regras abaixo, de acordo com o tipo de QRCode e o produto associado a ele:
        ▪ QR Code Estático: Se o QR Code contém valor, o campo amount deve ser preenchido com esse valor. Se o valor não estiver presente, o valor deve ser preenchido pelo usuário pagador, em ambiente da ITP, antes da criação do consentimento.
        ▪ QR Code Dinâmico de Cobrança Imediata (COB): O campo amount deve ser preenchido com o valor da cobrança (valor.original). Quando valor.modalidadeAlteracao for igual a 1, o valor pode ser alterado pelo usuário pagador, em ambiente da ITP, antes da criação do consentimento.
        ▪ QR Code Dinâmico de Cobrança com Vencimento (COBV): O campo amount deve ser preenchido com o valor final da cobrança, correspondente à composição: valor original, deduzidos eventuais abatimentos e descontos, acrescidos de eventuais juros e multa. O campo modalidadeAlteracao não se aplica a COBV; o valor não pode ser alterado pelo usuário pagador.
        ▪ QR Code Dinâmico de Pix Saque: O campo amount deve ser preenchido com o valor do saque (valor.retirada.saque.valor). Quando valor.retirada.saque.modalidadeAlteracao for igual a 1, o valor do saque pode ser alterado pelo usuário pagador, em ambiente da ITP, antes da criação do consentimento e respeitados os limites definidos pelo facilitador de serviço de saque.
        ▪ QR Code Dinâmico de Pix Troco: O campo amount deve ser preenchido com o valor total da transação, correspondente à soma do valor da compra (valor.original) com o valor do troco (valor.retirada.troco.valor). O valor da compra (valor.original) não pode ser alterado. Quando valor.retirada.troco.modalidadeAlteracao for igual a 1, apenas o valor do troco pode ser alterado pelo usuário pagador, em ambiente da ITP, antes da criação do consentimento e respeitados os limites definidos pelo facilitador de serviço de saque.
        ▪ Para todos os cenários em que o valor não pode ser alterado, o campo amount deve ser preenchido com o valor estabelecido no QR Code. Caso o campo amount seja preenchido com valor divergente do esperado, deve ser retornado o erro HTTP Status 422 com código VALOR_INVALIDO.
    IbgeTownCodeV4:
      type: string
      minLength: 7
      maxLength: 7
      pattern: '^\d{7}$'
      example: '5300108'
      description: |
        O campo ibgetowncode no arranjo PIX, tem o mesmo comportamento que o campo codMun descrito no item 1.6.6 do manual do PIX, conforme segue:

        1. Caso a informação referente ao município não seja enviada; o PSP do recebedor assumirá que não existem feriados estaduais e municipais no período em questão;
    IbgeTownCodeV5:
      type: string
      minLength: 7
      maxLength: 7
      pattern: '^\d{7}$'
      example: '5300108'
      description: |
        O campo ibgetowncode, no arranjo PIX, tem o mesmo comportamento que o campo codMun descrito no manual do PIX.
        Caso a informação referente ao município não seja enviada; o PSP do recebedor assumirá que não existem feriados estaduais e municipais no período em questão;
        No caso de QRCode Dinâmico com vencimento, deve prevalecer o código do município do usuário pagador informado pelo prestador do serviço de iniciação.
        [Restrição] Para QRCode Dinâmico com vencimento é obrigatório o envio desse parâmetro pelo ITP para que o Detentor possa utiliza-lo em sua consulta. É obrigatório que o Detentor utilize o valor informado pelo ITP em sua consulta ao QRCode no PSP Recebedor
    DetailsV4:
      type: object
      description: |
        Objeto contendo os detalhes do pagamento.
      required:
        - localInstrument
        - creditorAccount
      properties:
        localInstrument:
          $ref: '#/components/schemas/EnumLocalInstrumentV4'
        qrCode:
          type: string
          maxLength: 512
          pattern: '[\w\W\s]*'
          example: |
            00020104141234567890123426660014BR.GOV.BCB.PIX014466756C616E6F32303139406578616D706C652E636F6D27300012
            BR.COM.OUTRO011001234567895204000053039865406123.455802BR5915NOMEDORECEBEDOR6008BRASILIA61087007490062
            530515RP12345678-201950300017BR.GOV.BCB.BRCODE01051.0.080450014BR.GOV.BCB.PIX0123PADRAO.URL.PIX/0123AB
            CD81390012BR.COM.OUTRO01190123.ABCD.3456.WXYZ6304EB76
          description: |
            Sequência de caracteres que corresponde ao QR Code disponibilizado para o pagador.
            É a sequência de caracteres que seria lida pelo leitor de QR Code, e deve propiciar o retorno dos dados do pagador após consulta na DICT.
            Essa funcionalidade é possível tanto para QR Code estático quanto para QR Code dinâmico.
            No arranjo do Pix esta é a mesma sequência gerada e/ou lida pela funcionalidade Pix Copia e Cola.
            Este campo deverá ser no formato UTF-8.
            [Restrição] Preenchimento obrigatório para pagamentos por QR Code, observado o tamanho máximo de 512 bytes.
        proxy:
          $ref: '#/components/schemas/ProxyV4'
        creditorAccount:
          $ref: '#/components/schemas/CreditorAccountV4'
    DetailsV5:
      type: object
      description: |
        Objeto contendo os detalhes do pagamento.
      required:
        - localInstrument
        - creditorAccount
      properties:
        payloadJWS:
          description: |
            Representa o payloadJWS obtido pela ITP na leitura do QR dinâmico. Devem ser enviados todos os fragmentos capturados do JWT que representa o QR gerado pelo PSP do Recebedor, permitindo ao detentor de contas validar os dados das cobranças repassadas pelo ITP.
            [Restrição] Campo de envio obrigatório quando o valor presente em ```/data/payment/details/localInstrument``` for igual a APDN ou QRDN.
          type: string
          maxLength: 16384
          pattern: '^[A-Za-z0-9_-]+\.[A-Za-z0-9_-]+\.[A-Za-z0-9_-]+$'
        localInstrument:
          $ref: '#/components/schemas/EnumLocalInstrumentV5'
        qrCode:
          type: string
          maxLength: 512
          pattern: '[\w\W\s]*'
          example: |
            00020104141234567890123426660014BR.GOV.BCB.PIX014466756C616E6F32303139406578616D706C652E636F6D27300012
            BR.COM.OUTRO011001234567895204000053039865406123.455802BR5915NOMEDORECEBEDOR6008BRASILIA61087007490062
            530515RP12345678-201950300017BR.GOV.BCB.BRCODE01051.0.080450014BR.GOV.BCB.PIX0123PADRAO.URL.PIX/0123AB
            CD81390012BR.COM.OUTRO01190123.ABCD.3456.WXYZ6304EB76
          description: |
            Representa a sequência de caracteres correspondente ao QRCode disponibilizado para o pagador, podendo ser obtido pelo leitor do dispositivo do pagador ou por copia e cola. Deve estar no formato UTF-8 e propiciar o retorno dos dados do pagador após a consulta no DICT. Para casos onde “/data/payment/details/localInstrument” for igual a QRDN ou APDN, os dados da cobrança serão repassados pelo ITP no campo “/data/payment/details/payloadJWS”, permitindo ao detentor validar os dados da cobrança sem a necessidade de consultar o payloadJWS do QRCode em questão através da URL. Não é vedada ao detentor realizar a consulta, porém, em casos de mudança do valor do campo "txId", a detentora deverá confiar no payloadJWS repassado pela ITP.
            [Restrição] Campo de preenchimento obrigatório quando o valor de /data/payment/details/localInstrument for igual a QRDN, APDN, QRES ou APES, observado o tamanho máximo de 512 bytes.
        proxy:
          $ref: '#/components/schemas/ProxyV5'
        creditorAccount:
          $ref: '#/components/schemas/CreditorAccountV5'
    EnumLocalInstrumentV4:
      type: string
      enum:
        - MANU
        - DICT
        - QRDN
        - QRES
        - INIC
      example: DICT
      description: |
        Especifica a forma de iniciação do pagamento:
        - MANU - Inserção manual de dados da conta transacional
        - DICT - Inserção manual de chave Pix
        - QRDN - QR code dinâmico
        - QRES - QR code estático
        - INIC - Indica que o recebedor (creditor) contratou o Iniciador de Pagamentos especificamente para realizar iniciações de pagamento em que o beneficiário é previamente conhecido.

        [Restrição] Se /data/payment/schedule enviado com valor diferente de single durante a criação do consentimento, apenas os métodos MANU, DICT ou QRES são permitidos.
    EnumLocalInstrumentV5:
      type: string
      enum:
        - MANU
        - DICT
        - QRDN
        - QRES
        - INIC
        - APES
        - APDN
      example: DICT
      description: |
        Especifica a forma de iniciação do pagamento:
        - MANU - Inserção manual de dados da conta transacional
        - DICT - Inserção manual de chave Pix
        - APDN - Leitura de QR code dinâmico via NFC
        - QRDN - Leitura QR code dinâmico (exceto NFC)
        - APES - Leitura de QR code estático via NFC
        - QRES - Leitura de QR code estático (exceto NFC)
        - INIC - Indica que o recebedor (creditor) contratou o Iniciador de Pagamentos especificamente para realizar iniciações de pagamento em que o beneficiário é previamente conhecido.

        [Restrição] Se /data/payment/schedule enviado com valor diferente de single durante a criação do consentimento, apenas os métodos MANU, DICT ou QRES são permitidos.
    ProxyV4:
      type: string
      maxLength: 77
      pattern: '[\w\W\s]*'
      example: '12345678901'
      description: |
        Chave cadastrada no DICT pertencente ao recebedor. Os tipos de chaves podem ser: telefone, e-mail, cpf/cnpj ou chave aleatória.
        No caso de telefone celular deve ser informado no padrão E.1641.
        Para e-mail deve ter o formato xxxxxxxx@xxxxxxx.xxx(.xx) e no máximo 77 caracteres.
        No caso de CPF deverá ser informado com 11 números, sem pontos ou traços.
        Para o caso de CNPJ deverá ser informado com 14 números, sem pontos ou traços.
        No caso de chave aleatória deve ser informado o UUID gerado pelo DICT, conforme formato especificado na RFC41223.
        Se informado, a detentora da conta deve validar o proxy no DICT quando localInstrument for igual a DICT, QRDN ou QRES e validar o campo creditorAccount.
        Esta validação é opcional caso o localInstrument for igual a INIC.
        [Restrição] Se localInstrument for igual a MANU, o campo proxy não deve ser preenchido. Se localInstrument for igual INIC, DICT, QRDN ou QRES, o campo proxy deve ser sempre preenchido com a chave Pix.
    ProxyV5:
      type: string
      maxLength: 77
      pattern: '[\w\W\s]*'
      example: '12345678901'
      description: |
        Chave cadastrada no DICT pertencente ao recebedor. Os tipos de chaves podem ser: telefone, e-mail, cpf/cnpj ou chave aleatória. No caso de telefone celular deve ser informado no padrão E.1641. Para e-mail deve ter o formato xxxxxxxx@xxxxxxx.xxx(.xx) e no máximo 77 caracteres. No caso de CPF deverá ser informado com 11 números, sem pontos ou traços. Para o caso de CNPJ deverá ser informado com 14 caracteres, sem pontos ou traços. No caso de chave aleatória deve ser informado o UUID gerado pelo DICT, conforme formato especificado na RFC4122. Se informado, a detentora da conta deve validar o proxy no DICT quando localInstrument for igual a DICT, APDN, APES, QRDN ou QRES e validar o campo creditorAccount. Esta validação é opcional caso o localInstrument for igual a INIC.
        [Restrição] Se localInstrument for igual a MANU, o campo proxy não deve ser preenchido. Se localInstrument for igual INIC, DICT, APDN, APES, QRDN ou QRES, o campo proxy deve ser sempre preenchido com a chave Pix.
