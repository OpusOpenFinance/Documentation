    EnumPaymentStatusType:
      type: string
      enum:
        - RCVD
        - CANC
        - ACCP
        - ACPD
        - RJCT
        - ACSC
        - PDNG
        - SCHD
      example: PDNG
      description: |
        Estado atual da iniciação de pagamento. O estado evolui na seguinte ordem:

        1.  RCVD (Received) - Indica que a requisição de pagamento foi recebida com sucesso pela detentora, mas ainda há validações a serem feitas antes de ser submetida para liquidação.

        2.  CANC (Cancelled) - Indica que a transação Pix pendente foi cancelada com sucesso pelo usuário antes que fosse confirmada (ACCP) ou rejeitada (RJCT) pela detentora.

        3.  ACCP( Accepted Customer Profile) - Indica que todas as verificações necessárias já foram realizadas pela detentora e que a transação está pronta para ser enviada para liquidação (no SPI se for Pix para outra instituição ou internamente se for para outra conta na mesma instituição).

        4.  ACPD (Accepted Clearing Processed) - Indica que a detentora já submeteu a transação para liquidação, mas ainda não tem a confirmação se foi liquidada ou rejeitada.

        5.  RJCT (Rejected) Indica que a transação foi rejeitada pela detentora ou pelo SPI.

        6.  ACSC (Accepted Settlement Completed Debitor Account) - Indica que a transação foi efetivada pela detentora ou pelo SPI.

        7.  PDNG (Pending) - Indica que a detentora reteve temporariamente a transação Pix para análise. Não se aplica quando a conta recebedora e a pagadora possuem a mesma titularidade.

        8.  SCHD (Scheduled) - Indica que a transação Pix foi agendada com sucesso na detentora.

        Em caso insucesso:

        RJCT (REJECTED) - Instrução de pagamento rejeitada.
    422ResponseErrorCreatePixPayment:
      type: object
      required:
        - errors
      properties:
        errors:
          type: array
          minItems: 1
          maxItems: 9
          items:
            type: object
            required:
              - code
              - title
              - detail
            properties:
              code:
                $ref: '#/components/schemas/EnumErrorsCreatePixPayment'
              title:
                type: string
                maxLength: 255
                pattern: '[\w\W\s]*'
                example: Pagamento não permite cancelamento.
                description: |
                  Título específico do erro reportado, de acordo com o código enviado:

                  • PAGAMENTO_NAO_PERMITE_CANCELAMENTO: Pagamento não permite cancelamento
                  • ERRO_IDEMPOTENCIA: Conteúdo da mensagem (claim data) diverge do conteúdo associado a esta chave de idempotência (x-idempotency-key).
              detail:
                type: string
                maxLength: 2048
                pattern: '[\w\W\s]*'
                example: Pagamento não permite cancelamento.
                description: |
                  Descrição específica do erro de acordo com o código reportado:

                  • PAGAMENTO_NAO_PERMITE_CANCELAMENTO: Pagamento não permite cancelamento
                  • ERRO_IDEMPOTENCIA: Conteúdo da mensagem (claim data) diverge do conteúdo associado a esta chave de idempotência (x-idempotency-key).
        meta:
          $ref: '#/components/schemas/RegulatoryMeta'
    422ResponseErrorCreatePixPayments:
      type: object
      required:
        - errors
      properties:
        errors:
          type: array
          minItems: 1
          maxItems: 9
          items:
            type: object
            required:
              - code
              - title
              - detail
            properties:
              code:
                $ref: '#/components/schemas/EnumErrorsCreatePayment'
              title:
                type: string
                maxLength: 255
                pattern: '[\w\W\s]*'
                example: Saldo insuficiente.
                description: |
                  Título específico do erro reportado, de acordo com o código enviado:
                  - SALDO_INSUFICIENTE: Saldo insuficiente.
                  - VALOR_ACIMA_LIMITE: Acima do limite estabelecido.
                  - VALOR_INVALIDO: Valor inválido.
                  - COBRANCA_INVALIDA: Cobrança inválida.
                  - CONSENTIMENTO_INVALIDO – Consentimento inválido (em status final).
                  - PARAMETRO_NAO_INFORMADO: Parâmetro obrigatório não informado.
                  - PARAMETRO_INVALIDO: Parâmetro com valor inválido.
                  - NAO_INFORMADO: Não informado.
                  - PAGAMENTO_DIVERGENTE_CONSENTIMENTO: Divergência entre pagamento e consentimento.
                  - DETALHE_PAGAMENTO_INVALIDO: Detalhe do pagamento inválido.
                  - PAGAMENTO_RECUSADO_DETENTORA: Pagamento recusado pela detentora de conta.
                  - PAGAMENTO_RECUSADO_SPI: Pagamento recusado no Sistema de Pagamentos Instantâneos (SPI).
                  - ERRO_IDEMPOTENCIA: Erro idempotência.
                  - CONSENTIMENTO_PENDENTE_AUTORIZACAO: Consentimento pendente autorização de múltiplas alçadas (status “PARTIALLY_ACCEPTED”).
                  - CONTA_NAO_PERMITE_PAGAMENTO – A conta selecionada é do tipo [salario/investimento/liquidação/outros] e não permite realizar esse pagamento.
                  - QRCODE_INVALIDO - O QRCode utilizado para a iniciação de pagamento não é válido.
              detail:
                type: string
                maxLength: 2048
                pattern: '[\w\W\s]*'
                example: A conta selecionada não possui saldo suficiente para realizar o pagamento.
                description: |
                  Descrição específica do erro de acordo com o código reportado:
                  - SALDO_INSUFICIENTE: A conta selecionada não possui saldo suficiente para realizar o pagamento.
                  - VALOR_ACIMA_LIMITE: O valor (ou quantidade de transações) ultrapassa a faixa de limite parametrizada na detentora para permitir a realização de transações pelo cliente.
                  - VALOR_INVALIDO: O valor enviado não é válido para o QR Code informado.
                  - COBRANCA_INVALIDA: Validação de expiração, validação de vencimento ou Status Válido.
                  - CONSENTIMENTO_INVALIDO – Consentimento inválido (em status final).
                  - PARAMETRO_NAO_INFORMADO: endToEndId
                  - PARAMETRO_INVALIDO: endToEndId
                  - NAO_INFORMADO: Não reportado/identificado pela instituição detentora de conta.
                  - PAGAMENTO_DIVERGENTE_CONSENTIMENTO: Dados do pagamento divergentes dos dados do consentimento.
                  - DETALHE_PAGAMENTO_INVALIDO: Parâmetro [nome_campo] não obedece às regras de negócio.
                  - PAGAMENTO_RECUSADO_DETENTORA: [descrição do motivo de recusa].
                  - PAGAMENTO_RECUSADO_SPI: [código de erro conforme tabela de domínios reason PACS.002].
                  - ERRO_IDEMPOTENCIA: Conteúdo da mensagem (claim data) diverge do conteúdo associado a esta chave de idempotência (x-idempotency-key).
                  - CONSENTIMENTO_PENDENTE_AUTORIZACAO: Consentimento pendente autorização de múltiplas alçadas (status “PARTIALLY_ACCEPTED”).
                  - CONTA_NAO_PERMITE_PAGAMENTO – A conta selecionada é do tipo [salario/investimento/liquidação/outros] e não permite realizar esse pagamento.
                  - QRCODE_INVALIDO - O QRCode utilizado para a iniciação de pagamento não é válido.
        meta:
          $ref: '#/components/schemas/RegulatoryMeta'
    EnumErrorsCreatePixPayment:
      type: string
      enum:
        - PAGAMENTO_NAO_PERMITE_CANCELAMENTO
        - ERRO_IDEMPOTENCIA
      example: PAGAMENTO_NAO_PERMITE_CANCELAMENTO
      description: |
        Códigos de erros previstos na criação da iniciação de pagamento:

        • PAGAMENTO_NAO_PERMITE_CANCELAMENTO: Pagamento não permite cancelamento
        • ERRO_IDEMPOTENCIA: Conteúdo da mensagem (claim data) diverge do conteúdo associado a esta chave de idempotência (x-idempotency-key).
    EnumErrorsCreatePayment:
      type: string
      enum:
        - SALDO_INSUFICIENTE
        - VALOR_ACIMA_LIMITE
        - VALOR_INVALIDO
        - COBRANCA_INVALIDA
        - CONSENTIMENTO_INVALIDO
        - PARAMETRO_NAO_INFORMADO
        - PARAMETRO_INVALIDO
        - NAO_INFORMADO
        - PAGAMENTO_DIVERGENTE_CONSENTIMENTO
        - DETALHE_PAGAMENTO_INVALIDO
        - PAGAMENTO_RECUSADO_DETENTORA
        - PAGAMENTO_RECUSADO_SPI
        - ERRO_IDEMPOTENCIA
        - CONSENTIMENTO_PENDENTE_AUTORIZACAO
        - CONTA_NAO_PERMITE_PAGAMENTO
        - QRCODE_INVALIDO
      example: SALDO_INSUFICIENTE
      description: |
        Códigos de erros previstos na criação da iniciação de pagamento:
        - SALDO_INSUFICIENTE: Esta conta não possui saldo suficiente para realizar o pagamento.
        - VALOR_ACIMA_LIMITE: O valor (ou quantidade de transações) ultrapassa a faixa de limite parametrizada na detentora para permitir a realização de transações pelo cliente.
        - VALOR_INVALIDO: O valor enviado não é válido para o QR Code informado.
        - COBRANCA_INVALIDA: Validação de expiração, validação de vencimento, Status Válido.
        - CONSENTIMENTO_INVALIDO – Consentimento inválido (em status final).
        - PARAMETRO_NAO_INFORMADO: Parâmetro não informado.
        - PARAMETRO_INVALIDO: Parâmetro inválido.
        - NAO_INFORMADO: Não informada pela detentora de conta.
        - PAGAMENTO_DIVERGENTE_CONSENTIMENTO: Dados do pagamento divergentes dos dados do consentimento.
        - DETALHE_PAGAMENTO_INVALIDO: Detalhe do pagamento inválido.
        - PAGAMENTO_RECUSADO_DETENTORA: Pagamento recusado pela detentora de conta.
        - PAGAMENTO_RECUSADO_SPI: Pagamento recusado no Sistema de Pagamentos Instantâneos (SPI).
        - ERRO_IDEMPOTENCIA: Erro idempotência.
        - CONSENTIMENTO_PENDENTE_AUTORIZACAO: Consentimento pendente autorização de múltiplas alçadas (status “PARTIALLY_ACCEPTED”)
        - CONTA_NAO_PERMITE_PAGAMENTO – A conta selecionada é do tipo [salario/investimento/liquidação/outros] e não permite realizar esse pagamento.
        - QRCODE_INVALIDO - O QRCode utilizado para a iniciação de pagamento não é válido.
    ResponsePaymentsGetConsentsConsentIdPayments:
      type: object
      required:
        - data
        - links
        - meta
      properties:
        data:
          type: array
          description: Objeto contendo dados do pagamento
          items:
            type: object
            required:
              - paymentId
              - endToEndId
              - consentId
              - creationDateTime
              - statusUpdateDateTime
              - status
              - localInstrument
              - payment
              - creditorAccount
              - cnpjInitiator
              - debtorAccount
            properties:
              paymentId:
                type: string
                minLength: 1
                maxLength: 100
                pattern: '^[a-zA-Z0-9][a-zA-Z0-9\-]{0,99}$'
                example: TXpRMU9UQTROMWhZV2xSU1FUazJSMDl
                description: |
                  Código ou identificador único informado pela instituição detentora da conta para representar
                  a iniciação de pagamento individual. O `paymentId` deve ser diferente do `endToEndId`.
                  Este é o identificador que deverá ser utilizado na consulta ao status da iniciação de pagamento efetuada.
              endToEndId:
                $ref: '#/components/schemas/EndToEndId'
              statusUpdateDateTime:
                type: string
                format: date-time
                pattern: '^(\d{4})-(1[0-2]|0?[1-9])-(3[01]|[12][0-9]|0?[1-9])T(?:[01]\d|2[0123]):(?:[012345]\d):(?:[012345]\d)Z$'
                example: '2020-07-21T08:30:00Z'
                description: |
                  Data e hora da última atualização da iniciação de pagamento.
                  Uma string com data e hora conforme especificação RFC-3339,
                  sempre com a utilização de timezone UTC(UTC time format).
              status:
                $ref: '#/components/schemas/EnumPaymentStatusType'
        links:
          $ref: '#/components/schemas/LinkSingle'
        meta:
          $ref: '#/components/schemas/RegulatoryMeta'
    XV:
      description: 'Cabeçalho que indica a versão implementada da API pela instituição financeira para atender à solicitação. Deve ser preenchido de forma completa, por exemplo: x-v : 1.0.2.'
      type: string
      pattern: '^\d+\.\d+\.\d+$'
      example: 1.0.0
    XFapiInteractionId:
      type: string
      pattern: '^[0-9a-fA-F]{8}-[0-9a-fA-F]{4}-[0-9a-fA-F]{4}-[0-9a-fA-F]{4}-[0-9a-fA-F]{12}$'
      minLength: 1
      maxLength: 36
      format: uuid
      example: d78fc4e5-37ca-4da3-adf2-9b082bf92280
      description: Um UUID [RFC4122](https://tools.ietf.org/html/rfc4122) usado como um ID de correlação entre request e response. Campo de geração e envio obrigatório pela iniciadora (client) e o seu valor deve ser “espelhado” pela detentora (server) no cabeçalho de resposta. Caso não seja enviado pela iniciadora, a detentora deve gerar um x-fapi-interaction-id e retorná-lo na resposta com o HTTP status code 400. Caso recebido um valor inválido, a detentora deve gerar um x-fapi-interaction-id e retorná-lo na resposta com o HTTP status code 400 ou 422 (com o código PARAMETRO_INVALIDO). A iniciadora deve acatar o valor gerado pelo detentor e recebido na resposta.
  headers:
    xOriginError:
      description: Indica a origem do erro.
      schema:
        $ref: '#/components/schemas/EnumOriginError'
      required: false
    xErrorSourceUrl:
      description: URL da chamada que originou o erro, presente apenas quando `x-origin-error` = `participant`.
      schema:
        type: string
      required: false
    xRegulatoryV:
      description: Versão regulatória desejada para a chamada ao participante (disponível apenas em rotas não-proxy).
      schema:
        $ref: '#/components/schemas/RegulatoryVersion'
      required: false
    xSelectedRegulatoryV:
      description: Versão regulatória efetivamente utilizada na requisição ao participante.
      schema:
        $ref: '#/components/schemas/SelectedRegulatoryVersion'
      required: true
    xFapiInteractionIdResponse:
      description: |
        Um UUID [RFC4122](https://tools.ietf.org/html/rfc4122) usado como um ID de correlação entre request e response. Campo de geração e envio obrigatório pela iniciadora (client) e o seu valor deve ser “espelhado” pela detentora (server) no cabeçalho de resposta. Caso não seja enviado pela iniciadora, a detentora deve gerar um x-fapi-interaction-id e retorná-lo na resposta com o HTTP status code 400. Caso recebido um valor inválido, a detentora deve gerar um x-fapi-interaction-id e retorná-lo na resposta com o HTTP status code 400 ou 422 (com o código PARAMETRO_INVALIDO). A iniciadora deve acatar o valor gerado pelo detentor e recebido na resposta.
      schema:
        $ref: '#/components/schemas/XFapiInteractionId'
      required: true
    xV:
      description: 'Cabeçalho que indica a versão implementada da API pela instituição financeira para atender à solicitação. Deve ser preenchido de forma completa, por exemplo: x-v : 1.0.2.'
      required: true
      schema:
        $ref: '#/components/schemas/XV'
  parameters:
    applicationId:
      name: x-application-id
      in: header
      required: true
      description: Identificador do aplicativo que realiza a requisição
      schema:
        $ref: '#/components/schemas/UUID'
    authorisationServerId:
      name: x-authorisation-server-id
      required: true
      description: Identificador do Authorisation Server da trasmissora do consentimento, obtido através da consula da lista de participantes
      in: header
      schema:
        $ref: '#/components/schemas/UUID'
    headerConsentId:
      name: x-consent-id
      required: true
      in: header
      description: Identificador do consentimento a ser utilizado nesta operação, obtido na resposta de sua criação
      schema:
        type: string
        pattern: '^urn:[a-zA-Z0-9][a-zA-Z0-9-]{0,31}:[a-zA-Z0-9()+,\-.:=@;$_!*''%\/?#]+$'
        maxLength: 256
      example: 'urn:bancox:f865cd66-392a-420b-9ff0-1b6d7cc60ee0'
    consentId:
      name: consentId
      required: true
      in: path
      description: |
        O consentId é o identificador único do consentimento e deverá ser um URN - Uniform Resource Name.
        Um URN, conforme definido na [RFC8141](https://tools.ietf.org/html/rfc8141) é um Uniform Resource
        Identifier - URI - que é atribuído sob o URI scheme "urn" e um namespace URN específico, com a intenção de que o URN
        seja um identificador de recurso persistente e independente da localização.
        Considerando a string urn:prudential:C1DD93123 como exemplo para consentId temos:
        - o namespace(urn)
        - o identificador associado ao namespace da instituição transnmissora (bancox)
        - o identificador específico dentro do namespace (f865cd66-392a-420b-9ff0-1b6d7cc60ee0).
        Informações mais detalhadas sobre a construção de namespaces devem ser consultadas na [RFC8141](https://tools.ietf.org/html/rfc8141).
      schema:
        type: string
        pattern: '^urn:[a-zA-Z0-9][a-zA-Z0-9-]{0,31}:[a-zA-Z0-9()+,\-.:=@;$_!*''%\/?#]+$'
        maxLength: 256
      example: 'urn:bancox:f865cd66-392a-420b-9ff0-1b6d7cc60ee0'
    authorisationFlowIntent:
      name: x-authorisation-flow-intent
      required: false
      description: Indicador de qual será o modelo de aprovação do consentimento de pagamento
      in: header
      schema:
        $ref: '#/components/schemas/EnumAuthorisationFlowIntent'
    regulatoryV:
        name: x-regulatory-v
        required: false
        description: Versão regulatória desejada para a chamada ao participante (disponível apenas em rotas não-proxy).
        in: header
        schema:
          $ref: '#/components/schemas/RegulatoryVersion'
    authorizationHeader:
      name: Authorization
      in: header
      description: Cabeçalho HTTP padrão. Permite que as credenciais sejam fornecidas dependendo do tipo de recurso solicitado
      required: true
      schema:
        type: string
        pattern: '[\w\W\s]*'
        minLength: 1
        maxLength: 2048
    xCustomerUserAgent:
      name: x-customer-user-agent
      in: header
      description: Indica o user-agent que o usuário utiliza.
      required: false
      schema:
        type: string
        pattern: '[\w\W\s]*'
        minLength: 1
        maxLength: 100
    xFapiAuthDate:
      name: x-fapi-auth-date
      in: header
      description: 'Data em que o usuário logou pela última vez com o receptor. Representada de acordo com a [RFC7231](https://tools.ietf.org/html/rfc7231).Exemplo: Sun, 10 Sep 2017 19:43:31 UTC'
      required: false
      schema:
        type: string
        pattern: '^(Mon|Tue|Wed|Thu|Fri|Sat|Sun), \d{2} (Jan|Feb|Mar|Apr|May|Jun|Jul|Aug|Sep|Oct|Nov|Dec) \d{4} \d{2}:\d{2}:\d{2} (GMT|UTC)$'
        minLength: 29
        maxLength: 29
    xFapiCustomerIpAddress:
      name: x-fapi-customer-ip-address
      in: header
      description: O endereço IP do usuário se estiver atualmente logado com o receptor.
      required: false
      schema:
        type: string
        pattern: '[\w\W\s]*'
        minLength: 1
        maxLength: 100
    xFapiInteractionId:
      name: x-fapi-interaction-id
      in: header
      description: Um UUID [RFC4122](https://tools.ietf.org/html/rfc4122) usado como um ID de correlação entre request e response. Campo de geração e envio obrigatório pela iniciadora (client) e o seu valor deve ser “espelhado” pela detentora (server) no cabeçalho de resposta. Caso não seja enviado pela iniciadora, a detentora deve gerar um x-fapi-interaction-id e retorná-lo na resposta com o HTTP status code 400. Caso recebido um valor inválido, a detentora deve gerar um x-fapi-interaction-id e retorná-lo na resposta com o HTTP status code 400 ou 422 (com o código PARAMETRO_INVALIDO). A iniciadora deve acatar o valor gerado pelo detentor e recebido na resposta.
      required: true
      schema:
        type: string
        pattern: '^[0-9a-fA-F]{8}-[0-9a-fA-F]{4}-[0-9a-fA-F]{4}-[0-9a-fA-F]{4}-[0-9a-fA-F]{12}$'
        minLength: 1
        maxLength: 36
        format: uuid
        example: d78fc4e5-37ca-4da3-adf2-9b082bf92280
    xIdempotencyKey:
      name: x-idempotency-key
      in: header
      description: Cabeçalho HTTP personalizado. Identificador de solicitação exclusivo para suportar a idempotência.
      required: true
      schema:
        type: string
        minLength: 1
        maxLength: 40
        pattern: ^(?!\s)(.*)(\S)$
    startDate:
      name: startDate
      in: query
      description: Data inicial de corte, incluindo o dia informado, para recuperação do pagamento ligado ao consentimento.
      required: false
      schema:
        type: string
        format: date
        example: '2025-04-16'
        pattern: '^(\d{4})-(1[0-2]|0?[1-9])-(3[01]|[12][0-9]|0?[1-9])$'
        minLength: 10
        maxLength: 10
    endDate:
      name: endDate
      in: query
      description: Data final de corte, incluindo o dia informado, da ocorrência do pagamento ligada ao consentimento.
      required: false
      schema:
        format: date
        type: string
        example: '2025-04-17'
        pattern: '^(\d{4})-(1[0-2]|0?[1-9])-(3[01]|[12][0-9]|0?[1-9])$'
        minLength: 10
        maxLength: 10
