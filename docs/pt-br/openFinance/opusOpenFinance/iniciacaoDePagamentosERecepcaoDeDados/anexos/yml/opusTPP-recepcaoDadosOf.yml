      - TCR_POS
      - TRFC_PRE
      - TRFC_POS
      - OUTROS_INDEXADORES
      example: TJLP
    LoansContractInterestRate:
      type: object
      description: Objeto que traz o conjunto de informações necessárias para demonstrar a composição das taxas de juros remuneratórios da Modalidade de crédito
      required:
      - taxType
      - interestRateType
      - taxPeriodicity
      - calculation
      - referentialRateIndexerType
      properties:
        taxType:
          $ref: '#/components/schemas/LoansEnumContractTaxType'
        interestRateType:
          $ref: '#/components/schemas/LoansEnumContractInterestRateType'
        taxPeriodicity:
          $ref: '#/components/schemas/LoansEnumContractTaxPeriodicity'
        calculation:
          $ref: '#/components/schemas/LoansEnumContractCalculation'
        referentialRateIndexerType:
          $ref: '#/components/schemas/LoansEnumContractReferentialRateIndexerType'
        referentialRateIndexerSubType:
          $ref: '#/components/schemas/LoansEnumContractReferentialRateIndexerSubType'
        referentialRateIndexerAdditionalInfo:
          type: string
          description: 'Campo livre para complementar a informação relativa ao Tipo de taxa referencial ou indexador.

            [Restrição] Obrigatório para complementar a informação relativa ao Tipo de taxa referencial ou indexador, quando selecionada o tipo ou subtipo OUTRO.

            '
          maxLength: 140
          pattern: ^[^\s](.*[^\s])?$
          example: Informações adicionais
        preFixedRate:
          type: string
          pattern: ^\d{1,2}\.\d{6}$
          format: double
          maxLength: 9
          minLength: 8
          example: '0.600000'
          description: 'Taxa pré fixada aplicada sob o contrato da modalidade crédito. p.ex. 0.014500. O preenchimento deve respeitar as 6 casas decimais, mesmo que venham preenchidas com zeros(representação de porcentagem p.ex: 0.150000. Este valor representa 15%. O valor 1 representa 100%).


            [Restrição] Este campo é de envio obrigatório caso não seja enviado o campo postFixedRate.

            '
        postFixedRate:
          type: string
          pattern: ^\d{1,2}\.\d{6}$
          format: double
          maxLength: 9
          minLength: 8
          description: 'Taxa pós fixada aplicada sob o contrato da modalidade crédito. p.ex. 0.0045.O preenchimento deve respeitar as 6 casas decimais, mesmo que venham preenchidas com zeros (representação de porcentagem p.ex: 0.1500. Este valor representa 15%. O valor 1 representa 100%). Para taxas pós fixadas necessário informar o indexador (campo referentialRateIndexerSubType).


            [Restrição] Este campo é de envio obrigatório caso não seja enviado o campo preFixedRate.

            '
          example: '0.550000'
        additionalInfo:
          type: string
          maxLength: 1200
          pattern: ^[^\s](.*[^\s])?$
          example: Informações adicionais
          description: "Texto com informações adicionais sobre a composição das taxas de juros pactuadas. \n\n[Restrição] Caso a instituição possua a informação para compartilhamento, esta deverá ser informada.\n"
