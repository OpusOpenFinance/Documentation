    BankFixedIncomesResponseBalances:
      type: object
      required:
        - data
        - links
        - meta
      properties:
        data:
          type: object
          required:
            - referenceDateTime
            - quantity
            - updatedUnitPrice
            - grossAmount
            - netAmount
            - incomeTax
            - financialTransactionTax
            - blockedBalance
            - purchaseUnitPrice
          properties:
            referenceDateTime:
              type: string
              format: date-time
              description: |
                Data e hora da última posição consolidada a que se referem os dados transacionais do cliente disponíveis nos canais eletrônicos.
                Na representação data deve se considerar os minutos e segundos como zero (00:00:00Z).
              pattern: '(^(\d{4})-(1[0-2]|0?[1-9])-(3[01]|[12][0-9]|0?[1-9])T(?:[01]\d|2[0123]):(?:[012345]\d):(?:[012345]\d)Z$)'
              example: '2022-07-21T17:32:00Z'
              maxLength: 20
            quantity:
              type: string
              format: double
              description: Quantidade de títulos detidos na data da posição do cliente
              maxLength: 26
              pattern: '^\d{1,15}\.\d{2,10}$'
              example: '1000.0004'
            updatedUnitPrice:
              type: object
              required:
                - amount
                - currency
              description: Valor bruto unitário atualizado na data de referência.
              properties:
                amount:
                  description: Valor relacionado ao objeto.
                  type: string
                  format: double
                  maxLength: 26
                  pattern: '^\d{1,15}\.\d{2,10}$'
                  example: '1000.000004'
                currency:
                  $ref: '#/components/schemas/BankFixedIncomesCurrencyCode'
            grossAmount:
              description: Valor do investimento que se refere a quantidade multiplicado pelo PU atualizado na data de referência;
              type: object
              required:
                - amount
                - currency
              properties:
                amount:
                  type: string
                  format: double
                  maxLength: 20
                  pattern: '^\d{1,15}\.\d{2,4}$'
                  example: '1000.0004'
                  description: Valor relacionado ao objeto.
                currency:
                  $ref: '#/components/schemas/BankFixedIncomesCurrencyCode'
            netAmount:
              description: 'Valor do investimento atualizado na data de referência, posterior a dedução de impostos (IOF e IR).'
              type: object
              required:
                - amount
                - currency
              properties:
                amount:
                  type: string
                  format: double
                  maxLength: 20
                  pattern: '^\d{1,15}\.\d{2,4}$'
                  example: '1000.0004'
                  description: Valor relacionado ao objeto.
                currency:
                  $ref: '#/components/schemas/BankFixedIncomesCurrencyCode'
            incomeTax:
              type: object
              required:
                - amount
                - currency
              description: Valor do imposto de renda provisionado considerando a alíquota vigente na data de referência.
              properties:
                amount:
                  type: string
                  format: double
                  maxLength: 20
                  pattern: '^\d{1,15}\.\d{2,4}$'
                  example: '1000.0004'
                  description: Valor relacionado ao objeto.
                currency:
                  $ref: '#/components/schemas/BankFixedIncomesCurrencyCode'
            financialTransactionTax:
              type: object
              required:
                - amount
                - currency
              description: Valor do imposto (IOF) provisionado considerando a alíquota vigente na data de referência.
              properties:
                amount:
                  type: string
                  format: double
                  maxLength: 20
                  pattern: '^\d{1,15}\.\d{2,4}$'
                  example: '1000.0004'
                  description: Valor relacionado ao objeto.
                currency:
                  $ref: '#/components/schemas/BankFixedIncomesCurrencyCode'
            blockedBalance:
              type: object
              required:
                - amount
                - currency
              description: Valor não disponível para movimentação naquele momento por qualquer motivo (bloqueio judicial, bloqueio em garantia, entre outros). Prazo de carência não é considerado como bloqueio.
              properties:
                amount:
                  type: string
                  format: double
                  maxLength: 20
                  pattern: '^\d{1,15}\.\d{2,4}$'
                  example: '1000.0004'
                  description: Valor relacionado ao objeto.
                currency:
                  $ref: '#/components/schemas/BankFixedIncomesCurrencyCode'
            purchaseUnitPrice:
              type: object
              required:
                - amount
                - currency
              description: Valor unitário negociado com o cliente na data de aquisição
              properties:
                amount:
                  type: string
                  format: double
                  maxLength: 24
                  pattern: '^\d{1,15}\.\d{2,8}$'
                  example: '1000.000004'
                  description: Valor relacionado ao objeto.
                currency:
                  $ref: '#/components/schemas/BankFixedIncomesCurrencyCode'
            preFixedRate:
              type: string
              format: double
              description: |
                Taxa de remuneração acordada com o cliente na contratação. Em casos de produtos progressivos, considerar a taxa máxima contratada.
              pattern: '^-?\d{1}\.\d{6}$'
              maxLength: 9
              minLength: 8
              example: '0.300000'
            postFixedIndexerPercentage:
              type: string
              format: double
              description: |
                Percentual do indexador acordado com o cliente na contratação. Em casos de produtos progressivos, considerar a taxa máxima contratada.
              pattern: '^-?\d{1}\.\d{6}$'
              maxLength: 9
              minLength: 8
              example: '1.000000'
        links:
          $ref: '#/components/schemas/BankFixedIncomesLinks'
        meta:
          $ref: '#/components/schemas/BankFixedIncomesMeta'
      additionalProperties: false
    BankFixedIncomesResponseTransactions:
      type: object
      required:
        - data
        - links
        - meta
      properties:
        data:
          type: array
          minItems: 0
          items:
            $ref: '#/components/schemas/BankFixedIncomesProductMovement'
        links:
          $ref: '#/components/schemas/BankFixedIncomesTransactionsLinks'
        meta:
          $ref: '#/components/schemas/BankFixedIncomesTransactionsMeta'
      additionalProperties: false
    BankFixedIncomesProductMovement:
      type: object
      required:
        - type
        - transactionType
        - transactionDate
        - transactionUnitPrice
        - transactionQuantity
        - transactionGrossValue
        - transactionNetValue
        - transactionId
      properties:
        type:
          $ref: '#/components/schemas/BankFixedIncomesEnumMovementType'
        transactionType:
          $ref: '#/components/schemas/BankFixedIncomesEnumTransactionType'
        transactionTypeAdditionalInfo:
          type: string
          maxLength: 100
          pattern: '[\w\W\s]*'
          description: |
            Informação adicional do tipo de movimentação, para preenchimento no caso de movimentações não delimitadas no domínio.

            [Restrição] Campo de preenchimento obrigatório pelas participantes quando houver 'Outros' no campo Motivo da movimentação.
        transactionDate:
          type: string
          format: date
          maxLength: 10
          minLength: 10
          pattern: '^(\d{4})-(1[0-2]|0?[1-9])-(3[01]|[12][0-9]|0?[1-9])$'
          example: '2018-02-15'
          description: Data da movimentação.
        transactionUnitPrice:
          type: object
          description: Preço unitário bruto negociado na transação.
          required:
            - amount
            - currency
          properties:
            amount:
              type: string
              format: double
              maxLength: 24
              pattern: '^\d{1,15}\.\d{2,8}$'
              example: '1000.04'
            currency:
              $ref: '#/components/schemas/BankFixedIncomesCurrencyCode'
        transactionQuantity:
          type: string
          format: double
          maxLength: 24
          pattern: '^\d{1,15}\.\d{2,8}$'
          example: '42.25'
          description: Quantidade de títulos envolvidos na movimentação.
        transactionGrossValue:
          type: object
          description: Valor bruto da transação (Preço unitário da movimentação x Quantidade).
          required:
            - amount
            - currency
          properties:
            amount:
              type: string
              format: double
              maxLength: 20
              pattern: '^\d{1,15}\.\d{2,4}$'
              example: '1000.04'
            currency:
              $ref: '#/components/schemas/BankFixedIncomesCurrencyCode'
        incomeTax:
          type: object
          description: |
            Valor do imposto de renda recolhido na transação.

            [Restrição] Campo de preenchimento obrigatório para os produtos aos quais essa taxa se aplica quando o campo `type` for preenchido com o valor `SAIDA`.
          required:
            - amount
            - currency
          properties:
            amount:
              type: string
              format: double
              maxLength: 20
              pattern: '^\d{1,15}\.\d{2,4}$'
              example: '1000.04'
            currency:
              $ref: '#/components/schemas/BankFixedIncomesCurrencyCode'
        financialTransactionTax:
          type: object
          description: |
            Valor do IOF recolhido na transação.

            [Restrição] Campo de preenchimento obrigatório para os produtos aos quais essa taxa se aplica quando o campo `type` for preenchido com o valor `SAIDA`.
          required:
            - amount
            - currency
          properties:
            amount:
              type: string
              format: double
              maxLength: 20
              pattern: '^\d{1,15}\.\d{2,4}$'
              example: '1000.04'
              description: Valor relacionado ao objeto.
            currency:
              $ref: '#/components/schemas/BankFixedIncomesCurrencyCode'
        transactionNetValue:
          type: object
          description: Valor líquido da transação.
          required:
            - amount
            - currency
          properties:
            amount:
              type: string
              format: double
              maxLength: 20
              pattern: '^\d{1,15}\.\d{2,4}$'
              example: '1000.04'
              description: Valor relacionado ao objeto.
            currency:
              $ref: '#/components/schemas/BankFixedIncomesCurrencyCode'
        remunerationTransactionRate:
          type: string
          format: double
          maxLength: 9
          minLength: 8
          pattern: '^-?\d{1}\.\d{6}$'
          example: '0.300000'
          description: |
            Taxa de remuneração da transação.

            [Restrição] Campo de preenchimento obrigatório pelas participantes quando o campo 'type' for preenchido com o valor 'ENTRADA' e se tratar de produto prefixado ou híbrido.
        indexerPercentage:
          type: string
          format: double
          maxLength: 8
          minLength: 8
          pattern: '^\d{1}\.\d{6}$'
          example: '1.100000'
          description: |
            Percentual máximo do indexador acordado com o cliente na contratação.

            [Restrição] Campo de preenchimento obrigatório pelas participantes quando o campo 'type' for preenchido com o valor 'ENTRADA' e se tratar de produto pós-fixado ou híbrido.
        transactionId:
          type: string
          maxLength: 100
          pattern: '^[a-zA-Z0-9][a-zA-Z0-9-]{0,99}$'
          example: ABCD2126019929279212650822221989319253344
          description: Código ou identificador único prestado pela instituição que mantém a representação individual do movimento.
      additionalProperties: false
    BankFixedIncomesEnumMovementType:
      type: string
      description: |
        Tipo de movimentação na visão de investimento

        - ENTRADA: APLICACAO, CANCELAMENTO, TRANSFERENCIA_TITULARIDADE, TRANSFERENCIA_CUSTODIA, OUTROS.

        - SAIDA: RESGATE, CANCELAMENTO, VENCIMENTO, PAGAMENTO_JUROS, AMORTIZACAO, TRANSFERENCIA_TITULARIDADE, TRANSFERENCIA_CUSTODIA, OUTROS.
      enum:
        - ENTRADA
        - SAIDA
      example: ENTRADA
    BankFixedIncomesEnumTransactionType:
      type: string
      description: Aplicação, resgate, cancelamento, vencimento, pagamento de juros, amortização, transferência de titularidade, transferência de custódia e outros.
      enum:
        - APLICACAO
        - RESGATE
        - CANCELAMENTO
        - VENCIMENTO
        - PAGAMENTO_JUROS
        - AMORTIZACAO
        - TRANSFERENCIA_TITULARIDADE
        - TRANSFERENCIA_CUSTODIA
        - OUTROS
      example: APLICACAO
    CreditFixedIncomesResponseInvestmentList:
      type: object
      required:
        - data
        - links
        - meta
      properties:
        data:
          type: array
          minItems: 0
          items:
            type: object
            description: Lista de títulos de renda fixa crédito mantidos pelo cliente na instituição transmissora e para as quais ele tenha fornecido consentimento
            required:
              - brandName
              - companyCnpj
              - investmentType
              - investmentId
            properties:
              brandName:
                type: string
                description: 'Nome da Marca reportada pelo participante no Open Finance. Recomenda-se utilizar, sempre que possível, o mesmo nome de marca atribuído no campo do diretório Customer Friendly Server Name (Authorisation Server).'
                pattern: '^[^\s](.*[^\s])?$'
                maxLength: 80
                example: Organização A
              companyCnpj:
                type: string
                description: 'Registro completo do CNPJ da instituição responsável pelo Cadastro - o CNPJ corresponde a representação alfanumérica da inscrição no Cadastro de Pessoa Jurídica. Deve-se ter apenas os caracteres do CNPJ, sem máscara'
                maxLength: 14
                pattern: '^[0-9A-Z]{12}[0-9]{2}$'
                example: '21128159000166'
              investmentType:
                $ref: '#/components/schemas/CreditFixedIncomesEnumInvestmentType'
              investmentId:
                type: string
                description: 'Identifica de forma única  o relacionamento do cliente com o produto, mantendo as regras de imutabilidade dentro da instituição transmissora.'
                maxLength: 100
                pattern: '^[a-zA-Z0-9][a-zA-Z0-9-]{0,99}$'
                example: '92792126019929200000000000000000000000000'
            additionalProperties: false
        links:
          $ref: '#/components/schemas/CreditFixedIncomesProductListLinks'
        meta:
          $ref: '#/components/schemas/CreditFixedIncomesMeta'
      additionalProperties: false
    CreditFixedIncomesResponseProductIdentification:
      type: object
      required:
        - data
        - links
        - meta
      properties:
        data:
          $ref: '#/components/schemas/CreditFixedIncomesIdentification'
        links:
          $ref: '#/components/schemas/CreditFixedIncomesLinks'
        meta:
          $ref: '#/components/schemas/CreditFixedIncomesMeta'
      additionalProperties: false
    CreditFixedIncomesIdentification:
      type: object
      required:
        - investmentType
        - remuneration
        - issueUnitPrice
        - issueDate
        - dueDate
        - voucherPaymentIndicator
        - purchaseDate
        - taxExemptProduct
      properties:
        issuerInstitutionCnpjNumber:
          type: string
          description: |
            CNPJ da instituição emissora.

            Caso a instituição tenha a informação, o envio será obrigatório.
          maxLength: 14
          pattern: '^[0-9A-Z]{12}[0-9]{2}$'
          example: '11225860000140'
        isinCode:
          type: string
          description: |
            Código ISIN é um código universal que identifica cada valor mobiliário ou instrumento financeiro, conforme Norma ISO 6166. Caso a transmissora possua a informação o envio deste campo é obrigatório.

            [Restrição] Deve ser preenchido nos casos em que o 'clearingCode' não seja preenchido.
          maxLength: 12
          pattern: '^[A-Z]{2}([A-Z0-9]){9}\d{1}$'
          example: BRCST4CTF001
        investmentType:
          $ref: '#/components/schemas/CreditFixedIncomesEnumInvestmentType'
        debtorCnpjNumber:
          type: string
          description: |
            CNPJ do devedor. Caso a transmissora possua a informação para os produtos CRI e CRA, o envio deste campo é obrigatório.
          maxLength: 14
          pattern: '^[0-9A-Z]{12}[0-9]{2}$'
          example: '11225860000140'
        debtorName:
          type: string
          description: |
            Nome do devedor. Caso a transmissora possua a informação para os produtos CRI e CRA, o envio deste campo é obrigatório.
          pattern: '[\w\W\s]*'
          maxLength: 70
          example: Roberto Marino
        taxExemptProduct:
          $ref: '#/components/schemas/CreditFixedIncomesEnumTaxExemptProduct'
        remuneration:
          $ref: '#/components/schemas/CreditFixedIncomesRemuneration'
        issueUnitPrice:
          type: object
          required:
            - amount
            - currency
          properties:
            amount:
              type: string
              description: Valor relacionado ao objeto.
              maxLength: 24
              pattern: '^\d{1,15}\.\d{2,8}$'
              example: '1000.000004'
            currency:
              $ref: '#/components/schemas/CreditFixedIncomesCurrencyCode'
        issueDate:
          type: string
          format: date
          description: Data de emissão do título
          maxLength: 10
          pattern: '^(\d{4})-(1[0-2]|0?[1-9])-(3[01]|[12][0-9]|0?[1-9])$'
          example: '2018-02-16'
        dueDate:
          type: string
          format: date
          description: Data de vencimento do título
          maxLength: 10
          pattern: '^(\d{4})-(1[0-2]|0?[1-9])-(3[01]|[12][0-9]|0?[1-9])$'
          example: '2018-02-15'
        voucherPaymentIndicator:
          $ref: '#/components/schemas/CreditFixedIncomesEnumVoucherPaymentIndicator'
        voucherPaymentPeriodicity:
          $ref: '#/components/schemas/CreditFixedIncomesEnumVoucherPaymentPeriodicity'
        voucherPaymentPeriodicityAdditionalInfo:
          type: string
          description: |
            Informações adicionais da periodicidade de pagamento de cupom
            [Restrição] Campo de preenchimento obrigatório pelas participantes quando houver 'Outros' no campo 'voucherPaymentPeriodicity'.
          maxLength: 50
          pattern: '[\w\W\s]*'
          example: Diária
        clearingCode:
          type: string
          description: |
            Código de registro do ativo na Clearing. Caso a transmissora possua a informação o envio deste campo é obrigatório.

            [Restrição] Deve ser preenchido nos casos em que o 'isinCode' não seja preenchido.
          maxLength: 30
          pattern: '[\w\W-]*'
          example: CDB421GPXXX
        purchaseDate:
          type: string
          format: date
          description: Data de aquisição do cliente
          maxLength: 10
          pattern: '^(\d{4})-(1[0-2]|0?[1-9])-(3[01]|[12][0-9]|0?[1-9])$'
          example: '2018-02-15'
        gracePeriodDate:
          type: string
          format: date
          description: |
            Data até a qual o cliente não poderá resgatar antecipadamente seu investimento.

            Caso a instituição tenha a informação, o envio será obrigatório.
          maxLength: 10
          pattern: '^(\d{4})-(1[0-2]|0?[1-9])-(3[01]|[12][0-9]|0?[1-9])$'
          example: '2018-02-16'
      additionalProperties: false
    CreditFixedIncomesEnumInvestmentType:
      type: string
      description: 'Especificação do ativo em questão (Debêntures, CRI ou CRA).'
      enum:
        - DEBENTURES
        - CRI
        - CRA
      example: CRI
    CreditFixedIncomesEnumTaxExemptProduct:
      type: string
      description: Indicador de um produto incentivado
      enum:
        - SIM
        - NAO
      example: SIM
    CreditFixedIncomesEnumVoucherPaymentIndicator:
      type: string
      description: |
        Indicativo se há pagamento de cupom
          1. Sim
          2. Nao
      enum:
        - SIM
        - NAO
      example: SIM
    CreditFixedIncomesEnumVoucherPaymentPeriodicity:
      type: string
      description: |
        Em caso de haver pagamento de cupom, descrever a periodicidade (mensal, trimestral, semestral, anual, irregular e outros)
      enum:
        - MENSAL
        - TRIMESTRAL
        - SEMESTRAL
        - ANUAL
        - IRREGULAR
        - OUTROS
      example: MENSAL
    CreditFixedIncomesRemuneration:
      type: object
      required:
        - indexer
      properties:
        preFixedRate:
          type: string
          description: |
            Valor da taxa de emissão do contrato.
            [Restrição] Campo de preenchimento obrigatório pelas participantes quando houver 'PRE_FIXADO' no campo 'indexer' ou quando se tratar de produto com remuneração híbrida.
          maxLength: 9
          pattern: '^-?\d{1}\.\d{6}$'
          example: '0.300000'
        postFixedIndexerPercentage:
          type: string
          description: |
            Percentual do indexador de emissão do contrato.
            [Restrição] Campo de preenchimento obrigatório pelas participantes quando o campo 'indexer' for preenchido de forma diferente de 'PRE_FIXADO' ou quando se tratar de produto com remuneração híbrida.
          maxLength: 9
          pattern: '^-?\d{1}\.\d{6}$'
          example: '1.100000'
        rateType:
          $ref: '#/components/schemas/CreditFixedIncomesEnumRateType'
        ratePeriodicity:
          $ref: '#/components/schemas/CreditFixedIncomesEnumRatePeriodicity'
        calculation:
          $ref: '#/components/schemas/CreditFixedIncomesEnumCalculation'
        indexer:
          $ref: '#/components/schemas/CreditFixedIncomesEnumIndexer'
        indexerAdditionalInfo:
          type: string
          description: |
            Informações adicionais do indexador
            [Restrição] Campo de preenchimento obrigatório pelas participantes quando houver 'Outros' no campo 'indexer'.
          pattern: '[\w\W\s]*'
          maxLength: 50
          example: Dólar
    CreditFixedIncomesEnumRateType:
      type: string
      description: |
        Tipo da taxa de remuneração (linear ou exponencial).

        Caso a instituição tenha a informação, o envio será obrigatório.
      enum:
        - LINEAR
        - EXPONENCIAL
      example: LINEAR
    CreditFixedIncomesEnumRatePeriodicity:
      type: string
      description: |
        Periodicidade da taxa de remuneração (mensal, anual, diário, semestral).

        Caso a instituição tenha a informação, o envio será obrigatório.
      enum:
        - MENSAL
        - ANUAL
        - DIARIO
        - SEMESTRAL
      example: MENSAL
    CreditFixedIncomesEnumCalculation:
      type: string
      description: |
        Base de cálculo (dias úteis ou dias corridos).

        Caso a instituição tenha a informação, o envio será obrigatório.
      enum:
        - DIAS_UTEIS
        - DIAS_CORRIDOS
      example: DIAS_CORRIDOS
    CreditFixedIncomesEnumIndexer:
      type: string
      description: 'Índice utilizado como referência para a correção da rentabilidade e/ou rendimentos do ativo (CDI, DI, TR, IPCA, IGP_M, IGP_DI, INPC, BCP, TLC, SELIC, PRE_FIXADO e OUTROS)'
      enum:
        - CDI
        - DI
        - TR
        - IPCA
        - IGP_M
        - IGP_DI
        - INPC
        - BCP
        - TLC
        - SELIC
        - PRE_FIXADO
        - OUTROS
      example: CDI
    CreditFixedIncomesCurrencyCode:
      type: string
      description: 'Moeda referente ao valor monetário, seguindo o modelo ISO-4217.'
      maxLength: 3
      pattern: '^[A-Z]{3}$'
      example: BRL
