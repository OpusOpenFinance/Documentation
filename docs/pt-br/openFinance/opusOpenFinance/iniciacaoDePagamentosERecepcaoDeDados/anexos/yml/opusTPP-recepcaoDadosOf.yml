    LoansEnumContractReferentialRateIndexerType:
      type: string
      description: '"Tipos de taxas referenciais ou indexadores, conforme Anexo 5: Taxa referencial ou Indexador (Indx), do Documento 3040"

        '
      enum:
      - SEM_TIPO_INDEXADOR
      - PRE_FIXADO
      - POS_FIXADO
      - FLUTUANTES
      - INDICES_PRECOS
      - CREDITO_RURAL
      - OUTROS_INDEXADORES
      example: PRE_FIXADO
    LoansEnumContractInterestRateType:
      type: string
      description: '"Tipo de Juros  (vide  Enum)

        - SIMPLES (aplicada/cobrada sempre sobre o capital inicial, que é o valor emprestado/investido. Não há cobrança de juros sobre juros acumulados no(s) período(s) anterior(es). Exemplo: em um empréstimo de R$1.000, com taxa de juros simples de 8% a.a., com duração de 2 anos, o total de juros será R$80 no primeiro ano e R$ 80 no segundo ano. Ao final do contrato, o tomador irá devolver o principal e os juros simples de cada ano: R$1.000+R$80+R$80=R$1.160)

        - COMPOSTO (para cada período do contrato (diário, mensal, anual etc.), há um “novo capital” para a cobrança da taxa de juros contratada. Esse “novo capital” é a soma do capital e do juro cobrado no período anterior. Exemplo: em um empréstimo de R$1.000, com taxa de juros composta de 8% a.a., com duração de 2 anos, o total de juros será R$80 no primeiro ano. No segundo ano, os juros vão ser somados ao capital (R$1.000 + R$ 80 = R$ 1.080), resultando em juros de R$ 86 (8%de R$ 1.080))"

        '
      enum:
      - SIMPLES
      - COMPOSTO
      example: SIMPLES
    LoansReleases:
      type: object
      description: Lista dos pagamentos realizados no período
      required:
      - paymentId
      - isOverParcelPayment
      - paidDate
      - currency
      - paidAmount
      properties:
        paymentId:
          type: string
          maxLength: 100
          minLength: 1
          example: XlthLXpBLVowLTldW2EtekEtWjAtOVwtXXswLDk5fSQ
          pattern: ^[a-zA-Z0-9][a-zA-Z0-9-]{0,99}$
          description: Código ou identificador único prestado pela instituição para representar o pagamento individual.
        isOverParcelPayment:
          type: boolean
          example: true
          description: Identifica se é um pagamento pactuado (false) ou avulso (true).
        instalmentId:
          type: string
          maxLength: 100
          minLength: 1
          pattern: ^[a-zA-Z0-9][a-zA-Z0-9-]{0,99}$
          example: WGx0aExYcEJMVm93TFRsZFcyRXRla0V0V2pBdE9Wd3RYWH
          description: "Identificador de parcela, de responsabilidade de cada Instituição transmissora.  \n[Restrição] Informação de envio obrigatório quando isOverParcelPayment tiver o valor FALSE.\n"
        paidDate:
          type: string
          format: date
          maxLength: 10
          pattern: ^(\d{4})-(1[0-2]|0?[1-9])-(3[01]|[12][0-9]|0?[1-9])$
          example: '2021-05-21'
          description: Data efetiva do pagamento referente ao contrato da modalidade de crédito consultada, conforme especificação RFC-3339. p.ex. 2014-03-19
        currency:
          type: string
          maxLength: 3
          pattern: ^(\w{3}){1}$
          example: BRL
          description: 'Moeda referente ao valor monetário informado, segundo modelo ISO-4217. p.ex. ''BRL''.

            Todos os valores monetários informados estão representados com a moeda vigente do Brasil.

            '
        paidAmount:
          type: string
          format: double
          pattern: ^-?\d{1,15}\.\d{2,4}$
          maxLength: 21
          minLength: 4
          example: '1000.0400'
          description: 'Valor do pagamento referente ao contrato da modalidade de crédito consultada. Expresso em valor monetário com no mínimo 2 casas e no máximo 4 casas decimais. Se encargos e taxas foram pagos juntos da parcela, a soma total deve ser adicionada ao valor da parcela neste campo. Caso o pagamento de taxas e encargos tenham sido feitos a parte, devem ser listados no campo ovelParcel.

            '
        overParcel:
          type: object
          description: 'Objeto das tarifas e encargos que foram pagos fora da parcela.


            [Restrição] Informação deve ser enviada caso ela exista.

            '
          required:
          - fees
          - charges
          properties:
            fees:
              type: array
              minItems: 0
              items:
                $ref: '#/components/schemas/LoansFeeOverParcel'
              description: Lista das tarifas que foram pagas fora da parcela, só para pagamento avulso.
            charges:
              type: array
              minItems: 0
              items:
                $ref: '#/components/schemas/LoansChargeOverParcel'
              description: Lista dos encargos que foram pagos fora da parcela.
    LoansEnumContractFeeCharge:
      type: string
