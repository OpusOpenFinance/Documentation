          minLength: 24
          maxLength: 24
          example: '2021-05-21T08:30:03.374Z'
        totalRemainingAmount:
          description: "Valor total que falta para o cliente liquidar o contrato, considerando o somatório total de todas as parcelas a vencer e vencidas, bem como todas as taxas, tarifas e encargos das parcelas. Nos casos de contrato com taxas pós-fixadas, considerar apenas valores pré-fixados, visto que o cálculo pós-fixado ocorre apenas em momento futuro, e que o valor está sujeito às variações de seu indexador.\n\n[Restrição] Este campo é de envio obrigatório caso o campo `productSubTypeCategory` seja preenchido `CREDITO_PESSOAL_CLEAN` ou `CONSIGNADO_SIAPE` no endpoint /contracts/{contractId}.  \n"
          type: string
          format: double
          pattern: ^\d{1,15}\.\d{2,4}$
          maxLength: 20
          minLength: 4
          example: '1000.0400'
        releases:
          type: array
          minItems: 0
          items:
            $ref: '#/components/schemas/LoansReleases'
          description: Lista dos pagamentos realizados no período
