    BankFixedIncomesResponseInvestmentList:
      type: object
      required:
        - data
        - links
        - meta
      properties:
        data:
          type: array
          minItems: 0
          items:
            type: object
            description: Lista de títulos de renda fixa bancária mantidos pelo cliente na instituição transmissora e para as quais ele tenha fornecido consentimento
            required:
              - brandName
              - companyCnpj
              - investmentType
              - investmentId
            properties:
              brandName:
                type: string
                description: 'Nome da Marca reportada pelo participante no Open Finance. Recomenda-se utilizar, sempre que possível, o mesmo nome de marca atribuído no campo do diretório Customer Friendly Server Name (Authorisation Server).'
                pattern: '^[^\s](.*[^\s])?$'
                example: Organização A
                maxLength: 80
              companyCnpj:
                type: string
                description: 'Registro completo do CNPJ da instituição responsável pelo Cadastro - o CNPJ corresponde a representação alfanumérica da inscrição no Cadastro de Pessoa Jurídica. Deve-se ter apenas os caracteres do CNPJ, sem máscara.'
                maxLength: 14
                pattern: '^[0-9A-Z]{12}[0-9]{2}$'
                example: '21281590001660'
              investmentType:
                $ref: '#/components/schemas/BankFixedIncomesEnumInvestmentType'
              investmentId:
                type: string
                description: 'Identifica de forma única  o relacionamento do cliente com o produto, mantendo as regras de imutabilidade dentro da instituição transmissora.'
                maxLength: 100
                pattern: '^[a-zA-Z0-9][a-zA-Z0-9-]{0,99}$'
                example: '92792126019929200000000000000000000000000'
            additionalProperties: false
        links:
          $ref: '#/components/schemas/BankFixedIncomesLinks'
        meta:
          $ref: '#/components/schemas/BankFixedIncomesMeta'
      additionalProperties: false
    BankFixedIncomesResponseProductIdentification:
      type: object
      required:
        - data
        - links
        - meta
      properties:
        data:
          $ref: '#/components/schemas/BankFixedIncomesIdentifyProduct'
        links:
          $ref: '#/components/schemas/BankFixedIncomesLinks'
        meta:
          $ref: '#/components/schemas/BankFixedIncomesMeta'
      additionalProperties: false
    BankFixedIncomesIdentifyProduct:
      type: object
      required:
        - issuerInstitutionCnpjNumber
        - investmentType
        - remuneration
        - issueUnitPrice
        - dueDate
        - issueDate
        - purchaseDate
        - gracePeriodDate
      properties:
        issuerInstitutionCnpjNumber:
          type: string
          description: CNPJ da instituição emissora.
          maxLength: 14
          pattern: '^[0-9A-Z]{12}[0-9]{2}$'
          example: '11225860000140'
        isinCode:
          type: string
          description: |
            Código ISIN da emissão, Código ISIN do produto, Código da emissora (campo opcional): código universal que identifica cada valor mobiliário ou instrumento financeiro, conforme Norma ISO 6166
          maxLength: 12
          minLength: 12
          pattern: '^[A-Z]{2}([A-Z0-9]){9}\d{1}$'
          example: BRCST4CTF001
        investmentType:
          $ref: '#/components/schemas/BankFixedIncomesEnumInvestmentType'
        remuneration:
          $ref: '#/components/schemas/BankFixedIncomesRemuneration'
        issueUnitPrice:
          type: object
          description: Preço unitário de emissão do título.
          required:
            - amount
            - currency
          properties:
            amount:
              type: string
              format: double
              maxLength: 24
              pattern: '^\d{1,15}\.\d{2,8}$'
              example: '1000.000004'
              description: Valor relacionado ao objeto.
            currency:
              $ref: '#/components/schemas/BankFixedIncomesCurrencyCode'
        dueDate:
          type: string
          format: date
          maxLength: 10
          minLength: 10
          pattern: '^(\d{4})-(1[0-2]|0?[1-9])-(3[01]|[12][0-9]|0?[1-9])$'
          example: '2018-02-15'
          description: Data de vencimento do título.
        issueDate:
          type: string
          format: date
          maxLength: 10
          minLength: 10
          pattern: '^(\d{4})-(1[0-2]|0?[1-9])-(3[01]|[12][0-9]|0?[1-9])$'
          example: '2018-02-16'
          description: Data de emissão do título.
        clearingCode:
          type: string
          maxLength: 30
          pattern: '[\w\W-]*'
          example: CDB421GPXXX
          description: Código de registro do ativo na clearing.
        purchaseDate:
          type: string
          format: date
          maxLength: 10
          minLength: 10
          pattern: '^(\d{4})-(1[0-2]|0?[1-9])-(3[01]|[12][0-9]|0?[1-9])$'
          example: '2018-02-15'
          description: Data de aquisição do cliente.
        gracePeriodDate:
          type: string
          format: date
          maxLength: 10
          minLength: 10
          pattern: '^(\d{4})-(1[0-2]|0?[1-9])-(3[01]|[12][0-9]|0?[1-9])$'
          example: '2018-02-16'
          description: Data até a qual o cliente não poderá resgatar antecipadamente seu investimento.
      additionalProperties: false
    BankFixedIncomesEnumInvestmentType:
      type: string
      description: 'Especificação do ativo em questão (CDB, RDB, LCI ou LCA)'
      enum:
        - CDB
        - RDB
        - LCI
        - LCA
      example: CDB
    BankFixedIncomesRemuneration:
      type: object
      description: Objeto para detalhamento de remuneração do titulo.
      required:
        - rateType
        - ratePeriodicity
        - calculation
        - indexer
      properties:
        preFixedRate:
          type: string
          format: double
          pattern: '^-?\d{1}\.\d{6}$'
          maxLength: 9
          minLength: 8
          example: '0.300000'
          description: |
            Taxa de remuneração pré fixada de emissão do título. p.ex. 0.014500.

            [Restrição] Campo de preenchimento obrigatório pelas participantes quando houver 'PRE_FIXADO' no campo 'indexer' ou quando se tratar de produto com remuneração híbrida.
        postFixedIndexerPercentage:
          type: string
          format: double
          pattern: '^-?\d{1}\.\d{6}$'
          maxLength: 9
          minLength: 8
          example: '1.100000'
          description: |
            Percentual do indexador pós fixado de emissão do título. p.ex. 0.014500.

            [Restrição] Campo de preenchimento obrigatório pelas participantes quando o campo 'indexer' for preenchido de forma diferente de 'PRE_FIXADO' ou quando se tratar de produto com remuneração híbrida.
        rateType:
          $ref: '#/components/schemas/BankFixedIncomesEnumRateType'
        ratePeriodicity:
          $ref: '#/components/schemas/BankFixedIncomesEnumRatePeriodicity'
        calculation:
          $ref: '#/components/schemas/BankFixedIncomesEnumCalculation'
        indexer:
          $ref: '#/components/schemas/BankFixedIncomesEnumIndexer'
        indexerAdditionalInfo:
          type: string
          description: |
            Informações adicionais do indexador

            [Restrição] Campo de preenchimento obrigatório pelas participantes quando houver 'Outros' no campo 'indexer'.
          maxLength: 50
          example: Dólar
          pattern: '[\w\W\s]*'
      additionalProperties: false
    BankFixedIncomesEnumRateType:
      type: string
      description: 'Tipo da taxa de remuneração (linear ou exponencial)'
      enum:
        - LINEAR
        - EXPONENCIAL
      example: LINEAR
    BankFixedIncomesEnumRatePeriodicity:
      type: string
      description: 'Periodicidade da taxa de remuneração (mensal, anual, diário, semestral)'
      enum:
        - MENSAL
        - ANUAL
        - DIARIO
        - SEMESTRAL
      example: MENSAL
    BankFixedIncomesEnumCalculation:
      type: string
      description: 'Base de cálculo (dias úteis ou dias corridos)'
      enum:
        - DIAS_UTEIS
        - DIAS_CORRIDOS
      example: DIAS_CORRIDOS
    BankFixedIncomesEnumIndexer:
      type: string
      description: 'Índice utilizado como referência para a correção da rentabilidade e/ou rendimentos do ativo (CDI, DI , TR, IPCA, IGP_M, IGP_DI, INPC, BCP, TLC, SELIC, PRE_FIXADO e OUTROS)'
      enum:
        - CDI
        - DI
        - TR
        - IPCA
        - IGP_M
        - IGP_DI
        - INPC
        - BCP
        - TLC
        - SELIC
        - PRE_FIXADO
        - OUTROS
      example: CDI
    BankFixedIncomesCurrencyCode:
      type: string
      pattern: '^[A-Z]{3}$'
      maxLength: 3
      description: 'Moeda referente ao valor monetário, seguindo o modelo ISO-4217.'
      example: BRL
