    CreditFixedIncomesResponseBalances:
      type: object
      required:
        - data
        - links
        - meta
      properties:
        data:
          type: object
          required:
            - referenceDateTime
            - updatedUnitPrice
            - quantity
            - grossAmount
            - netAmount
            - incomeTax
            - financialTransactionTax
            - blockedBalance
            - purchaseUnitPrice
          properties:
            referenceDateTime:
              type: string
              format: date-time
              description: 'data e hora da última posição consolidada disponível a que se referem os dados transacionais do cliente disponíveis nos canais eletrônicos; Na representação data deve se considerar os minutos e segundos como zero (00:00:00Z)'
              maxLength: 20
              pattern: '(^(\d{4})-(1[0-2]|0?[1-9])-(3[01]|[12][0-9]|0?[1-9])T(?:[01]\d|2[0123]):(?:[012345]\d):(?:[012345]\d)Z$)'
              example: '2022-07-21T17:32:00Z'
            updatedUnitPrice:
              type: object
              description: valor bruto unitário atualizado na data de referência;
              required:
                - amount
                - currency
              properties:
                amount:
                  type: string
                  format: double
                  pattern: '^\d{1,15}\.\d{2,8}$'
                  maxLength: 24
                  minLength: 4
                  example: '1000.0400'
                  description: Valor relacionado ao objeto.
                currency:
                  $ref: '#/components/schemas/CreditFixedIncomesCurrencyCode'
            quantity:
              type: string
              format: double
              description: quantidade de títulos detidos na data da posição do cliente
              maxLength: 24
              minLength: 4
              pattern: '^\d{1,15}\.\d{2,8}$'
              example: '15.00'
            grossAmount:
              type: object
              description: valor do investimento que se refere a quantidade x PU atualizado na data de referência
              required:
                - amount
                - currency
              properties:
                amount:
                  type: string
                  format: double
                  pattern: '^\d{1,15}\.\d{2,4}$'
                  maxLength: 20
                  minLength: 4
                  example: '1000.04'
                  description: Valor relacionado ao objeto.
                currency:
                  $ref: '#/components/schemas/CreditFixedIncomesCurrencyCode'
            netAmount:
              type: object
              description: 'valor do investimento atualizado na data de referência, posterior a dedução de impostos (IOF e IR)'
              required:
                - amount
                - currency
              properties:
                amount:
                  type: string
                  format: double
                  pattern: '^\d{1,15}\.\d{2,4}$'
                  maxLength: 20
                  minLength: 4
                  example: '1000.04'
                  description: Valor relacionado ao objeto.
                currency:
                  $ref: '#/components/schemas/CreditFixedIncomesCurrencyCode'
            incomeTax:
              type: object
              description: Valor do imposto de renda provisionado considerando a alíquota vigente na data de referência.
              required:
                - amount
                - currency
              properties:
                amount:
                  type: string
                  format: double
                  pattern: '^\d{1,15}\.\d{2,4}$'
                  maxLength: 20
                  minLength: 4
                  example: '1000.04'
                  description: Valor relacionado ao objeto.
                currency:
                  $ref: '#/components/schemas/CreditFixedIncomesCurrencyCode'
            financialTransactionTax:
              type: object
              description: Valor do imposto (IOF) provisionado considerando a alíquota vigente na data de referência.
              required:
                - amount
                - currency
              properties:
                amount:
                  type: string
                  format: double
                  pattern: '^\d{1,15}\.\d{2,4}$'
                  maxLength: 20
                  minLength: 4
                  example: '1000.04'
                  description: Valor relacionado ao objeto.
                currency:
                  $ref: '#/components/schemas/CreditFixedIncomesCurrencyCode'
            blockedBalance:
              type: object
              description: Valor não disponível para movimentação naquele momento por qualquer motivo (bloqueio judicial, bloqueio em garantia, entre outros). Prazo de carência não é considerado como bloqueio.
              required:
                - amount
                - currency
              properties:
                amount:
                  type: string
                  format: double
                  pattern: '^\d{1,15}\.\d{2,4}$'
                  maxLength: 20
                  minLength: 4
                  example: '1000.04'
                  description: Valor relacionado ao objeto.
                currency:
                  $ref: '#/components/schemas/CreditFixedIncomesCurrencyCode'
            purchaseUnitPrice:
              type: object
              description: valor unitário negociado com o cliente na data de aquisição
              required:
                - amount
                - currency
              properties:
                amount:
                  type: string
                  format: double
                  pattern: '^\d{1,15}\.\d{2,8}$'
                  maxLength: 24
                  minLength: 4
                  example: '1000.000004'
                  description: Valor relacionado ao objeto.
                currency:
                  $ref: '#/components/schemas/CreditFixedIncomesCurrencyCode'
            preFixedRate:
              type: string
              description: |
                Taxa de remuneração acordada com o cliente na contratação. Em casos de produtos progressivos, considerar a taxa máxima contratada.
              maxLength: 9
              minLength: 8
              pattern: '^-?\d{1}\.\d{6}$'
              example: '0.300000'
            postFixedIndexerPercentage:
              type: string
              description: |
                Percentual do indexador acordado com o cliente na contratação. Em casos de produtos progressivos, considerar a taxa máxima contratada.
              maxLength: 9
              minLength: 8
              pattern: '^-?\d{1}\.\d{6}$'
              example: '1.100000'
            fine:
              type: object
              description: |
                Valor de multa devido ao atraso do pagamento acordado em contrato.
                Caso a transmissora possua a informação, o envio deste campo é obrigatório.
              required:
                - amount
                - currency
              properties:
                amount:
                  type: string
                  format: double
                  pattern: '^\d{1,15}\.\d{2,4}$'
                  maxLength: 20
                  minLength: 4
                  example: '1000.04'
                  description: Valor relacionado ao objeto.
                currency:
                  $ref: '#/components/schemas/CreditFixedIncomesCurrencyCode'
            latePayment:
              type: object
              description: |
                Valor de mora devido ao atraso do pagamento acordado em contrato.
                Caso a transmissora possua a informação, o envio deste campo é obrigatório.
              required:
                - amount
                - currency
              properties:
                amount:
                  type: string
                  format: double
                  pattern: '^\d{1,15}\.\d{2,4}$'
                  maxLength: 20
                  minLength: 4
                  example: '1000.04'
                  description: Valor relacionado ao objeto.
                currency:
                  $ref: '#/components/schemas/CreditFixedIncomesCurrencyCode'
        links:
          $ref: '#/components/schemas/CreditFixedIncomesLinks'
        meta:
          $ref: '#/components/schemas/CreditFixedIncomesMeta'
      additionalProperties: false
    CreditFixedIncomesResponseTransactions:
      type: object
      required:
        - data
        - links
        - meta
      properties:
        data:
          type: array
          minItems: 0
          items:
            $ref: '#/components/schemas/CreditFixedIncomesTransaction'
        links:
          $ref: '#/components/schemas/CreditFixedIncomesTransactionsLinks'
        meta:
          $ref: '#/components/schemas/CreditFixedIncomesMetaTransactions'
      additionalProperties: false
    CreditFixedIncomesTransaction:
      type: object
      required:
        - type
        - transactionType
        - transactionDate
        - transactionGrossValue
        - transactionNetValue
        - transactionId
      properties:
        type:
          $ref: '#/components/schemas/CreditFixedIncomesEnumType'
        transactionType:
          $ref: '#/components/schemas/CreditFixedIncomesEnumTransactionType'
        transactionTypeAdditionalInfo:
          type: string
          description: |
            Informação adicional do tipo de movimentação, para preenchimento no caso de movimentações não delimitadas no domínio.
            [Restrição] Campo de preenchimento obrigatório pelas participantes quando houver 'OUTROS' no campo 'transactionType'.
          maxLength: 100
          pattern: '[\w\W\s]*'
        transactionDate:
          type: string
          format: date
          description: Data da movimentação
          maxLength: 10
          pattern: '^(\d{4})-(1[0-2]|0?[1-9])-(3[01]|[12][0-9]|0?[1-9])$'
          example: '2018-02-15'
        transactionUnitPrice:
          type: object
          description: |
            Valor unitário negociado com o cliente na data de aquisição. Em transferências de custódia, quando o PU original (da instituição de origem) não estiver disponível para a transmissora, deve ser informado o PU marcado pela instituição na data de transferência.

            [Restrição] Campo de preenchimento obrigatório pelas participantes quando o campo `transactionType` for preenchido com os valores `COMPRA`, `VENDA` ou `VENCIMENTO`.
          required:
            - amount
            - currency
          properties:
            amount:
              type: string
              format: double
              pattern: '^\d{1,15}\.\d{2,8}$'
              maxLength: 24
              minLength: 4
              example: '1000.000004'
              description: Valor relacionado ao objeto.
            currency:
              $ref: '#/components/schemas/CreditFixedIncomesCurrencyCode'
        transactionQuantity:
          type: string
          description: |
            Quantidade de títulos envolvidos na movimentação

            [Restrição] Campo de preenchimento obrigatório pelas participantes quando o campo 'transactionType' for preenchido com os valores 'COMPRA', 'VENDA', 'VENCIMENTO', 'TRANSFERENCIA_TITULARIDADE' ou 'TRANSFERENCIA_CUSTODIA'.
          maxLength: 24
          pattern: '^\d{1,15}\.\d{2,8}$'
          example: '42.25'
        transactionGrossValue:
          type: object
          description: 'Valor bruto da transação (Preço unitário da movimentação x Quantidade)'
          required:
            - amount
            - currency
          properties:
            amount:
              type: string
              format: double
              pattern: '^\d{1,15}\.\d{2,4}$'
              maxLength: 20
              minLength: 4
              example: '1000.04'
              description: Valor relacionado ao objeto.
            currency:
              $ref: '#/components/schemas/CreditFixedIncomesCurrencyCode'
        incomeTax:
          type: object
          description: |
            Valor do imposto de renda recolhido na transação.
            [Restrição] Campo de preenchimento obrigatório pelas participantes quando o campo 'type' for preenchido com o valor 'SAIDA'.
          required:
            - amount
            - currency
          properties:
            amount:
              type: string
              format: double
              pattern: '^\d{1,15}\.\d{2,4}$'
              maxLength: 20
              minLength: 4
              example: '1000.04'
              description: Valor relacionado ao objeto.
            currency:
              $ref: '#/components/schemas/CreditFixedIncomesCurrencyCode'
        financialTransactionTax:
          type: object
          description: |
            Valor do IOF recolhido na transação.
            [Restrição] Campo de preenchimento obrigatório pelas participantes quando o campo 'type' for preenchido com o valor 'SAIDA'.
          required:
            - amount
            - currency
          properties:
            amount:
              type: string
              format: double
              pattern: '^\d{1,15}\.\d{2,4}$'
              maxLength: 20
              minLength: 4
              example: '1000.04'
              description: Valor relacionado ao objeto.
            currency:
              $ref: '#/components/schemas/CreditFixedIncomesCurrencyCode'
        transactionNetValue:
          type: object
          description: Valor líquido da transação
          required:
            - amount
            - currency
          properties:
            amount:
              type: string
              format: double
              pattern: '^\d{1,15}\.\d{2,4}$'
              maxLength: 20
              minLength: 4
              example: '1000.04'
              description: Valor relacionado ao objeto.
            currency:
              $ref: '#/components/schemas/CreditFixedIncomesCurrencyCode'
        remunerationTransactionRate:
          type: string
          description: |
            Taxa de remuneração acordada com o cliente na contratação.

            [Restrição] Campo de preenchimento obrigatório pelas participantes quando o campo 'type' for preenchido com o valor 'ENTRADA' e se tratar de produto prefixado ou híbrido.
          maxLength: 9
          minLength: 8
          pattern: '^-?\d{1}\.\d{6}$'
          example: '0.300000'
        indexerPercentage:
          type: string
          description: |
            Percentual máximo do indexador na transação acordado com o cliente na contratação.

            [Restrição] Campo de preenchimento obrigatório pelas participantes quando o campo 'type' for preenchido com o valor 'ENTRADA' e se tratar de produto pós-fixado ou híbrido.
          maxLength: 8
          minLength: 8
          pattern: '^\d{1}\.\d{6}$'
          example: '1.100000'
        transactionId:
          type: string
          description: |
            Código ou identificador único prestado pela instituição para individualizar o movimento.
          maxLength: 100
          pattern: '^[a-zA-Z0-9][a-zA-Z0-9-]{0,99}$'
          example: ABCD2126019929279212650822221989319253344
    CreditFixedIncomesEnumType:
      type: string
      description: |
        Tipo de movimentação na visão de investimento:

        ENTRADA: COMPRA, CANCELAMENTO, TRANSFERENCIA_TITULARIDADE, TRANSFERENCIA_CUSTODIA, OUTROS.

        SAIDA: VENDA, CANCELAMENTO, VENCIMENTO, PAGAMENTO_JUROS, AMORTIZACAO, PREMIO, TRANSFERENCIA_TITULARIDADE, TRANSFERENCIA_CUSTODIA, MULTA, MORA, OUTROS.
      enum:
        - ENTRADA
        - SAIDA
      example: ENTRADA
    CreditFixedIncomesEnumTransactionType:
      type: string
      description: Compra, venda, cancelamento, vencimento, pagamento de juros, amortização, prêmio, transferência de titularidade, transferência de custódia, multa, mora e outros.
      enum:
        - COMPRA
        - VENDA
        - CANCELAMENTO
        - VENCIMENTO
        - PAGAMENTO_JUROS
        - AMORTIZACAO
        - PREMIO
        - TRANSFERENCIA_TITULARIDADE
        - TRANSFERENCIA_CUSTODIA
        - MULTA
        - MORA
        - OUTROS
      example: COMPRA
    VariableIncomesResponseProductList:
      type: object
      required:
        - data
        - links
        - meta
      properties:
        data:
          type: array
          minItems: 0
