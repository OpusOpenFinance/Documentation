          description: "Valor original da garantia. Expresso em valor monetário com no mínimo 2 casas e no máximo 4 casas decimais.\n\n[Restrição] Para casos em que warrantyType for igual a \"GARANTIA_FIDEJUSSORIA\" o valor da garantia corresponde a uma porcentagem do total garantido. \nDessa forma, os casos de garantia fidejussória para os quais não é possível determinar um valor monetário para a garantia devem ser preenchidos com 0.00.\n"
    LoansChargeOverParcel:
      type: object
      required:
      - chargeType
      - chargeAmount
      properties:
        chargeType:
          $ref: '#/components/schemas/LoansEnumContractFinanceChargeType'
        chargeAdditionalInfo:
          type: string
          pattern: ^[^\s](.*[^\s])?$
          maxLength: 140
          example: Informações adicionais
          description: 'Campo livre para preenchimento das informações adicionais referente ao encargo.


            [Restrição] Obrigatório quando chargeType for igual ''OUTROS''.

            '
        chargeAmount:
          type: string
          format: double
          pattern: ^-?\d{1,15}\.\d{2,4}$
          maxLength: 21
          minLength: 4
          example: '1000.0400'
          description: Valor do pagamento do encargo pago fora da parcela. Expresso em valor monetário com no mínimo 2 casas e no máximo 4 casas decimais.
    LoansLinks:
      type: object
      description: Referências para outros recusos da API requisitada.
      required:
      - self
      properties:
        self:
          type: string
          format: url
          maxLength: 4048
          description: URI completo que gerou a resposta atual.
          example: https://api.banco.com.br/open-banking/api/v1/resource
        first:
          type: string
          format: url
          maxLength: 4048
          description: URI da primeira página que originou essa lista de resultados. Restrição - Obrigatório quando não for a primeira página da resposta
          example: https://api.banco.com.br/open-banking/api/v1/resource
        prev:
          type: string
          format: url
          maxLength: 4048
          description: "URI da página anterior dessa lista de resultados. Restrição - \tObrigatório quando não for a primeira página da resposta"
          example: https://api.banco.com.br/open-banking/api/v1/resource
        next:
          type: string
          format: url
          maxLength: 4048
          description: URI da próxima página dessa lista de resultados. Restrição - Obrigatório quando não for a última página da resposta
          example: https://api.banco.com.br/open-banking/api/v1/resource
        last:
          type: string
          format: url
          maxLength: 4048
          description: URI da última página dessa lista de resultados. Restrição - Obrigatório quando não for a última página da resposta
          example: https://api.banco.com.br/open-banking/api/v1/resource
    LoansMetaNonPaginated:
      type: object
      description: Meta informações referente à API requisitada.
      required:
      - requestDateTime
      properties:
        requestDateTime:
          description: Data e hora da consulta, conforme especificação RFC-3339, formato UTC.
          type: string
          maxLength: 20
          format: date-time
          example: '2021-05-21T08:30:00Z'
    LoansResponseLoansInstalments:
      type: object
      required:
      - data
      - links
      - meta
      properties:
        data:
          $ref: '#/components/schemas/LoansInstalments'
        links:
          $ref: '#/components/schemas/LoansLinksNonPaginated'
        meta:
          $ref: '#/components/schemas/LoansMetaNonPaginated'
    LoansResponseLoansContract:
      type: object
      required:
      - data
      - links
      - meta
      properties:
        data:
          $ref: '#/components/schemas/LoansContract'
        links:
          $ref: '#/components/schemas/LoansLinksNonPaginated'
        meta:
          $ref: '#/components/schemas/LoansMetaNonPaginated'
    LoansInstalments:
      type: object
      description: Conjunto de informações referentes ao prazo remanescente e às parcelas de uma operação de crédito de empréstimos
      required:
      - dueInstalments
      - pastDueInstalments
      - typeContractRemaining
      - typeNumberOfInstalments
      - paidInstalments
      properties:
        typeNumberOfInstalments:
          type: string
          description: Tipo de prazo total do contrato referente à modalidade de crédito informada.
          enum:
          - DIA
          - SEMANA
          - MES
          - ANO
          - SEM_PRAZO_TOTAL
          example: MES
        totalNumberOfInstalments:
          type: number
          maximum: 999999999
          example: 130632
          description: 'Prazo Total segundo o tipo (dia, semana, mês, ano) referente à Modalidade de Crédito informada. Deve corresponder à soma de `paidInstalments` + `pastDueInstalments` + `dueInstalments`.


            [Restrição] Obrigatoriamente deve ser preenchido caso o `typeNumberOfInstalments` seja diferente de `SEM_PRAZO_TOTAL`.

            '
        typeContractRemaining:
          type: string
          enum:
          - DIA
          - SEMANA
          - MES
          - ANO
          - SEM_PRAZO_REMANESCENTE
          description: 'Tipo de prazo remanescente do contrato referente à modalidade de crédito informada.

            '
        contractRemainingNumber:
          type: number
          maximum: 999999999
          example: 14600
          description: 'Prazo Remanescente segundo o tipo (dia, semana, mês, ano) referente à Modalidade de Crédito informada.


            [Restrição] Obrigatoriamente deve ser preenchido caso o typeContractRemaining seja diferente de SEM_PRAZO_REMANESCENTE.

            '
        paidInstalments:
          type: number
          description: Quantidade de prestações pagas. (No caso de modalidades que não possuam parcelas, o número de prestações é igual a zero)
          maximum: 999999
          example: 73
        dueInstalments:
          type: number
          description: Quantidade de prestações a vencer.(No caso de modalidades que não possuam parcelas, o número de prestações é igual a zero)
          maximum: 999999
          example: 57
        pastDueInstalments:
          type: number
          description: Quantidade de prestações vencidas. (No caso de modalidades que não possuam parcelas, o número de prestações é igual a zero)
          maximum: 999999
          example: 73
        balloonPayments:
          type: array
          items:
            $ref: '#/components/schemas/LoansBalloonPayment'
          minItems: 1
          description: Lista que traz as datas de vencimento e valor das parcelas não regulares do contrato da modalidade de crédito consultada
    LoansMeta:
      type: object
      description: Meta informações referente à API requisitada.
      required:
      - totalRecords
      - totalPages
      - requestDateTime
      properties:
        totalRecords:
          type: integer
          format: int32
          description: Número total de registros no resultado
          example: 1
        totalPages:
          type: integer
          format: int32
          description: Número total de páginas no resultado
          example: 1
        requestDateTime:
          description: Data e hora da consulta, conforme especificação RFC-3339, formato UTC.
          type: string
          maxLength: 20
          format: date-time
          example: '2021-05-21T08:30:00Z'
    LoansResponseLoansPayments:
      type: object
      required:
      - data
      - links
      - meta
      properties:
        data:
          $ref: '#/components/schemas/LoansPayments'
        links:
          $ref: '#/components/schemas/LoansLinksNonPaginated'
        meta:
          $ref: '#/components/schemas/LoansMetaNonPaginated'
    LoansEnumContractTaxType:
      type: string
      description: '"Tipo de Taxa (vide  Enum)

        - NOMINAL (taxa nominal é uma taxa de juros em que a unidade referencial não coincide com a unidade de tempo da capitalização. Ela é sempre fornecida em termos anuais, e seus períodos de capitalização podem ser diários, mensais, trimestrais ou semestrais. p.ex. Uma taxa de 12% ao ano com capitalização mensal)

        - EFETIVA (É a taxa de juros em que a unidade referencial coincide com a unidade de tempo da capitalização. Como as unidades de medida de tempo da taxa de juros e dos períodos de capitalização são iguais, usa-se exemplos simples como 1% ao mês, 60% ao ano)"

        '
      enum:
      - NOMINAL
      - EFETIVA
      example: EFETIVA
    LoansBalloonPaymentAmount:
      type: object
      required:
      - amount
      - currency
      description: Valor monetário da parcela não regular a vencer.
      properties:
        amount:
          type: string
          format: double
          pattern: ^\d{1,15}\.\d{2,4}$
          maxLength: 20
          minLength: 4
          example: '1000.0400'
          description: Valor monetário da parcela não regular a vencer. Expresso em valor monetário com no mínimo 2 casas e no máximo 4 casas decimais.
        currency:
          type: string
          pattern: ^[A-Z]{3}$
          maxLength: 3
          description: Moeda referente ao valor monetário, seguindo o modelo ISO-4217.
          example: BRL
    LoansContract:
      type: object
      description: Conjunto de informações referentes à identificação da operação de crédito de empréstimo
      required:
      - contractNumber
      - ipocCode
      - productName
      - productType
      - productSubType
      - contractDate
      - contractAmount
      - instalmentPeriodicity
      - CET
      - amortizationScheduled
      - interestRates
      - contractedFees
      - contractedFinanceCharges
      - productSubTypeCategory
      properties:
        contractNumber:
          type: string
          maxLength: 100
          minLength: 1
          pattern: ^[\w\W]{1,100}$
          example: '1324926521496'
          description: Número do contrato dado pela instituição contratante.
        ipocCode:
          type: string
          maxLength: 67
          minLength: 22
          pattern: ^[\w\W]{22,67}$
          example: '92792126019929279212650822221989319252576'
          description: "Número padronizado do contrato - IPOC (Identificação Padronizada da Operação de Crédito). Segundo DOC 3040, composta por:\n- **CNPJ da instituição:** 8 (oito) posições iniciais;\n- **Modalidade da operação:** 4 (quatro) posições;\n- **Tipo do cliente:** 1 (uma) posição( 1 = pessoa natural - CPF, 2= pessoa jurídica – CNPJ, 3 = pessoa física no exterior, 4 = pessoa jurídica no exterior, 5 = pessoa natural sem CPF e 6 = pessoa jurídica sem CNPJ);\n- **Código do cliente:** O número de posições varia conforme o tipo do cliente:\n  1. Para clientes pessoa física com CPF (tipo de cliente = 1), informar as 11 (onze) posições do CPF;\n  2. Para clientes pessoa jurídica com CNPJ (tipo de cliente = 2), informar as 8 (oito) posições iniciais do CNPJ;\n  3. Para os demais clientes (tipos de cliente 3, 4, 5 e 6), informar 14 (catorze) posições com complemento de zeros à esquerda se a identificação tiver tamanho inferior;\n- **Código do contrato:** 1 (uma) até 40 (quarenta) posições, sem complemento de caracteres.\n"
        productName:
          type: string
          maxLength: 140
          pattern: ^[^\s](.*[^\s])?$
          example: Crédito Pessoal Consignado
          description: 'Denominação/Identificação do nome da Modalidade da Operação de Crédito divulgado ao cliente

            '
        productType:
          $ref: '#/components/schemas/LoansEnumContractProductTypeLoans'
        productSubType:
          $ref: '#/components/schemas/LoansEnumContractProductSubTypeLoans'
        productSubTypeCategory:
          $ref: '#/components/schemas/LoansEnumContractProductSubTypeCategory'
        contractDate:
          type: string
          format: date
          maxLength: 10
          pattern: ^(\d{4})-(1[0-2]|0?[1-9])-(3[01]|[12][0-9]|0?[1-9])$
          example: '2018-01-05'
          description: 'Data de contratação da operação de crédito. Especificação RFC-3339. Para produtos rotativos, productSubType `CHEQUE_ESPECIAL` e `CONTA_GARANTIDA`, caso tenha-se múltiplas contratações do mesmo produto, deve-se enviar à última data disponível.

            '
        disbursementDates:
          type: array
          minItems: 1
          description: 'Lista que traz as Datas de Desembolso do valor contratado.

            '
          items:
            type: string
            format: date
            maxLength: 10
            pattern: ^(\d{4})-(1[0-2]|0?[1-9])-(3[01]|[12][0-9]|0?[1-9])$
            example: '2018-01-15'
            description: 'Data do Desembolso do valor contratado. Especificação RFC-3339.

              No caso de uma liberação de recursos feita em D0 mas com referência retroativa feita em D -1, contabilmente a data correta seria D -1.

              '
        settlementDate:
          type: string
          format: date
          maxLength: 10
          pattern: ^(\d{4})-(1[0-2]|0?[1-9])-(3[01]|[12][0-9]|0?[1-9])$
          example: '2018-01-15'
          description: 'Data de liquidação da operação. Data do cancelamento do contrato para casos em que não há saldo devedor restante. No caso de cancelamento com saldo devedor, a data só deve ser preenchida quando o mesmo for liquidado.

            '
        contractAmount:
          type: string
          format: double
          pattern: ^\d{1,15}\.\d{2,4}$
          maxLength: 20
          minLength: 4
          example: '1000.0400'
          description: "Valor contratado da operação. Não incluir valores de taxas, tarifas, encargos e seguros. \nExpresso em valor monetário com no mínimo 2 casas e no máximo 4 casas decimais. \nNos casos em que não houver este valor explícito no contrato do produto, enviar como 0.00\n"
        currency:
          type: string
          maxLength: 3
          pattern: ^(\w{3}){1}$
          example: BRL
          description: 'Moeda referente ao valor da garantia, segundo modelo ISO-4217. p.ex. ''BRL''

            Todos os valores monetários informados estão representados com a moeda vigente do Brasil

            '
        dueDate:
          type: string
          format: date
          maxLength: 10
          minLength: 2
          pattern: ^(\d{4})-(1[0-2]|0?[1-9])-(3[01]|[12][0-9]|0?[1-9])$
          example: '2028-01-15'
          description: 'Data do último vencimento da operação, seguindo a especificação RFC-3339. Informação deve ser enviada caso ela exista. Especialmente para contratos repactuados, deve-se alterar a data para a do último vencimento. Para produtos rotativos, productSubType `CHEQUE_ESPECIAL` e `CONTA_GARANTIDA`, o campo representa a data fim da renovação para contratos ativos ou data do cancelamento para contratos cancelados ou vencidos.

            '
        instalmentPeriodicity:
          $ref: '#/components/schemas/LoansEnumContractInstalmentPeriodicity'
        instalmentPeriodicityAdditionalInfo:
          type: string
          pattern: ^[^\s](.*[^\s])?$
          maxLength: 50
          example: Informações adicionais sobre periodicidade
          description: 'Campo obrigatório para complementar a informação relativa à periodicidade de pagamento regular quando tiver a opção OUTROS.

            '
        firstInstalmentDueDate:
          type: string
          format: date
          maxLength: 10
          pattern: ^(\d{4})-(1[0-2]|0?[1-9])-(3[01]|[12][0-9]|0?[1-9])$
          example: '2018-02-15'
          description: 'Data de vencimento primeira parcela do principal.

            Informação deve ser enviada caso ela exista.

            '
        CET:
          type: string
          pattern: ^\d{1,6}\.\d{6}$
          format: double
          maxLength: 13
          minLength: 8
          example: '0.290000'
          description: "CET – Custo Efetivo Total deve ser expresso na forma de taxa percentual anual e incorpora todos os encargos e despesas incidentes nas operações de crédito (taxa de juro, mas também tarifas, tributos, seguros e outras despesas cobradas).\n\nO preenchimento deve respeitar as 6 casas decimais, mesmo que venham preenchidas com zeros (representação de porcentagem p.ex: 0.150000. Este valor representa 15%. O valor 1 representa 100%).\n\nPara o público PF (pessoa física) o campo é de envio obrigatório para contratos firmados a partir de 2008, conforme Resolução CMN 3.517. Para o público PJ (pessoa jurídica) o campo é de envio obrigatório para contratos firmados a partir de 2011, conforme Resolução CMN 3.909. O campo poderá ser preenchido com 0.00 em cenários nos quais a casa não tenha a informação de CET (Custo efetivo total) apenas para as exceções listadas abaixo: \n\n- Em contratos anteriores a 2008 (para o público PF); \n- Em contratos anteriores a 2011 (para o público PJ); \n- Público PJ de médio ou grande porte. \n"
        hasInsuranceContracted:
          type: boolean
          description: "Campo que identifica se existe seguro contratado para o Empréstimo, onde seguro contratado é `true` e não contratado é `false`.  \n\n[Restrição] Este campo é de envio obrigatório caso o campo productSubTypeCategory seja preenchido `CREDITO_PESSOAL_CLEAN` ou `CONSIGNADO_SIAPE`.  \n"
          example: true
        amortizationScheduled:
          $ref: '#/components/schemas/LoansEnumContractAmortizationScheduled'
        amortizationScheduledAdditionalInfo:
          type: string
          pattern: ^[^\s](.*[^\s])?$
          maxLength: 200
          example: Informações complementares relativa à amortização do tipo 'OUTROS'
          description: 'Campo obrigatório para complementar a informação relativa à amortização quando selecionada a opção OUTROS.

            '
        cnpjConsignor:
          type: string
          maxLength: 14
          pattern: ^[0-9A-Z]{12}[0-9]{2}$
          example: '60500998000135'
          description: "CNPJ do consignante (CNPJ corresponde ao registro alfanumérico de inscrição no Cadastro de Pessoa Jurídica). \n\nDeve-se ter apenas a representação alfanumérica do CNPJ, sem máscara.\n\n[Restrição] Informação adicional específica para quando o `productSubType` for igual a `CREDITO_PESSOAL_COM_CONSIGNACAO`. \nEste campo é de envio obrigatório somente enquanto houver vínculo (consignação ativa). \nNos casos de desconsignação, o campo pode ser omitido.\n"
        interestRates:
          type: array
          description: "Objeto que traz o conjunto de informações necessárias para demonstrar a composição das taxas de juros remuneratórios da Modalidade de crédito. Caso o contrato não possua taxas de juros, deve ser compartilhada uma lista vazia. Caso o contrato possua uma taxa de juros com valor 0, deve ser compartilhado um objeto com o valor 0 de forma explícita. Para contratos em renegociação, a taxa de empréstimo compartilhada deve se manter a taxa do contrato vigente, sendo alterada para a renegociada ao fim do processo de renegociação. Para os produtos CPC (campo `productSubTypeCategory` preenchido com `CREDITO_PESSOAL_CLEAN`) ou Consignado Federal (campo `productSubTypeCategory` preenchido com `CONSIGNADO_SIAPE`) deve-se obrigatoriamente conter a taxa nominal e a taxa efetiva (campo taxPeriodicity) com periodicidade a.a. (ao ano), podendo adicionalmente conter, além das taxas nominal e efetiva ao ano, outras com outra periodicidade.  \n"
          items:
            $ref: '#/components/schemas/LoansContractInterestRate'
          minItems: 0
        contractedFees:
          type: array
          description: Lista que traz as informações das tarifas pactuadas no contrato.
          items:
            $ref: '#/components/schemas/LoansContractedFee'
          minItems: 0
        contractedFinanceCharges:
          type: array
          description: Lista que traz os encargos pactuados no contrato
          items:
            $ref: '#/components/schemas/LoansFinanceCharge'
          minItems: 0
        nextInstalmentAmount:
          type: string
          format: double
          pattern: ^\d{1,15}\.\d{2,4}$
          maxLength: 20
          minLength: 4
          example: '1000.0400'
          description: "Informa o valor de face (corresponde ao valor da parcela no vencimento). Para contratos liquidados, retornar zero, seguindo o pattern. \n[Restrição] Este campo é de envio obrigatório caso o campo `productSubTypeCategory` seja preenchido `CREDITO_PESSOAL_CLEAN` ou `CONSIGNADO_SIAPE` no endpoint /contracts/{contractId}.  \n"
    LoansBalloonPayment:
      type: object
      description: Lista que traz as datas de vencimento e valor das parcelas não regulares  do contrato da modalidade de crédito consultada.
      required:
      - dueDate
      - amount
      properties:
        dueDate:
          type: string
          maxLength: 10
          minLength: 2
          format: date
          pattern: ^(\d{4})-(1[0-2]|0?[1-9])-(3[01]|[12][0-9]|0?[1-9])$
          example: '2021-05-21'
          description: '''Data de vencimento da parcela não regular  a vencer do contrato da modalidade de crédito consultada, conforme especificação RFC-3339. p.ex. 2014-03-19''

            '
        amount:
          $ref: '#/components/schemas/LoansBalloonPaymentAmount'
    LoansEnumContractCalculation:
      type: string
      description: Base de cálculo
      enum:
      - 21/252
      - 30/360
      - 30/365
      example: 21/252
    LoansEnumContractProductTypeLoans:
      type: string
      description: Tipo da modalidade de crédito contratada, conforme  circular 4.015 e descrição do DOC3040 do SCR).
      enum:
      - EMPRESTIMOS
      example: EMPRESTIMOS
    LoansEnumContractProductSubTypeLoans:
      type: string
      description: Sub tipo da modalidades de crédito Empréstimos contratadas, conforme  circular 4.015 e descrição do DOC3040 do SCR).
      enum:
      - HOME_EQUITY
      - CHEQUE_ESPECIAL
      - CONTA_GARANTIDA
      - CAPITAL_GIRO_TETO_ROTATIVO
      - CREDITO_PESSOAL_SEM_CONSIGNACAO
      - CREDITO_PESSOAL_COM_CONSIGNACAO
      - MICROCREDITO_PRODUTIVO_ORIENTADO
      - CAPITAL_GIRO_PRAZO_VENCIMENTO_ATE_365_DIAS
      - CAPITAL_GIRO_PRAZO_VENCIMENTO_SUPERIOR_365_DIAS
      example: CREDITO_PESSOAL_COM_CONSIGNACAO
    LoansEnumContractProductSubTypeCategory:
      type: string
      description: 'Categoria destinada à classificação específica relacionada à submodalidade do produto.

        As orientações a seguir devem ser observadas para o correto preenchimento deste campo:

        * O preenchimento com o enum `CREDITO_PESSOAL_CLEAN` será obrigatório, a partir da publicação da versão 2.5.0 da API Empréstimos, **para contratos em aberto**, quando aplicável;

        * O enum `CONSIGNADO_SIAPE`, **que engloba todos os contratos consignados sob a regulamentação do Sistema Integrado de Administração de Recursos Humanos (Siape), apresentando informações de servidores estatutários, temporários, celetistas (CLT), entre outros**, será de envio obrigatório, a partir do início do piloto para crédito consignado;

        * Contratos liquidados até a entrada em produção (go live) da versão 2.5.0 poderão ser preenchidos com a opção OUTRO;

        * As demais submodalidades devem ser classificadas na opção `OUTRO`.

        '
      enum:
      - CREDITO_PESSOAL_CLEAN
      - CONSIGNADO_SIAPE
      - OUTRO
      example: CREDITO_PESSOAL_CLEAN
    LoansEnumWarrantySubType:
      type: string
      description: 'Denominação/Identificação do sub tipo da garantia que avaliza a Modalidade da Operação de Crédito contratada (Doc 3040, Anexo 12).

        '
      enum:
      - ACOES_DEBENTURES
      - ACORDOS_COMPENSACAO_LIQUIDACAO_OBRIGACOES
      - APLICACOES_FINANCEIRAS_RENDA_FIXA
      - APLICACOES_FINANCEIRAS_RENDA_VARIAVEL
      - APOLICES_CREDITO_EXPORTACAO
      - CCR_CONVENIO_CREDITOS_RECIPROCOS
      - CHEQUES
      - CIVIL
      - DIREITOS_SOBRE_ALUGUEIS
      - DEPOSITOS_A_VISTA_A_PRAZO_POUPANCA_OURO_TITULOS_PUBLICOS_FEDERAIS_ART_36
      - DEPOSITO_TITULOS_EMITIDOS_ENTIDADES_ART_23
      - DUPLICATAS
      - EMD_ENTIDADES_MULTILATERAIS_DESENVOLVIMENTO_ART_37
      - EQUIPAMENTOS
      - ESTADUAL_OU_DISTRITAL
      - FATURA_CARTAO_CREDITO
      - FEDERAL
      - FCVS_FUNDO_COMPENSACAO_VARIACOES_SALARIAIS
      - FGI_FUNDO_GARANTIDOR_INVESTIMENTOS
      - FGPC_FUNDO_GARANTIA_PROMOCAO_COMPETIT
      - FGTS_FUNDO_GARANTIA_TEMPO_SERVICO
      - FUNDO_GARANTIDOR_AVAL
      - GARANTIA_PRESTADA_FGPC_LEI_9531_ART_37
      - GARANTIA_PRESTADA_FUNDOS_QUAISQUER_OUTROS_MECANISMOS_COBERTURA_RISCO_CREDITO_ART_37
