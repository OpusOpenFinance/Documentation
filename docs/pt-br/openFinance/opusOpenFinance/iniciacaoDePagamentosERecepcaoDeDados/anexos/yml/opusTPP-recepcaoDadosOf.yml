      properties:
        totalRecords:
          type: integer
          format: int32
          description: Número total de registros no resultado
          example: 1
        totalPages:
          type: integer
          format: int32
          description: Número total de páginas no resultado
          example: 1
        requestDateTime:
          description: Data e hora da consulta, conforme especificação RFC-3339, formato UTC.
          type: string
          maxLength: 20
          format: date-time
          example: '2021-05-21T08:30:00Z'
    FinancingsResponseFinancingsContractList:
      type: object
      required:
      - data
      - links
      - meta
      properties:
        data:
          type: array
          minItems: 0
          items:
            $ref: '#/components/schemas/FinancingsListContract'
        links:
          $ref: '#/components/schemas/FinancingsLinks'
        meta:
          $ref: '#/components/schemas/FinancingsMeta'
    FinancingsContract:
      type: object
      description: Conjunto de informações referentes à identificação da operação de crédito de financiamentos
      required:
      - contractNumber
      - ipocCode
      - productName
      - productType
      - productSubType
      - contractDate
      - contractAmount
      - instalmentPeriodicity
      - CET
      - amortizationScheduled
      - interestRates
      - contractedFees
      - contractedFinanceCharges
      properties:
        contractNumber:
          type: string
          maxLength: 100
          pattern: ^[\w\W]{1,100}$
          example: '1324926521496'
          description: Número do contrato dado pela instituição contratante.
        ipocCode:
          type: string
          maxLength: 67
          minLength: 22
          pattern: ^[\w\W]{22,67}$
          description: "\"Número padronizado do contrato - IPOC (Identificação Padronizada da Operação de Crédito). Segundo DOC 3040, composta por:\n- **CNPJ da instituição:** 8 (oito) posições iniciais;\n- **Modalidade da operação:** 4 (quatro) posições;\n- **Tipo do cliente:** 1 (uma) posição( 1 = pessoa natural - CPF, 2= pessoa jurídica – CNPJ, 3 = pessoa física no exterior, 4 = pessoa jurídica no exterior, 5 = pessoa natural sem CPF e 6 = pessoa jurídica sem CNPJ);\n- **Código do cliente:** O número de posições varia conforme o tipo do cliente:\n  1. Para clientes pessoa física com CPF (tipo de cliente = 1), informar as 11 (onze) posições do CPF;\n  2. Para clientes pessoa jurídica com CNPJ (tipo de cliente = 2), informar as 8 (oito) posições iniciais do CNPJ;\n  3. Para os demais clientes (tipos de cliente 3, 4, 5 e 6), informar 14 (catorze) posições com complemento de zeros à esquerda se a identificação tiver tamanho inferior;\n- **Código do contrato:** 1 (uma) até 40 (quarenta) posições, sem complemento de caracteres.\"\n"
          example: '92792126019929279212650822221989319252576'
        productName:
          type: string
          maxLength: 140
          pattern: ^[^\s](.*[^\s])?$
          example: Crédito Pessoal Consignado
          description: 'Denominação/Identificação do nome da Modalidade da Operação de Crédito divulgado ao cliente

            '
        productType:
          $ref: '#/components/schemas/FinancingsEnumProductType'
        productSubType:
          $ref: '#/components/schemas/FinancingsEnumProductSubType'
        contractDate:
          type: string
          format: date
          maxLength: 10
          pattern: ^(\d{4})-(1[0-2]|0?[1-9])-(3[01]|[12][0-9]|0?[1-9])$
          example: '2018-01-05'
          description: Data de contratação da operação de crédito. Especificação RFC-3339
        disbursementDates:
          type: array
          minItems: 1
          description: 'Lista que traz as Datas de Desembolso do valor contratado.

            '
          items:
            type: string
            format: date
            maxLength: 10
            pattern: ^(\d{4})-(1[0-2]|0?[1-9])-(3[01]|[12][0-9]|0?[1-9])$
            example: '2018-01-15'
            description: 'Data do Desembolso do valor contratado. Especificação RFC-3339.

              No caso de uma liberação de recursos feita em D0 mas com referência retroativa feita em D -1, contabilmente a data correta seria D -1.

              '
        settlementDate:
          type: string
          format: date
          maxLength: 10
          pattern: ^(\d{4})-(1[0-2]|0?[1-9])-(3[01]|[12][0-9]|0?[1-9])$
          example: '2018-01-15'
          description: 'Data de liquidação da operação.

            '
        contractAmount:
          type: string
          format: double
          pattern: ^\d{1,15}\.\d{2,4}$
          maxLength: 20
          minLength: 4
          example: '1000.0400'
          description: Valor contratado da operação. Expresso em valor monetário com no mínimo 2 casas e no máximo 4 casas decimais. Nos casos em que não houver este valor explícito no contrato do produto, enviar como 0.00.
        currency:
          type: string
          pattern: ^(\w{3}){1}$
          maxLength: 3
          description: 'Moeda referente ao valor da garantia, segundo modelo ISO-4217. p.ex. ''BRL''

            Todos os valores monetários informados estão representados com a moeda vigente do Brasil

            '
          example: BRL
        dueDate:
          type: string
          format: date
          maxLength: 10
          pattern: ^(\d{4})-(1[0-2]|0?[1-9])-(3[01]|[12][0-9]|0?[1-9])$
          example: '2028-01-15'
          description: "Data de vencimento Final da operação. Especificação RFC-3339.   \n"
        instalmentPeriodicity:
          type: string
          description: '"Informação relativa à periodicidade regular das parcelas. (Vide Enum)

            sem periodicidade regular, semanal, quinzenal, mensal, bimestral, trimestral, semestral, anual"

            '
          enum:
          - SEM_PERIODICIDADE_REGULAR
          - SEMANAL
          - QUINZENAL
          - MENSAL
          - BIMESTRAL
          - TRIMESTRAL
          - SEMESTRAL
          - ANUAL
          - OUTROS
          example: SEMANAL
        instalmentPeriodicityAdditionalInfo:
          type: string
          pattern: ^[^\s](.*[^\s])?$
          maxLength: 50
          example: Informações adicionais sobre periodicidade
          description: "Campo para complementar a informação relativa à periodicidade de pagamento regular. \n\n[Restrição] Obrigatório quando o campo instalmentPeriodicity for igual a OUTROS.\n"
        firstInstalmentDueDate:
          type: string
          format: date
          maxLength: 10
          pattern: ^(\d{4})-(1[0-2]|0?[1-9])-(3[01]|[12][0-9]|0?[1-9])$
          example: '2018-02-15'
          description: 'Data de vencimento primeira parcela do principal.

            '
        CET:
          type: string
          format: double
          maxLength: 13
          minLength: 8
          pattern: ^\d{1,6}\.\d{6}$
          example: '0.290000'
          description: "CET – Custo Efetivo Total deve ser expresso na forma de taxa percentual anual e incorpora todos os encargos e despesas incidentes nas operações de crédito (taxa de juro, mas também tarifas, tributos, seguros e outras despesas cobradas).\n\nO preenchimento deve respeitar as 6 casas decimais, mesmo que venham preenchidas com zeros (representação de porcentagem p.ex: 0.150000.\nEste valor representa 15%. O valor 1 representa 100%).  \n\nPara o público PF (pessoa física) o campo é de envio obrigatório para contratos firmados a partir de 2008, conforme Resolução CMN 3.517. Para o público PJ (pessoa jurídica) o campo é de envio obrigatório para contratos firmados a partir de 2011, conforme Resolução CMN 3.909. Excepcionalmente nos casos de operações de crédito rural, o envio do campo CET será obrigatório a partir de 2019, conforme Resolução CMN 4.699. O campo poderá ser preenchido com 0.00 em cenários nos quais a casa não tenha a informação de CET (Custo efetivo total) apenas para as exceções listadas abaixo:\n- Em contratos anteriores a 2008 (para o público PF);\n- Em contratos anteriores a 2011 (para o público PJ);\n- Em contratos anteriores a 2019 para os casos de operações de crédito rural (ambos os públicos PF e PJ);\n- Público PJ de médio ou grande porte.\n\nQuando o CET for indexado dinamicamente a um indicador ainda não divulgado, informar o valor recalculado com o último índice oficial disponível na data da consulta. Assim que o novo índice for publicado, o CET deve ser atualizado na próxima exposição.\n"
        amortizationScheduled:
          type: string
          description: 'Sistema de amortização (Vide Enum):

            - SAC (Sistema de Amortização Constante) - É aquele em que o valor da amortização permanece igual até o final. Os juros cobrados sobre o parcelamento não entram nesta conta.

            - PRICE (Sistema Francês de Amortização) - As parcelas são fixas do início ao fim do contrato. Ou seja, todas as parcelas terão o mesmo valor, desde a primeira até a última. Nos primeiros pagamentos, a maior parte do valor da prestação corresponde aos juros. Ao longo do tempo, a taxa de juros vai decrescendo. Como o valor da prestação é fixo, com o passar das parcelas, o valor de amortização vai aumentando.

            - SAM (Sistema de Amortização Misto) - Cada prestação (pagamento) é a média aritmética das prestações respectivas no Sistemas Price e no Sistema de Amortização Constante (SAC).

            - SEM SISTEMA DE AMORTIZAÇÃO

            '
          enum:
          - SAC
          - PRICE
          - SAM
          - SEM_SISTEMA_AMORTIZACAO
          - OUTROS
          example: SAC
        amortizationScheduledAdditionalInfo:
          type: string
          pattern: ^[^\s](.*[^\s])?$
          maxLength: 200
          example: Informações complementares relativa à amortização do tipo 'OUTROS'
          description: 'Campo para complementar a informação relativa à amortização.


            [Restrição] Obrigatório quando o campo amortizationScheduled for igual a OUTROS.

            '
        interestRates:
          type: array
          minItems: 0
          description: "Objeto que traz o conjunto de informações necessárias para demonstrar a composição das taxas de juros remuneratórios da Modalidade de crédito.  \nCaso o contrato não possua taxas de juros, deve ser compartilhada uma lista vazia. Caso o contrato possua uma taxa de juros com valor 0, deve ser compartilhado um objeto com o valor 0 de forma explícita.\n"
          items:
            $ref: '#/components/schemas/FinancingsContractInterestRate'
        contractedFees:
          type: array
          minItems: 0
          description: 'Lista que traz as informações das tarifas pactuadas no contrato.

            '
          items:
            $ref: '#/components/schemas/FinancingsContractFee'
        contractedFinanceCharges:
          type: array
          minItems: 0
          description: Lista que traz os encargos pactuados no contrato
          items:
            $ref: '#/components/schemas/FinancingsFinanceCharge'
        hasInsuranceContracted:
          type: boolean
          description: Campo que identifica se existe seguro contratado para o Financiamento, onde seguro contratado é true e não contratado é false. O não envio do campo significa que a instituição não oferece este produto.
    FinancingsResponseFinancingsWarranties:
      type: object
      required:
      - data
      - links
      - meta
      properties:
        data:
          type: array
          minItems: 0
          items:
            $ref: '#/components/schemas/FinancingsWarranties'
        links:
          $ref: '#/components/schemas/FinancingsLinks'
        meta:
          $ref: '#/components/schemas/FinancingsMeta'
    FinancingsPayments:
      type: object
      description: Conjunto de informações referentes aos pagamentos realizados de uma operação de crédito de adiantamento a depositantes
      required:
      - contractOutstandingBalance
      - releases
      properties:
        paidInstalments:
          type: number
          maximum: 2147483647
          example: 73
          description: 'Quantidade total de parcelas pagas do contrato referente à Modalidade de Crédito informada.


            [Restrição] Obrigatório para modalidades que possuam parcelas.

            '
        contractOutstandingBalance:
          type: string
          format: double
          pattern: ^\d{1,15}\.\d{2,4}$
          maxLength: 20
          minLength: 4
          example: '1000.0400'
          description: Valor necessário para o cliente liquidar a dívida, ou seja, este campo deve ser preenchido com o saldo devedor atualizado descrito no DDC (Documento Descritivo de Crédito).
        releases:
          type: array
          minItems: 0
          description: Lista dos pagamentos realizados no período
          items:
            $ref: '#/components/schemas/FinancingsReleases'
    FinancingsReleases:
      type: object
      description: Lista dos pagamentos realizados no período
      required:
      - paymentId
      - isOverParcelPayment
      - paidDate
      - currency
      - paidAmount
      properties:
        paymentId:
          type: string
          maxLength: 100
          minLength: 1
          example: XlthLXpBLVowLTldW2EtekEtWjAtOVwtXXswLDk5fSQ
          pattern: ^[a-zA-Z0-9][a-zA-Z0-9-]{0,99}$
          description: Código ou identificador único prestado pela instituição para representar o pagamento individual.
        isOverParcelPayment:
          type: boolean
          example: true
          description: Identifica se é um pagamento pactuado (false) ou avulso (true).
        instalmentId:
          type: string
          maxLength: 100
          minLength: 1
          pattern: ^[a-zA-Z0-9][a-zA-Z0-9-]{0,99}$
          example: WGx0aExYcEJMVm93TFRsZFcyRXRla0V0V2pBdE9Wd3RYWH
          description: "Identificador de parcela, de responsabilidade de cada Instituição transmissora.  \n[Restrição] Informação de envio obrigatório quando isOverParcelPayment tiver o valor FALSE.\n"
        paidDate:
          type: string
          format: date
          maxLength: 10
          pattern: ^(\d{4})-(1[0-2]|0?[1-9])-(3[01]|[12][0-9]|0?[1-9])$
          example: '2021-05-21'
          description: Data efetiva do pagamento referente ao contrato da modalidade de crédito consultada, conforme especificação RFC-3339. p.ex. 2014-03-19
        currency:
          type: string
          maxLength: 3
          pattern: ^(\w{3}){1}$
          example: BRL
          description: 'Moeda referente ao valor monetário informado, segundo modelo ISO-4217. p.ex. ''BRL''.

            Todos os valores monetários informados estão representados com a moeda vigente do Brasil.

            '
        paidAmount:
          type: string
          format: double
          pattern: ^-?\d{1,15}\.\d{2,4}$
          maxLength: 21
          minLength: 4
          example: '1000.0400'
          description: 'Valor do pagamento referente ao  contrato da modalidade de crédito consultada.

            Expresso em valor monetário com no mínimo 2 casas e no máximo 4 casas decimais.

            '
        overParcel:
          $ref: '#/components/schemas/FinancingsOverParcel'
    FinancingsOverParcel:
      type: object
      description: 'Objeto das tarifas e encargos que foram pagos fora da parcela.


        [Restrição] Informação deve ser enviada caso ela exista.

        '
      required:
      - fees
      - charges
      properties:
        fees:
          type: array
          minItems: 0
          items:
            $ref: '#/components/schemas/FinancingsFeeOverParcel'
          description: Lista das tarifas que foram pagas fora da parcela, só para pagamento avulso.
        charges:
          type: array
          minItems: 0
          items:
            $ref: '#/components/schemas/FinancingsChargeOverParcel'
          description: Lista dos encargos que foram pagos fora da parcela.
    FinancingsResponseFinancingsContract:
      type: object
      required:
      - data
      - links
      - meta
      properties:
        data:
          $ref: '#/components/schemas/FinancingsContract'
        links:
          $ref: '#/components/schemas/FinancingsLinksSingle'
        meta:
          $ref: '#/components/schemas/FinancingsMetaSingle'
    FinancingsBalloonPayment:
      type: object
      description: Lista que traz as datas de vencimento e valor das parcelas não regulares  do contrato da modalidade de crédito consultada.
      required:
      - dueDate
      - amount
      properties:
        dueDate:
          type: string
          format: date
          pattern: ^(\d{4})-(1[0-2]|0?[1-9])-(3[01]|[12][0-9]|0?[1-9])$
          description: Data de vencimento da parcela não regular  a vencer do contrato da modalidade de crédito consultada, conforme especificação RFC-3339. p.ex. 2014-03-19
          maxLength: 10
          example: '2020-01-10'
        amount:
          $ref: '#/components/schemas/FinancingsBalloonPaymentAmount'
    FinancingsFinanceCharge:
      type: object
      description: Conjunto de informações referentes à identificação da operação de crédito
      required:
      - chargeType
      properties:
        chargeType:
          $ref: '#/components/schemas/FinancingsEnumContractFinanceChargeType'
        chargeAdditionalInfo:
          type: string
          maxLength: 50
          description: 'Campo para informações adicionais.


            [Restrição] Obrigatório se selecionada a opção ''OUTROS'' em Tipo de encargo pactuado no contrato.

            '
          pattern: ^[^\s](.*[^\s])?$
          example: Informações adicionais sobre encargos.
        chargeRate:
          type: string
          format: double
          pattern: ^\d{1}\.\d{6}$
          maxLength: 8
          minLength: 8
          description: "Representa o valor do encargo em percentual pactuado no contrato.   \nO preenchimento deve respeitar as 6 casas decimais, mesmo que venham preenchidas com zeros(representação de porcentagem p.ex: 0.150000. \nEste valor representa 15%. O valor 1 representa 100%).\n"
          example: '0.071200'
    FinancingsChargeOverParcel:
      type: object
      required:
      - chargeType
      - chargeAmount
      properties:
        chargeType:
          $ref: '#/components/schemas/FinancingsEnumContractFinanceChargeType'
        chargeAmount:
          type: string
          format: double
          pattern: ^-?\d{1,15}\.\d{2,4}$
          maxLength: 21
          minLength: 4
          example: '1000.0400'
          description: Valor do pagamento do encargo pago fora da parcela. Expresso em valor monetário com no mínimo 2 casas e no máximo 4 casas decimais.
        chargeAdditionalInfo:
          type: string
          pattern: ^[^\s](.*[^\s])?$
          maxLength: 140
          example: Informações adicionais
          description: 'Campo livre para preenchimento das informações adicionais referente ao encargo.


            [Restrição] Obrigatório quando chargeType for igual ''OUTROS''.

            '
    FinancingsEnumProductType:
      type: string
      description: '"Tipo da modalidade de crédito contratada, conforme  circular 4.015 e descrição do DOC3040 do SCR). (Vide Enum)

        Financiamentos, Financiamentos rurais  e Financiamentos imobiliários"

        '
      enum:
      - FINANCIAMENTOS
      - FINANCIAMENTOS_RURAIS
      - FINANCIAMENTOS_IMOBILIARIOS
      example: FINANCIAMENTOS
    FinancingsEnumContractFinanceChargeType:
      type: string
      description: Tipo de encargo pactuado no contrato.
      enum:
      - JUROS_REMUNERATORIOS_POR_ATRASO
      - MULTA_ATRASO_PAGAMENTO
      - JUROS_MORA_ATRASO
      - IOF_CONTRATACAO
      - IOF_POR_ATRASO
      - SEM_ENCARGO
      - OUTROS
      example: JUROS_REMUNERATORIOS_POR_ATRASO
    FinancingsContractInterestRate:
      type: object
      description: Objeto que traz o conjunto de informações necessárias para demonstrar a composição das taxas de juros remuneratórios da Modalidade de crédito
      required:
      - taxType
      - interestRateType
      - taxPeriodicity
      - calculation
      - referentialRateIndexerType
      properties:
        taxType:
          type: string
          description: '"Tipo de Taxa (vide  Enum)

            - NOMINAL (taxa nominal é uma taxa de juros em que a unidade referencial não coincide com a unidade de tempo da capitalização. Ela é sempre fornecida em termos anuais, e seus períodos de capitalização podem ser diários, mensais, trimestrais ou semestrais. p.ex. Uma taxa de 12% ao ano com capitalização mensal)

            - EFETIVA (É a taxa de juros em que a unidade referencial coincide com a unidade de tempo da capitalização. Como as unidades de medida de tempo da taxa de juros e dos períodos de capitalização são iguais, usa-se exemplos simples como 1% ao mês, 60% ao ano)"

            '
          enum:
          - NOMINAL
          - EFETIVA
          example: EFETIVA
        interestRateType:
          type: string
          description: '"Tipo de Juros  (vide  Enum)

            - SIMPLES (aplicada/cobrada sempre sobre o capital inicial, que é o valor emprestado/investido. Não há cobrança de juros sobre juros acumulados no(s) período(s) anterior(es). Exemplo: em um empréstimo de R$1.000, com taxa de juros simples de 8% a.a., com duração de 2 anos, o total de juros será R$80 no primeiro ano e R$ 80 no segundo ano. Ao final do contrato, o tomador irá devolver o principal e os juros simples de cada ano: R$1.000+R$80+R$80=R$1.160)

            - COMPOSTO (para cada período do contrato (diário, mensal, anual etc.), há um “novo capital” para a cobrança da taxa de juros contratada. Esse “novo capital” é a soma do capital e do juro cobrado no período anterior. Exemplo: em um empréstimo de R$1.000, com taxa de juros composta de 8% a.a., com duração de 2 anos, o total de juros será R$80 no primeiro ano. No segundo ano, os juros vão ser somados ao capital (R$1.000 + R$ 80 = R$ 1.080), resultando em juros de R$ 86 (8%de R$ 1.080))"

            '
          enum:
          - SIMPLES
          - COMPOSTO
          example: SIMPLES
        taxPeriodicity:
          type: string
          description: '"Periodicidade da taxa . (Vide  Enum)

            a.m - ao mês

            a.a. - ao ano"

            '
          enum:
          - AM
          - AA
          example: AA
        calculation:
          type: string
          description: Base de cálculo
          enum:
          - 21/252
          - 30/360
          - 30/365
          example: 21/252
        referentialRateIndexerType:
          type: string
          description: '"Tipos de taxas referenciais ou indexadores, conforme Anexo 5: Taxa referencial ou Indexador (Indx), do Documento 3040"

            '
          enum:
          - SEM_TIPO_INDEXADOR
          - PRE_FIXADO
          - POS_FIXADO
          - FLUTUANTES
          - INDICES_PRECOS
          - CREDITO_RURAL
          - OUTROS_INDEXADORES
          example: PRE_FIXADO
        referentialRateIndexerSubType:
          type: string
          description: '"Sub tipos de taxas referenciais ou indexadores, conforme Anexo 5: Taxa referencial ou Indexador (Indx), do Documento 3040"

            '
          enum:
          - SEM_SUB_TIPO_INDEXADOR
          - PRE_FIXADO
          - TR_TBF
          - TJLP
          - LIBOR
          - TLP
          - OUTRAS_TAXAS_POS_FIXADAS
          - CDI
          - SELIC
          - OUTRAS_TAXAS_FLUTUANTES
          - IGPM
          - IPCA
          - IPCC
          - OUTROS_INDICES_PRECO
          - TCR_PRE
          - TCR_POS
          - TRFC_PRE
          - TRFC_POS
          - OUTROS_INDEXADORES
          example: TJLP
        referentialRateIndexerAdditionalInfo:
          type: string
          maxLength: 140
          pattern: ^[^\s](.*[^\s])?$
          example: Informações adicionais
          description: 'Campo livre para complementar a informação relativa ao Tipo de taxa referencial ou indexador.


            [Restrição] Obrigatório para complementar a informação relativa ao Tipo de taxa referencial ou indexador, quando selecionada o tipo ou subtipo OUTRO.

            '
        preFixedRate:
          type: string
          format: double
          maxLength: 9
          minLength: 8
          pattern: ^\d{1,2}\.\d{6}$
          example: '0.600000'
          description: "Taxa pré fixada aplicada sob o contrato da modalidade crédito. p.ex. 0.014500.   \nO preenchimento deve respeitar as 6 casas decimais, mesmo que venham preenchidas com zeros(representação de porcentagem p.ex: 0.150000. Este valor representa 15%. O valor 1 representa 100%).\n"
        postFixedRate:
          type: string
          format: double
          maxLength: 9
          minLength: 8
          pattern: ^\d{1,2}\.\d{6}$
          example: '0.550000'
          description: "Taxa pós fixada aplicada sob o contrato da modalidade crédito. p.ex. 0.014500.   \nO preenchimento deve respeitar as 6 casas decimais, mesmo que venham preenchidas com zeros (representação de porcentagem p.ex: 0.150000. Este valor representa 15%. O valor 1 representa 100%).\n"
        additionalInfo:
          type: string
          maxLength: 1200
          pattern: ^[^\s](.*[^\s])?$
          example: Informações adicionais
          description: "Texto com informações adicionais sobre a composição das taxas de juros pactuadas. \n\n[Restrição] Caso a instituição possua a informação para compartilhamento, esta deverá ser informada.\n"
