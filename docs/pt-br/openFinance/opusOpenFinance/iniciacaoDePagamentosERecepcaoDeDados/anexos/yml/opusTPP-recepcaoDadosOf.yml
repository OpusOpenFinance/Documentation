        - contacts
        - companiesCnpj
      properties:
        updateDateTime:
          type: string
          maxLength: 20
          format: date-time
          pattern: '^(\d{4})-(1[0-2]|0?[1-9])-(3[01]|[12][0-9]|0?[1-9])T(?:[01]\d|2[0123]):(?:[012345]\d):(?:[012345]\d)Z$'
          example: '2021-05-21T08:30:00Z'
          description: |
            Data e hora da atualização dos campos \<_endpoint_\>, conforme especificação RFC-3339, formato UTC. Quando não existente uma data vinculada especificamente ao bloco, assumir a data e hora de atualização do cadastro como um todo.
        personalId:
          type: string
          pattern: '^[a-zA-Z0-9][a-zA-Z0-9-]{0,99}$'
          maxLength: 100
          minLength: 1
          description: Um identificador único e imutável usado para identificar o recurso cliente pessoa natural. Este identificador não tem significado para o cliente que deu o consentimento
          example: 578-psd-71md6971kjh-2d414
        brandName:
          type: string
          maxLength: 80
          pattern: '[\w\W\s]*'
          example: Organização A
          description: 'Nome da Marca reportada pelo participante no Open Finance. Recomenda-se utilizar, sempre que possível, o mesmo nome de marca atribuído no campo do diretório Customer Friendly Server Name (Authorisation Server).'
        civilName:
          type: string
          maxLength: 70
          pattern: '^[\w\W]*$'
          example: Juan Kaique Cláudio Fernandes
          description: |
            Nome civil completo da pessoa natural (Direito fundamental da pessoa, o nome civil é aquele atribuído à pessoa natural desde o registro de seu nascimento, com o qual será identificada por toda a sua vida, bem como após a sua morte).

            Caso o nome civil informado exceda o limite de 70 caracteres, devem ser mantidos o primeiro e o último nome completos, realizando abreviação progressiva dos nomes intermediários (reduzindo-os às respectivas iniciais, seguidas de ponto), até que o nome se ajuste ao limite definido.
            Persistindo excesso após a abreviação de todos os intermediários, aplicar truncamento simples ao final do campo para respeitar o limite máximo. Não utilizar reticências.
        socialName:
          type: string
          maxLength: 70
          pattern: '[\w\W\s]*'
          example: Jaqueline de Freitas
          description: 'Nome social da pessoa natural, se houver. (aquele pelo qual travestis e transexuais se reconhecem, bem como são identificados por sua comunidade e em seu meio social, conforme Decreto Local)'
        birthDate:
          type: string
          maxLength: 10
          format: date
          pattern: '^(\d{4})-(1[0-2]|0?[1-9])-(3[01]|[12][0-9]|0?[1-9])$'
          example: '1989-03-23'
          description: 'Data de nascimento, conforme especificação RFC-3339'
        maritalStatusCode:
          $ref: '#/components/schemas/CustomersEnumMaritalStatusCode'
        maritalStatusAdditionalInfo:
          type: string
          pattern: '[\w\W\s]*'
          maxLength: 50
          example: Amasiado
          description: |
            Campo livre para complementar a informação relativa ao estado marital.

            [Restrição] Preenchimento obrigatório quando selecionado o tipo 'OUTRO'.
        sex:
          $ref: '#/components/schemas/CustomersEnumSex'
        companiesCnpj:
          type: array
          minItems: 1
          items:
            type: string
            pattern: '^[0-9A-Z]{12}[0-9]{2}$'
            maxLength: 14
          example:
            - '01773247000103'
            - '01773247000563'
          description: |
            Representação alfanumérica completa do CNPJ da instituição responsável pelo Cadastro - o CNPJ corresponde a representação alfanumérica de inscrição no Cadastro de Pessoa Jurídica.
            Deve-se ter apenas os caracteres do CNPJ, sem máscara.
        documents:
          $ref: '#/components/schemas/CustomersPersonalDocument'
        otherDocuments:
          type: array
          items:
            $ref: '#/components/schemas/CustomersPersonalOtherDocument'
          minItems: 1
          description: Relação dos demais documentos
        hasBrazilianNationality:
          type: boolean
          example: false
          description: Informa se o Cliente tem nacionalidade brasileira.
        nationality:
          type: array
          minItems: 1
          items:
            $ref: '#/components/schemas/CustomersNationality'
        filiation:
          type: array
          minItems: 1
          items:
            type: object
            required:
              - type
              - civilName
            properties:
              type:
                $ref: '#/components/schemas/CustomersEnumFiliationType'
              civilName:
                type: string
                maxLength: 70
                pattern: '^[\w\W]*$'
                example: Marcelo Cláudio Fernandes
                description: |
                  Nome civil completo da pessoa natural (Direito fundamental da pessoa, o nome civil é aquele atribuído à pessoa natural desde o registro de seu nascimento, com o qual será identificada por toda a sua vida, bem como após a sua morte).

                  Caso o nome civil informado exceda o limite de 70 caracteres, devem ser mantidos o primeiro e o último nome completos, realizando abreviação progressiva dos nomes intermediários (reduzindo-os às respectivas iniciais, seguidas de ponto), até que o nome se ajuste ao limite definido.
                  Persistindo excesso após a abreviação de todos os intermediários, aplicar truncamento simples ao final do campo para respeitar o limite máximo. Não utilizar reticências.
              socialName:
                type: string
                maxLength: 70
                pattern: '^[\w\W]*$'
                description: |
                  Nome social da pessoa natural, se houver.
                  (aquele pelo qual travestis e transexuais se reconhecem,
                  bem como são identificados por sua comunidade e em seu meio social, conforme Decreto Local).
        contacts:
          $ref: '#/components/schemas/CustomersPersonalContacts'
    CustomersPersonalDocument:
      type: object
      description: Objeto agrupador de informações relativas a Documentos da pessoa natural
      properties:
        cpfNumber:
          type: string
          maxLength: 11
          pattern: '^\d{11}$'
          example: '25872252137'
          description: |
            Número completo do CPF.
            Atributo que corresponde às informações mínimas exigidas pela Regulamentação em vigor.
            O CPF é o Cadastro de Pessoa natural. Ele é um documento feito pela Receita Federal e serve para identificar os contribuintes. O CPF é uma numeração com 11 dígitos, que só mudam por decisão judicial. O documento é emitido pela receita federal.

            [Restrição] Preenchimento obrigatório quando não for informado o passport.
        passport:
          $ref: '#/components/schemas/CustomersPersonalPassport'
    CustomersPersonalPassport:
      type: object
      description: |
        Documento concedido aos viajantes por uma autoridade administrativa nacional a fim de certificar sua identidade perante autoridades estrangeiras.

        [Restrição] Aplicável somente à Pessoa natural residente no exterior desobrigada de inscrição no CPF.

        [Restrição] Preenchimento obrigatório quando não for informado o cpfNumber.
      required:
        - number
        - country
      properties:
        number:
          type: string
          maxLength: 20
          pattern: '^[\w\W]*$'
          example: '75253468744594820620'
          description: |
            Número do Passaporte.
        country:
          type: string
          maxLength: 3
          pattern: '^(\w{3}){1}$'
          example: CAN
          description: |
            Pais de emissão do passaporte. Código do pais de acordo com o código 'alpha3' do ISO-3166.
        expirationDate:
          type: string
          format: date
          maxLength: 10
          pattern: '^(\d{4})-(1[0-2]|0?[1-9])-(3[01]|[12][0-9]|0?[1-9])$'
          example: '2021-05-21'
          description: |
            Data vigência do Passaporte, conforme especificação RFC-3339.
        issueDate:
          type: string
          format: date
          maxLength: 10
          pattern: '^(\d{4})-(1[0-2]|0?[1-9])-(3[01]|[12][0-9]|0?[1-9])$'
          example: '2021-05-21'
          description: |
            Data de emissão do passaporte, conforme especificação RFC-3339.
    CustomersPersonalOtherDocument:
      type: object
      required:
        - type
        - number
      properties:
        type:
          $ref: '#/components/schemas/CustomersEnumPersonalOtherDocumentType'
        typeAdditionalInfo:
          type: string
          maxLength: 70
          pattern: '[\w\W\s]*'
          example: CREA-RJ
          description: Campo livre de preenchimento obrigatório se selecionada a opção OUTROS tipos de documentos
        number:
          type: string
          maxLength: 40
          pattern: '[\w\W\s]*'
          example: '15291908'
          description: Identificação/Número do documento informado
        checkDigit:
          type: string
          maxLength: 2
          pattern: '[\w\W\s]*'
          example: P
          description: Dígito verificador do documento informado. De preenchimento obrigatório se o documento informado tiver dígito verificador
        additionalInfo:
          type: string
          maxLength: 50
          pattern: '[\w\W\s]*'
          example: SSP/SP
          description: |
            Para documentos em que se aplique o uso do local de emissão o mesmo deve ser enviado mandatoriamente, com a informação de órgão e UF. Exemplo: RG, local de emissão: SSP/RS.
            [Restrição] Obrigatório quando o Local de Emissão do Documento for relevante.
        expirationDate:
          type: string
          format: date
          maxLength: 10
          pattern: '^(\d{4})-(1[0-2]|0?[1-9])-(3[01]|[12][0-9]|0?[1-9])$'
          example: '2021-05-21'
          description: 'Data de validade do documento informado, conforme especificação RFC-3339.'
    CustomersEnumPersonalOtherDocumentType:
      type: string
      enum:
        - CNH
        - RG
        - NIF
        - RNE
        - OUTROS
      description: |
        Relação dos Códigos dos demais documentos pessoa natural.
    CustomersNationality:
      type: object
      description: Objeto que agrupa informações relativas à nacionalidade da Pessoa Natural
      required:
        - otherNationalitiesInfo
        - documents
      properties:
        otherNationalitiesInfo:
          type: string
          pattern: '^\S[\s\S]*$'
          maxLength: 40
          example: CAN
          description: |
            Campo de preenchimento obrigatório caso o cliente não possua nacionalidade brasileira. Preencher indicando todas suas demais nacionalidades utilizando o código de pais de acordo com o código alpha3 do ISO-3166.p.ex.'CAN'
        documents:
          type: array
          items:
            $ref: '#/components/schemas/CustomersNationalityOtherDocument'
          description: Lista que traz relação de documentos complementares de pessoas com nacionalidade diferente de brasileira
    CustomersNationalityOtherDocument:
      type: object
      required:
        - type
        - number
      properties:
        type:
          type: string
          maxLength: 10
          pattern: '[\w\W\s]*'
          description: 'Tipo de documento. Campo livre, de preenchimento obrigatório quando a nacionalidade for diferente de brasileira. Informar tipo e número do documento, além da, vigência e demais informações complementares para se identificar o documento de pessoa estrangeira'
          example: SOCIAL SEC
        number:
          type: string
          maxLength: 40
          pattern: '[\w\W\s]*'
          description: 'Número de identificação do documento. Campo livre, de preenchimento obrigatório quando a nacionalidade for diferente de brasileira. Informar o número do documento e demais informações complementares para se identificar o documento de pessoa estrangeira'
          example: '423929299'
        expirationDate:
          description: 'Data de validade do documento informado, conforme especificação RFC-3339.'
          type: string
          maxLength: 10
          format: date
          pattern: '^(\d{4})-(1[0-2]|0?[1-9])-(3[01]|[12][0-9]|0?[1-9])$'
          example: '2021-05-21'
        issueDate:
          description: 'Data de emissão do documento, conforme especificação RFC-3339.'
          type: string
          maxLength: 10
          format: date
          pattern: '^(\d{4})-(1[0-2]|0?[1-9])-(3[01]|[12][0-9]|0?[1-9])$'
          example: '2021-05-21'
        country:
          type: string
          maxLength: 80
          pattern: '[\w\W\s]*'
          example: Brasil
          description: |
            Nome do país.
        additionalInfo:
          type: string
          maxLength: 70
          pattern: '[\w\W\s]*'
          description: Campo livre de preenchimento quando necessário.
          example: Informações adicionais.
    CustomersEnumFiliationType:
      type: string
      enum:
        - MAE
        - PAI
      example: PAI
      description: Tipo de filiação.
    CustomersPersonalContacts:
      type: object
      description: |
        Conjunto de informações referentes às formas para contatar o cliente.
        Os dados deste campo são de envio obrigatório. Só não devem ser enviados caso a instituição não os possua.
      required:
        - postalAddresses
        - phones
        - emails
      properties:
        postalAddresses:
          type: array
          items:
            $ref: '#/components/schemas/CustomersPersonalPostalAddress'
          minItems: 0
          description: Lista de endereços da pessoa natural
        phones:
          type: array
          items:
            $ref: '#/components/schemas/CustomersCustomerPhone'
          minItems: 0
          description: Lista com telefones de contato da pessoa natural
        emails:
          type: array
          items:
            $ref: '#/components/schemas/CustomersCustomerEmail'
          minItems: 0
          description: Lista e-mails de contato
    CustomersPersonalPostalAddress:
      type: object
      required:
        - isMain
        - address
        - townName
        - postCode
        - country
      properties:
        isMain:
          type: boolean
          example: true
          description: Indica se o endereço informado é o principal.
        address:
          type: string
          maxLength: 150
          pattern: '[\w\W\s]*'
          example: 'Av Naburo Ykesaki, 1270'
          description: Corresponde ao endereço residencial do cliente.
        additionalInfo:
          type: string
          maxLength: 30
          pattern: '[\w\W\s]*'
          example: Fundos
          description: Alguns logradouros ainda necessitam ser especificados por meio de complemento.
        districtName:
          type: string
          maxLength: 50
          pattern: '[\w\W\s]*'
          example: Centro
          description: |
            Bairro é uma comunidade ou região localizada em uma cidade ou município de acordo com as suas subdivisões geográficas.
            [Restrição] De preenchimento obrigatório, se houver.
        townName:
          type: string
          maxLength: 50
          pattern: '[\w\W\s]*'
          example: Marília
          description: |
            Localidade: O nome da localidade corresponde à designação da cidade ou município no qual o endereço está localizado.
        ibgeTownCode:
          type: string
          pattern: '\d{7}$'
          maxLength: 7
          example: '3550308'
          description: 'Código IBGE de Município. A Tabela de Códigos de Municípios do IBGE apresenta a lista dos municípios brasileiros associados a um código composto de 7 dígitos, sendo os dois primeiros referentes ao código da Unidade da Federação.'
        countrySubDivision:
          $ref: '#/components/schemas/CustomersEnumCountrySubDivision'
        postCode:
          type: string
          pattern: '^\d{8}$'
          maxLength: 8
          example: '17500001'
          description: |
            Código de Endereçamento Postal: Composto por um conjunto numérico de oito dígitos, o objetivo principal do CEP é orientar e acelerar o encaminhamento, o tratamento e a entrega de objetos postados nos Correios, por meio da sua atribuição a localidades, logradouros, unidades dos Correios, serviços, órgãos públicos, empresas e edifícios. p.ex. '01311000'.
        country:
          type: string
          maxLength: 80
          pattern: '[\w\W\s]*'
          example: Brasil
          description: Nome do país
        countryCode:
          type: string
          pattern: '^([A-Z]{3})$'
          maxLength: 3
          example: BRA
          description: Código do país de acordo com o código alpha3 do ISO-3166.
        geographicCoordinates:
          $ref: '#/components/schemas/CustomersGeographicCoordinates'
    CustomersEnumCountrySubDivision:
      type: string
      description: 'Enumeração referente a cada sigla da unidade da federação que identifica o estado ou o distrito federal, no qual o endereço está localizado. p.ex. ''AC''. São consideradas apenas as siglas para os estados brasileiros'
      enum:
        - AC
        - AL
        - AP
        - AM
        - BA
        - CE
        - DF
        - ES
        - GO
        - MA
        - MT
        - MS
        - MG
        - PA
        - PB
        - PR
        - PE
        - PI
        - RJ
        - RN
        - RS
        - RO
        - RR
        - SC
        - SP
        - SE
        - TO
      example: SP
    CustomersGeographicCoordinates:
      type: object
      description: 'Conjunto de informações, que correspondem aos valores das coordenadas geográficas em graus decimais, no Sistema de referência WGS84'
      required:
        - latitude
        - longitude
      properties:
        latitude:
          description: |
            Informação da Latitude referente a geolocalização informada. Entre -90 e 90.p.ex. '-23.5475000'. (2 casas antes da vírgula, 11 posições)
          type: string
          pattern: '^-?\d{1,2}\.\d{1,9}$'
          maxLength: 13
          example: '-23.5475000'
        longitude:
          description: |
            Informação da Longitude referente a geolocalização informada. Entre -180 e 180. p.ex '-46.6361100'. (3 casas antes da vírgula, 11 posições)
          type: string
          pattern: '^-?\d{1,3}\.\d{1,8}$'
          maxLength: 13
          example: '-46.6361100'
    CustomersCustomerPhone:
      type: object
      required:
        - isMain
        - type
        - areaCode
        - number
      properties:
        isMain:
          type: boolean
          description: Indica se o telefone informado é o principal
          example: true
        type:
          $ref: '#/components/schemas/CustomersEnumCustomerPhoneType'
        additionalInfo:
          type: string
          description: 'Informação complementar relativa ao tipo de telefone selecionado. [Restrição] De preenchimento obrigatório quando selecionado o tipo ''OUTRO''.'
          pattern: '[\w\W\s]*'
          maxLength: 70
          example: Informações adicionais.
        countryCallingCode:
          type: string
          maxLength: 4
          pattern: '^\d{1,4}$'
          example: '55'
          description: |
            Número de DDI (Discagem Direta Internacional) para telefone de acesso ao Cliente - se houver

            [Restrição] O preenchimento é obrigatório quando for diferente de 55.
        areaCode:
          $ref: '#/components/schemas/CustomersAreaCode'
        number:
          type: string
          maxLength: 13
          pattern: '^([0-9]{6,13})$'
          example: '29875132'
          description: Número de telefone do cliente
        phoneExtension:
          type: string
          maxLength: 5
          pattern: '^\d{1,5}$'
          description: Número do ramal. De preenchimento obrigatório se fizer parte da identificação do número do telefone informado
          example: '932'
    CustomersEnumCustomerPhoneType:
      type: string
      description: Identificação do Tipo de telefone do cliente.
      enum:
        - FIXO
        - MOVEL
        - OUTRO
      example: FIXO
    CustomersAreaCode:
      type: string
      example: '19'
      description: Número de DDD (Discagem Direta à Distância) do telefone do cliente - se houver
      maxLength: 3
      minLength: 2
      pattern: ^(\d{2,3})$
    CustomersCustomerEmail:
      type: object
      required:
        - isMain
        - email
      properties:
        isMain:
          type: boolean
          description: Indica se o email informado é o principal
          example: true
        email:
          type: string
          format: email
          description: Endereço de email
          maxLength: 320
          example: karinafernandes-81@br.inter.net
    CustomersEnumMaritalStatusCode:
      type: string
      enum:
        - SOLTEIRO
        - CASADO
        - VIUVO
        - SEPARADO_JUDICIALMENTE
        - DIVORCIADO
        - UNIAO_ESTAVEL
        - OUTRO
      example: OUTRO
      description: |
        Estado marital do cliente.
    CustomersEnumSex:
      type: string
      enum:
        - FEMININO
        - MASCULINO
        - OUTRO
      example: FEMININO
      description: |
        "Conjunto de características anatomofisiológicas que distinguem o homem e a mulher: Sexo masculino; sexo feminino".
        No caso de não ser feminino nem masculino é classificado como 'OUTRO'
    CustomersPersonalQualificationData:
      type: object
      description: 'Conjunto de informações relativas ao processo de qualificação. Considera-se qualificação as informações que permitam as instituições apreciar, avaliar, caracterizar e classificar o cliente com a finalidade de conhecer o seu perfil de risco e sua capacidade econômico-financeira'
      required:
        - updateDateTime
        - companyCnpj
      properties:
        updateDateTime:
          type: string
          maxLength: 20
          format: date-time
          example: '2021-05-21T08:30:00Z'
          description: |
            Data e hora da atualização dos campos \<_endpoint_\>, conforme especificação RFC-3339, formato UTC. Quando não existente uma data vinculada especificamente ao bloco, assumir a data e hora de atualização do cadastro como um todo.
        companyCnpj:
          type: string
          pattern: '^[0-9A-Z]{12}[0-9]{2}$'
          maxLength: 14
          example: '50685362000135'
          description: |
            Representação alfanumérica completa do CNPJ da instituição responsável pelo Cadastro - o CNPJ corresponde a representação alfanumérica de inscrição no Cadastro de Pessoa Jurídica. Deve-se ter apenas os caracteres do CNPJ, sem máscara.
        occupationCode:
          $ref: '#/components/schemas/CustomersEnumOccupationMainCodeType'
        occupationDescription:
          type: string
          maxLength: 100
          pattern: '[\w\W\s]*'
          example: '01'
          description: |
            Campo de livre preenchimento para informar o código da ocupação ou um descritivo da ocupação. Ao preencher o campo atentar para o seguintes pontos:
            - Quando selecionada a opção `occupationCode` `RECEITA_FEDERAL` ou `CBO`, informar o código desta lista padronizada;
            - Se selecionada `occupationCode` `OUTRO`, informar o descritivo da ocupação quando a IF não segue a lista padronizada da Receita Federal e nem da CBO;
            - No envio do código padronizado da Receita Federal e CBO, informar somente o código conforme consta nas listas correspondentes.

            [Restrição] Este campo é de envio obrigatório quando o campo `/data/occupationCode` for enviado.
        informedIncome:
          $ref: '#/components/schemas/CustomersInformedIncome'
        informedPatrimony:
          $ref: '#/components/schemas/CustomersPersonalInformedPatrimony'
        employers:
          type: array
          description: Lista de empregadores vinculados ao cliente conforme registros da instituição transmissora.
          minItems: 1
          items:
            type: object
            properties:
              cnpjCpf:
                type: string
                description: Número de inscrição (CPF/CNPJ) do empregador com o qual o cliente possua vínculo empregatício.
                pattern: '^([0-9]{11}|[0-9A-Z]{12}[0-9]{2})$'
                example: '30386566000164'
              name:
                type: string
                description: Nome do empregador ou Razão social do empregador com o qual o cliente possua vínculo empregatício.
                pattern: '^[^\s](.*[^\s])?$'
                example: 'Organização A'
    CustomersEnumOccupationMainCodeType:
      type: string
      enum:
        - RECEITA_FEDERAL
        - CBO
        - OUTRO
      example: RECEITA_FEDERAL
      description: |
        Traz a relação dos códigos relativos à ocupação.
    CustomersInformedIncome:
      type: object
      required:
        - frequency
        - amount
        - date
      properties:
        frequency:
          $ref: '#/components/schemas/CustomersEnumInformedIncomeFrequency'
        amount:
          $ref: '#/components/schemas/CustomersInformedIncomeAmount'
        date:
          type: string
          format: date
          maxLength: 10
          pattern: '^(\d{4})-(1[0-2]|0?[1-9])-(3[01]|[12][0-9]|0?[1-9])$'
          example: '2021-05-21'
          description: 'Data da renda, conforme especificação RFC-3339.'
    CustomersEnumInformedIncomeFrequency:
      type: string
      enum:
        - DIARIA
        - SEMANAL
        - QUINZENAL
        - MENSAL
        - BIMESTRAL
        - TRIMESTRAL
        - SEMESTRAL
        - ANUAL
        - OUTROS
      description: Traz a frequência ou período da renda informada.
    CustomersInformedIncomeAmount:
      type: object
      required:
        - amount
        - currency
      description: Valor total da renda informada
      properties:
        amount:
          description: |
            Valor total da renda informada. Expresso em valor monetário com no mínimo 2 casas e no máximo 4 casas decimais.
            Renda primária indica os montantes a pagar ou a receber em troca do uso temporário de recursos financeiros, trabalho ou ativos não financeiros não produzidos, a saber, remuneração de trabalhadores, renda de investimentos e demais rendas primárias.
            Fazem parte da primeira a remuneração do trabalho assalariado (salários e ordenados); da segunda, renda de investimento direto, renda de investimento em carteira, renda de outros investimentos e renda de ativos de reserva; e da terceira, tributos sobre a produção e importação, subsídios e aluguéis.
            Fonte: Banco Central do Brasil – Departamento Econômico
          type: string
          pattern: '^\d{1,15}\.\d{2,4}$'
          maxLength: 20
          minLength: 4
          example: '100000.0400'
        currency:
          type: string
          pattern: '^[A-Z]{3}$'
          maxLength: 3
          description: 'Moeda referente ao valor monetário, seguindo o modelo ISO-4217.'
          example: BRL
    CustomersPersonalInformedPatrimony:
      type: object
      required:
        - amount
        - year
      properties:
        amount:
          $ref: '#/components/schemas/CustomersInformedPatrimonyAmount'
        year:
          type: number
          maximum: 9999
          example: 2010
          description: 'Ano de referência da Renda, conforme especificação RFC-3339.'
    CustomersInformedPatrimonyAmount:
      type: object
      required:
        - amount
        - currency
      description: Valor do patrimônio informado
      properties:
        amount:
          description: |
            Valor do patrimônio informado. Expresso em valor monetário com no mínimo 2 casas e no máximo 4 casas decimais.
            Patrimônio é o conjunto de bens vinculado a uma pessoa ou a uma entidade.
          type: string
          pattern: '^-?\d{1,15}\.\d{2,4}$'
          maxLength: 21
          minLength: 4
          example: '100000.0400'
        currency:
          type: string
          pattern: '^[A-Z]{3}$'
          maxLength: 3
          description: 'Moeda referente ao valor monetário, seguindo o modelo ISO-4217.'
          example: BRL
    CustomersPersonalFinancialRelationData:
      type: object
      description: 'Objeto que reúne as informações relativas ao relacionamento do cliente junto à Instituição. Considera-se relacionamento as informações que permitam conhecer desde quando a pessoa consultada é cliente da instituição, bem como um indicador dos produtos e serviços que ela consome atualmente e seus representantes'
      required:
        - updateDateTime
        - startDate
        - productsServicesType
        - accounts
        - procurators
      properties:
        updateDateTime:
          type: string
          format: date-time
          maxLength: 20
          pattern: '^(\d{4})-(1[0-2]|0?[1-9])-(3[01]|[12][0-9]|0?[1-9])T(?:[01]\d|2[0123]):(?:[012345]\d):(?:[012345]\d)Z$'
          example: '2021-05-21T08:30:00Z'
          description: |
            Data e hora da atualização dos campos \<_endpoint_\>, conforme especificação RFC-3339, formato UTC. Quando não existente uma data vinculada especificamente ao bloco, assumir a data e hora de atualização do cadastro como um todo.
        startDate:
          type: string
          format: date-time
          maxLength: 20
          pattern: '^(\d{4})-(1[0-2]|0?[1-9])-(3[01]|[12][0-9]|0?[1-9])T(?:[01]\d|2[0123]):(?:[012345]\d):(?:[012345]\d)Z$'
          example: '2021-05-21T08:30:00Z'
          description: Data de início de relacionamento com a Instituição Financeira. Deve trazer o menor valor entre a informação reportada ao BACEN pelo DOC 3040 e CCS.
        productsServicesType:
          type: array
          items:
            $ref: '#/components/schemas/CustomersEnumProductServiceType'
          minItems: 1
          maxItems: 12
        productsServicesTypeAdditionalInfo:
          type: string
          pattern: '^[\w\W]*$'
          maxLength: 100
          example: Informações adicionais do tipo de serviço.
          description: |
            Informações adicionais do tipo de serviço.
            [Restrição] Campo obrigatório quando productsServicesType for 'OUTROS'.
        procurators:
          type: array
          items:
            $ref: '#/components/schemas/CustomersPersonalProcurator'
          minItems: 0
          description: |
            Lista dos representantes.
            [Restrição] De preenchimento obrigatório se houver representante.
        accounts:
          type: array
          items:
            $ref: '#/components/schemas/CustomersPersonalAccount'
          minItems: 0
          description: |
            Lista de contas depósito à vista, poupança e pagamento pré-pagas mantidas pelo cliente na instituição transmissora.
        portabilitiesReceived:
          type: array
          items:
            $ref: '#/components/schemas/CustomersPortabilitiesReceived'
          minItems: 1
          description: |
            Lista de informações de empregador recebidos através de portabilidade de salário solicitada pelo cliente da transmissora à instituição detentora(s) de sua conta salário, ativos ou que já estiveram ativos,. Cada vínculo é associado a uma portabilidade de salário recebida pela transmissora.

            Obs.: a portabilidade não é explicitamente encerrada, ou seja, a IF para a qual o salário foi portado não é avisado quando a conta salário se encerra ou o salário é portado para outra IF. Não é possível garantir que os dados informados sejam de uma portabilidade ativa, nem que o vínculo com o banco folha ainda exista. A transmissora terá tais informações apenas quando o pedido da portabilidade tiver sido solicitado em seus canais.
        paychecksBankLink:
          type: array
          items:
            $ref: '#/components/schemas/CustomersPaychecksBankLink'
          minItems: 1
          description: |
            Lista de informações de contas salário relacionadas com vínculos empregatícios, existentes ou que já existiram, firmados entre o cliente pessoa natural e um ou mais empregadores. Cada vínculo é associado a uma conta salário aberta mantida no banco-folha (instituição transmissora).

            Obs: como empregadores antigos podem não ter solicitado o fechamento da conta salário, não é possível garantir que os dados informados sejam do empregador atual.
    CustomersEnumProductServiceType:
      type: string
      enum:
        - CONTA_DEPOSITO_A_VISTA
        - CONTA_POUPANCA
        - CONTA_PAGAMENTO_PRE_PAGA
        - CARTAO_CREDITO
        - OPERACAO_CREDITO
        - SEGURO
        - PREVIDENCIA
        - INVESTIMENTO
        - OPERACOES_CAMBIO
        - CONTA_SALARIO
        - CREDENCIAMENTO
        - OUTROS
      example: SEGURO
      description: Lista com a relação dos produtos e serviços com contrato vigente.
    CustomersPersonalProcurator:
      type: object
      required:
        - type
        - cpfNumber
        - civilName
      properties:
        type:
          $ref: '#/components/schemas/CustomersEnumProcuratorsTypePersonal'
        cpfNumber:
          type: string
          maxLength: 11
          pattern: '^\d{11}$'
          example: '73677831148'
          description: 'Número completo do CPF. O CPF é o Cadastro de Pessoa natural. Ele é um documento feito pela Receita Federal e serve para identificar os contribuintes. O CPF é uma numeração com 11 dígitos, que só mudam por decisão judicial. O documento é emitido pela receita federal'
        civilName:
          type: string
          maxLength: 70
          pattern: '[\w\W\s]*'
          example: Elza Milena Stefany Teixeira
          description: |
            Nome civil completo da pessoa natural (Direito fundamental da pessoa, o nome civil é aquele atribuído à pessoa natural desde o registro de seu nascimento, com o qual será identificada por toda a sua vida, bem como após a sua morte).

            Caso o nome civil informado exceda o limite de 70 caracteres, devem ser mantidos o primeiro e o último nome completos, realizando abreviação progressiva dos nomes intermediários (reduzindo-os às respectivas iniciais, seguidas de ponto), até que o nome se ajuste ao limite definido.
            Persistindo excesso após a abreviação de todos os intermediários, aplicar truncamento simples ao final do campo para respeitar o limite máximo. Não utilizar reticências.
        socialName:
          type: string
          maxLength: 70
          pattern: '[\w\W\s]*'
          example: Carlos
          description: 'Nome social da pessoa natural, se houver. (aquele pelo qual travestis e transexuais se reconhecem, bem como são identificados por sua comunidade e em seu meio social, conforme Decreto Nº 51.180, de 14 de janeiro de 2010)'
    CustomersEnumProcuratorsTypePersonal:
      type: string
      enum:
        - REPRESENTANTE_LEGAL
        - PROCURADOR
      example: PROCURADOR
      description: |
        Tipo de representante.
        Representante legal - Nome Civil completo da Pessoa Natural que represente uma entidade ou uma empresa e é nomeado em seu ato constitutivo, ou seja, no contrato social ou estatuto social.
        Procurador - é qualquer pessoa que represente a Pessoa Natural em algum negócio, mediante autorização escrita do mesmo.
    CustomersPersonalAccount:
      type: object
      description: |
        Lista de contas depósito à vista, poupança e pagamento pré-pagas mantidas pelo cliente na instituição transmissora e para as quais ele tenha fornecido consentimento
      required:
        - compeCode
        - number
        - checkDigit
        - type
        - subtype
      properties:
        compeCode:
          type: string
          maxLength: 3
          pattern: '^\d{3}$'
          description: 'Código identificador atribuído pelo Banco Central do Brasil às instituições participantes do STR (Sistema de Transferência de reservas).O Compe (Sistema de Compensação de Cheques e Outros Papéis) é um sistema que identifica e processa as compensações bancárias. Ele é representado por um código de três dígitos que serve como identificador de bancos, sendo assim, cada instituição bancária possui um número exclusivo'
          example: '001'
        branchCode:
          type: string
          maxLength: 4
          pattern: '^\d{4}$'
          description: |
            Código da Agência detentora da conta. (Agência é a dependência destinada ao atendimento aos clientes, ao público em geral e aos associados de cooperativas de crédito, no exercício de atividades da instituição, não podendo ser móvel ou transitória)
            [Restrição] Obrigatoriamente deve ser preenchido quando o campo "type" for diferente de conta pré paga.
          example: '6272'
        number:
          type: string
          maxLength: 20
          pattern: '^\d{8,20}$'
          description: |
            Número da conta
          example: '24550245'
        checkDigit:
          type: string
          maxLength: 1
          pattern: '[\w\W\s]*'
          description: |
            Dígito da conta
          example: '4'
        type:
          $ref: '#/components/schemas/CustomersEnumAccountTypeCustomers'
        subtype:
          type: string
          enum:
            - INDIVIDUAL
            - CONJUNTA_SIMPLES
            - CONJUNTA_SOLIDARIA
          description: |
            Subtipo de conta (vide Enum):
            Conta individual - possui um único titular
            Conta conjunta simples - onde as movimentações financeiras só podem serem realizadas mediante autorização de TODOS os correntistas da conta.
            Conta conjunta solidária - é a modalidade cujos titulares podem realizar movimentações de forma isolada, isto é, sem que seja necessária a autorização dos demais titulares.
          example: INDIVIDUAL
    CustomersEnumAccountTypeCustomers:
      type: string
      enum:
        - CONTA_DEPOSITO_A_VISTA
        - CONTA_POUPANCA
        - CONTA_PAGAMENTO_PRE_PAGA
      description: |
        Tipos de contas. Modalidades tradicionais previstas pela Resolução 4.753, não contemplando contas vinculadas, conta de domiciliados no exterior, contas em moedas estrangeiras e conta correspondente moeda eletrônica. Vide Enum:

        Conta de depósito à vista ou Conta corrente - é o tipo mais comum. Nela, o dinheiro fica à sua disposição para ser sacado a qualquer momento. Essa conta não gera rendimentos para o depositante.

        Conta poupança - foi criada para estimular as pessoas a pouparem. O dinheiro que ficar na conta por trinta dias passa a gerar rendimentos, com isenção de imposto de renda para quem declara. Ou seja, o dinheiro “cresce” (rende) enquanto ficar guardado na conta. Cada depósito terá rendimentos de mês em mês, sempre no dia do mês em que o dinheiro tiver sido depositado.

        Conta de pagamento pré-paga - segundo CIRCULAR Nº 3.680, BCB de  2013, é a 'destinada à execução de transações de pagamento em moeda eletrônica realizadas com base em fundos denominados em reais previamente aportados'.
      example: CONTA_DEPOSITO_A_VISTA
    CustomersPortabilitiesReceived:
      type: object
      required:
        - employerName
        - employerCnpjCpf
        - paycheckBankDetainerCnpj
        - paycheckBankDetainerIspb
        - portabilityApprovalDate
      properties:
        employerName:
          type: string
          pattern: '^[^\s](.*[^\s])?$'
          maxLength: 80
          description: |
            Nome do empregador conforme recebido pela comunicação de portabilidade. O empregador pode ser pessoa natural ou pessoa jurídica, quando se tratar de pessoa jurídica, deve haver o envio da razão social.
        employerCnpjCpf:
          type: string
          pattern: '^([0-9]{11}|[0-9A-Z]{12}[0-9]{2})$'
          maxLength: 14
          description: |
            Registro de inscrição (CPF/CNPJ) do empregador (contratante dos serviços de pagamento), conforme recebido pela comunicação de portabilidade.
        paycheckBankDetainerCnpj:
          type: string
          pattern: '^[0-9A-Z]{12}[0-9]{2}$'
          maxLength: 14
          description: |
            Registro de inscrição no Cadastro Nacional da Pessoa Jurídica (CNPJ) do banco folha (instituição detentora da conta salário) conforme recebido pela comunicação de portabilidade.
        paycheckBankDetainerIspb:
          type: string
          pattern: '^[0-9A-Z]{8}$'
          maxLength: 8
          description: |
            Registro do ISPB do Banco Folha (instituição detentora da conta salário) conforme recebido pela comunicação de portabilidade.
        portabilityApprovalDate:
          type: string
          format: date
          pattern: '^(\d{4})-(1[0-2]|0?[1-9])-(3[01]|[12][0-9]|0?[1-9])$'
          maxLength: 10
          description: |
            Data de aprovação da portabilidade, conforme recebido pela comunicação de portabilidade.

            Obs.: somente devem ser compartilhadas solicitações aprovadas, mesmo que de forma compulsória.
    CustomersPaychecksBankLink:
      type: object
      required:
        - employerName
        - employerCnpjCpf
        - paycheckBankCnpj
        - paycheckBankIspb
        - accountOpeningDate
      properties:
        employerName:
          type: string
          pattern: '^[^\s](.*[^\s])?$'
          maxLength: 80
          description: |
            Nome do empregador conforme registrado na abertura da conta salário. O empregador pode ser pessoa natural ou pessoa jurídica, quando se tratar de pessoa jurídica, deve haver o envio da razão social.
        employerCnpjCpf:
          type: string
          pattern: '^([0-9]{11}|[0-9A-Z]{12}[0-9]{2})$'
          maxLength: 14
          description: |
            Documento do empregador (CNPJ/CPF), conforme registrado na abertura da conta salário.
        paycheckBankCnpj:
          type: string
          pattern: '^[0-9A-Z]{12}[0-9]{2}$'
          maxLength: 14
          description: |
            CNPJ da instituição financeira contratada para prestar serviço de pagamento de salário (banco-folha).
        paycheckBankIspb:
          type: string
          pattern: '^[0-9A-Z]{8}$'
          maxLength: 8
          description: |
            Registro ISPB (Identificador do Sistema de Pagamentos Brasileiros) da instituição contratada para prestar serviço de pagamento de salário (banco-folha).
        accountOpeningDate:
          type: string
          format: date
          pattern: '^(\d{4})-(1[0-2]|0?[1-9])-(3[01]|[12][0-9]|0?[1-9])$'
          maxLength: 10
          description: |
            Data de abertura da conta salário.
    CustomersBusinessIdentificationData:
      type: object
      description: Conjunto de informações relativas a Identificação ou seja a ação e o efeito de identificar de forma única a pessoa jurídica através de seus dados cadastrais
      required:
        - businessId
        - updateDateTime
        - brandName
        - cnpjNumber
        - companiesCnpj
        - companyName
        - incorporationDate
        - parties
        - contacts
      properties:
        updateDateTime:
          type: string
          maxLength: 20
          format: date-time
          example: '2021-05-21T08:30:00Z'
          description: |
            Data e hora da atualização dos campos \<_endpoint_\>, conforme especificação RFC-3339, formato UTC. Quando não existente uma data vinculada especificamente ao bloco, assumir a data e hora de atualização do cadastro como um todo.
        businessId:
          type: string
          maxLength: 100
          minLength: 1
          pattern: '^[a-zA-Z0-9][a-zA-Z0-9-]{0,99}$'
          example: 578-psd-71md6971kjh-2d414
          description: Um identificador único e imutável usado para identificar o recurso cliente pessoa jurídica. Este identificador não tem significado para o cliente que deu o consentimento
        brandName:
          type: string
          maxLength: 80
          pattern: '[\w\W\s]*'
          example: Organização A
          description: |
            Nome da Marca reportada pelo participante no Open Finance. Recomenda-se utilizar, sempre que possível, o mesmo nome de marca atribuído no campo do diretório Customer Friendly Server Name (Authorisation Server).
        companyName:
          type: string
          maxLength: 144
          pattern: '[\w\W\s]*'
          example: Luiza e Benjamin Assessoria Jurídica Ltda
          description: Razão social da empresa consultada é o termo registrado sob o qual uma pessoa jurídica (PJ) se individualiza e exerce suas atividades. Também pode ser chamada por denominação social ou firma empresarial
        tradeName:
          type: string
          maxLength: 70
          pattern: '[\w\W\s]*'
          example: Mundo da Eletronica
          description: 'Nome fantasia da pessoa jurídica, se houver. (É o nome popular da empresa, utilizado para divulgação da empresa e melhor fixação com o público). De preenchimento obrigatório se houver'
        incorporationDate:
          type: string
          maxLength: 20
          format: date-time
          example: '2021-05-21T08:30:00Z'
          description: 'Data de constituição da empresa, conforme especificação RFC-3339.'
        cnpjNumber:
          type: string
          maxLength: 14
          pattern: '^[0-9A-Z]{12}[0-9]{2}$'
          example: '50685362006773'
          description: |
            Número completo do CNPJ da Empresa consultada - o CNPJ corresponde a representação alfanumérica da inscrição no Cadastro de Pessoa Jurídica.
            Deve-se ter apenas caracteres do CNPJ, sem máscara
        companiesCnpj:
          minItems: 1
          type: array
          example:
            - '50685362000135'
            - '50685362006555'
          description: |
            Representação alfanumérica completa do CNPJ da instituição responsável pelo Cadastro - o CNPJ corresponde a representação alfanumérica de inscrição no Cadastro de Pessoa Jurídica.
            Deve-se ter apenas os caracteres do CNPJ, sem máscara.
          items:
            type: string
            maxLength: 14
            pattern: '^[0-9A-Z]{12}[0-9]{2}$'
            example: '50685362000135'
        otherDocuments:
          type: array
          minItems: 1
          items:
            $ref: '#/components/schemas/CustomersBusinessOtherDocument'
          description: Relação dos demais documentos
        parties:
          type: array
          items:
            $ref: '#/components/schemas/CustomersPartiesParticipation'
          minItems: 0
          description: |
            Lista relativa às informações das partes envolvidas, como: sócio e/ou administrador. Objeto de envio obrigatório para todos os CNPJs que possuam sócios e/ou administradores no cadastro do QSA (Quadro de Sócios e Administradores)
        contacts:
          $ref: '#/components/schemas/CustomersBusinessContacts'
    CustomersBusinessOtherDocument:
      type: object
      required:
        - type
        - number
        - country
      properties:
        type:
          type: string
          maxLength: 20
          pattern: '[\w\W\s]*'
          example: EIN
          description: 'Número do Tipo de documento informado. De preenchimento obrigatório, para a Pessoa jurídica com domicílio ou sede no exterior, desobrigada de inscrição no CNPJ'
        number:
          type: string
          maxLength: 20
          pattern: '[\w\W\s]*'
          example: '128328453'
          description: 'Número do outro documento. De preenchimento obrigatório, para a Pessoa jurídica com domicílio ou sede no exterior, desobrigada de inscrição no CNPJ'
        country:
          type: string
          maxLength: 3
          pattern: '^(\w{3}){1}$'
          example: CAN
          description: Pais de emissão do tipo de documento informado. Código do pais de acordo com o código alpha3 do ISO-3166
        expirationDate:
          type: string
          format: date
          maxLength: 10
          pattern: '^(\d{4})-(1[0-2]|0?[1-9])-(3[01]|[12][0-9]|0?[1-9])$'
          example: '2021-05-21'
          description: 'Data vigência do tipo de  documento informado, conforme especificação RFC-3339.'
    CustomersPartiesParticipation:
      type: object
      description: |
        Lista relativa às informações das partes envolvidas, como: sócio e /ou administrador
      required:
        - type
        - personType
        - documentType
        - documentNumber
      properties:
        personType:
          type: string
          enum:
            - PESSOA_NATURAL
            - PESSOA_JURIDICA
          description: Indica se a pessoa da parte envolvida é uma pessoa natural ou juridica
        type:
          type: string
          description: |
            Indica o perfil de atuação na empresa. Vide Enum
            O administrador é o responsável por desempenhar todas as funções administrativas da empresa. É ele quem conduz o dia a dia do negócio, assinando documentos, respondendo legalmente pela sociedade, realizando empréstimos e outras ações gerenciais. Apesar de estar na linha de frente da empresa, ele é denominado sócio por também possuir sua parcela de participação no Capital Social.
            Sócio não tem qualquer envolvimento nas atividades administrativas da sociedade.
          enum:
            - SOCIO
            - ADMINISTRADOR
        civilName:
          type: string
          maxLength: 70
          pattern: '[\w\W\s]*'
          example: Juan Kaique Cláudio Fernandes
          description: |
            Nome civil completo da pessoa natural (Direito fundamental da pessoa, o nome civil é aquele atribuído à pessoa natural desde o registro de seu nascimento, com o qual será identificada por toda a sua vida, bem como após a sua morte).

            Caso o nome civil informado exceda o limite de 70 caracteres, devem ser mantidos o primeiro e o último nome completos, realizando abreviação progressiva dos nomes intermediários (reduzindo-os às respectivas iniciais, seguidas de ponto), até que o nome se ajuste ao limite definido.
            Persistindo excesso após a abreviação de todos os intermediários, aplicar truncamento simples ao final do campo para respeitar o limite máximo. Não utilizar reticências.

            [Restrição] O campo civilName deve ser obrigatoriamente preenchido quando personType for PESSOA_NATURAL.
        socialName:
          type: string
          maxLength: 70
          pattern: '[\w\W\s]*'
          example: Karina
          description: |
            Nome social da pessoa natural, se houver. (aquele pelo qual travestis e transexuais se reconhecem, bem como são identificados por sua comunidade e em seu meio social, conforme Decreto Local).
        companyName:
          type: string
          maxLength: 144
          pattern: '[\w\W\s]*'
          example: Luiza e Benjamin Assessoria Jurídica Ltda
          description: |
            Razão social da empresa consultada é o termo registrado sob o qual uma pessoa jurídica (PJ) se individualiza e exerce suas atividades. Também pode ser chamada por denominação social ou firma empresarial

            [Restrição] o campo companyName deve ser obrigatoriamente preenchido quando personType for PESSOA_JURIDICA.
        tradeName:
          type: string
          maxLength: 70
          pattern: '[\w\W\s]*'
          example: Mundo da Eletronica
          description: 'Nome fantasia da pessoa jurídica, se houver. (É o nome popular da empresa, utilizado para divulgação da empresa e melhor fixação com o público). De preenchimento obrigatório se houver'
        startDate:
          type: string
          maxLength: 20
          format: date-time
          pattern: '^(\d{4})-(1[0-2]|0?[1-9])-(3[01]|[12][0-9]|0?[1-9])T(?:[01]\d|2[0123]):(?:[012345]\d):(?:[012345]\d)Z$'
          example: '2021-05-21T08:30:00Z'
          description: 'Data de início da participação, conforme especificação RFC-3339.'
        shareholding:
          type: string
          format: double
          maxLength: 8
          minLength: 8
          pattern: '^[01]\.\d{6}$'
          example: '0.510000'
          description: |
            Percentual de participação societária (informar com 6 casas decimais). O Sócio só deve ser informado se sua participação societária for igual ou superior a 25%. p.ex: 0.250000 (Este valor  representa 25%. O valor '1 'representa 100%).

            [Restrição]: Campo obrigatório caso o type for igual a SOCIO e este tiver participação societária maior que 25%.
        documentType:
          $ref: '#/components/schemas/CustomersEnumPartiesParticipationDocumentType'
        documentNumber:
          type: string
          maxLength: 20
          pattern: '[\w\W\s]*'
          example: '73677831148'
          description: Número do documento informado. Campo Texto Livre para preencher número e dígito do documento se houver
        documentAdditionalInfo:
          type: string
          maxLength: 100
          pattern: '[\w\W\s]*'
          example: CNH
          description: 'Campo livre, de preenchimento obrigatório quando o documento informado tiver informações complementares relevantes para a sua identificação'
        documentCountry:
          type: string
          maxLength: 3
          pattern: '[\w\W\s]*'
          example: CAN
          description: |
            País de emissão do documento. Código do pais de acordo com o código alpha3 do ISO-3166.
        documentExpirationDate:
          type: string
          format: date
          maxLength: 10
          example: '2021-05-21'
          pattern: '^(\d{4})-(1[0-2]|0?[1-9])-(3[01]|[12][0-9]|0?[1-9])$'
          description: 'Data de validade do documento informado, conforme especificação RFC-3339.'
        documentIssueDate:
          type: string
          maxLength: 10
          format: date
          pattern: '^(\d{4})-(1[0-2]|0?[1-9])-(3[01]|[12][0-9]|0?[1-9])$'
          example: '2021-05-21'
          description: 'Data de emissão do documento, conforme especificação RFC-3339.'
    CustomersEnumPartiesParticipationDocumentType:
      type: string
      enum:
        - CPF
        - PASSAPORTE
        - OUTRO_DOCUMENTO_VIAGEM
        - CNPJ
      description: |
        Tipo do documento informado.
    CustomersBusinessContacts:
      type: object
      description: Conjunto de informações referentes às formas para contatar o cliente.
      required:
        - postalAddresses
        - phones
        - emails
      properties:
        postalAddresses:
          type: array
          items:
            $ref: '#/components/schemas/CustomersBusinessPostalAddress'
          minItems: 0
          description: Lista de endereços da pessoa jurídica
        phones:
          type: array
          items:
            $ref: '#/components/schemas/CustomersCustomerPhone'
          minItems: 0
          description: Lista com telefones de contato da pessoa jurídica
        emails:
          type: array
          items:
            $ref: '#/components/schemas/CustomersCustomerEmail'
          minItems: 0
          description: Lista e-mails de contato
    CustomersBusinessPostalAddress:
      type: object
      required:
        - isMain
        - townName
        - country
        - countryCode
      properties:
        isMain:
          type: boolean
          example: true
          description: Indica se o endereço informado é o principal
        address:
          type: string
          maxLength: 150
          minLength: 2
          pattern: '^[\w\W\s]*$'
          example: 'Av Naburo Ykesaki, 1270'
          description: |
            Corresponde ao endereço comercial do cliente.
        additionalInfo:
          type: string
          maxLength: 30
          pattern: '[\w\W\s]*'
          example: Fundos
          description: Alguns logradouros ainda necessitam ser especificados por meio de complemento
        districtName:
          type: string
          maxLength: 50
          pattern: '[\w\W\s]*'
          example: Centro
          description: |
            Bairro é uma comunidade ou região localizada em uma cidade ou município de acordo com as suas subdivisões geográficas. Preenchimento obrigatório, se houver.
        townName:
          type: string
          maxLength: 50
          pattern: '^[\w\W\s]*$'
          minLength: 2
          example: Marília
          description: |
            Localidade: O nome da localidade corresponde à designação da cidade ou município no qual o endereço está localizado.
        ibgeTownCode:
          type: string
          pattern: '\d{7}$'
          maxLength: 7
          example: '3550308'
          description: 'Código IBGE de Município. A Tabela de Códigos de Municípios do IBGE apresenta a lista dos municípios brasileiros associados a um código composto de 7 dígitos, sendo os dois primeiros referentes ao código da Unidade da Federação.'
        countrySubDivision:
          $ref: '#/components/schemas/CustomersEnumCountrySubDivision'
        postCode:
          type: string
          pattern: '^\d{8}$'
          maxLength: 8
          example: '17500001'
          description: |
            Código de Endereçamento Postal: Composto por um conjunto numérico de oito dígitos, o objetivo principal do CEP é orientar e acelerar o encaminhamento, o tratamento e a entrega de objetos postados nos Correios, por meio da sua atribuição a localidades, logradouros, unidades dos Correios, serviços, órgãos públicos, empresas e edifícios. p.ex. '01311000'
        country:
          type: string
          maxLength: 80
          pattern: '[\w\W\s]*'
          example: Brasil
          description: Nome do país
        countryCode:
          type: string
          maxLength: 3
          pattern: '^([A-Z]{3})$'
          example: BRA
          description: Código do pais de acordo com o código alpha3 do ISO-3166
        geographicCoordinates:
          $ref: '#/components/schemas/CustomersGeographicCoordinates'
    CustomersBusinessQualificationData:
      type: object
      description: 'Objeto que reúne as informações relativas ao processo de qualificação. Considera-se qualificação as informações que permitam as instituições apreciar, avaliar, caracterizar e classificar o cliente com a finalidade de conhecer o seu perfil de risco e sua capacidade econômico-financeira'
      required:
        - updateDateTime
      properties:
        updateDateTime:
          type: string
          maxLength: 20
          format: date-time
          example: '2021-05-21T08:30:00Z'
          description: |
            Data e hora da atualização dos campos \<_endpoint_\>, conforme especificação RFC-3339, formato UTC. Quando não existente uma data vinculada especificamente ao bloco, assumir a data e hora de atualização do cadastro como um todo.
        economicActivities:
          type: array
          items:
            $ref: '#/components/schemas/CustomersEconomicActivity'
          minItems: 0
          description: 'Lista dos demais códigos relativos às demais atividades econômicas da empresa, segundo padrão CNAE (Classificação Nacional de Atividades Econômicas). De preenchimento obrigatório, se houver'
        informedRevenue:
          $ref: '#/components/schemas/CustomersInformedRevenue'
        informedPatrimony:
          $ref: '#/components/schemas/CustomersBusinessInformedPatrimony'
    CustomersEconomicActivity:
      type: object
      required:
        - code
        - isMain
      properties:
        code:
          type: string
          pattern: '^\d{7}$'
          description: |
            Traz o código do ramo da atividade principal da empresa consultada, segundo padrão CNAE (Classificação Nacional de Atividades Econômicas)

            [Observação] O campo sempre deve ser enviado com 7 caracteres, seguindo a classificação “CNAE-Subclasse 2.3”. Em casos em que o valor inicie com zeros, ele deve conter todos os caracteres, incluindo os zeros.
          example: '0600001'
        isMain:
          type: boolean
          description: 'Indica se é o ramo principal de atividade da empresa quando true e se é o ramo secundário quando false. [Restrição] Somente uma ocorrência relativa ao código da atividade econômica principal deve trazer o valor true.'
          example: true
    CustomersInformedRevenue:
      type: object
      required:
        - amount
      properties:
        frequency:
          $ref: '#/components/schemas/CustomersEnumInformedRevenueFrequency'
        frequencyAdditionalInfo:
          type: string
          maxLength: 100
          pattern: '[\w\W\s]*'
          example: Informações adicionais
          description: |
            Texto livre para complementar informação relativa ao patrimonio.

            [Restrição] Preencher quando frequency for igual OUTROS.
        amount:
          $ref: '#/components/schemas/CustomersInformedRevenueAmount'
        year:
          type: number
          maximum: 9999
          example: 2010
          description: 'Ano de referência da Renda, conforme especificação RFC-3339.'
    CustomersEnumInformedRevenueFrequency:
      type: string
      description: |
        Traz a frequência ou período do faturamento informado.
        "O faturamento é calculado a partir de todos os benefícios que a empresa conseguiu com sua atividade econômica em um determinado período. Esses benefícios são os rendimentos ou ganhos da organização através de suas vendas ou serviços prestados".
      enum:
        - DIARIA
        - SEMANAL
        - QUINZENAL
        - MENSAL
        - BIMESTRAL
        - TRIMESTRAL
        - SEMESTRAL
        - ANUAL
        - OUTROS
      example: DIARIA
    CustomersInformedRevenueAmount:
      type: object
      required:
        - amount
        - currency
      description: Valor do patrimônio informado
      properties:
        amount:
          description: |
            Valor do patrimônio informado. Expresso em valor monetário com no mínimo 2 casas e no máximo 4 casas decimais.
            Patrimônio é o conjunto de bens vinculado a uma pessoa ou a uma entidade.
          type: string
          pattern: '^-?\d{1,15}\.\d{2,4}$'
          maxLength: 21
          minLength: 4
          example: '100000.0400'
        currency:
          type: string
          pattern: '^[A-Z]{3}$'
          maxLength: 3
          description: 'Moeda referente ao valor monetário, seguindo o modelo ISO-4217.'
          example: BRL
    CustomersBusinessInformedPatrimony:
      type: object
      required:
        - amount
        - date
      properties:
        amount:
          $ref: '#/components/schemas/CustomersInformedPatrimonyAmount'
        date:
          type: string
          format: date
          maxLength: 20
          pattern: '^(\d{4})-(1[0-2]|0?[1-9])-(3[01]|[12][0-9]|0?[1-9])$'
          example: '2021-05-21'
          description: 'Data de referência do Patrimônio, conforme especificação RFC-3339.'
    CustomersBusinessFinancialRelationData:
      type: object
      description: 'Objeto que reúne as informações relativas ao relacionamento do cliente junto à Instituição. Considera-se relacionamento as informações que permitam conhecer desde quando a pessoa consultada é cliente da instituição, bem como um indicador dos produtos e serviços que ela consome atualmente e seus representantes'
      required:
        - updateDateTime
        - startDate
        - productsServicesType
        - procurators
        - accounts
      properties:
        updateDateTime:
          type: string
          format: date-time
          maxLength: 20
          pattern: '^(\d{4})-(1[0-2]|0?[1-9])-(3[01]|[12][0-9]|0?[1-9])T(?:[01]\d|2[0123]):(?:[012345]\d):(?:[012345]\d)Z$'
          example: '2020-07-21T08:30:00Z'
          description: |
            Data e hora da atualização dos campos \<_endpoint_\>, conforme especificação RFC-3339, formato UTC. Quando não existente uma data vinculada especificamente ao bloco, assumir a data e hora de atualização do cadastro como um todo.
        startDate:
          type: string
          format: date-time
          maxLength: 20
          pattern: '^(\d{4})-(1[0-2]|0?[1-9])-(3[01]|[12][0-9]|0?[1-9])T(?:[01]\d|2[0123]):(?:[012345]\d):(?:[012345]\d)Z$'
          example: '2020-07-21T08:30:00Z'
          description: Data de início de relacionamento com a Instituição Financeira. Deve trazer o menor valor entre a informação reportada ao BACEN pelo DOC 3040 e CCS.
        productsServicesType:
          type: array
          minItems: 1
          maxItems: 12
          items:
            $ref: '#/components/schemas/CustomersEnumProductServiceType'
        procurators:
          type: array
          items:
            $ref: '#/components/schemas/CustomersBusinessProcurator'
          minItems: 0
          description: Lista dos representantes. De preenchimento obrigatório se houver representante.
        accounts:
          type: array
          items:
            $ref: '#/components/schemas/CustomersBusinessAccount'
          minItems: 0
          description: |
            Lista de contas depósito à vista, poupança e pagamento pré-pagas mantidas pelo cliente na instituição transmissora.
    CustomersBusinessProcurator:
      type: object
      required:
        - type
        - cnpjCpfNumber
        - civilName
      properties:
        type:
          type: string
          enum:
            - REPRESENTANTE_LEGAL
            - PROCURADOR
          description: |
            Tipo de representante.
            Representante legal - Nome Civil completo da Pessoa Natural que represente uma entidade ou uma empresa e é nomeado em seu ato constitutivo, ou seja, no contrato social ou estatuto social.
            Procurador - é qualquer pessoa que represente a Pessoa Natural em algum negócio, mediante autorização escrita do mesmo.
          example: PROCURADOR
        cnpjCpfNumber:
          type: string
          maxLength: 14
          pattern: '^([0-9]{11}|[0-9A-Z]{12}[0-9]{2})$'
          example: '73677831148'
          description: Identificação do Representante Legal ou Procurador. Registro do cadastro na Receita Federal (Preencher com CPF ou CNPJ sem formatação).
        civilName:
          type: string
          maxLength: 70
          pattern: '[\w\W\s]*'
          example: Elza Milena Stefany Teixeira
          description: |
            Nome civil completo da pessoa natural (Direito fundamental da pessoa, o nome civil é aquele atribuído à pessoa natural desde o registro de seu nascimento, com o qual será identificada por toda a sua vida, bem como após a sua morte).

            Caso o nome civil informado exceda o limite de 70 caracteres, devem ser mantidos o primeiro e o último nome completos, realizando abreviação progressiva dos nomes intermediários (reduzindo-os às respectivas iniciais, seguidas de ponto), até que o nome se ajuste ao limite definido.
            Persistindo excesso após a abreviação de todos os intermediários, aplicar truncamento simples ao final do campo para respeitar o limite máximo. Não utilizar reticências.
        socialName:
          type: string
          maxLength: 70
          pattern: '[\w\W\s]*'
          example: Stefany Teixeirass
          description: |
            Nome social da pessoa natural, se houver.
            bem como são identificados por sua comunidade e em seu meio social, conforme Decreto Local.
    CustomersBusinessAccount:
      type: object
      required:
        - compeCode
        - number
        - checkDigit
        - type
      properties:
        compeCode:
          type: string
          maxLength: 3
          pattern: '^\d{3}$'
          description: 'Código identificador atribuído pelo Banco Central do Brasil às instituições participantes do STR (Sistema de Transferência de reservas).O Compe (Sistema de Compensação de Cheques e Outros Papéis) é um sistema que identifica e processa as compensações bancárias. Ele é representado por um código de três dígitos que serve como identificador de bancos, sendo assim, cada instituição bancária possui um número exclusivo'
          example: '001'
        branchCode:
          type: string
          maxLength: 4
          pattern: '^\d{4}$'
          description: |
            Código da Agência detentora da conta. (Agência é a dependência destinada ao atendimento aos clientes, ao público em geral e aos associados de cooperativas de crédito, no exercício de atividades da instituição, não podendo ser móvel ou transitória)
            [Restrição] Obrigatoriamente deve ser preenchido quando o campo "type" for diferente de conta pré paga.
          example: '6272'
        number:
          type: string
          maxLength: 20
          pattern: '^\d{8,20}$'
          description: |
            Número da conta
          example: '24550245'
        checkDigit:
          type: string
          maxLength: 1
          pattern: '[\w\W\s]*'
          description: |
            Dígito da conta
          example: '4'
        type:
          $ref: '#/components/schemas/CustomersEnumAccountTypeCustomers'
    CreditCardsAccountsAccountPaymentMethod:
      description: Conjunto de informações relativas aos Meios de Pagamento da Conta de pagamento pós-paga
      properties:
        identificationNumber:
          description: 'Número de identificação do cartão: corresponde aos 4 últimos dígitos do cartão para pessoa natural, ou então, preencher com um identificador para pessoa jurídica, com as características definidas para os IDs no Open Finance.

            '
          example: '4453'
          maxLength: 100
          minLength: 1
          pattern: ^[a-zA-Z0-9][a-zA-Z0-9-]{0,99}$
          type: string
        isMultipleCreditCard:
          description: 'Indica se o Cartão de crédito associado à conta pagamento pós-paga é múltiplo ou não. Cartões denominados múltiplos possuem tanto a função crédito quanto a função débito, devendo o proprietário do cartão, no momento de sua utilização, informar se o pagamento é na função crédito (que leva a um pagamento futuro, por meio de uma fatura do cartão de crédito) ou na função débito.

            '
          example: true
          type: boolean
      required:
      - identificationNumber
      - isMultipleCreditCard
      type: object
    CreditCardsAccountsAvailableAmount:
      description: "Valor disponível do limite informado   \n"
      properties:
        amount:
          description: 'Valor disponível do limite informado expresso em valor monetário com no mínimo 2 casas e no máximo 4 casas decimais.


            [Restrição] O campo é obrigatório caso isLimitFlexible for igual a false.

            '
          example: '1000.0400'
          format: double
          maxLength: 21
          minLength: 4
          pattern: ^-?\d{1,15}\.\d{2,4}$
          type: string
        currency:
          description: "Moeda referente ao limite informado, segundo modelo ISO-4217. p.ex. 'BRL.'\nTodos os saldos informados estão representados com a moeda vigente do Brasil.  \n\n[Restrição] O campo é obrigatório caso isLimitFlexible for igual a false.\n"
          example: BRL
          maxLength: 3
          pattern: ^[A-Z]{3}$
          type: string
      type: object
    CreditCardsAccountsBillMinimumAmount:
      description: 'Valor do pagamento minimo da fatura

        '
      properties:
        amount:
          description: Valor do pagamento minimo da fatura
          example: '1000.0400'
          format: double
          maxLength: 20
          minLength: 4
          pattern: ^\d{1,15}\.\d{2,4}$
          type: string
        currency:
          description: Moeda referente ao valor monetário, seguindo o modelo ISO-4217.
          example: BRL
          maxLength: 3
          pattern: ^[A-Z]{3}$
          type: string
      required:
      - amount
      - currency
      type: object
    CreditCardsAccountsBillTotalAmount:
      description: 'Valor total da faturas.

        O campo deve assumir valor positivo para saldo devedor e negativo para saldo credor.

        '
      properties:
        amount:
          description: Valor total da faturas. Expresso em valor monetário com no mínimo 2 casas e no máximo 4 casas decimais.
          example: '1000.0400'
          format: double
          maxLength: 21
          minLength: 4
          pattern: ^-?\d{1,15}\.\d{2,4}$
          type: string
        currency:
          description: Moeda referente ao valor monetário, seguindo o modelo ISO-4217.
          example: BRL
          maxLength: 3
          pattern: ^[A-Z]{3}$
          type: string
      required:
      - amount
      - currency
      type: object
    CreditCardsAccountsBillsData:
      description: Conjunto das informações referentes a lista de faturas associadas à conta de pagamento pós-paga
      properties:
        billClosingDate:
          description: data de fechamento da Fatura
          example: '2021-05-21'
          format: date
          maxLength: 10
          pattern: ^(\d{4})-(1[0-2]|0?[1-9])-(3[01]|[12][0-9]|0?[1-9])$
          type: string
        billId:
          description: Código único e imutável que identifica a fatura.
          example: 3459087XXZTR
          maxLength: 100
          minLength: 1
          pattern: ^[a-zA-Z0-9][a-zA-Z0-9-]{0,99}$
          type: string
        billMinimumAmount:
          $ref: '#/components/schemas/CreditCardsAccountsBillMinimumAmount'
        billTotalAmount:
          $ref: '#/components/schemas/CreditCardsAccountsBillTotalAmount'
        dueDate:
          description: Data de vencimento da Fatura, que aparece para pagamento pelo cliente
          example: '2021-05-21'
          format: date
          maxLength: 10
          pattern: ^(\d{4})-(1[0-2]|0?[1-9])-(3[01]|[12][0-9]|0?[1-9])$
          type: string
        financeCharges:
          description: Lista dos encargos cobrados na fatura
          items:
            $ref: '#/components/schemas/CreditCardsAccountsBillsFinanceCharge'
          minItems: 1
          type: array
        isInstalment:
          description: Indica se a fatura permite parcelamento (true) ou não (false).
          example: false
          type: boolean
        payments:
          description: 'Lista que traz os valores relativos aos pagamentos da Fatura da conta de pagamento pós-paga.

            Pagamentos efetuados a partir do momento que uma nova fatura é fechada e exposta, devem estar listados na fatura fechada, até que haja um novo fechamento.

            '
          items:
            $ref: '#/components/schemas/CreditCardsAccountsBillsPayment'
          minItems: 0
          type: array
      required:
      - billId
      - dueDate
      - billClosingDate
      - billTotalAmount
      - billMinimumAmount
      - isInstalment
      - payments
      type: object
    CreditCardsAccountsBillsFinanceCharge:
      properties:
        additionalInfo:
          description: Campo livre, de preenchimento obrigatório se selecionado tipo de encargo 'OUTROS'
          example: Informações Adicionais
          maxLength: 140
          pattern: '[\w\W\s]*'
          type: string
        amount:
          description: Valor cobrado pelo encargo. Expresso em valor monetário com no mínimo 2 casas e no máximo 4 casas decimais.
          example: '100000.0400'
          format: double
          maxLength: 20
          minLength: 4
          pattern: ^\d{1,15}\.\d{2,4}$
          type: string
        currency:
          description: "Moeda referente ao valor cobrado pelo encargo, segundo modelo ISO-4217. p.ex. 'BRL' \nTodos os saldos informados estão representados com a moeda vigente do Brasil.\n"
          example: BRL
          maxLength: 3
          pattern: ^(\w{3}){1}$
          type: string
        type:
          $ref: '#/components/schemas/CreditCardsAccountsEnumCreditCardAccountsFinanceChargeType'
      required:
      - type
      - amount
      - currency
      type: object
    CreditCardsAccountsBillsPayment:
      properties:
        amount:
          description: "Valor pagamento segundo o valueType.  \nExpresso em valor monetário com no mínimo 2 casas e no máximo 4 casas decimais.   \nO campo não pode assumir valor negativo por se tratar de um pagamento.\n"
          example: '1000.0400'
          format: double
          maxLength: 20
          minLength: 4
          pattern: ^\d{1,15}\.\d{2,4}$
          type: string
        currency:
          description: 'Moeda referente ao valor de pagamento da fatura, segundo modelo ISO-4217. p.ex. ''BRL'' Todos os valores informados estão representados com a moeda vigente do Brasil

            '
          example: BRL
          maxLength: 3
          pattern: ^(\w{3}){1}$
          type: string
        paymentDate:
          description: Data efetiva de quando o Pagamento da fatura foi realizado
          example: '2021-05-21'
          format: date
          maxLength: 10
          pattern: ^(\d{4})-(1[0-2]|0?[1-9])-(3[01]|[12][0-9]|0?[1-9])$
          type: string
        paymentMode:
          $ref: '#/components/schemas/CreditCardsAccountsEnumCreditCardAccountsPaymentMode'
        valueType:
          $ref: '#/components/schemas/CreditCardsAccountsEnumCreditCardAccountsBillingValueType'
      required:
      - valueType
      - paymentDate
      - paymentMode
      - amount
      - currency
      type: object
    CreditCardsAccountsBillsTransactions:
      description: Lista que traz os valores relativos aos saldos do Limite de crédito total da conta de pagamento pós-paga
      properties:
        amount:
          $ref: '#/components/schemas/CreditCardsAccountsTransactionAmountBills'
        billId:
          description: Código único e imutável que identifica a fatura onde consta a transação informada.
          example: MTU0OTU1NjI2NTk4OTRmc2ZhZDRmc2Q1NmZkM
          maxLength: 100
          minLength: 1
          pattern: ^[a-zA-Z0-9][a-zA-Z0-9-]{0,99}$
          type: string
        billPostDate:
          description: 'Data em que a transação foi inserida na fatura.

            '
          example: '2021-05-21'
          format: date
          maxLength: 20
          pattern: ^(\d{4})-(1[0-2]|0?[1-9])-(3[01]|[12][0-9]|0?[1-9])$
          type: string
        brazilianAmount:
          $ref: '#/components/schemas/CreditCardsAccountsTransactionBrazilianAmountBills'
        chargeIdentificator:
          description: 'Número da parcela que está sendo informada.


            [Restrição] Preenchimento obrigatório se Tipo de Pagamento (paymentType) selecionada for ''A_PRAZO''.

            '
          example: 12
          format: integer
          maximum: 999
          minimum: 1
          type: number
        chargeNumber:
          description: "Quantidade de parcelas.   \n[Restrição] O campo deve ser preenchido quando houverem parcelas relacionadas a transação.\n"
          example: 12
          format: integer
          maximum: 999
          type: number
        creditDebitType:
          $ref: '#/components/schemas/EnumCreditDebitIndicator'
        feeType:
          $ref: '#/components/schemas/CreditCardsAccountsEnumCreditCardAccountFee'
        feeTypeAdditionalInfo:
          description: Campo livre, de preenchimento obrigatório quando selecionada tipo de tarifa "OUTRA"
          maxLength: 140
          pattern: ^\S[\s\S]*$
          type: string
        identificationNumber:
          description: 'Número de identificação do cartão: corresponde aos 4 últimos dígitos do cartão para PF, ou então, preencher com um identificador para PJ, com as caracteristicas definidas para os IDs no Open Finance.

            '
          example: '4453'
          maxLength: 100
          minLength: 1
          pattern: ^[a-zA-Z0-9][a-zA-Z0-9-]{0,99}$
          type: string
        otherCreditsAdditionalInfo:
          description: 'Campo livre para preenchimento de dados adicionais de outros tipos de crédito contratados no cartão.


            [Restrição] Preenchimento obrigatório quando selecionado no campo outros tipos de crédito "OUTROS".

            '
          maxLength: 50
          pattern: ^\S[\s\S]*$
          type: string
        otherCreditsType:
          $ref: '#/components/schemas/CreditCardsAccountsEnumCreditCardAccountsOtherCreditType'
        payeeMCC:
          description: 'O MCC ou o código da categoria do estabelecimento comercial. Os MCCs são agrupados segundo suas similaridades. O MCC é usado para classificar o negócio pelo tipo fornecido de bens ou serviços. Os MCCs são atribuídos por tipo de comerciante (por exemplo, um para hotéis, um para lojas de materiais de escritório, etc.) ou por nome de comerciante (por exemplo, 3000 para a United Airlines).


            [Restrição] Informação de envio obrigatório quando o valor do campo transactionType for igual a PAGAMENTO.

            '
          example: 5137
          format: integer
          maximum: 2147483647
          type: number
        paymentType:
          $ref: '#/components/schemas/CreditCardsAccountsEnumCreditCardAccountsPaymentType'
        transactionDateTime:
          description: "Data e hora da transação.   \n\nNas compras parceladas, o `transactionDateTime` deve ser idêntico em todas as parcelas. O campo deve obrigatoriamente refletir a informação exibida ao cliente nos canais digitais da instituição, com precisão de data, hora e minuto — mesmo que a instituição não exiba esse nível de granularidade em seus canais. Nesses casos, os segundos e milissegundos podem ser preenchidos com zero (0). Exemplo: 2024-01-29T11:15:00.000Z.\n"
          example: '2016-01-29T12:29:03.374Z'
          format: date-time
          maxLength: 24
          pattern: (^(\d{4})-(1[0-2]|0?[1-9])-(3[01]|[12][0-9]|0?[1-9])T(?:[01]\d|2[0123]):(?:[012345]\d):(?:[012345]\d)\.(?:[0-9]){3}Z$)
          type: string
        transactionId:
          description: "Código ou identificador único prestado pela instituição que mantém a conta para representar a transação individual. \nÉ esperado que o `transactionId` seja único, imutável e estável.\n"
          example: TXpRMU9UQTROMWhZV2xSU1FUazJSMDl
          maxLength: 100
          minLength: 1
          pattern: ^[a-zA-Z0-9][a-zA-Z0-9-]{0,99}$
          type: string
        transactionName:
          description: Literal usada na instituição financeira para identificar a transação. A informação apresentada precisa ser a mesma utilizada nos canais eletrônicos da instituição (extrato e fatura).
          example: PGTO
          maxLength: 200
          pattern: '[\w\W\s]*'
          type: string
        transactionType:
          $ref: '#/components/schemas/EnumCreditCardTransactionType'
        transactionalAdditionalInfo:
          description: Campo livre, de preenchimento obrigatório quando selecionado tipo de transação "OUTROS"
          maxLength: 140
          pattern: ^\S[\s\S]*$
          type: string
      required:
      - transactionId
      - identificationNumber
      - transactionName
      - creditDebitType
      - transactionType
      - brazilianAmount
      - amount
      - transactionDateTime
      - billPostDate
      type: object
    CreditCardsAccountsData:
      description: Conjunto de informações das Contas de pagamento pós paga
      properties:
        brandName:
          description: Nome da Marca reportada pelo participante no Open Finance. Recomenda-se utilizar, sempre que possível, o mesmo nome de marca atribuído no campo do diretório Customer Friendly Server Name (Authorisation Server).
          example: Organização A
          maxLength: 80
          pattern: '[\w\W\s]*'
          type: string
        companyCnpj:
          description: Registro completo do CNPJ da instituição responsável pelo Cadastro – o CNPJ corresponde a representação alfanumérica da inscrição no Cadastro de Pessoa Jurídica. Deve-se ter apenas os caracteres do CNPJ, sem máscara.
          example: '21128159000166'
          maxLength: 14
          pattern: ^[0-9A-Z]{12}[0-9]{2}$
          type: string
        creditCardAccountId:
          description: Identifica de forma única a conta pagamento pós-paga do cliente, mantendo as regras de imutabilidade dentro da instituição transmissora.
          example: XXZTR3459087
          maxLength: 100
          minLength: 1
          pattern: ^[a-zA-Z0-9][a-zA-Z0-9-]{0,99}$
          type: string
        creditCardNetwork:
          $ref: '#/components/schemas/CreditCardsAccountsEnumCreditCardAccountNetwork'
        name:
          description: 'Denominação/Identificação do nome da conta de pagamento pós-paga (cartão). Conforme CIRCULAR Nº 3.680,BCB, 2013: ''conta de pagamento pós-paga: destinada à execução de transações de pagamento que independem do aporte prévio de recursos'
          example: Cartão Universitário
          maxLength: 50
          pattern: '[\w\W\s]*'
          type: string
        networkAdditionalInfo:
          description: Texto livre para especificar categoria de bandeira marcada como 'OUTRAS'
          example: AURA CARD
          maxLength: 50
          pattern: '[\w\W\s]*'
          type: string
        productAdditionalInfo:
          description: Informações complementares se tipo de Cartão 'OUTROS'
          maxLength: 50
          pattern: '[\w\W\s]*'
          type: string
        productType:
          $ref: '#/components/schemas/CreditCardsAccountsEnumCreditCardAccountsProductType'
      required:
      - brandName
      - companyCnpj
      - name
      - productType
      - creditCardNetwork
      - creditCardAccountId
      type: object
    CreditCardsAccountsEnumCreditCardAccountFee:
      description: 'Traz os tipos de Tarifas: (Vide Enum) Anuidade, Saque com cartão no Brasil, Saque com cartão no exterior, Avaliação emergencial de crédito, Emissão segunda via, Tarifa pagamento de contas, SMS, OUTRA.


        [Restrição] Preenchimento obrigatório se Tipo de Transação selecionada for ''TARIFA''.

        '
      enum:
      - ANUIDADE
      - SAQUE_CARTAO_BRASIL
      - SAQUE_CARTAO_EXTERIOR
      - AVALIACAO_EMERGENCIAL_CREDITO
      - EMISSAO_SEGUNDA_VIA
      - TARIFA_PAGAMENTO_CONTAS
      - SMS
      - OUTRA
      example: ANUIDADE
      type: string
    CreditCardsAccountsEnumCreditCardAccountNetwork:
      description: 'Categoria de Bandeiras de Cartões de Crédito (Instituidor do arranjo de pagamento).

        Bandeira é a detentora de todos os direitos e deveres da utilização da marca estampada no cartão, inclusive as bandeiras pertencentes aos emissores.

        '
      enum:
      - VISA
      - MASTERCARD
      - AMERICAN_EXPRESS
      - DINERS_CLUB
      - HIPERCARD
      - BANDEIRA_PROPRIA
      - CHEQUE_ELETRONICO
      - ELO
      - OUTRAS
      example: VISA
      type: string
    CreditCardsAccountsEnumCreditCardAccountsBillingValueType:
      description: "Traz os tipos dos valores relativos aos pagamentos da fatura da conta de pagamento pós-paga: (Vide Enum)\n - Valor de pagamento da fatura com parcelamento\n - Valor pagamento da fatura realizado\n - Outro Valor pago na fatura\n\n VALOR_PAGAMENTO_FATURA_PARCELADO: Quando o pagamento corresponde ao fato gerador para abertura do plano de parcelamento da fatura\n\n VALOR_PAGAMENTO_FATURA_REALIZADO: Quando o pagamento corresponde ao valor total da fatura\n\n OUTRO_VALOR_PAGO_FATURA: Demais casos\n"
      enum:
      - VALOR_PAGAMENTO_FATURA_PARCELADO
      - VALOR_PAGAMENTO_FATURA_REALIZADO
      - OUTRO_VALOR_PAGO_FATURA
      type: string
    CreditCardsAccountsEnumCreditCardAccountsConsolidationType:
      description: 'Indicador que permite informar se o valor do limite é consolidado ou individual.


        CONSOLIDADO: utilizado quando o limite da conta cartão é compartilhado entre todos os métodos de pagamento (paymentMethod) atrelados a conta.


        INDIVIDUAL: Utilizado quando cada método de pagamento (paymentMethod) possui seu limite segregado.

        '
      enum:
      - CONSOLIDADO
      - INDIVIDUAL
      example: CONSOLIDADO
      type: string
    CreditCardsAccountsEnumCreditCardAccountsFinanceChargeType:
      description: 'Traz a denominação dos Encargos que

        incidem na fatura da conta de pagamento pós-paga. (Vide Enum)

        - Juros remuneratórios por atraso no pagamento da fatura

        - Multa por atraso no pagamento da fatura

        - Juros de mora por atraso no pagamento da fatura

        - IOF

        - Outros

        '
      enum:
      - JUROS_REMUNERATORIOS_ATRASO_PAGAMENTO_FATURA
      - MULTA_ATRASO_PAGAMENTO_FATURA
      - JUROS_MORA_ATRASO_PAGAMENTO_FATURA
      - IOF
      - OUTROS
      type: string
    CreditCardsAccountsEnumCreditCardAccountsLineLimitType:
      description: 'Indicador do tipo de limite


        LIMITE_CREDITO_TOTAL: Limite de crédito total aplicado a conta cartão.


        LIMITE_CREDITO_MODALIDADE_OPERACAO: Limite de crédito por modalidade desse conta cartão (observar lineName e listar os aplicáveis da instituição).

        '
      enum:
      - LIMITE_CREDITO_TOTAL
      - LIMITE_CREDITO_MODALIDADE_OPERACAO
      example: LIMITE_CREDITO_TOTAL
      type: string
    CreditCardsAccountsEnumCreditCardAccountsOtherCreditType:
      description: 'Traz outros tipos de crédito contratados no cartão.


        [Restrição] Preenchimento obrigatório se o tipo transação selecionado for ''OPERACOES_CREDITO_CONTRATADAS_CARTAO''.

        '
      enum:
      - CREDITO_ROTATIVO
      - PARCELAMENTO_FATURA
      - EMPRESTIMO
      - OUTROS
      example: CREDITO_ROTATIVO
      type: string
    CreditCardsAccountsEnumCreditCardAccountsPaymentMode:
      description: 'Traz as formas de efetivação do pagamento realizado: (Vide Enum)

        - Débito em conta corrente

        - Boleto bancário

        - Averbação em folha

        - PIX

        '
      enum:
      - DEBITO_CONTA_CORRENTE
      - BOLETO_BANCARIO
      - AVERBACAO_FOLHA
      - PIX
      type: string
    CreditCardsAccountsEnumCreditCardAccountsPaymentType:
      description: 'Traz os tipos de pagamento.


        [Restrição] Preenchimento obrigatório se Tipo de Transação selecionada for ''PAGAMENTO''.

        '
      enum:
      - A_VISTA
      - A_PRAZO
      example: A_VISTA
      type: string
    CreditCardsAccountsEnumCreditCardAccountsProductType:
      description: Categoria atribuída a um cartão de pagamento, sob uma certa denominação, que lhe agrega um conjunto de vantagens, diferenciando-o de acordo com o perfil do portador.
      enum:
      - CLASSIC_NACIONAL
      - CLASSIC_INTERNACIONAL
      - GOLD
      - PLATINUM
      - INFINITE
      - ELECTRON
      - STANDARD_NACIONAL
      - STANDARD_INTERNACIONAL
      - ELETRONIC
      - BLACK
      - REDESHOP
      - MAESTRO_MASTERCARD_MAESTRO
      - GREEN
      - BLUE
      - BLUEBOX
      - PROFISSIONAL_LIBERAL
      - CHEQUE_ELETRONICO
      - CORPORATIVO
      - EMPRESARIAL
      - COMPRAS
      - BASICO_NACIONAL
      - BASICO_INTERNACIONAL
      - NANQUIM
      - GRAFITE
      - MAIS
      - OUTROS
      example: OUTROS
      type: string
    CreditCardsAccountsIdentificationData:
      description: Conjunto de informações referentes à identificação da conta de pagamento pós-paga.
      properties:
        creditCardNetwork:
          $ref: '#/components/schemas/CreditCardsAccountsEnumCreditCardAccountNetwork'
        name:
          description: 'Denominação/Identificação do nome da conta de pagamento pós-paga (cartão). Conforme CIRCULAR Nº 3.680,BCB, 2013: ''conta de pagamento pós-paga: destinada à execução de transações de pagamento que independem do aporte prévio de recursos''.

            '
          example: Cartão Universitário
          maxLength: 50
          pattern: '[\w\W\s]*'
          type: string
        networkAdditionalInfo:
          description: Texto livre para especificar categoria de bandeira marcada como 'OUTRAS'.
          example: AURA CARD
          maxLength: 50
          pattern: '[\w\W\s]*'
          type: string
        paymentMethod:
          description: 'Listagem dos cartões (ex.: virtual/adicional/titular) associados a conta cartão consentida, conforme disponíveis ao usuário nos canais proprietários.


            O envio da listagem paymentMethod vazia só deve ocorrer nos seguintes cenários:

            - Conta com pagamento ativo, mas com todos os métodos de pagamentos cancelados;

            - Conta nova sem emissão de métodos de pagamentos;

            - Conta com cartão no-name: entrega de cartão emergencial ao cliente sem dados do cliente no plástico;

            - Conta bloqueada por furto, roubo ou perda: cartão está inativo e aguardando embossing de novo cartão;

            - Conta suspensa: conta suspensa por falta de pagamento, suspensão judicial, entre outros, no entanto cartão se mantém em posse do cliente;

            - Conta inativa: sem utilização de cartão por mais de X dias, no entanto cartão ainda está atrelado ao cliente;

            - Conta aguardando / revisão da análise do cliente: cliente já solicitou cartão, embossing em processo, mas ainda há análises adicionais (ex.: fraude), para serem concluídas.

            '
          items:
            $ref: '#/components/schemas/CreditCardsAccountsAccountPaymentMethod'
          minItems: 0
          type: array
        productAdditionalInfo:
          description: Informações complementares se tipo de Cartão 'OUTROS'
          example: OURO_INTERNACIONAL
          maxLength: 50
          pattern: '[\w\W\s]*'
          type: string
        productType:
          $ref: '#/components/schemas/CreditCardsAccountsEnumCreditCardAccountsProductType'
      required:
      - name
      - productType
      - creditCardNetwork
      - paymentMethod
      type: object
    CreditCardsAccountsLimitAmount:
      description: 'Valor total do limite concedido.

        '
      properties:
        amount:
          description: 'Valor total do limite informado expresso em valor monetário com no mínimo 2 casas e no máximo 4 casas decimais.


            [Restrição] O campo é obrigatório caso isLimitFlexible for igual a false.

            '
          example: '1000.0400'
          format: double
          maxLength: 20
          minLength: 4
          pattern: ^\d{1,15}\.\d{2,4}$
          type: string
        currency:
          description: 'Moeda referente ao limite informado, segundo modelo ISO-4217. p.ex. ''BRL.''

            Todos os limite informados estão representados com a moeda vigente do Brasil.


            [Restrição] O campo é obrigatório caso isLimitFlexible for igual a false.

            '
          example: BRL
          maxLength: 3
          pattern: ^[A-Z]{3}$
          type: string
        limitAmountReason:
          description: 'Razão pela qual o valor total do limite informado está igual a zero.


            [Restrição] Campo de preenchimento obrigatório quando limitAmount for igual a 0.00.

            '
          example: O perfil do cliente passou por uma análise e o limite precisou ser zerado
          maxLength: 200
          pattern: '[\w\W\s]*'
          type: string
      required:
      - amount
      - currency
      type: object
    CreditCardsAccountsLimitsData:
      description: Conjunto de informações referentes aos limites da conta de pagamento pós-paga.
      properties:
        availableAmount:
          $ref: '#/components/schemas/CreditCardsAccountsAvailableAmount'
        consolidationType:
          $ref: '#/components/schemas/CreditCardsAccountsEnumCreditCardAccountsConsolidationType'
        creditLineLimitType:
          $ref: '#/components/schemas/CreditCardsAccountsEnumCreditCardAccountsLineLimitType'
        customizedLimitAmount:
          description: 'Valor total do limite customizado pelo cliente nos canais eletrônicos da instituição. Esse objeto é de envio obrigatório nos casos em que a instituição permita ao cliente alterar o seu limite.

            '
          properties:
            amount:
              description: 'Valor total do limite informado expresso em valor monetário com no mínimo 2 casas e no máximo 4 casas decimais.

                '
              example: '1000.0400'
              format: double
              maxLength: 20
              minLength: 4
              pattern: ^\d{1,15}\.\d{2,4}$
              type: string
            currency:
              description: 'Moeda referente ao limite informado, segundo modelo ISO-4217. p.ex. ''BRL.'' Todos os limite informados estão representados com a moeda vigente do Brasil.

                '
              example: BRL
              maxLength: 3
              pattern: ^[A-Z]{3}$
              type: string
          required:
          - amount
          - currency
          type: object
        identificationNumber:
          description: 'Número de identificação do cartão: corresponde aos 4 últimos dígitos do cartão para PF, ou então, preencher com um identificador para PJ, com as caracteristicas definidas para os IDs no Open Finance.

            '
          example: '4453'
          maxLength: 100
          minLength: 1
          pattern: ^[a-zA-Z0-9][a-zA-Z0-9-]{0,99}$
          type: string
        isLimitFlexible:
          description: True= Indica que a conta cartão possui limite total flexível ou “sem limite”. False = Indica que a conta cartão possui limite predeterminado exibido no canal para o cliente.
          example: true
          type: boolean
        limitAmount:
          $ref: '#/components/schemas/CreditCardsAccountsLimitAmount'
        lineName:
          enum:
          - CREDITO_A_VISTA
          - CREDITO_PARCELADO
          - SAQUE_CREDITO_BRASIL
          - SAQUE_CREDITO_EXTERIOR
          - EMPRESTIMO_CARTAO_CONSIGNADO
          - OUTROS
          example: CREDITO_A_VISTA
          type: string
        lineNameAdditionalInfo:
          description: Campo de preenchimento obrigatório se selecionada a opção 'OUTRAS' em lineName.
          example: Informações adicionais e complementares.
          maxLength: 50
          pattern: '[\w\W\s]*'
          type: string
        usedAmount:
          $ref: '#/components/schemas/CreditCardsAccountsUsedAmount'
      required:
      - creditLineLimitType
      - consolidationType
      - identificationNumber
      - isLimitFlexible
      - usedAmount
      type: object
