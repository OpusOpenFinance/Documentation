    LoansListContract:
      type: object
      description: Conjunto de informações de contratos de empréstimo mantidos pelo cliente na instituição transmissora e para os quais ele tenha fornecido consentimento
      required:
      - contractId
      - brandName
      - companyCnpj
      - productType
      - productSubType
      - ipocCode
      - productSubTypeCategory
      properties:
        contractId:
          type: string
          pattern: ^[a-zA-Z0-9][a-zA-Z0-9-]{0,99}$
          maxLength: 100
          minLength: 1
          example: '92792126019929279212650822221989319252576'
          description: Identifica de forma única o contrato da operação de crédito do cliente, mantendo as regras de imutabilidade dentro da instituição transmissora.
        brandName:
          type: string
          pattern: ^[^\s](.*[^\s])?$
          maxLength: 80
          example: Organização A
          description: Nome da Marca reportada pelo participante no Open Finance. Recomenda-se utilizar, sempre que possível, o mesmo nome de marca atribuído no campo do diretório Customer Friendly Server Name (Authorisation Server).
        companyCnpj:
          type: string
          pattern: ^[0-9A-Z]{12}[0-9]{2}$
          maxLength: 14
          example: '21128159000166'
          description: Representação alfanumérica completa do CNPJ da instituição responsável pelo contrato de empréstimo afim de identificar a instituição credora nos casos de portabilidade de crédito - o CNPJ corresponde ao registro alfanumérico de inscrição no Cadastro de Pessoa Jurídica. Deve-se ter apenas a representação alfanumérica do CNPJ, sem máscara.
        productType:
          $ref: '#/components/schemas/LoansEnumContractProductTypeLoans'
        productSubType:
          $ref: '#/components/schemas/LoansEnumContractProductSubTypeLoans'
        productSubTypeCategory:
          $ref: '#/components/schemas/LoansEnumContractProductSubTypeCategory'
        ipocCode:
          type: string
          maxLength: 67
          minLength: 22
          pattern: ^[\w\W]{22,67}$
          example: '92792126019929279212650822221989319252576'
          description: "Número padronizado do contrato - IPOC (Identificação Padronizada da Operação de Crédito). Segundo DOC 3040, composta por:\n- **CNPJ da instituição:** 8 (oito) posições iniciais;\n- **Modalidade da operação:** 4 (quatro) posições;\n- **Tipo do cliente:** 1 (uma) posição( 1 = pessoa natural - CPF, 2= pessoa jurídica – CNPJ, 3 = pessoa física no exterior, 4 = pessoa jurídica no exterior, 5 = pessoa natural sem CPF e 6 = pessoa jurídica sem CNPJ);\n- **Código do cliente:** O número de posições varia conforme o tipo do cliente:\n  1. Para clientes pessoa física com CPF (tipo de cliente = 1), informar as 11 (onze) posições do CPF;\n  2. Para clientes pessoa jurídica com CNPJ (tipo de cliente = 2), informar as 8 (oito) posições iniciais do CNPJ;\n  3. Para os demais clientes (tipos de cliente 3, 4, 5 e 6), informar 14 (catorze) posições com complemento de zeros à esquerda se a identificação tiver tamanho inferior;\n- **Código do contrato:** 1 (uma) até 40 (quarenta) posições, sem complemento de caracteres.          \n"
    LoansEnumContractTaxPeriodicity:
      type: string
      description: '"Periodicidade da taxa. (Vide  Enum)

        a.m - ao mês

        a.a. - ao ano"

        '
      enum:
      - AM
      - AA
      example: AA
    LoansFinanceCharge:
      type: object
      description: Conjunto de informações referentes à identificação da operação de crédito
      required:
      - chargeType
      properties:
        chargeType:
          $ref: '#/components/schemas/LoansEnumContractFinanceChargeType'
        chargeAdditionalInfo:
          type: string
          maxLength: 140
          description: 'Campo para informações adicionais.


            [Restrição] Obrigatório se selecionada a opção ''OUTROS'' em Tipo de encargo pactuado no contrato.

            '
          pattern: ^[^\s](.*[^\s])?$
          example: Informações adicionais sobre encargos.
        chargeRate:
          type: string
          pattern: ^\d{1}\.\d{6}$
          format: double
          maxLength: 8
          minLength: 8
          description: 'Representa o valor do encargo em percentual pactuado no contrato.


            O preenchimento deve respeitar as 6 casas decimais, mesmo que venham preenchidas com zeros(representação de porcentagem p.ex: 0.150000. Este valor representa 15%. O valor 1 representa 100%).

            '
          example: '0.070000'
    LoansEnumContractReferentialRateIndexerSubType:
      type: string
      description: '"Sub tipos de taxas referenciais ou indexadores, conforme Anexo 5: Taxa referencial ou Indexador (Indx), do Documento 3040.


        [Restrição] Caso no campo postFixedRate seja informado um valor aplicável ao contrato, o envio deste campo será obrigatório."

        '
      enum:
      - SEM_SUB_TIPO_INDEXADOR
      - PRE_FIXADO
      - TR_TBF
      - TJLP
      - LIBOR
      - TLP
      - OUTRAS_TAXAS_POS_FIXADAS
      - CDI
      - SELIC
      - OUTRAS_TAXAS_FLUTUANTES
      - IGPM
