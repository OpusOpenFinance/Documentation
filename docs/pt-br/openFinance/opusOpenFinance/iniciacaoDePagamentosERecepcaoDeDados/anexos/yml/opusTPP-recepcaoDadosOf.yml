    EnumCreditCardTransactionType:
      type: string
      description: Traz os tipos de Transação
      enum:
        - PAGAMENTO
        - PAGAMENTO_FATURA
        - TARIFA
        - OPERACOES_CREDITO_CONTRATADAS_CARTAO
        - ESTORNO
        - CASHBACK
        - OUTROS
      example: CASHBACK
    EnumAccountType:
      type: string
      enum:
        - CONTA_DEPOSITO_A_VISTA
        - CONTA_POUPANCA
        - CONTA_PAGAMENTO_PRE_PAGA
      description: |
        Tipos de contas. Modalidades tradicionais previstas pela Resolução 4.753, não contemplando contas vinculadas, conta de domiciliados no exterior, contas em moedas estrangeiras e conta correspondente moeda eletrônica. Vide Enum
        Conta de depósito à vista ou Conta corrente - é o tipo mais comum. Nela, o dinheiro fica à sua disposição para ser sacado a qualquer momento. Essa conta não gera rendimentos para o depositante
        Conta poupança - foi criada para estimular as pessoas a pouparem. O dinheiro que ficar na conta por trinta dias passa a gerar rendimentos, com isenção de imposto de renda para quem declara. Ou seja, o dinheiro "cresce" (rende) enquanto ficar guardado na conta. Cada depósito terá rendimentos de mês em mês, sempre no dia do mês em que o dinheiro tiver sido depositado
        Conta de pagamento pré-paga: segundo CIRCULAR Nº 3.680, BCB de  2013, é a 'destinada à execução de transações de pagamento em moeda eletrônica realizadas com base em fundos denominados em reais previamente aportados'
      example: CONTA_DEPOSITO_A_VISTA
    EnumCreditDebitIndicator:
      type: string
      description: |
        Indicador do tipo de lançamento:
        Débito (no extrato) Em um extrato bancário, os débitos, marcados com a letra "D" ao lado do valor registrado, informam as saídas de dinheiro na conta-corrente.
        Crédito (no extrato) Em um extrato bancário, os créditos, marcados com a letra "C" ao lado do valor registrado, informam as entradas de dinheiro na conta-corrente.
      enum:
        - CREDITO
        - DEBITO
      example: DEBITO
    EnumPartiePersonType:
      type: string
      enum:
        - PESSOA_NATURAL
        - PESSOA_JURIDICA
      example: PESSOA_NATURAL
      description: |
        Identificação do Tipo de Pessoa da pessoa envolvida na transação.
        Pessoa Natural - Informar CPF no campo "partieCnpjCpf".
        Pessoa Jurídica - Informar CNPJ no campo "partieCnpjCpf".
    EnumOriginError:
      type: string
      enum:
        - opus-tpp
        - participant
        - directory
        - unknown
      example: opus-tpp
      description: |
        Origem do erro reportado:
        - **opus-tpp**: erro originado no Opus TPP.
        - **participant**: erro originado na instituição transmissora ou detentora.
        - **directory**: erro originado no Diretório de Participantes.
        - **unknown**: origem não identificada.
    RegulatoryVersion:
      type: string
      description: |
        Versão regulatória desejada para a chamada ao participante (disponível apenas em rotas não-proxy).

        **Comportamento:**
        - Se não enviado: será utilizada a versão mais atual disponível no participante.
        - Se enviado com versão exata existente: usa a versão solicitada.
        - Se enviado com versão inexistente: será utilizada a versão mais recente da mesma major, se disponível. Caso contrário, será utilizada a versão mais atual disponível.

        **Formato aceito:** É válido usar versão completa (ex: "4.0.0") ou apenas a major (ex: "4").

        **Nota:** Este header não é aceito em rotas proxy. Nas rotas proxy, a versão será sempre a mais atual da major indicada no endpoint do OpusTPP.
      example: '4.0.0'
    SelectedRegulatoryVersion:
      type: string
      description: |
        Versão regulatória efetivamente utilizada na requisição ao participante.

        Este header é retornado em todas as respostas (rotas proxy e não-proxy) para indicar qual versão do endpoint do participante foi utilizada para processar a requisição.

        **Exemplos:**
        - Cliente solicitou "4.0.0" e participante possui: retorna "4.0.0"
        - Cliente solicitou "4.1.0" mas participante só possui "4.0.0": retorna "4.0.0"
        - Cliente não informou header: retorna a versão mais atual disponível (ex: "4.2.0")
      example: '4.0.0'
    XFapiInteractionId:
      type: string
      format: uuid
      minLength: 1
      maxLength: 36
      pattern: '^[0-9a-fA-F]{8}-[0-9a-fA-F]{4}-[0-9a-fA-F]{4}-[0-9a-fA-F]{4}-[0-9a-fA-F]{12}$'
      example: d78fc4e5-37ca-4da3-adf2-9b082bf92280
    XV:
      description: 'Cabeçalho que indica a versão implementada da API pela instituição financeira para atender à solicitação. Deve ser preenchido de forma completa, por exemplo: x-v : 1.0.2.'
      type: string
      pattern: '^\d+\.\d+\.\d+$'
      example: 1.0.0
    ResourcesResponseResourceList:
      type: object
      required:
        - data
        - links
        - meta
      properties:
        data:
          type: array
          minItems: 0
          items:
            type: object
            required:
              - resourceId
              - type
              - status
            properties:
              resourceId:
                type: string
                description: |
                  Identifica o recurso reportado pelo participante do Open Finance, no caso de:
                  - Contas de depósito à vista, de poupança ou de pagamento pós-paga : corresponde ao accountId;
                  - Conta de pagamento pós-paga: corresponde ao  creditCardAccountId;
                  - Empréstimos, Financiamentos, Direitos creditórios descontados e Adiantamento a depositantes: corresponde ao contractId
                  - Renda Fixa Bancária, Renda Fixa Crédito, Renda Variável, Título do Tesouro Direto e Fundo de Investimento: corresponde ao investmentId;
                  - Câmbio: corresponde ao operationId.
                minLength: 1
                maxLength: 100
                pattern: '^[a-zA-Z0-9][a-zA-Z0-9-]{0,99}$'
                example: 25cac914-d8ae-6789-b215-650a6215820d
              type:
                type: string
                enum:
                  - ACCOUNT
                  - CREDIT_CARD_ACCOUNT
                  - LOAN
                  - FINANCING
                  - UNARRANGED_ACCOUNT_OVERDRAFT
                  - INVOICE_FINANCING
                  - BANK_FIXED_INCOME
                  - CREDIT_FIXED_INCOME
                  - VARIABLE_INCOME
                  - TREASURE_TITLE
                  - FUND
                  - EXCHANGE
                description: |
                  Tipo de recurso (vide Enum):
                    - Account - Conta de depósito à vista, poupança ou pagamento pré-paga
                    - Credit Card Account - Conta de pagamento pós-paga (Cartão de Crédito)
                    - Loan - Empréstimo
                    - Financing - Financiamento
                    - Unarranged Account Overdraft - Cheque Especial
                    - Invoice Financing - Financiamento de Fatura
                    - Bank Fixed Income - Renda Fixa Bancária
                    - Credit Fixed Income - Renda Fixa Crédito
                    - Variabel Income - Renda Variável
                    - Treasure Title - Título do Tesouro Direto
                    - Fund - Fundo de Investimento
                    - Exchange - Câmbio
                example: ACCOUNT
              status:
                type: string
                enum:
                  - AVAILABLE
                  - UNAVAILABLE
                  - TEMPORARILY_UNAVAILABLE
                  - PENDING_AUTHORISATION
                description: |
                  Tipo de status de recurso (vide Enum):
                  Available - Disponível
                  Unavailable - Indisponível
                  Temporarily Unavailable - Temporariamente Indisponível
                  Pending Authorisation - Pendente de Autorização
                example: AVAILABLE
          description: Lista de recursos e seus respectivos status.
