    CreditCardsAccountsResponseCreditCardAccountsLimits:
      properties:
        data:
          description: '[Restrição] O envio dos dados de limites deve seguir as seguintes orientações:

            - A lista vazia deve ser interpretada como a ausência da informação;

            - Cenário de limite com valor zerado, deve ter um registro explícito informando o valor como zero;

            - Cenário de "cartão sem limite", isto é, cartões em que o uso do limite é flexível, deve ser informado em um registro explícito com isLimitFlexible como true;

            - Os limites globais devem ser compartilhados na lista de limites, definidos pelo enum CONSOLIDADO, no campo consolidationType. Limites já incluídos no global não devem ser compartilhados, para não ocorrer redundância de informações;

            - Limites segregados, que não fazem parte do global, devem ser compartilhados pelo enum INDIVIDUAL, no campo consolidationType.

            - Cartões virtuais, só devem ter seu limite listado caso o limite do mesmo for segregado do global, assim, devem ser compartilhados pelo enum INDIVIDUAL, no campo consolidationType.

            - Só devem ser compartilhados limites de cartões ativos. Exclusivamente no caso de contas cartões canceladas, enviar lista vazia.

            '
          items:
            $ref: '#/components/schemas/CreditCardsAccountsLimitsData'
          minItems: 0
          type: array
        links:
          $ref: '#/components/schemas/CreditCardsAccountsLinks'
        meta:
          $ref: '#/components/schemas/CreditCardsAccountsMeta'
      required:
      - data
      - links
      - meta
      type: object
    CreditCardsAccountsResponseCreditCardAccountsList:
      properties:
        data:
          description: Conjunto de informações de conta de pagamento pós-paga
          items:
            $ref: '#/components/schemas/CreditCardsAccountsData'
          minItems: 0
          type: array
        links:
          $ref: '#/components/schemas/CreditCardsAccountsLinks'
        meta:
          $ref: '#/components/schemas/CreditCardsAccountsMeta'
      required:
      - data
      - links
      - meta
      type: object
    CreditCardsAccountsResponseCreditCardAccountsTransactions:
      properties:
        data:
          items:
            $ref: '#/components/schemas/CreditCardsAccountsTransaction'
          minItems: 0
          type: array
        links:
          $ref: '#/components/schemas/CreditCardsAccountsTransactionsLinks'
        meta:
          $ref: '#/components/schemas/CreditCardsAccountsMetaOnlyRequestDateTime'
      required:
      - data
      - links
      - meta
      type: object
    CreditCardsAccountsTransaction:
      description: Lista que traz os valores relativos aos saldos do Limite de crédito total da conta de pagamento pós-paga
      properties:
        amount:
          $ref: '#/components/schemas/CreditCardsAccountsTransactionAmount'
        billForecastDate:
          description: 'Mês e ano em que a transação/parcela será faturada, podendo ser uma fatura aberta, futura ou fechada.


            - Caso seja uma transação futura, essa data poderá ser ajustada conforme o cliente altere os ciclos de sua fatura. Independentemente disso, o mês e o ano devem corresponder exatamente à previsão de cobrança dessa parcela.


            - Todas as transações devem ser refletidas de forma idêntica aos canais digitais, e, caso não estejam nos canais, devem ser apresentadas conforme a previsão de cobrança da casa.

            '
          example: 2021-05
          pattern: ^(\d{4})-(1[0-2]|0?[1-9])$
          type: string
        billId:
          description: "Código único e imutável que identifica a fatura onde consta a transação informada. \nPreencher apenas para casos de transação em fatura fechada, ou seja, este campo não é esperado em casos de transação em fatura aberta.\n"
          example: MTU0OTU1NjI2NTk4OTRmc2ZhZDRmc2Q1NmZkM
          maxLength: 100
          minLength: 1
          pattern: ^[a-zA-Z0-9][a-zA-Z0-9-]{0,99}$
          type: string
        billPostDate:
          description: "Data em que a transação foi inserida na fatura. \nPreencher o campo com a data dummy: 0001-01-01, apenas para os casos nos quais ainda não houver a data de inserção na fatura.\n"
          example: '2021-05-21'
          format: date
          maxLength: 20
          pattern: ^(\d{4})-(1[0-2]|0?[1-9])-(3[01]|[12][0-9]|0?[1-9])$
          type: string
        brazilianAmount:
          $ref: '#/components/schemas/CreditCardsAccountsTransactionBrazilianAmount'
        chargeIdentificator:
          description: 'Número da parcela que está sendo informada.


            [Restrição] Preenchimento obrigatório se Tipo de Pagamento (paymentType) selecionada for ''A_PRAZO''.

            '
          example: 12
          format: integer
          maximum: 999
          minimum: 1
          type: number
        chargeNumber:
          description: "Quantidade de parcelas.   \n[Restrição] O campo deve ser preenchido quando houverem parcelas relacionadas a transação.\n"
          example: 12
          format: integer
          maximum: 999
          type: number
        creditDebitType:
          $ref: '#/components/schemas/EnumCreditDebitIndicator'
        feeType:
          $ref: '#/components/schemas/CreditCardsAccountsEnumCreditCardAccountFee'
        feeTypeAdditionalInfo:
          description: Campo livre, de preenchimento obrigatório quando selecionada tipo de tarifa "OUTRA"
          maxLength: 140
          pattern: ^\S[\s\S]*$
          type: string
        identificationNumber:
          description: 'Número de identificação do cartão: corresponde aos 4 últimos dígitos do cartão para PF, ou então, preencher com um identificador para PJ, com as caracteristicas definidas para os IDs no Open Finance.

            '
          example: '4453'
          maxLength: 100
          minLength: 1
          pattern: ^[a-zA-Z0-9][a-zA-Z0-9-]{0,99}$
          type: string
        otherCreditsAdditionalInfo:
          description: 'Campo livre para preenchimento de dados adicionais de outros tipos de crédito contratados no cartão.


            [Restrição] Preenchimento obrigatório quando selecionado no campo outros tipos de crédito "OUTROS".

            '
          maxLength: 50
          pattern: ^\S[\s\S]*$
          type: string
        otherCreditsType:
          $ref: '#/components/schemas/CreditCardsAccountsEnumCreditCardAccountsOtherCreditType'
        payeeMCC:
          description: 'O MCC ou o código da categoria do estabelecimento comercial. Os MCCs são agrupados segundo suas similaridades. O MCC é usado para classificar o negócio pelo tipo fornecido de bens ou serviços. Os MCCs são atribuídos por tipo de comerciante (por exemplo, um para hotéis, um para lojas de materiais de escritório, etc.) ou por nome de comerciante (por exemplo, 3000 para a United Airlines).


            [Restrição] Informação de envio obrigatório quando o valor do campo transactionType for igual a PAGAMENTO.

            '
          example: 5137
          format: integer
          maximum: 2147483647
          type: number
        paymentType:
          $ref: '#/components/schemas/CreditCardsAccountsEnumCreditCardAccountsPaymentType'
        transactionDateTime:
          description: "Data e hora da transação.   \n\nNas compras parceladas, o `transactionDateTime` deve ser idêntico em todas as parcelas. O campo deve obrigatoriamente refletir a informação exibida ao cliente nos canais digitais da instituição, com precisão de data, hora e minuto — mesmo que a instituição não exiba esse nível de granularidade em seus canais. Nesses casos, os segundos e milissegundos podem ser preenchidos com zero (0). Exemplo: 2024-01-29T11:15:00.000Z.\n"
          example: '2016-01-29T12:29:03.374Z'
          format: date-time
          maxLength: 24
          pattern: (^(\d{4})-(1[0-2]|0?[1-9])-(3[01]|[12][0-9]|0?[1-9])T(?:[01]\d|2[0123]):(?:[012345]\d):(?:[012345]\d)\.(?:[0-9]){3}Z$)
          type: string
        transactionId:
          description: "Código ou identificador único e imutável prestado pela instituição que mantém a conta para representar a transação individual. \nSó devem ser compartilhadas transações após conciliação, fazendo com que o `transactionId` seja imutável.\n"
          example: TXpRMU9UQTROMWhZV2xSU1FUazJSMDl
          maxLength: 100
          minLength: 1
          pattern: ^[a-zA-Z0-9][a-zA-Z0-9-]{0,99}$
          type: string
        transactionName:
          description: Literal usada na instituição financeira para identificar a transação. A informação apresentada precisa ser a mesma utilizada nos canais eletrônicos da instituição (extrato e fatura).
          example: PGTO
          maxLength: 200
          pattern: '[\w\W\s]*'
          type: string
        transactionType:
          $ref: '#/components/schemas/EnumCreditCardTransactionType'
        transactionalAdditionalInfo:
          description: Campo livre, de preenchimento obrigatório quando selecionado tipo de transação "OUTROS"
          maxLength: 140
          pattern: ^\S[\s\S]*$
          type: string
      required:
      - transactionId
      - identificationNumber
      - transactionName
      - creditDebitType
      - transactionType
      - brazilianAmount
      - amount
      - transactionDateTime
      - billPostDate
      - billForecastDate
      type: object
    CreditCardsAccountsTransactionAmount:
      description: "Valor original da transação. Expresso em valor monetário com no mínimo 2 casas decimais e no máximo 4 casas decimais. \nDeve ser sempre preenchido com o valor original da transação independente da nacionalidade, sem convertê-lo. \nPara compras parceladas o valor do campo deve corresponder ao valor da parcela.   \n"
      properties:
        amount:
          description: Valor relacionado ao objeto.
          example: '1000.0400'
          format: double
          maxLength: 20
          minLength: 4
          pattern: ^\d{1,15}\.\d{2,4}$
          type: string
        currency:
          description: Moeda referente ao valor monetário, seguindo o modelo ISO-4217.
          example: BRL
          maxLength: 3
          pattern: ^[A-Z]{3}$
          type: string
      required:
      - amount
      - currency
      type: object
    CreditCardsAccountsTransactionAmountBills:
      description: 'Valor original da transação. Expresso em valor monetário com no mínimo 2 casas decimais e no máximo 4 casas decimais. Deve ser sempre preenchido com o valor original da transação independente da nacionalidade, sem convertê-lo.

        '
      properties:
        amount:
          description: Valor relacionado ao objeto.
          example: '1000.0400'
          format: double
          maxLength: 20
          minLength: 4
          pattern: ^\d{1,15}\.\d{2,4}$
          type: string
        currency:
          description: Moeda referente ao valor monetário, seguindo o modelo ISO-4217.
          example: BRL
          maxLength: 3
          pattern: ^[A-Z]{3}$
          type: string
      required:
      - amount
      - currency
      type: object
    CreditCardsAccountsTransactionBrazilianAmount:
      description: "Valor da transação expresso em valor monetário com no mínimo 2 casas e no máximo 4 casas decimais, em moeda corrente do Brasil. \nDeve ser o valor de amount convertido para BRL (em caso de compra internacional) ou o mesmo valor de amount (em caso de compra nacional). \nPara compras parceladas o valor do campo deve corresponder ao valor da parcela.\n"
      properties:
        amount:
          description: Valor relacionado ao objeto.
          example: '1000.0400'
          format: double
          maxLength: 20
          minLength: 4
          pattern: ^\d{1,15}\.\d{2,4}$
          type: string
        currency:
          description: Moeda referente ao valor monetário, seguindo o modelo ISO-4217.
          example: BRL
          maxLength: 3
          pattern: ^[A-Z]{3}$
          type: string
      required:
      - amount
      - currency
      type: object
    CreditCardsAccountsTransactionBrazilianAmountBills:
      description: 'Valor da transação expresso em valor monetário com no mínimo 2 casas e no máximo 4 casas decimais, em moeda corrente do Brasil. Deve ser o valor de amount convertido para BRL (em caso de compra internacional) ou o mesmo valor de amount (em caso de compra nacional).

        '
      properties:
        amount:
          description: Valor relacionado ao objeto.
          example: '1000.0400'
          format: double
          maxLength: 20
          minLength: 4
          pattern: ^\d{1,15}\.\d{2,4}$
          type: string
        currency:
          description: Moeda referente ao valor monetário, seguindo o modelo ISO-4217.
          example: BRL
          maxLength: 3
          pattern: ^[A-Z]{3}$
          type: string
      required:
      - amount
      - currency
      type: object
    CreditCardsAccountsTransactionsLinks:
      description: Referências para outros recusos da API requisitada.
      properties:
        first:
          description: URI da primeira página que originou essa lista de resultados. Restrição - Obrigatório quando não for a primeira página da resposta
          example: https://api.banco.com.br/open-banking/api/v2/resource
          format: url
          maxLength: 4048
          type: string
        next:
          description: URI da próxima página dessa lista de resultados. Restrição - Obrigatório quando não for a última página da resposta
          example: https://api.banco.com.br/open-banking/api/v2/resource
          format: url
          maxLength: 4048
          type: string
        prev:
          description: "URI da página anterior dessa lista de resultados. Restrição - \tObrigatório quando não for a primeira página da resposta"
          example: https://api.banco.com.br/open-banking/api/v2/resource
          format: url
          maxLength: 4048
          type: string
        self:
          description: URI completo que gerou a resposta atual.
          example: https://api.banco.com.br/open-banking/api/v2/resource
          format: url
          maxLength: 4048
          type: string
      required:
      - self
      type: object
    CreditCardsAccountsUsedAmount:
      description: "Valor utilizado do limite informado. \nLimites extras fornecidos ou contratados e usados pelo cliente devem ser somados neste campo. \nAssim, se o valor deste campo for maior que o limite do cliente, significa o uso e contratação de limites extras no cartão.\n"
      properties:
        amount:
          description: Valor utilizado do limite informado expresso em valor monetário com no mínimo 2 casas e no máximo 4 casas decimais.
          example: '1000.0400'
          format: double
          maxLength: 21
          minLength: 4
          pattern: ^-?\d{1,15}\.\d{2,4}$
          type: string
        currency:
          description: "Moeda referente ao limite informado, segundo modelo ISO-4217. p.ex. 'BRL.'\nTodos os saldos informados estão representados com a moeda vigente do Brasil. \n"
          example: BRL
          maxLength: 3
          pattern: ^[A-Z]{3}$
          type: string
      required:
      - amount
      - currency
      type: object
    CreditCardsAccountsResponseBillsTransactions:
      type: object
      required:
