openapi: 3.0.0
info:
  title: API Credit Fixed Incomes - Integration Layer - OPUS Open Finance Brasil
  description: |
    API de información de operaciones de Renta Fija Crédito del Open Finance Brasil – Fase 4.
    API que retorna información de operaciones de inversión del tipo Renta Fija Crédito (Debêntures, CRI/CRA)
    mantenidas en las instituciones transmisoras por sus clientes, incluyendo datos como denominación del producto,
    rentabilidad, cantidad, plazos, saldos en posición del cliente y movimientos financieros.
    No existe segregación entre persona natural y persona jurídica. La exposición se dará por cada operación de
    renta fija contratada por el cliente.
  version: 4.0.0-rc.1-base1.0.3
  license:
    name: Apache 2.0
    url: 'https://www.apache.org/licenses/LICENSE-2.0'
tags:
  - name: Product List
    description: Obtiene la lista de operaciones de Renta Fija Crédito mantenidas por el cliente en la institución transmisora.
  - name: Product Identification
    description: Obtiene los datos de la operación de Renta Fija Crédito identificada por investmentId.
  - name: Balances
    description: Obtiene la posición de la operación de Renta Fija Crédito identificada por investmentId.
  - name: Transactions
    description: Obtiene los movimientos históricos (últimos 12 meses) de la operación de Renta Fija Crédito identificada por investmentId.
  - name: Transactions Current
    description: 'Obtiene los movimientos recientes de la operación de Renta Fija Crédito identificada por investmentId. El período a considerar para la presentación de movimientos será de hasta 7 días - 7 días anteriores a la consulta, incluyendo el día de la consulta (D-6).'
paths:
  /discovery:
    post:
      tags:
        - Product List
      summary: Obtiene una lista de recursos que representan todas las inversiones del tipo Renta Fija Crédito realizadas por el cliente.
      operationId: discoverCreditFixedIncomes
      description: Método para obtener la lista de inversiones del tipo Renta Fija Crédito realizadas por el cliente en la institución transmisora.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RequestWithConsentAndRequestMeta'
      responses:
        '200':
          $ref: '#/components/responses/OKResponseCreditFixedIncomeDiscovery'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '405':
          $ref: '#/components/responses/MethodNotAllowed'
        '406':
          $ref: '#/components/responses/NotAcceptable'
        '422':
          $ref: '#/components/responses/UnprocessableEntity'
        '423':
          $ref: '#/components/responses/Locked'
        '429':
          $ref: '#/components/responses/TooManyRequests'
        '500':
          $ref: '#/components/responses/InternalServerError'
        '504':
          $ref: '#/components/responses/GatewayTimeout'
        '529':
          $ref: '#/components/responses/SiteIsOverloaded'
        default:
          $ref: '#/components/responses/Default'
  /investments:
    post:
      tags:
        - Product List
      summary: Obtiene la lista de operaciones de Renta Fija Crédito mantenidas por el cliente en la institución transmisora y para las cuales haya proporcionado consentimiento.
      operationId: creditFixedIncomesGetInvestments
      description: Obtiene la lista de operaciones de Renta Fija Crédito mantenidas por el cliente en la institución transmisora y para las cuales haya proporcionado consentimiento.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RequestWithConsentAndRequestMetaAndPagination'
      responses:
        '200':
          $ref: '#/components/responses/ResponseCreditFixedIncomesProductList'
        '400':
          $ref: '#/components/responses/BadRequestWithAdditionalProperties'
        '401':
          $ref: '#/components/responses/UnauthorizedWithAdditionalProperties'
        '403':
          $ref: '#/components/responses/ForbiddenWithAdditionalProperties'
        '404':
          $ref: '#/components/responses/NotFoundWithAdditionalProperties'
        '405':
          $ref: '#/components/responses/MethodNotAllowedWithAdditionalProperties'
        '406':
          $ref: '#/components/responses/NotAcceptableWithAdditionalProperties'
        '422':
          $ref: '#/components/responses/UnprocessableEntityWithAdditionalProperties'
        '423':
          $ref: '#/components/responses/LockedWithAdditionalProperties'
        '429':
          $ref: '#/components/responses/TooManyRequestsWithAdditionalProperties'
        '500':
          $ref: '#/components/responses/InternalServerErrorWithAdditionalProperties'
        '504':
          $ref: '#/components/responses/GatewayTimeoutWithAdditionalProperties'
        '529':
          $ref: '#/components/responses/SiteIsOverloadedWithAdditionalProperties'
        default:
          $ref: '#/components/responses/DefaultWithAdditionalProperties'
  /find:
    post:
      tags:
        - Product Identification
      summary: Obtiene los datos de la operación de Renta Fija Crédito identificada por investmentId.
      operationId: creditFixedIncomesGetInvestmentsInvestmentId
      description: Obtiene los datos de la operación de Renta Fija Crédito identificada por investmentId.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RequestWithConsentAndRequestMetaAndInvestmentId'
      responses:
        '200':
          $ref: '#/components/responses/ResponseCreditFixedIncomesProductIdentification'
        '400':
          $ref: '#/components/responses/BadRequestWithAdditionalProperties'
        '401':
          $ref: '#/components/responses/UnauthorizedWithAdditionalProperties'
        '403':
          $ref: '#/components/responses/ForbiddenWithAdditionalProperties'
        '404':
          $ref: '#/components/responses/NotFoundWithAdditionalProperties'
        '405':
          $ref: '#/components/responses/MethodNotAllowedWithAdditionalProperties'
        '406':
          $ref: '#/components/responses/NotAcceptableWithAdditionalProperties'
        '422':
          $ref: '#/components/responses/UnprocessableEntityWithAdditionalProperties'
        '423':
          $ref: '#/components/responses/LockedWithAdditionalProperties'
        '429':
          $ref: '#/components/responses/TooManyRequestsWithAdditionalProperties'
        '500':
          $ref: '#/components/responses/InternalServerErrorWithAdditionalProperties'
        '504':
          $ref: '#/components/responses/GatewayTimeoutWithAdditionalProperties'
        '529':
          $ref: '#/components/responses/SiteIsOverloadedWithAdditionalProperties'
        default:
          $ref: '#/components/responses/DefaultWithAdditionalProperties'
  /balances:
    post:
      tags:
        - Balances
      summary: Obtiene la posición de la operación de Renta Fija Crédito identificada por investmentId.
      operationId: creditFixedIncomesGetInvestmentsInvestmentIdBalances
      description: |
        Obtiene la posición de la operación de Renta Fija Crédito identificada por investmentId.

        En los casos en que no haya posición para la inversión, es decir, cantidad de activos y valores monetarios en cero, pero la misma aún esté dentro del plazo de exposición (hasta 12 meses después del último movimiento), se debe retornar status code 200 y para el payload de retorno considerar los valores a continuación. Los campos no obligatorios no deben ser retornados:

        - Valores monetarios: 0.00
        - Cantidad de activos: 0.00
        - Fecha y hora de la última posición: mismo contenido del campo requestDateTime
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RequestWithConsentAndRequestMetaAndInvestmentId'
      responses:
        '200':
          $ref: '#/components/responses/ResponseCreditFixedIncomesBalances'
        '400':
          $ref: '#/components/responses/BadRequestWithAdditionalProperties'
        '401':
          $ref: '#/components/responses/UnauthorizedWithAdditionalProperties'
        '403':
          $ref: '#/components/responses/ForbiddenWithAdditionalProperties'
        '404':
          $ref: '#/components/responses/NotFoundWithAdditionalProperties'
        '405':
          $ref: '#/components/responses/MethodNotAllowedWithAdditionalProperties'
        '406':
          $ref: '#/components/responses/NotAcceptableWithAdditionalProperties'
        '422':
          $ref: '#/components/responses/UnprocessableEntityWithAdditionalProperties'
        '423':
          $ref: '#/components/responses/LockedWithAdditionalProperties'
        '429':
          $ref: '#/components/responses/TooManyRequestsWithAdditionalProperties'
        '500':
          $ref: '#/components/responses/InternalServerErrorWithAdditionalProperties'
        '504':
          $ref: '#/components/responses/GatewayTimeoutWithAdditionalProperties'
        '529':
          $ref: '#/components/responses/SiteIsOverloadedWithAdditionalProperties'
        default:
          $ref: '#/components/responses/DefaultWithAdditionalProperties'
  /transactions:
    post:
      tags:
        - Transactions
      summary: Obtiene los movimientos históricos (últimos 12 meses) de la operación de Renta Fija Crédito identificada por investmentId.
      operationId: creditFixedIncomesGetInvestmentsInvestmentIdTransactions
      description: Obtiene los movimientos históricos (últimos 12 meses) de la operación de Renta Fija Crédito identificada por investmentId.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RequestTransactions'
      responses:
        '200':
          $ref: '#/components/responses/ResponseCreditFixedIncomesTransactions'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '405':
          $ref: '#/components/responses/MethodNotAllowed'
        '406':
          $ref: '#/components/responses/NotAcceptable'
        '422':
          $ref: '#/components/responses/UnprocessableEntity'
        '423':
          $ref: '#/components/responses/Locked'
        '429':
          $ref: '#/components/responses/TooManyRequests'
        '500':
          $ref: '#/components/responses/InternalServerError'
        '504':
          $ref: '#/components/responses/GatewayTimeout'
        '529':
          $ref: '#/components/responses/SiteIsOverloaded'
        default:
          $ref: '#/components/responses/Default'
  /transactions-current:
    post:
      tags:
        - Transactions Current
      summary: 'Obtiene los movimientos recientes de la operación de Renta Fija Crédito identificada por investmentId. El período a considerar para la presentación de movimientos será de hasta 7 días - 7 días anteriores a la consulta, incluyendo el día de la consulta (D-6).'
      operationId: creditFixedIncomesGetInvestmentsInvestmentIdTransactionsCurrent
      description: 'Obtiene los movimientos recientes de la operación de Renta Fija Crédito identificada por investmentId. El período a considerar para la presentación de movimientos será de hasta 7 días - 7 días anteriores a la consulta, incluyendo el día de la consulta (D-6).'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RequestTransactionsCurrent'
      responses:
        '200':
          $ref: '#/components/responses/ResponseCreditFixedIncomesTransactionsCurrent'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '405':
          $ref: '#/components/responses/MethodNotAllowed'
        '406':
          $ref: '#/components/responses/NotAcceptable'
        '422':
          $ref: '#/components/responses/UnprocessableEntity'
        '423':
          $ref: '#/components/responses/Locked'
        '429':
          $ref: '#/components/responses/TooManyRequests'
        '500':
          $ref: '#/components/responses/InternalServerError'
        '504':
          $ref: '#/components/responses/GatewayTimeout'
        '529':
          $ref: '#/components/responses/SiteIsOverloaded'
        default:
          $ref: '#/components/responses/Default'
components:
  schemas:
    ResponseCreditFixedIncomesProductList:
      type: object
      required:
        - data
        - meta
      properties:
        data:
          type: array
          minItems: 0
          items:
            $ref: '#/components/schemas/CreditFixedList'
        meta:
          $ref: '#/components/schemas/CreditFixedIncomesMeta'
    ResponseCreditFixedIncomesProductIdentification:
      type: object
      required:
        - data
        - meta
      properties:
        data:
          $ref: '#/components/schemas/CreditFixedIdentification'
        meta:
          $ref: '#/components/schemas/CreditFixedIncomesMeta'
    ResponseCreditFixedIncomesBalances:
      type: object
      required:
        - data
        - meta
      properties:
        data:
          type: object
          required:
            - referenceDateTime
            - updatedUnitPrice
            - quantity
            - grossAmount
            - netAmount
            - incomeTax
            - financialTransactionTax
            - blockedBalance
            - purchaseUnitPrice
          properties:
            referenceDateTime:
              $ref: '#/components/schemas/ReferenceDateTime'
            updatedUnitPrice:
              $ref: '#/components/schemas/UpdatedUnitPrice'
            quantity:
              type: string
              format: double
              description: cantidad de títulos poseídos en la fecha de la posición del cliente
              maxLength: 24
              minLength: 4
              pattern: '^\d{1,15}\.\d{2,8}$'
              example: '15.00'
            grossAmount:
              $ref: '#/components/schemas/GrossAmount'
            netAmount:
              $ref: '#/components/schemas/NetAmount'
            incomeTax:
              $ref: '#/components/schemas/IncomeTax'
            financialTransactionTax:
              $ref: '#/components/schemas/FinancialTransactionTax'
            blockedBalance:
              $ref: '#/components/schemas/BlockedBalance'
            purchaseUnitPrice:
              $ref: '#/components/schemas/PurchaseUnitPrice'
            preFixedRate:
              type: string
              description: |
                Tasa de remuneración acordada con el cliente en la contratación. En casos de productos progresivos, considerar la tasa máxima contratada.
                Se espera que el llenado de este campo por las participantes sea enviado conforme fue acordado en el momento de la contratación.
              maxLength: 8
              minLength: 8
              pattern: '^\d{1}\.\d{6}$'
              example: '0.300000'
            postFixedIndexerPercentage:
              $ref: '#/components/schemas/PostFixedIndexerPercentage'
            fine:
              $ref: '#/components/schemas/Fine'
            latePayment:
              $ref: '#/components/schemas/LatePayment'
        meta:
          $ref: '#/components/schemas/CreditFixedIncomesMeta'
    ResponseCreditFixedIncomesTransactions:
      type: object
      required:
        - data
        - meta
      properties:
        data:
          type: array
          minItems: 0
          items:
            $ref: '#/components/schemas/CreditFixedIncomesTransactions'
        meta:
          $ref: '#/components/schemas/MetaOnlyRequestDateTimeAndHasMoreRecords'
    ResponseCreditFixedIncomesTransactionsCurrent:
      type: object
      required:
        - data
        - meta
      properties:
        data:
          type: array
          minItems: 0
          items:
            type: object
            required:
              - type
              - transactionType
              - transactionDate
              - transactionGrossValue
              - transactionNetValue
              - transactionId
            properties:
              type:
                $ref: '#/components/schemas/Type'
              transactionType:
                $ref: '#/components/schemas/TransactionType'
              transactionTypeAdditionalInfo:
                type: string
                description: |
                  Información adicional del tipo de movimiento, para completar en caso de movimientos no delimitados en el dominio.
                  [Restricción] Campo de llenado obligatorio por las participantes cuando haya 'OUTROS' en el campo 'transactionType'.
                maxLength: 100
                pattern: '[\w\W\s]*'
              transactionDate:
                type: string
                format: date
                description: Fecha del movimiento
                maxLength: 10
                pattern: '^(\d{4})-(1[0-2]|0?[1-9])-(3[01]|[12][0-9]|0?[1-9])$'
                example: '2018-02-15'
              transactionUnitPrice:
                type: object
                description: |
                  valor unitario negociado con el cliente en la fecha de adquisición

                  [Restricción] Campo de llenado obligatorio por las participantes cuando el campo 'transactionType' sea completado con los valores 'COMPRA', 'VENDA' o 'VENCIMENTO'.
                required:
                  - amount
                  - currency
                properties:
                  amount:
                    type: string
                    format: double
                    pattern: '^\d{1,15}\.\d{2,8}$'
                    maxLength: 24
                    minLength: 4
                    example: '1000.000004'
                    description: Valor relacionado al objeto.
                  currency:
                    $ref: '#/components/schemas/Currency'
              transactionQuantity:
                type: string
                description: |
                  Cantidad de títulos involucrados en el movimiento

                  [Restricción] Campo de llenado obligatorio por las participantes cuando el campo 'transactionType' sea completado con los valores 'COMPRA', 'VENDA', 'VENCIMENTO', 'TRANSFERENCIA_TITULARIDADE' o 'TRANSFERENCIA_CUSTODIA'.
                maxLength: 24
                pattern: '^\d{1,15}\.\d{2,8}$'
                example: '42.25'
              transactionGrossValue:
                $ref: '#/components/schemas/TransactionGrossValue'
              incomeTax:
                type: object
                description: |
                  Valor del impuesto a la renta retenido en la transacción.
                  [Restricción] Campo de llenado obligatorio por las participantes cuando el campo 'type' sea completado con el valor 'SAIDA'.
                required:
                  - amount
                  - currency
                properties:
                  amount:
                    type: string
                    format: double
                    pattern: '^\d{1,15}\.\d{2,4}$'
                    maxLength: 20
                    minLength: 4
                    example: '1000.04'
                    description: Valor relacionado al objeto.
                  currency:
                    $ref: '#/components/schemas/Currency'
              financialTransactionTax:
                type: object
                description: |
                  Valor del IOF retenido en la transacción.
                  [Restricción] Campo de llenado obligatorio por las participantes cuando el campo 'type' sea completado con el valor 'SAIDA'.
                required:
                  - amount
                  - currency
                properties:
                  amount:
                    type: string
                    format: double
                    pattern: '^\d{1,15}\.\d{2,4}$'
                    maxLength: 20
                    minLength: 4
                    example: '1000.04'
                    description: Valor relacionado al objeto.
                  currency:
                    $ref: '#/components/schemas/Currency'
              transactionNetValue:
                $ref: '#/components/schemas/TransactionNetValue'
              remunerationTransactionRate:
                $ref: '#/components/schemas/RemunerationTransactionRate'
              indexerPercentage:
                type: string
                description: |
                  Porcentaje máximo del indexador en la transacción acordada con el cliente en la contratación.

                  [Restricción] Campo de llenado obligatorio por las participantes cuando el campo 'type' sea completado con el valor 'ENTRADA' y se trate de un producto post-fijado o híbrido.
                maxLength: 8
                minLength: 8
                pattern: '^\d{1}\.\d{6}$'
                example: '1.100000'
              transactionId:
                type: string
                description: |
                  Código o identificador único proporcionado por la institución para individualizar el movimiento.
                maxLength: 100
                pattern: '^[a-zA-Z0-9][a-zA-Z0-9-]{0,99}$'
                example: ABCD2126019929279212650822221989319253344
        meta:
          $ref: '#/components/schemas/MetaOnlyRequestDateTimeAndHasMoreRecords'
    BlockedBalance:
      type: object
      description: Valor no disponible para movimiento en ese momento por cualquier motivo (bloqueo judicial, bloqueo en garantía, entre otros). El plazo de carencia no se considera como bloqueo.
      required:
        - amount
        - currency
      properties:
        amount:
          type: string
          format: double
          pattern: '^\d{1,15}\.\d{2,4}$'
          maxLength: 20
          minLength: 4
          example: '1000.04'
          description: Valor relacionado al objeto.
        currency:
          $ref: '#/components/schemas/Currency'
    CreditFixedIdentification:
      type: object
      required:
        - investmentType
        - remuneration
        - issueUnitPrice
        - issueDate
        - dueDate
        - voucherPaymentIndicator
        - purchaseDate
        - taxExemptProduct
      properties:
        issuerInstitutionCnpjNumber:
          type: string
          description: |
            CNPJ de la institución emisora.

            Si la institución tiene la información, el envío será obligatorio.
          maxLength: 14
          pattern: '^\d{14}$'
          example: '11225860000140'
        isinCode:
          type: string
          description: |
            El código ISIN es un código universal que identifica cada valor mobiliario o instrumento financiero, según la Norma ISO 6166. Si la transmisora posee la información, el envío de este campo es obligatorio.

            [Restricción] Debe ser completado en los casos en que no se complete 'clearingCode'.
          maxLength: 12
          pattern: '^[A-Z]{2}([A-Z0-9]){9}\d{1}$'
          example: BRCST4CTF001
        investmentType:
          $ref: '#/components/schemas/EnumInvestimentType'
        debtorCnpjNumber:
          type: string
          description: |
            CNPJ del deudor. Si la transmisora posee la información para los productos CRI y CRA, el envío de este campo es obligatorio.
          maxLength: 14
          pattern: '^\d{14}$'
          example: '11225860000140'
        debtorName:
          type: string
          description: |
            Nombre del deudor. Si la transmisora posee la información para los productos CRI y CRA, el envío de este campo es obligatorio.
          pattern: '[\w\W\s]*'
          maxLength: 70
          example: Roberto Marino
        taxExemptProduct:
          $ref: '#/components/schemas/EnumTaxExemptProduct'
        remuneration:
          $ref: '#/components/schemas/Remuneration'
        issueUnitPrice:
          $ref: '#/components/schemas/IssueUnitPrice'
        issueDate:
          type: string
          format: date
          description: Fecha de emisión del título
          maxLength: 10
          pattern: '^(\d{4})-(1[0-2]|0?[1-9])-(3[01]|[12][0-9]|0?[1-9])$'
          example: '2018-02-16'
        dueDate:
          type: string
          format: date
          description: Fecha de vencimiento del título
          maxLength: 10
          pattern: '^(\d{4})-(1[0-2]|0?[1-9])-(3[01]|[12][0-9]|0?[1-9])$'
          example: '2018-02-15'
        voucherPaymentIndicator:
          $ref: '#/components/schemas/VoucherPaymentIndicator'
        voucherPaymentPeriodicity:
          $ref: '#/components/schemas/VoucherPaymentPeriodicity'
        voucherPaymentPeriodicityAdditionalInfo:
          type: string
          description: |
            Informaciones adicionales de la periodicidad de pago de cupón
            [Restricción] Campo de llenado obligatorio por las participantes cuando haya 'Otros' en el campo 'voucherPaymentPeriodicity'.
          maxLength: 50
          pattern: '[\w\W\s]*'
          example: Diária
        clearingCode:
          type: string
          description: |
            Código de registro del activo en la Clearing. Si la transmisora posee la información, el envío de este campo es obligatorio.

            [Restricción] Debe ser completado en los casos en que no se complete 'isinCode'.
          maxLength: 30
          pattern: '[\w\W-]*'
          example: CDB421GPXXX
        purchaseDate:
          type: string
          format: date
          description: Fecha de adquisición del cliente
          maxLength: 10
          pattern: '^(\d{4})-(1[0-2]|0?[1-9])-(3[01]|[12][0-9]|0?[1-9])$'
          example: '2018-02-15'
        gracePeriodDate:
          type: string
          format: date
          description: |
            Fecha hasta la cual el cliente no podrá rescatar anticipadamente su inversión.

            Si la institución tiene la información, el envío será obligatorio.
          maxLength: 10
          pattern: '^(\d{4})-(1[0-2]|0?[1-9])-(3[01]|[12][0-9]|0?[1-9])$'
          example: '2018-02-16'
    CreditFixedIncomesMeta:
      type: object
      description: Meta información referente a la API solicitada.
      required:
        - totalRecords
        - totalPages
        - requestDateTime
      properties:
        totalRecords:
          type: integer
          format: int32
          description: Número total de registros en el resultado
          example: 1
        totalPages:
          type: integer
          format: int32
          description: Número total de páginas en el resultado
          example: 1
        requestDateTime:
          description: 'Fecha y hora de la consulta, según especificación RFC-3339, formato UTC.'
          type: string
          maxLength: 20
          format: date-time
          example: '2021-05-21T08:30:00Z'
    CreditFixedList:
      type: object
      description: Lista de títulos de renta fija crédito mantenidos por el cliente en la institución transmisora y para los cuales haya proporcionado consentimiento
      required:
        - brandName
        - companyCnpj
        - investmentType
        - investmentId
      properties:
        brandName:
          type: string
          description: 'Nombre de la Marca reportada por el participante en Open Finance. Se recomienda utilizar, siempre que sea posible, el mismo nombre de marca atribuido en el campo del directorio Customer Friendly Server Name (Authorisation Server).'
          pattern: '[\w\W\s]*'
          maxLength: 80
          example: Organização A
        companyCnpj:
          type: string
          description: 'Número completo del CNPJ de la institución responsable del Registro - el CNPJ corresponde al número de inscripción en el Registro de Personas Jurídicas. Debe tener solo los números del CNPJ, sin máscara'
          maxLength: 14
          pattern: '^\d{14}$'
          example: '21128159000166'
        investmentType:
          $ref: '#/components/schemas/EnumInvestimentType'
        investmentId:
          $ref: '#/components/schemas/LegacyId'
    Currency:
      type: string
      description: 'Moneda referente al valor monetario, siguiendo el modelo ISO-4217.'
      maxLength: 3
      pattern: '^[A-Z]{3}$'
      example: BRL
    EnumCalculation:
      type: string
      description: |
        Base de cálculo (días hábiles o días corridos).
          1. días hábiles
          2. días corridos.

        Si la institución tiene la información, el envío será obligatorio.
      enum:
        - DIAS_UTEIS
        - DIAS_CORRIDOS
      example: DIAS_CORRIDOS
    EnumTaxExemptProduct:
      type: string
      description: Indicador de un producto incentivado
      enum:
        - SIM
        - NAO
      example: SIM
    EnumIndexer:
      type: string
      description: |
        Índice utilizado como referencia para la corrección de la rentabilidad y/o rendimientos del activo
        1. CDI
        2. DI
        3. TR
        4. IPCA
        5. IGP_M
        6. IGP_DI
        7. INPC
        8. BCP
        10. TLC
        11. SELIC
        12. PRE_FIXADO
        13. OUTROS
      enum:
        - CDI
        - DI
        - TR
        - IPCA
        - IGP_M
        - IGP_DI
        - INPC
        - BCP
        - TLC
        - SELIC
        - PRE_FIXADO
        - OUTROS
      example: CDI
    EnumInvestimentType:
      type: string
      description: 'Especificación del activo en cuestión (Debêntures, CRI o CRA).'
      enum:
        - DEBENTURES
        - CRI
        - CRA
      example: CRI
    EnumRatePeriodicity:
      type: string
      description: |
        Periodicidad de la tasa de remuneración (mensual, anual, diaria, semestral).

        Si la institución tiene la información, el envío será obligatorio.
      enum:
        - MENSAL
        - ANUAL
        - DIARIO
        - SEMESTRAL
      example: MENSAL
    EnumRateType:
      type: string
      description: |
        Tipo de tasa de remuneración
          1. LINEAR
          2. EXPONENCIAL

        Si la institución tiene la información, el envío será obligatorio.
      enum:
        - LINEAR
        - EXPONENCIAL
      example: LINEAR
    FinancialTransactionTax:
      type: object
      description: |
        Valor del impuesto (IOF) provisionado considerando la alícuota vigente en la fecha de referencia.
      required:
        - amount
        - currency
      properties:
        amount:
          type: string
          format: double
          pattern: '^\d{1,15}\.\d{2,4}$'
          maxLength: 20
          minLength: 4
          example: '1000.04'
          description: Valor relacionado al objeto.
        currency:
          $ref: '#/components/schemas/Currency'
    Fine:
      type: object
      description: |
        Valor de multa debido al atraso del pago acordado en contrato.
        Si la transmisora posee la información, el envío de este campo es obligatorio.
      required:
        - amount
        - currency
      properties:
        amount:
          type: string
          format: double
          pattern: '^\d{1,15}\.\d{2,4}$'
          maxLength: 20
          minLength: 4
          example: '1000.04'
          description: Valor relacionado al objeto.
        currency:
          $ref: '#/components/schemas/Currency'
    GrossAmount:
      type: object
      description: valor de la inversión que se refiere a la cantidad x PU actualizado en la fecha de referencia
      required:
        - amount
        - currency
      properties:
        amount:
          type: string
          format: double
          pattern: '^\d{1,15}\.\d{2,4}$'
          maxLength: 20
          minLength: 4
          example: '1000.04'
          description: Valor relacionado al objeto.
        currency:
          $ref: '#/components/schemas/Currency'
    IncomeTax:
      type: object
      description: |
        Valor del impuesto a la renta provisionado considerando la alícuota vigente en la fecha de referencia.
      required:
        - amount
        - currency
      properties:
        amount:
          type: string
          format: double
          pattern: '^\d{1,15}\.\d{2,4}$'
          maxLength: 20
          minLength: 4
          example: '1000.04'
          description: Valor relacionado al objeto.
        currency:
          $ref: '#/components/schemas/Currency'
    IndexerPercentage:
      type: string
      description: |
        Porcentaje máximo del indexador en la transacción acordada con el cliente en la contratación.

        [Restricción] Campo de llenado obligatorio por las participantes cuando el campo 'type' sea completado con el valor 'ENTRADA' y se trate de un producto post-fijado o híbrido.
      maxLength: 8
      minLength: 8
      pattern: '^\d{1}\.\d{6}$'
      example: '1.100000'
    IssueUnitPrice:
      type: object
      required:
        - amount
        - currency
      properties:
        amount:
          type: string
          description: Valor relacionado al objeto.
          maxLength: 24
          pattern: '^\d{1,15}\.\d{2,8}$'
          example: '1000.000004'
        currency:
          type: string
          description: 'Moneda referente al valor monetario, siguiendo el modelo ISO-4217.'
          maxLength: 3
          pattern: '^[A-Z]{3}$'
          example: BRL
    LatePayment:
      type: object
      description: |
        Valor de mora debido al atraso del pago acordado en contrato.
        Si la transmisora posee la información, el envío de este campo es obligatorio.
      required:
        - amount
        - currency
      properties:
        amount:
          type: string
          format: double
          pattern: '^\d{1,15}\.\d{2,4}$'
          maxLength: 20
          minLength: 4
          example: '1000.04'
          description: Valor relacionado al objeto.
        currency:
          $ref: '#/components/schemas/Currency'
    NetAmount:
      type: object
      description: 'valor de la inversión actualizado en la fecha de referencia, posterior a la deducción de impuestos (IOF e IR)'
      required:
        - amount
        - currency
      properties:
        amount:
          type: string
          format: double
          pattern: '^\d{1,15}\.\d{2,4}$'
          maxLength: 20
          minLength: 4
          example: '1000.04'
          description: Valor relacionado al objeto.
        currency:
          $ref: '#/components/schemas/Currency'
    PostFixedIndexerPercentage:
      type: string
      description: |
        Porcentaje del indexador acordado con el cliente en la contratación. En casos de productos progresivos, considerar la tasa máxima contratada.
        Se espera que el llenado de este campo por las participantes sea enviado conforme fue acordado en el momento de la contratación.
      maxLength: 8
      minLength: 8
      pattern: '^\d{1}\.\d{6}$'
      example: '1.100000'
    PurchaseUnitPrice:
      type: object
      description: valor unitario negociado con el cliente en la fecha de adquisición
      required:
        - amount
        - currency
      properties:
        amount:
          type: string
          format: double
          pattern: '^\d{1,15}\.\d{2,8}$'
          maxLength: 24
          minLength: 4
          example: '1000.000004'
          description: Valor relacionado al objeto.
        currency:
          $ref: '#/components/schemas/Currency'
    ReferenceDateTime:
      type: string
      format: date-time
      description: 'fecha y hora de la última posición consolidada disponible a la que se refieren los datos transaccionales del cliente disponibles en los canales electrónicos; En la representación de la fecha se deben considerar los minutos y segundos como cero (00:00:00Z)'
      maxLength: 20
      pattern: '(^(\d{4})-(1[0-2]|0?[1-9])-(3[01]|[12][0-9]|0?[1-9])T(?:[01]\d|2[0123]):(?:[012345]\d):(?:[012345]\d)Z$)'
      example: '2022-07-21T17:32:00Z'
    Remuneration:
      type: object
      required:
        - indexer
      properties:
        preFixedRate:
          type: string
          description: |
            Valor de la tasa de emisión del contrato.
            [Restricción] Campo de llenado obligatorio por las participantes cuando haya 'PRE_FIXADO' en el campo 'indexer' o cuando se trate de un producto con remuneración híbrida.
          maxLength: 8
          pattern: '^\d{1}\.\d{6}$'
          example: '0.300000'
        postFixedIndexerPercentage:
          type: string
          description: |
            Porcentaje del indexador de emisión del contrato.
            [Restricción] Campo de llenado obligatorio por las participantes cuando el campo 'indexer' sea completado de forma diferente a 'PRE_FIXADO' o cuando se trate de un producto con remuneración híbrida.
          maxLength: 8
          pattern: '^\d{1}\.\d{6}$'
          example: '1.100000'
        rateType:
          $ref: '#/components/schemas/EnumRateType'
        ratePeriodicity:
          $ref: '#/components/schemas/EnumRatePeriodicity'
        calculation:
          $ref: '#/components/schemas/EnumCalculation'
        indexer:
          $ref: '#/components/schemas/EnumIndexer'
        indexerAdditionalInfo:
          type: string
          description: |
            Informaciones adicionales del indexador
            [Restricción] Campo de llenado obligatorio por las participantes cuando haya 'Outros' en el campo 'indexer'.
          pattern: '[\w\W\s]*'
          maxLength: 50
          example: Dólar
    CreditFixedIncomesTransactions:
      type: object
      required:
        - type
        - transactionType
        - transactionDate
        - transactionGrossValue
        - transactionNetValue
        - transactionId
      properties:
        type:
          $ref: '#/components/schemas/Type'
        transactionType:
          $ref: '#/components/schemas/TransactionType'
        transactionTypeAdditionalInfo:
          $ref: '#/components/schemas/TypeAdditionalInfo'
        transactionDate:
          $ref: '#/components/schemas/TransactionDate'
        transactionUnitPrice:
          type: object
          description: |
            valor unitario negociado con el cliente en la fecha de adquisición

            [Restricción] Campo de llenado obligatorio por las participantes cuando el campo 'transactionType' sea completado con los valores 'COMPRA', 'VENDA' o 'VENCIMENTO'.
          required:
            - amount
            - currency
          properties:
            amount:
              type: string
              format: double
              pattern: '^\d{1,15}\.\d{2,8}$'
              maxLength: 24
              minLength: 4
              example: '1000.000004'
              description: Valor relacionado al objeto.
            currency:
              $ref: '#/components/schemas/Currency'
        transactionQuantity:
          $ref: '#/components/schemas/TransactionQuantity'
        transactionGrossValue:
          $ref: '#/components/schemas/TransactionGrossValue'
        incomeTax:
          type: object
          description: |
            Valor del impuesto a la renta retenido en la transacción.
            [Restricción] Campo de llenado obligatorio por las participantes cuando el campo 'type' sea completado con el valor 'SAIDA'.
          required:
            - amount
            - currency
          properties:
            amount:
              type: string
              format: double
              pattern: '^\d{1,15}\.\d{2,4}$'
              maxLength: 20
              minLength: 4
              example: '1000.04'
              description: Valor relacionado al objeto.
            currency:
              $ref: '#/components/schemas/Currency'
        financialTransactionTax:
          type: object
          description: |
            Valor del IOF retenido en la transacción.
            [Restricción] Campo de llenado obligatorio por las participantes cuando el campo 'type' sea completado con el valor 'SAIDA'.
          required:
            - amount
            - currency
          properties:
            amount:
              type: string
              format: double
              pattern: '^\d{1,15}\.\d{2,4}$'
              maxLength: 20
              minLength: 4
              example: '1000.04'
              description: Valor relacionado al objeto.
            currency:
              $ref: '#/components/schemas/Currency'
        transactionNetValue:
          $ref: '#/components/schemas/TransactionNetValue'
        remunerationTransactionRate:
          $ref: '#/components/schemas/RemunerationTransactionRate'
        indexerPercentage:
          $ref: '#/components/schemas/IndexerPercentage'
        transactionId:
          $ref: '#/components/schemas/LegacyId'
    RemunerationTransactionRate:
      type: string
      description: |
        Tasa de remuneración acordada con el cliente en la contratación.

        [Restricción] Campo de llenado obligatorio por las participantes cuando el campo 'type' sea completado con el valor 'ENTRADA' y se trate de un producto prefijado o híbrido.
      maxLength: 8
      minLength: 8
      pattern: '^\d{1}\.\d{6}$'
      example: '0.300000'
    TransactionDate:
      type: string
      format: date
      description: Fecha del movimiento
      maxLength: 10
      pattern: '^(\d{4})-(1[0-2]|0?[1-9])-(3[01]|[12][0-9]|0?[1-9])$'
      example: '2018-02-15'
    TransactionGrossValue:
      type: object
      description: 'Valor bruto de la transacción (Precio unitario del movimiento x Cantidad)'
      required:
        - amount
        - currency
      properties:
        amount:
          type: string
          format: double
          pattern: '^\d{1,15}\.\d{2,4}$'
          maxLength: 20
          minLength: 4
          example: '1000.04'
          description: Valor relacionado al objeto.
        currency:
          $ref: '#/components/schemas/Currency'
    TransactionNetValue:
      type: object
      description: Valor neto de la transacción
      required:
        - amount
        - currency
      properties:
        amount:
          type: string
          format: double
          pattern: '^\d{1,15}\.\d{2,4}$'
          maxLength: 20
          minLength: 4
          example: '1000.04'
          description: Valor relacionado al objeto.
        currency:
          $ref: '#/components/schemas/Currency'
    TransactionQuantity:
      type: string
      description: |
        Cantidad de títulos involucrados en el movimiento

        [Restricción] Campo de llenado obligatorio por las participantes cuando el campo 'transactionType' sea completado con los valores 'COMPRA', 'VENDA', 'VENCIMENTO', 'TRANSFERENCIA_TITULARIDADE' o 'TRANSFERENCIA_CUSTODIA'.
      maxLength: 24
      pattern: '^\d{1,15}\.\d{2,8}$'
      example: '42.25'
    TransactionType:
      type: string
      description: Compra, venta, cancelación, vencimiento, pago de intereses, amortización, premio, transferencia de titularidad, transferencia de custodia, multa, mora y otros. Para movimientos de transferencia (titularidad o custodia) se debe considerar el precio unitario (transactionUnitPrice) de la adquisición del título.
      enum:
        - COMPRA
        - VENDA
        - CANCELAMENTO
        - VENCIMENTO
        - PAGAMENTO_JUROS
        - AMORTIZACAO
        - PREMIO
        - TRANSFERENCIA_TITULARIDADE
        - TRANSFERENCIA_CUSTODIA
        - MULTA
        - MORA
        - OUTROS
      example: COMPRA
    Type:
      type: string
      description: |
        Tipo de movimiento en la visión de inversión:

        ENTRADA: COMPRA, CANCELAMENTO, TRANSFERENCIA_TITULARIDADE, TRANSFERENCIA_CUSTODIA, OUTROS.

        SAIDA: VENDA, CANCELAMENTO, VENCIMENTO, PAGAMENTO_JUROS, AMORTIZACAO, PREMIO, TRANSFERENCIA_TITULARIDADE, TRANSFERENCIA_CUSTODIA, MULTA, MORA, OUTROS.

        Por ejemplo, para un movimiento de CANCELAMENTO, típicamente, será el tipo contrario al evento originario. Es decir, para cancelación de COMPRA, se considera tipo SAIDA; para cancelación de VENDA, se considera tipo ENTRADA.
      enum:
        - ENTRADA
        - SAIDA
      example: ENTRADA
    TypeAdditionalInfo:
      type: string
      description: |
        Información adicional del tipo de movimiento, para completar en caso de movimientos no delimitados en el dominio
        [Restricción] Campo de llenado obligatorio por las participantes cuando haya 'OUTROS' en el campo 'transactionType'.
      maxLength: 100
      pattern: '[\w\W\s]*'
    UpdatedUnitPrice:
      type: object
      description: valor bruto unitario actualizado en la fecha de referencia;
      required:
        - amount
        - currency
      properties:
        amount:
          type: string
          format: double
          pattern: '^\d{1,15}\.\d{2,8}$'
          maxLength: 24
          minLength: 4
          example: '1000.0400'
          description: Valor relacionado al objeto.
        currency:
          $ref: '#/components/schemas/Currency'
    VoucherPaymentIndicator:
      type: string
      description: |
        Indicativo si hay pago de cupón
          1. Sí
          2. No
      enum:
        - SIM
        - NAO
      example: SIM
    VoucherPaymentPeriodicity:
      type: string
      description: |
        En caso de haber pago de cupón, describir la periodicidad (mensual, trimestral, semestral, anual, irregular y otros)
          1. Mensual

          2. Trimestral

          3. Semestral

          4. Anual

          5. Irregular

          6. Otros

          [Restricción] Campo de llenado obligatorio por los participantes cuando haya 'SIM' en el campo indicativo de pago de cupón 'voucherPaymentIndicator'.
      enum:
        - MENSAL
        - TRIMESTRAL
        - SEMESTRAL
        - ANUAL
        - IRREGULAR
        - OUTROS
      example: MENSAL
    ResponseErrorMetaSingle:
      type: object
      required:
        - errors
      properties:
        errors:
          type: array
          minItems: 1
          maxItems: 13
          items:
            type: object
            required:
              - code
              - title
              - detail
            properties:
              code:
                description: Código de error específico del endpoint
                type: string
                pattern: '[\w\W\s]*'
                maxLength: 255
              title:
                description: Título legible por humanos de este error específico
                type: string
                pattern: '[\w\W\s]*'
                maxLength: 255
              detail:
                description: Descripción legible por humanos de este error específico
                type: string
                pattern: '[\w\W\s]*'
                maxLength: 2048
        meta:
          type: object
          description: Meta información referente a la API solicitada.
          required:
            - requestDateTime
          properties:
            requestDateTime:
              description: 'Fecha y hora de la consulta, según especificación RFC-3339, formato UTC.'
              type: string
              maxLength: 20
              format: date-time
              example: '2021-05-21T08:30:00Z'
    ResponseError:
      type: object
      required:
        - errors
      properties:
        errors:
          type: array
          minItems: 1
          maxItems: 13
          items:
            type: object
            required:
              - code
              - title
              - detail
            properties:
              code:
                description: Código de error específico del endpoint
                type: string
                pattern: '[\w\W\s]*'
                maxLength: 255
              title:
                description: Título legible por humanos de este error específico
                type: string
                pattern: '[\w\W\s]*'
                maxLength: 255
              detail:
                description: Descripción legible por humanos de este error específico
                type: string
                pattern: '[\w\W\s]*'
                maxLength: 2048
        meta:
          type: object
          description: Meta información referente a la API solicitada.
          required:
            - totalRecords
            - totalPages
            - requestDateTime
          properties:
            totalRecords:
              type: integer
              format: int32
              description: Número total de registros en el resultado
              example: 1
            totalPages:
              type: integer
              format: int32
              description: Número total de páginas en el resultado
              example: 1
            requestDateTime:
              description: 'Fecha y hora de la consulta, según especificación RFC-3339, formato UTC.'
              type: string
              maxLength: 20
              format: date-time
              example: '2021-05-21T08:30:00Z'
    LegacyId:
      description: |
        Array de clave y valor con la clave de identificación del recurso en el sistema de origen (legado), permitiendo claves compuestas
      type: array
      items:
        type: object
        required:
          - key
          - value
        properties:
          key:
            description: |
              Nombre del campo del identificador en el sistema de origen
            type: string
            example: internalResourceId
          value:
            description: |
              Valor del campo del identificador en el sistema de origen
            type: string
            example: '1234'
        additionalProperties: false
      minItems: 1
      maxItems: 10
    ToTransactionDate:
      description: |
        Fecha final de filtrado.
        [Restricción] Debe ser enviado obligatoriamente si se informa el campo fromTransactionDate.
        Si no se informa, se debe asumir el día actual.
      type: string
      maxLength: 10
      format: date
      example: '2021-05-21'
    FromTransactionDate:
      description: |
        Fecha inicial de filtrado.
        [Restricción] Debe ser enviado obligatoriamente si se informa el campo toTransactionDate.
        Si no se informa, se debe asumir el día actual.
      type: string
      maxLength: 10
      format: date
      example: '2021-05-21'
    ToTransactionDateCurrent:
      description: |
        Fecha final de filtrado.
        El período máximo utilizado en el filtro es de 7 días inclusive (D-6).
        [Restricción] Debe ser enviado obligatoriamente si se informa el campo fromTransactionDate.
        Si no se informa, se debe asumir el día actual.
      type: string
      maxLength: 10
      format: date
      example: '2023-02-01'
    FromTransactionDateCurrent:
      description: |
        Fecha inicial de filtrado.
        El período máximo utilizado en el filtro es de 7 días inclusive (D-6).
        [Restricción] Debe ser enviado obligatoriamente si se informa el campo toTransactionDate.
        Si no se informa, se debe asumir el día actual.
      type: string
      maxLength: 10
      format: date
      example: '2023-02-01'
    PaginationKey:
      description: |
        Identificador de rellamada, utilizado para evitar el conteo de llamadas al endpoint durante la paginación.
        Este campo puede ser transferido de un flujo anterior como un valor residual y, aunque pueda estar presente en la solicitud, no es necesario utilizarlo — simplemente puede ser ignorado.
      type: string
      maxLength: 2048
      pattern: '[\w\W\s]*'
    Page:
      description: |
        Número de la página que se está solicitando (el valor de la primera página es 1).
      type: integer
      default: 1
      minimum: 1
      maximum: 2147483647
      format: int32
    PageSize:
      description: |
        Cantidad total de registros por páginas.
      type: integer
      default: 25
      minimum: 1
      format: int32
      maximum: 1000
    ConsentDataSharing:
      description: |
        Consentimiento de compartición de datos
      type: object
      required:
        - brandId
        - creationDateTime
        - tpp
        - externalId
        - loggedUser
        - permissions
      properties:
        authExtraData:
          type: array
          description: |
            Array de clave y valor con datos adicionales provenientes del autorizador.
            Estos datos pueden ser utilizados como filtros de recursos.
          items:
            type: object
            required:
              - key
              - value
            properties:
              key:
                type: string
                example: agencia
              value:
                type: string
                example: '0011'
        consentOwner:
          deprecated: true
          type: array
          description: |
            [Obsoleto] Array de clave y valor con los datos de identificación referentes al dueño del consentimiento.
          items:
            type: object
            required:
              - key
              - value
            properties:
              key:
                type: string
                example: agencia
              value:
                type: string
                example: '0011'
        brandId:
          type: string
          description: |
            Identificador de la marca reportada por el participante de Open Finance
          example: cbanco
          minLength: 1
          maxLength: 50
        creationDateTime:
          description: |
            Fecha y hora en que se creó el consentimiento.
            Una cadena con fecha y hora según especificación RFC-3339, siempre con la utilización de zona horaria UTC (UTC time format).
          type: string
          pattern: '^(\d{4})-(1[0-2]|0?[1-9])-(3[01]|[12][0-9]|0?[1-9])T(?:[01]\d|2[0123]):(?:[012345]\d):(?:[012345]\d)Z$ '
          example: '2021-05-21T08:30:00Z'
          maxLength: 20
        tpp:
          type: object
          description: |
            Detalles del TPP (Third Party Provider) que solicitó el consentimiento
          additionalProperties: false
          required:
            - name
          properties:
            name:
              type: string
              description: |
                Nombre del TPP que solicitó el consentimiento
              example: GuiaBolsa
              maxLength: 100
        externalId:
          type: string
          description: |
            Identificador del consentimiento utilizado fuera de la plataforma Opus Open Finance
          example: urn:oob-bank:2f710909-4ccd-4998-8679-3d8de00e5ccf
          maxLength: 100
        loggedUser:
          type: object
          description: |
            Usuario (persona natural) que se encuentra conectado en la institución Transmisora de Datos.
          additionalProperties: false
          required:
            - document
          properties:
            document:
              type: object
              description: |
                Documento de identificación oficial del usuario.
              additionalProperties: false
              required:
                - identification
                - rel
              properties:
                identification:
                  type: string
                  maxLength: 11
                  description: |
                    Número del documento de identificación oficial del usuario.
                  example: '11111111111'
                  pattern: ^\d{11}$
                rel:
                  type: string
                  maxLength: 3
                  description: |
                    Tipo del documento de identificación oficial del usuario.
                  example: CPF
                  pattern: ^[A-Z]{3}$
        businessDocumentType:
          type: object
          description: |
            Usuario (persona jurídica) que se encuentra conectado en la institución Transmisora de Datos.
            [Restricción] Llenado obligatorio si el usuario conectado en la institución Transmisora de Datos es un CNPJ (persona jurídica).
          additionalProperties: false
          required:
            - document
          properties:
            document:
              type: object
              description: |
                Documento de identificación oficial del titular persona jurídica.
              additionalProperties: false
              required:
                - identification
                - rel
              properties:
                identification:
                  type: string
                  maxLength: 14
                  description: |
                    Número del documento de identificación oficial del titular persona jurídica.
                  example: '11111111111111'
                  pattern: ^\d{14}$
                rel:
                  type: string
                  maxLength: 4
                  description: |
                    Tipo del documento de identificación oficial del titular persona jurídica.
                  example: CNPJ
                  pattern: ^[A-Z]{4}$
        resources:
          description: |
            Lista de recursos permitidos por el cliente
          type: array
          items:
            type: object
            description: |
              Recursos seleccionados por el cliente
            required:
              - type
              - resourceLegacyId
            properties:
              type:
                description: |
                  Tipo del recurso
                type: string
                enum:
                  - ACCOUNT
                  - CREDIT_CARD_ACCOUNT
                  - LOAN
                  - FINANCING
                  - UNARRANGED_ACCOUNT_OVERDRAFT
                  - INVOICE_FINANCING
                  - PAYMENT
                  - BANK_FIXED_INCOME
                  - CREDIT_FIXED_INCOME
                  - VARIABLE_INCOME
                  - TREASURE_TITLE
                  - FUND
                example: PAYMENT
              resourceLegacyId:
                $ref: '#/components/schemas/LegacyId'
              authorizers:
                deprecated: true
                description: |
                  [Obsoleto] Lista de los autorizadores para el recurso en casos de múltiple competencia.
                  Si el recurso es seleccionado, todos los autorizadores deberán aceptar el consentimiento del que el recurso forma parte.
                type: array
                items:
                  type: object
                  required:
                    - cpf
                    - name
                  properties:
                    cpf:
                      description: |
                        CPF del autorizador
                      type: string
                      minLength: 11
                      maxLength: 11
                      pattern: ^\d{11}$
                      example: '11111111111'
                    name:
                      description: |
                        Nombre del autorizador
                      type: string
                      example: Marco Antonio de Brito
                minItems: 1
              hasMultipleAuthorisers:
                deprecated: true
                type: boolean
                example: 'false'
            additionalProperties: false
          maxItems: 1000
        expirationDateTime:
          description: |
            Fecha y hora de expiración del permiso.
            De llenado obligatorio, refleja la fecha límite de validez del consentimiento.
            Una cadena con fecha y hora según especificación RFC-3339, siempre con la utilización de zona horaria UTC (UTC time format).
          type: string
          maxLength: 20
          pattern: '^(\d{4})-(1[0-2]|0?[1-9])-(3[01]|[12][0-9]|0?[1-9])T(?:[01]\d|2[0123]):(?:[012345]\d):(?:[012345]\d)Z$ '
          example: '2021-05-21T08:30:00Z'
        permissions:
          type: array
          items:
            description: |
              Solo para consentimientos de compartición de datos.
              Especifica los tipos de permisos de acceso a las APIs en el ámbito de Open Finance Brasil - Fase 2, de acuerdo con los bloques de consentimiento proporcionados por el usuario y necesarios para el acceso a cada endpoint de las APIs.
            type: string
            enum:
              - ACCOUNTS_READ
              - ACCOUNTS_BALANCES_READ
              - ACCOUNTS_TRANSACTIONS_READ
              - ACCOUNTS_OVERDRAFT_LIMITS_READ
              - CREDIT_CARDS_ACCOUNTS_READ
              - CREDIT_CARDS_ACCOUNTS_BILLS_READ
              - CREDIT_CARDS_ACCOUNTS_BILLS_TRANSACTIONS_READ
              - CREDIT_CARDS_ACCOUNTS_LIMITS_READ
              - CREDIT_CARDS_ACCOUNTS_TRANSACTIONS_READ
              - CUSTOMERS_PERSONAL_IDENTIFICATIONS_READ
              - CUSTOMERS_PERSONAL_ADITTIONALINFO_READ
              - CUSTOMERS_BUSINESS_IDENTIFICATIONS_READ
              - CUSTOMERS_BUSINESS_ADITTIONALINFO_READ
              - FINANCINGS_READ
              - FINANCINGS_SCHEDULED_INSTALMENTS_READ
              - FINANCINGS_PAYMENTS_READ
              - FINANCINGS_WARRANTIES_READ
              - INVOICE_FINANCINGS_READ
              - INVOICE_FINANCINGS_SCHEDULED_INSTALMENTS_READ
              - INVOICE_FINANCINGS_PAYMENTS_READ
              - INVOICE_FINANCINGS_WARRANTIES_READ
              - LOANS_READ
              - LOANS_SCHEDULED_INSTALMENTS_READ
              - LOANS_PAYMENTS_READ
              - LOANS_WARRANTIES_READ
              - UNARRANGED_ACCOUNTS_OVERDRAFT_READ
              - UNARRANGED_ACCOUNTS_OVERDRAFT_SCHEDULED_INSTALMENTS_READ
              - UNARRANGED_ACCOUNTS_OVERDRAFT_PAYMENTS_READ
              - UNARRANGED_ACCOUNTS_OVERDRAFT_WARRANTIES_READ
              - BANK_FIXED_INCOMES_READ
              - CREDIT_FIXED_INCOMES_READ
              - FUNDS_READ
              - VARIABLE_INCOMES_READ
              - TREASURE_TITLES_READ
              - EXCHANGES_READ
              - RESOURCES_READ
          minItems: 1
          maxItems: 30
          example:
            - ACCOUNTS_READ
            - ACCOUNTS_OVERDRAFT_LIMITS_READ
            - RESOURCES_READ
      additionalProperties: false
    RequestMeta:
      type: object
      description: |
        Objeto que contiene datos referentes al contexto en el que se recibe la solicitud.
      required:
        - correlationId
        - brandId
      properties:
        correlationId:
          type: string
          description: |
            UUID que identifica el correlation ID de la solicitud realizada.
            Debe ser propagado a todas las llamadas hechas entre sistemas y registrado siempre que sea posible para facilitar el rastreo de errores.
          pattern: ^(localID:)?[0-9a-fA-F]{8}-[0-9a-fA-F]{4}-[0-9a-fA-F]{4}-[0-9a-fA-F]{4}-[0-9a-fA-F]{12}$
          example: localID:97623ed1-4732-4bf2-8d4b-ae7aced5443b
        brandId:
          type: string
          description: |
            Identificador de la marca reportada por el participante de Open Finance
          example: cbanco
          minLength: 1
          maxLength: 50
      additionalProperties: false
    RequestWithConsentAndRequestMeta:
      type: object
      required:
        - consent
        - requestMeta
      properties:
        consent:
          $ref: '#/components/schemas/ConsentDataSharing'
        requestMeta:
          $ref: '#/components/schemas/RequestMeta'
    RequestWithConsentAndRequestMetaAndPagination:
      type: object
      required:
        - consent
        - requestMeta
      properties:
        consent:
          $ref: '#/components/schemas/ConsentDataSharing'
        requestMeta:
          $ref: '#/components/schemas/RequestMeta'
        page:
          $ref: '#/components/schemas/Page'
        pageSize:
          $ref: '#/components/schemas/PageSize'
        pagination-key:
          $ref: '#/components/schemas/PaginationKey'
    MetaOnlyRequestDateTimeAndHasMoreRecords:
      type: object
      description: |
        Meta información referente a la API solicitada.
      required:
        - requestDateTime
        - hasMoreRecords
      properties:
        requestDateTime:
          description: |
            Fecha y hora de la consulta, según especificación RFC-3339, formato UTC.
          type: string
          maxLength: 20
          format: date-time
          example: '2021-05-21T08:30:00Z'
        hasMoreRecords:
          type: boolean
          description: |
            Indica si hay más registros a ser retornados (true) o no (false).
          example: true
    NonSelectableResourceDiscoveryResponse:
      title: Non-Selectable Resource Discovery Response
      type: object
      required:
        - data
      properties:
        data:
          type: object
          description: |
            Objeto que contiene la lista de recursos del cliente.
          required:
            - resources
          properties:
            resources:
              description: |
                Lista de recursos relacionados al discovery
              type: array
              items:
                type: object
                properties:
                  resourceLegacyId:
                    description: |
                      Array de clave y valor con la clave de identificación del recurso en el sistema de origen (legado), permitiendo claves compuestas
                    type: array
                    items:
                      type: object
                      properties:
                        key:
                          description: |
                            Nombre del campo del identificador en el sistema de origen
                          type: string
                        value:
                          description: |
                            Valor del campo del identificador en el sistema de origen
                          type: string
                      required:
                        - key
                  validUntil:
                    description: |
                      Indica la fecha hasta la cual el recurso estará disponible.
                    type: string
                    format: date
                    example: '2025-05-21'
                  status:
                    description: |
                      Indica el estado actual del recurso
                    type: string
                    default: AVAILABLE
                    enum:
                      - AVAILABLE
                      - PENDING_AUTHORISATION
                      - UNAVAILABLE
                      - TEMPORARILY_UNAVAILABLE
                  authorizers:
                    description: |
                      Lista de los autorizadores para el recurso en casos de múltiple competencia.
                      Si el recurso es seleccionado, todos los autorizadores deberán aceptar el consentimiento del que el recurso forma parte.
                    type: array
                    items:
                      type: object
                      properties:
                        cpf:
                          description: |
                            CPF del autorizador
                          type: string
                          minLength: 11
                          maxLength: 11
                          pattern: ^\d{11}$
                        name:
                          description: |
                            Nombre del autorizador
                          type: string
                      required:
                        - cpf
                        - name
                    minItems: 1
                required:
                  - resourceLegacyId
                  - validUntil
    RequestWithConsentAndRequestMetaAndInvestmentId:
      type: object
      required:
