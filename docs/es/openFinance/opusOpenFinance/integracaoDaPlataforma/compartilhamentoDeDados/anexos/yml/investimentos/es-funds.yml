          $ref: '#/components/responses/Default'
components:
  schemas:
    ResponseFundsProductList:
      type: object
      required:
        - data
        - meta
      properties:
        data:
          type: array
          minItems: 0
          items:
            $ref: '#/components/schemas/ResponseFundsProductListData'
        meta:
          $ref: '#/components/schemas/FundsMeta'
      additionalProperties: false
    ResponseFundsProductIdentification:
      type: object
      required:
        - data
        - meta
      properties:
        data:
          $ref: '#/components/schemas/ResponseFundsProductIdentificationData'
        meta:
          $ref: '#/components/schemas/FundsMeta'
      additionalProperties: false
    ResponseFundsBalances:
      type: object
      required:
        - data
        - meta
      properties:
        data:
          $ref: '#/components/schemas/ResponseFundsBalanceData'
        meta:
          $ref: '#/components/schemas/FundsMeta'
      additionalProperties: false
    ResponseFundsTransactions:
      type: object
      required:
        - data
        - meta
      properties:
        data:
          type: array
          minItems: 0
          items:
            $ref: '#/components/schemas/ResponseFundsTransactionsData'
        meta:
          $ref: '#/components/schemas/MetaOnlyRequestDateTimeAndHasMoreRecords'
      additionalProperties: false
    ResponseFundsTransactionsCurrent:
      type: object
      required:
        - data
        - meta
      properties:
        data:
          type: array
          minItems: 0
          items:
            $ref: '#/components/schemas/ResponseFundsTransactionsCurrentData'
        meta:
          $ref: '#/components/schemas/MetaOnlyRequestDateTimeAndHasMoreRecords'
      additionalProperties: false
    ResponseFundsProductListData:
      type: object
      description: Lista de fondos de inversión mantenidos por el cliente en la institución transmisora y para los cuales haya proporcionado consentimiento.
      required:
        - brandName
        - companyCnpj
        - investmentId
      properties:
        brandName:
          type: string
          description: 'Nombre de la Marca reportada por el participante en Open Finance. Se recomienda utilizar, siempre que sea posible, el mismo nombre de marca atribuido en el campo del directorio Customer Friendly Server Name (Authorisation Server).'
          pattern: '[\w\W\s]*'
          example: Organização A
          maxLength: 80
        companyCnpj:
          type: string
          description: 'Número completo del CNPJ de la institución responsable del Registro - el CNPJ corresponde al número de inscripción en el Registro de Personas Jurídicas. Debe tener solo los números del CNPJ, sin máscara.'
          maxLength: 14
          pattern: '^\d{14}$'
          example: '21128159000166'
        anbimaCategory:
          type: string
          description: |
            Según clasificación ANBIMA, que sigue la deliberación 77 de ANBIMA.

            – Renta Fija

            – Acciones

            – Multimercado

            – Cambiario

            https://www.anbima.com.br/data/files/5A/44/2C/B7/8411B510CD3B4DA568A80AC2/DeliberacaoN77-Diretriz-de-Classificacao-de-Fundos.pdf
          enum:
            - RENDA_FIXA
            - ACOES
            - MULTIMERCADO
            - CAMBIAL
          example: RENDA_FIXA
        anbimaClass:
          type: string
          description: Campo necesario para la adhesión a la Resolución CVM175. En espera de definiciones de mercado. Debe ser un campo de tipo enum.
          maxLength: 70
          pattern: '[\w\W\s]*'
        anbimaSubclass:
          type: string
          description: Campo necesario para la adhesión a la Resolución CVM175. En espera de definiciones de mercado. Debe ser un campo de tipo enum.
          maxLength: 70
          pattern: '[\w\W\s]*'
        investmentId:
          $ref: '#/components/schemas/LegacyId'
      additionalProperties: false
    ResponseFundsProductIdentificationData:
      type: object
      description: Informaciones del producto de fondo de inversión al que se refiere investmentId.
      required:
        - name
        - cnpjNumber
      properties:
        name:
          type: string
          description: Nombre oficial del fondo de inversión según se muestra a los clientes en los canales electrónicos.
          maxLength: 250
          example: CONSTELLATION MASTER FIA
        cnpjNumber:
          type: string
          description: CNPJ del fondo de inversión.
          maxLength: 14
          pattern: '^\d{14}$'
          example: '11225860000140'
        isinCode:
          type: string
          description: |
            Código universal que identifica cada valor mobiliario o instrumento financiero, según la Norma ISO 6166.

            DEFINICIÓN: El ISIN (International Securities Identification Number) es un código que identifica un valor mobiliario, conforme a la norma ISO 6166.

            ESTRUCTURA: El ISIN es un código alfanumérico que tiene 12 caracteres con la siguiente estructura:
            - Un prefijo, compuesto de 2 caracteres alfa, que identifica el código del país (Norma ISO 3166);
            - El número básico, compuesto de 9 caracteres alfabéticos o numéricos en su extensión;
            - Un dígito numérico de control.
          maxLength: 12
          minLength: 12
          pattern: '^[A-Z]{2}([A-Z0-9]){9}\d{1}$'
          example: BRCST4CTF001
        anbimaCategory:
          type: string
          description: |
            Según clasificación ANBIMA, que sigue la deliberación 77 de ANBIMA.

            – Renta Fija

            – Acciones

            – Multimercado

            – Cambiario

            https://www.anbima.com.br/data/files/5A/44/2C/B7/8411B510CD3B4DA568A80AC2/DeliberacaoN77-Diretriz-de-Classificacao-de-Fundos.pdf
          enum:
            - RENDA_FIXA
            - ACOES
            - MULTIMERCADO
            - CAMBIAL
          example: RENDA_FIXA
        anbimaClass:
          type: string
          description: Campo necesario para la adhesión a la Resolución CVM175. En espera de definiciones de mercado. Debe ser un campo de tipo enum.
          maxLength: 70
          pattern: '[\w\W\s]*'
        anbimaSubclass:
          type: string
          description: Campo necesario para la adhesión a la Resolución CVM175. En espera de definiciones de mercado. Debe ser un campo de tipo enum.
          maxLength: 70
          pattern: '[\w\W\s]*'
      additionalProperties: false
    ResponseFundsBalanceData:
      type: object
      description: Informaciones de la posición del fondo de inversión al que se refiere investmentId.
      required:
        - referenceDate
        - grossAmount
        - netAmount
        - incomeTaxProvision
        - financialTransactionTaxProvision
        - blockedAmount
        - quotaQuantity
        - quotaGrossPriceValue
      properties:
        referenceDate:
          type: string
          format: date
          description: Fecha de la última posición consolidada disponible a la que se refieren los datos transaccionales del cliente disponibles en los canales electrónicos.
          maxLength: 10
          pattern: '^(\d{4})-(1[0-2]|0?[1-9])-(3[01]|[12][0-9]|0?[1-9])$'
          example: '2023-01-07'
        grossAmount:
          $ref: '#/components/schemas/FundsBalancesGrossAmount'
        netAmount:
          $ref: '#/components/schemas/FundsBalancesNetAmount'
        incomeTaxProvision:
          $ref: '#/components/schemas/FundsBalancesIncomeTaxProvision'
        financialTransactionTaxProvision:
          $ref: '#/components/schemas/FundsBalancesFinancialTransactionTaxProvision'
        blockedAmount:
          $ref: '#/components/schemas/FundsBalancesBlockedAmount'
        quotaQuantity:
          type: string
          format: double
          description: Cantidad de cuotas poseídas en posición del cliente.
          pattern: '^\d{1,15}\.\d{2,8}$'
          maxLength: 24
          example: '42.25'
        quotaGrossPriceValue:
          $ref: '#/components/schemas/FundsBalancesQuotaGrossPriceValue'
    ResponseFundsTransactionsData:
      type: object
      description: Informaciones de la posición del fondo de inversión al que se refiere investmentId.
      required:
        - transactionId
        - type
        - transactionType
        - transactionConversionDate
        - transactionQuotaPrice
        - transactionQuotaQuantity
        - transactionValue
        - transactionGrossValue
      properties:
        transactionId:
          $ref: '#/components/schemas/LegacyId'
        type:
          $ref: '#/components/schemas/EnumFundsTransactionsType'
        transactionType:
          $ref: '#/components/schemas/EnumFundsTransactionsTransactionType'
        transactionTypeAdditionalInfo:
          type: string
          description: |
            Información adicional del tipo del motivo, para completar en caso de movimientos no delimitados en el dominio.

            [Restricción] Campo de llenado obligatorio por las participantes cuando el campo 'transactionType' sea completado con el valor 'OUTROS'.
          maxLength: 100
          pattern: '[\w\W\s]*'
        transactionConversionDate:
          type: string
          format: date
          description: Fecha de conversión de la transacción de movimiento del fondo de inversión.
          maxLength: 10
          minLength: 10
          pattern: '^(\d{4})-(1[0-2]|0?[1-9])-(3[01]|[12][0-9]|0?[1-9])$'
          example: '2023-01-07'
        transactionQuotaPrice:
          type: object
          description: |
            Es el valor de la cuota utilizada en la conversión para la realización del movimiento del cliente en el fondo, conforme a la regla prevista en el reglamento - el valor puede ser negativo.
          required:
            - amount
            - currency
          properties:
            amount:
              type: string
              format: double
              description: Valor relacionado al objeto.
              maxLength: 25
              pattern: '^-?\d{1,15}\.\d{2,8}$'
              example: '1000.04'
            currency:
              type: string
              description: 'Moneda referente al valor monetario, siguiendo el modelo ISO-4217.'
              pattern: '^[A-Z]{3}$'
              maxLength: 3
              example: BRL
        transactionQuotaQuantity:
          type: string
          format: double
          description: |
            Número de cuotas convertidas en la fecha del movimiento.
          maxLength: 24
          pattern: '^\d{1,15}\.\d{2,8}$'
          example: '42.25'
        transactionValue:
          type: object
          description: Valor solicitado por el cliente.
          required:
            - amount
            - currency
          properties:
            amount:
              type: string
              format: double
              description: Valor relacionado al objeto.
              maxLength: 21
              pattern: '^-?\d{1,15}\.\d{2,4}$'
              example: '1000.04'
            currency:
              type: string
              description: 'Moneda referente al valor monetario, siguiendo el modelo ISO-4217.'
              pattern: '^[A-Z]{3}$'
              maxLength: 3
              example: BRL
        transactionGrossValue:
          type: object
          description: |
            Valor del movimiento que se refiere a la cantidad de la cuota x valor de la cuota del movimiento.
            En los casos en que no haya movimiento de cuotas, por ejemplo: amortización, no considerar la regla descrita.
          required:
            - amount
            - currency
          properties:
            amount:
              type: string
              format: double
              description: Valor relacionado al objeto.
              maxLength: 21
              pattern: '^-?\d{1,15}\.\d{2,4}$'
              example: '1000.04'
            currency:
              type: string
              description: 'Moneda referente al valor monetario, siguiendo el modelo ISO-4217.'
              pattern: '^[A-Z]{3}$'
              maxLength: 3
              example: BRL
        incomeTax:
          type: object
          description: |
            Valor del Impuesto a la Renta (IR) retenido en la fuente considerando la alícuota vigente en la fecha del movimiento.

            [Restricción] Campo de llenado obligatorio por las participantes cuando el campo 'type' sea completado con el valor 'SAIDA'.
          required:
            - amount
            - currency
          properties:
            amount:
              type: string
              format: double
              description: Valor relacionado al objeto.
              maxLength: 21
              pattern: '^-?\d{1,15}\.\d{2,4}$'
              example: '1000.04'
            currency:
              type: string
              description: 'Moneda referente al valor monetario, siguiendo el modelo ISO-4217.'
              pattern: '^[A-Z]{3}$'
              maxLength: 3
              example: BRL
