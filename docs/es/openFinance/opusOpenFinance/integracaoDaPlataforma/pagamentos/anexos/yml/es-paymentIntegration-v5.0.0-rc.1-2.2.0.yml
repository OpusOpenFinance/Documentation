  /cancellation:
    post:
      tags:
        - Pagamentos
      summary: Cancelar iniciación de pago.
      description: "Este endpoint debe ser utilizado para cancelar, a pedido del cliente
        pagador, las transacciones que estén en una de las siguientes situaciones:
        Agendada con éxito (SCHD) o retenida para análisis (PDNG).




        - Si la solicitud es exitosa, la transacción pasa a la situación
        CANC.




        - Si el estado del pago es diferente de SCHD/PDNG o alguna otra
        regla de negocio impida la cancelación, la solicitud retorna HTTP Status
        422 con el code PAGAMENTO_NAO_PERMITE_CANCELAMENTO.

        \\



        - Si recibe un 422, la iniciadora realizará una solicitud find en el pago
        para verificar la situación actual del mismo, así como los detalles asociados.




        \ La cancelación de pago agendado (SCHD) puede ser enviada hasta las 23:59
        (Horario de Brasilia) del día anterior a la fecha de efectivación del pago.

        \n"
      requestBody:
        content:
          application/jwt:
            schema:
              $ref: "#/components/schemas/CancellationPixPayment"
            examples:
