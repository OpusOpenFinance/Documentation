    DebtorAccount:
      type: object
      description: "Objeto que contiene la identificación de la cuenta de origen del pagador.
        \ 


        Las informaciones sobre la cuenta de origen del pagador podrán ser traídas
        en el consentimiento para la titular, caso el iniciador haya recolectado
        estas informaciones del cliente. De lo contrario, será recolectada en la titular y
        traída para el iniciador como respuesta a la creación del pago.

        \n"
      required:
        - ispb
        - number
        - accountType
      properties:
        ispb:
          type: string
          minLength: 8
          maxLength: 8
          pattern: ^[0-9A-Z]{8}$
          description: "Debe ser llenado con el ISPB (Identificador del Sistema de
            Pagamentos Brasileños) del participante del SPI (Sistema de
            pagos instantáneos) solo con números.

            \n"
          example: "12345678"
        issuer:
          type: string
          minLength: 1
          maxLength: 4
          pattern: ^[0-9]{1,4}$
          description: "Código de la Agencia emisora de la cuenta sin dígito. \ 


            (Agencia es la dependencia destinada a la atención al cliente, al
            público en general y a los asociados de cooperativas de crédito, \ 


            en el ejercicio de actividades de la institución, no pudiendo ser móvil o
            transitoria). \ 


            [Restricción] Llenado obligatorio para los siguientes tipos de
            cuenta: CACC (CONTA_DEPOSITO_A_VISTA), SVGS (CONTA_POUPANCA) y SLRY
            (CONTA_SALARIO).

            \n"
          example: "1774"
        number:
          type: string
          minLength: 1
          maxLength: 20
          pattern: ^[0-9]{1,20}$
          description: "Debe ser llenado con el número de la cuenta transaccional del usuario
            pagador, con dígito verificador (si este existe), \ 


            si hay valor alfanumérico, este debe ser convertido a 0.

            \n"
          example: "1234567890"
        accountType:
          $ref: "#/components/schemas/EnumAccountPaymentsType"
      additionalProperties: false
    AuthExtraData:
      type: array
      description: Array de clave y valor con datos de la institución, estos datos serán
        enviados al conector de discovery y pueden ser utilizados como
        filtros para elección de recursos.
      items:
        type: object
        required:
          - key
          - value
        properties:
          key:
            type: string
            example: agencia
          value:
            type: string
            example: "0011"
    ConsentOwner:
      type: array
      description: Array de clave y valor con los datos de identificación referentes al
        dueño del consentimiento. Estos datos serán enviados al conector de
        discovery.
      items:
        type: object
        required:
          - key
          - value
        properties:
          key:
            type: string
            example: agencia
          value:
            type: string
            example: "0011"
    ConsentPayment:
      description: Consentimiento de pago
      type: object
      required:
        - brandId
        - creationDateTime
        - tpp
        - externalId
        - loggedUser
        - expirationDateTime
        - creditor
        - payment
      properties:
        brandId:
          $ref: "#/components/schemas/BrandId"
        creationDateTime:
          $ref: "#/components/schemas/CreationDateTime"
        tpp:
          $ref: "#/components/schemas/TPP"
        externalId:
          $ref: "#/components/schemas/ExternalId"
        loggedUser:
          $ref: "#/components/schemas/LoggedUser"
        businessDocumentType:
          $ref: "#/components/schemas/BusinessEntity"
        resources:
          $ref: "#/components/schemas/AcceptedResources"
        version:
          $ref: "#/components/schemas/Version"
        expirationDateTime:
          $ref: "#/components/schemas/ExpirationDateTime"
        creditor:
          $ref: "#/components/schemas/Identification"
        payment:
          oneOf:
            - $ref: "#/components/schemas/PixPaymentConsent"
            - $ref: "#/components/schemas/TedTefPaymentConsent"
        debtorAccount:
          $ref: "#/components/schemas/DebtorAccount"
        authExtraData:
          $ref: "#/components/schemas/AuthExtraData"
        consentOwner:
          $ref: "#/components/schemas/ConsentOwner"
      additionalProperties: false
    StartDateTime:
      description: Fecha y hora en que el consentimiento debe pasar a ser válido. Una
        cadena con fecha y hora conforme especificación RFC-3339, siempre con la
        utilización de timezone UTC(UTC time format).
      type: string
      maxLength: 20
      pattern: ^(\d{4})-(1[0-2]|0?[1-9])-(3[01]|[12][0-9]|0?[1-9])T(?:[01]\d|2[0123]):(?:[012345]\d):(?:[012345]\d)Z$
      example: "2021-05-21T08:30:00Z"
    Creditors:
      type: array
      minItems: 1
      items:
        type: object
        description: Objeto que contiene los datos del receptor (creditor).
        required:
          - personType
          - cpfCnpj
          - name
        properties:
          personType:
            $ref: "#/components/schemas/EnumPaymentPersonType"
          cpfCnpj:
            type: string
            minLength: 11
            maxLength: 14
            pattern: ^([0-9]{11})$|^([0-9A-Z]{12}[0-9]{2})$
            example: "58764789000137"
            description: "Identificación de la persona involucrada en la transacción. \ 


              Llenar con el CPF o CNPJ, de acuerdo con el valor elegido en el
              campo type. \ 

              \\

              El CPF será utilizado con 11 números y deberá ser informado sin
              puntos o guiones. \ 


              El CNPJ será utilizado con 14 números y deberá ser informado sin
              puntos o guiones.

              \n"
          name:
            type: string
            pattern: ^([A-Za-zÀ-ÖØ-öø-ÿ,.@:&*+_<>()!?/\\$%\d' -]+)$
            maxLength: 120
            example: Marco Antonio de Brito
            description: "En caso de persona natural debe ser informado el nombre completo del
              titular de la cuenta del receptor. \ 


              En caso de persona jurídica debe ser informada la razón social o el
              nombre comercial de la cuenta del receptor.

              \n"
    ContractDebtor:
      type: object
      description: Informaciones sobre el cliente deudor del contrato.
      required:
        - name
        - document
      properties:
        name:
          type: string
          description: En caso de persona natural debe ser informado el nombre completo del
            titular deudor del contrato.
          maxLength: 120
          pattern: ^([A-Za-zÀ-ÖØ-öø-ÿ,.@:&*+_<>()!?/\\$%\d' -]+)$
          example: Policarpo Quaresma
        document:
          type: object
          description: Documento de identificación oficial del cliente deudor del contrato.
          required:
            - identification
            - rel
          properties:
            identification:
              type: string
              description: Número del documento de identificación oficial del cliente deudor del
                contrato.
              maxLength: 14
              pattern: ^([0-9]{11})$|^([0-9A-Z]{12}[0-9]{2})$
              example: "11111111111111"
            rel:
              type: string
              description: Tipo del documento de identificación oficial del cliente deudor del
                contrato.
              enum:
                - CPF
                - CNPJ
          additionalProperties: false
      additionalProperties: false
    ImmediatePayment:
      type: object
      description: Definiciones para transacción inmediata.
      required:
        - type
        - date
        - currency
        - amount
        - creditorAccount
      properties:
        type:
          $ref: "#/components/schemas/EnumPaymentType"
        date:
          type: string
          format: date
          maxLength: 10
          pattern: ^(\d{4})-(1[0-2]|0?[1-9])-(3[01]|[12][0-9]|0?[1-9])$
          example: "2021-01-01"
          description: "Define la fecha objetivo de la liquidación del pago.


            El huso horario de Brasilia debe ser utilizado para la creación y
            racionalización sobre los datos de este campo.

            \n"
        currency:
          type: string
          maxLength: 3
          pattern: ^([A-Z]{3})$
          example: BRL
          description: "Código de la moneda nacional según modelo ISO-4217, o sea, 'BRL'.


            Todos los valores monetarios informados están representados con la
            moneda vigente de Brasil.

            \n"
        amount:
          type: string
          minLength: 4
          maxLength: 19
          pattern: ^((\d{1,16}\.\d{2}))$
          example: "100000.12"
          description: "Valor de la transacción con 2 casas decimales.

            \n"
        remittanceInformation:
          type: string
          maxLength: 140
          pattern: "[\\w\\W\\s]*"
          example: Pago de la nota RSTO035-002
          description: "Debe ser llenado siempre que el usuario pagador inserte alguna
            información adicional en un pago, a ser enviada al receptor.

            \n"
        creditorAccount:
          $ref: "#/components/schemas/CreditorAccount"
    AutomaticV1:
      type: object
      description: Definición de la configuración de recurrencia para pagos automáticos
      required:
        - contractId
        - period
        - contractDebtor
      properties:
        contractId:
          type: string
          pattern: ^[a-zA-Z0-9]{1,35}$
          minLength: 1
          maxLength: 35
          example: XE00038166201907261559y6j6
          description: Identificador del contrato de transacción
        amount:
          type: string
          pattern: ^((\d{1,16}\.\d{2}))$
          minLength: 4
          maxLength: 19
          example: "100000.12"
          description: Valor de la transacción con 2 casas decimales.
        transactionLimit:
          type: string
          pattern: ^((\d{1,16}\.\d{2}))$
          minLength: 4
          maxLength: 19
          example: "1000000.12"
          description: Valor de la transacción con 2 casas decimales.
        period:
          type: string
          enum:
            - DIARIO
            - SEMANAL
            - MENSAL
            - ANUAL
          example: DIARIO
          description: "Define la periodicidad permitida para realización de transacciones

            \\

            - DIARIO


            - SEMANAL


            - MENSAL


            - ANUAL

            \n"
        dayOfMonth:
          type: integer
          format: int32
          minimum: 1
          maximum: 31
          example: 10
          description: "Día fijo del mes que está prevista la transacción.




            [Restricción] Campo debe ser enviado cuando el campo
            `/data/recurringConfiguration/automatic/period` sea igual a MENSAL
            o ANUAL.

            \n"
        dayOfWeek:
          type: string
          enum:
            - SEGUNDA_FEIRA
            - TERCA_FEIRA
            - QUARTA_FEIRA
            - QUINTA_FEIRA
            - SEXTA_FEIRA
          example: SEGUNDA_FEIRA
          description: "Día de la semana que está prevista la transacción.


            - SEGUNDA_FEIRA

            \\

            - TERCA_FEIRA


            - QUARTA_FEIRA


            - QUINTA_FEIRA


            - SEXTA_FEIRA

            \\



            [Restricción] Campo debe ser enviado cuando el campo
            `/data/recurringConfiguration/automatic/period` sea igual a SEMANAL.

            \n"
        month:
          type: string
          enum:
            - JANEIRO
            - FEVEREIRO
            - MARCO
            - ABRIL
            - MAIO
            - JUNHO
            - JULHO
            - AGOSTO
            - SETEMBRO
            - OUTUBRO
            - NOVEMBRO
            - DEZEMBRO
          example: JANEIRO
          description: "Mes previsto para ocurrir transacciones.


            - JANEIRO


            - FEVEREIRO

            \\

            - MARCO


            - ABRIL


            - MAIO


            - JUNHO


            - JULHO


            - AGOSTO


            - SETEMBRO


            - OUTUBRO


            - NOVEMBRO


            - DEZEMBRO




            [Restricción] Campo debe ser enviado cuando el campo
            `/data/recurringConfiguration/automatic/period` sea igual a ANUAL

            \n"
        contractDebtor:
          $ref: "#/components/schemas/ContractDebtor"
        immediatePayment:
          $ref: "#/components/schemas/ImmediatePayment"
      additionalProperties: false
    AutomaticV2:
      type: object
      description: Definición de la configuración de recurrencia para pagos automáticos
      required:
        - contractId
        - interval
        - contractDebtor
        - isRetryAccepted
        - useOverdraftLimit
        - referenceStartDate
      properties:
        contractId:
          type: string
          pattern: ^[a-zA-Z0-9]{1,35}$
          minLength: 1
          maxLength: 35
          example: XE00038166201907261559y6j6
          description: Identificador del contrato de transacción
        fixedAmount:
          type: string
          pattern: ^((\d{1,16}\.\d{2}))$
          minLength: 4
          maxLength: 19
          example: "100000.12"
          description: "Valor fijo de cobro, si es llenado, representa un
            consentimiento para pagos de valores fijos, o no sujetos a
            alteración durante la vigencia del consentimiento.\ 




            [Restricción] Excluyente con el campo
            “/data/recurringConfiguration/automatic/maximumVariableAmount”

            \n"
        maximumVariableAmount:
          type: string
          pattern: ^((\d{1,16}\.\d{2}))$
          minLength: 4
          maxLength: 19
          example: "1000000.12"
          description: "Valor máximo permitido por cobro, si es llenado, representa
            un consentimiento para pagos de valores variables.\ 




            [Restricción] Excluyente con el campo
            “/data/recurringConfiguration/automatic/fixedAmount”

            \n"
        interval:
          type: string
          enum:
            - SEMANAL
            - MENSAL
            - ANUAL
            - SEMESTRAL
            - TRIMESTRAL
          example: SEMANAL
          description: "Define la periodicidad permitida para realización de transacciones

            \\

            - SEMANAL


            - MENSAL


            - ANUAL


            - SEMESTRAL


            - TRIMESTRAL

            \n"
        contractDebtor:
          $ref: "#/components/schemas/ContractDebtor"
        firstPayment:
          $ref: "#/components/schemas/ImmediatePayment"
        minimumVariableAmount:
          type: string
          pattern: ^((\d{1,16}\.\d{2}))$
          minLength: 4
          maxLength: 19
          example: "100000.12"
          description: "Valor definido por el usuario receptor.\ 


            Si el usuario pagador asigna un valor máximo para los pagos
            de aquella autorización, no podrá ser inferior al valor mínimo
            (piso) definido por el usuario receptor.\ 


            No puede ser llenado en las autorizaciones de valor fijo.

            \n"
        isRetryAccepted:
          type: boolean
          description: Indica si está permitido por el cliente receptor hacer intentos de
            pago (extradía), conforme las reglas establecidas en el esquema
            Pix.
          example: false
        useOverdraftLimit:
          type: boolean
          default: true
          example: true
          description: Indica si el usuario pagador autorizó la utilización de límite
            preaprobado (cheque especial) en su cuenta para realización de
            pagos, caso el cliente posea el producto.
        referenceStartDate:
          type: string
          format: date
          pattern: ^(\d{4})-(1[0-2]|0?[1-9])-(3[01]|[12][0-9]|0?[1-9])$
          description: "Representa la fecha prevista para el inicio del ciclo de cobro de los
            pagos asociados a la recurrencia. Se trata de una cadena con fecha
            conforme especificación RFC-3339, siguiendo el horario de Brasilia "
          example: "2023-05-21"
      additionalProperties: false
    Automatic:
      type: object
      required:
        - automatic
      properties:
        automatic:
          oneOf:
            - $ref: "#/components/schemas/AutomaticV1"
            - $ref: "#/components/schemas/AutomaticV2"
      additionalProperties: false
    Day:
      type: object
      description: "Configurar límite transaccional diario determinado por el usuario
        pagador.




        [Restricción] Si es enviado el objeto, al menos uno de los campos
        (`quantityLimit` o `transactionLimit`) deben ser llenados.

        \n"
      properties:
        quantityLimit:
          type: integer
          example: 2
          description: Cantidad límite de transacciones permitidas para ocurrir durante un
            día.
        transactionLimit:
          type: string
          pattern: ^((\d{1,16}\.\d{2}))$
          minLength: 4
          maxLength: 19
          example: "100000.12"
          description: Valor máximo a ser transaccionado diariamente.
    Week:
      type: object
      description: "Configurar límite transaccional semanal determinado por el usuario
        pagador.




        [Restricción] Si es enviado el objeto, al menos uno de los campos
        (`quantityLimit` o `transactionLimit`) deben ser llenados

        \n"
      properties:
        quantityLimit:
          type: integer
          example: 10
          description: Cantidad límite de transacciones permitidas para ocurrir durante una
            semana.
        transactionLimit:
          type: string
          pattern: ^((\d{1,16}\.\d{2}))$
          minLength: 4
          maxLength: 19
          example: "100000.12"
          description: Valor máximo a ser transaccionado semanalmente.
    Month:
      type: object
      description: "Configurar límite transaccional mensual determinado por el usuario
        pagador.




        [Restricción] Si es enviado el objeto, al menos uno de los campos
        (`quantityLimit` o `transactionLimit`) deben ser llenados

        \n"
      properties:
        quantityLimit:
          type: integer
          example: 30
          description: Cantidad límite de transacciones permitidas para ocurrir durante un
            mes.
        transactionLimit:
          type: string
          pattern: ^((\d{1,16}\.\d{2}))$
          minLength: 4
          maxLength: 19
          example: "100000.12"
          description: Valor máximo a ser transaccionado mensualmente.
    Year:
      type: object
      description: "Configurar límite transaccional anual determinado por el usuario
        pagador.




        [Restricción] Si es enviado el objeto, al menos uno de los campos
        (`quantityLimit` o `transactionLimit`) deben ser llenados

        \n"
      properties:
        quantityLimit:
          type: integer
          example: 100
          description: Cantidad límite de transacciones permitidas para ocurrir durante un
            año.
        transactionLimit:
          type: string
          pattern: ^((\d{1,16}\.\d{2}))$
          minLength: 4
          maxLength: 19
          example: "100000.12"
          description: Valor máximo a ser transaccionado por un año, a partir de la fecha
            definida en el campo `/data/startDateTime`.
    PeriodicLimits:
      type: object
      description: Límites transaccionales por período determinado por el usuario pagador.
      properties:
        day:
          $ref: "#/components/schemas/Day"
        week:
          $ref: "#/components/schemas/Week"
        month:
          $ref: "#/components/schemas/Month"
        year:
          $ref: "#/components/schemas/Year"
    PostSweeping:
      type: object
      required:
        - sweeping
      properties:
        sweeping:
          type: object
          description: Definición de la configuración de recurrencia para transferencias
            automáticas de fondos.
          properties:
            totalAllowedAmount:
              type: string
              minLength: 4
              maxLength: 19
              pattern: ^((\d{1,16}\.\d{2}))$
              example: "100000.12"
              description: Valor máximo a ser alcanzado por la sumatoria de todas las transacciones
                que utilizan el consentimiento autorizado por el cliente. Si el
                valor es superado, la titular de cuenta debe negar la transacción
                solicitada por el iniciador.
            transactionLimit:
              type: string
              pattern: ^((\d{1,16}\.\d{2}))$
              minLength: 4
              maxLength: 19
              example: "1000000.12"
              description: Valor máximo para cada transacción de pago asociada a este
                consentimiento. Si el valor del pago es mayor que este
                límite, la titular de cuentas debe rechazar la transacción de
                pago.
            periodicLimits:
              $ref: "#/components/schemas/PeriodicLimits"
      additionalProperties: false
    Vrp:
      type: object
      required:
        - vrp
      properties:
        vrp:
          type: object
          description: Definición de la configuración de recurrencia para realización de
            transacciones de valores variables
          properties:
            transactionLimit:
              type: string
              pattern: ^((\d{1,16}\.\d{2}))$
              minLength: 4
              maxLength: 19
              example: "100000.12"
              description: Límite máximo de valor permitido para cada transacción de pago.
            globalLimits:
              type: object
              description: Límite transaccional máximo para pagos, después de alcanzar este
                valor, el consentimiento debe ir al estado "CONSUMED".
              properties:
                quantityLimit:
                  type: integer
                  example: 10
                  description: Cantidad máxima de ocurrencia de pagos, después de alcanzar este
                    valor, el consentimiento debe ir al estado "CONSUMED"
                transactionLimit:
                  type: string
                  pattern: ^((\d{1,16}\.\d{2}))$
                  minLength: 4
                  maxLength: 19
                  example: "100000.12"
                  description: Valor transaccional máximo para pagos bajo este consentimiento,
                    después de alcanzar este valor, el consentimiento debe ir al
                    estado "CONSUMED".
            periodicLimits:
              type: object
              description: Límites transaccionales por período determinado por el usuario pagador.
              properties:
                day:
                  $ref: "#/components/schemas/Day"
                week:
                  $ref: "#/components/schemas/Week"
                month:
                  $ref: "#/components/schemas/Month"
                year:
                  $ref: "#/components/schemas/Year"
      additionalProperties: false
    AdditionalInformation:
      description: Debe ser llenado siempre que el usuario pagador inserte alguna
        información adicional en el consentimiento
      type: string
      example: Mi recurrencia
      pattern: "[\\w\\W\\s]*"
      maxLength: 140
    ConsentRecurringPayment:
      description: Consentimiento de pago recurrente
      type: object
      required:
        - brandId
        - creationDateTime
        - tpp
        - externalId
        - loggedUser
        - creditors
        - recurringConfiguration
      properties:
        brandId:
          $ref: "#/components/schemas/BrandId"
        creationDateTime:
          $ref: "#/components/schemas/CreationDateTime"
        tpp:
          $ref: "#/components/schemas/TPP"
        externalId:
          $ref: "#/components/schemas/ExternalId"
        loggedUser:
          $ref: "#/components/schemas/LoggedUser"
        businessDocumentType:
          $ref: "#/components/schemas/BusinessEntity"
        resources:
          $ref: "#/components/schemas/AcceptedResources"
        version:
          $ref: "#/components/schemas/Version"
        startDateTime:
          $ref: "#/components/schemas/StartDateTime"
        expirationDateTime:
          $ref: "#/components/schemas/ExpirationDateTime"
        creditors:
          $ref: "#/components/schemas/Creditors"
        recurringConfiguration:
          oneOf:
            - $ref: "#/components/schemas/Automatic"
            - $ref: "#/components/schemas/PostSweeping"
            - $ref: "#/components/schemas/Vrp"
        cancellation:
          $ref: "#/components/schemas/PixPaymentCancellation"
        additionalInformation:
          $ref: "#/components/schemas/AdditionalInformation"
        debtorAccount:
          $ref: "#/components/schemas/DebtorAccount"
        authExtraData:
          $ref: "#/components/schemas/AuthExtraData"
        consentOwner:
          $ref: "#/components/schemas/ConsentOwner"
      additionalProperties: false
    Permissions:
      type: array
      items:
        description: Permisos asignados al vínculo de cuenta
        type: string
        enum:
          - PAYMENTS_INITIATE
      minItems: 1
      example:
        - PAYMENTS_INITIATE
    PaymentType:
      type: string
      description: Indicador del tipo de pago
      maxLength: 25
      enum:
        - PAYMENT_CONSENT
        - PAYMENT_RECURRING_CONSENT
        - PAYMENT_ENROLLMENT_CONSENT
      example: PAYMENT_CONSENT
    DiscoveryAccountsPayment:
      type: object
      required:
        - requestMeta
        - consent
      properties:
        requestMeta:
          $ref: "#/components/schemas/RequestMeta"
        consent:
          oneOf:
            - $ref: "#/components/schemas/ConsentPaymentDiscoveryAccountsPayment"
            - $ref: "#/components/schemas/ConsentRecurringPaymentDiscoveryAccountsPayment"
            - $ref: "#/components/schemas/ConsentEnrollmentDiscoveryAccountsPayment"
        paymentType:
          $ref: "#/components/schemas/PaymentType"
      additionalProperties: false
    EndToEndIdWithoutRestriction:
      type: string
      minLength: 32
      maxLength: 32
      description: "Debe ser llenado en el formato estándar
        ExxxxxxxxyyyyMMddHHmmkkkkkkkkkkk (32 caracteres; “case sensitive”, es
        decir, diferencia letras mayúsculas y minúsculas), siendo: “E” – fijo (1
        carácter); xxxxxxxx – identificación del agente que generó el
        ´EndToEndId´, pudiendo ser: el ISPB del participante directo o el ISPB del
        participante indirecto (8 caracteres numéricos [0-9]); yyyyMMddHHmm –
        fecha, hora y minuto (12 caracteres), siguiendo el horario UTC, de la
        sumisión de la orden de pago, si la liquidación es prioritaria, o
        prevista para el envío de la orden al sistema de liquidación, si se
        realiza un agendamiento. Para órdenes prioritarias y no prioritarias,
        se acepta el llenado, por el agente que generó el ´EndToEndId´, con una
        tolerancia máxima de 12 horas, para el futuro y para el pasado, en
        relación al horario efectivo de procesamiento de la orden por el
        SPI; kkkkkkkkkkk – secuencial creado por el agente que generó el
        ´EndToEndId´ (11 caracteres alfanuméricos [a-z/A-Z/0-9]). Debe ser único
        dentro de cada “yyyyMMddHHmm”. Se admite que el ´EndToEndId´ sea generado
        por el participante directo, por el participante indirecto o por el iniciador
        de pago. Debe ser único, no pudiendo ser repetido en cualquier
        otra operación enviada al SPI."
      pattern: ^([E])([0-9A-Z]{8})([0-9]{4})(0[1-9]|1[0-2])(0[1-9]|[1-2][0-9]|3[0-1])(2[0-3]|[01][0-9])([0-5][0-9])([a-zA-Z0-9]{11})$
      example: E9040088820241225150000123873170
    RemittanceInformation:
      description: Debe ser llenado siempre que el usuario pagador inserte alguna
        información adicional en un pago, a ser enviada al receptor.
      type: string
      pattern: "[\\w\\W\\s]*"
      maxLength: 140
      example: Pago de la nota XPTO035-002.
    CnpjInitiator:
      type: string
      pattern: ^[0-9A-Z]{12}[0-9]{2}$
      maxLength: 14
      description: CNPJ del Iniciador de Pago debidamente habilitado para la
        prestación de Servicio de Iniciación en el Pix.
      example: "50685362000135"
    TransactionIdentification:
      description: "Se trata de un identificador de transacción que debe ser
        retransmitido intacto por el PSP del pagador al generar la orden de pago.




        [Restricción] La titular debe obligatoriamente retornar el campo con el
        mismo valor recibido del iniciador, si este ha sido enviado en la
        solicitud de la iniciación del pago.

        \n"
      type: string
      maxLength: 35
      pattern: ^[a-zA-Z0-9]{1,35}$
      example: E00038166201907261559y6j6
    EnumValidationStage:
      type: string
      enum:
        - POST_CONSENT
        - POST_PAYMENT
      example: POST_CONSENT
      description: "Momento referente a la llamada de la validación de pago




        \ Sigue descripción de cada valor del ENUM.








        - POST_CONSENT - Validación llamada en el momento del post consent




        - POST_PAYMENT - Validación llamada en el momento del post payment



        \n"
    PixPaymentRecurringConsent:
      type: object
      description: Solo para consentimientos de pago pix. Objeto que contiene datos
        de pago para consentimiento.
      properties:
        cancellation:
          $ref: "#/components/schemas/PixPaymentCancellation"
        ibgeTownCode:
          $ref: "#/components/schemas/IbgeTownCode"
        recurringConfiguration:
          oneOf:
            - $ref: "#/components/schemas/Automatic"
            - $ref: "#/components/schemas/PostSweeping"
            - $ref: "#/components/schemas/Vrp"
    ValidatePaymentRecurringConsent:
      type: object
      description: Objeto que contiene las informaciones de consentimiento para la iniciación de
        pago individual.
      required:
        - tpp
        - loggedUser
        - creditors
        - payment
      properties:
        tpp:
          $ref: "#/components/schemas/TPP"
        loggedUser:
          $ref: "#/components/schemas/LoggedUser"
        creditors:
          $ref: "#/components/schemas/Creditors"
        payment:
          allOf:
            - $ref: "#/components/schemas/PixPaymentRecurringConsent"
            - type: object
              properties:
                endToEndId:
                  $ref: "#/components/schemas/EndToEndIdWithoutRestriction"
                remittanceInformation:
                  $ref: "#/components/schemas/RemittanceInformation"
                cnpjInitiator:
                  $ref: "#/components/schemas/CnpjInitiator"
                transactionIdentification:
                  $ref: "#/components/schemas/TransactionIdentification"
        debtorAccount:
          $ref: "#/components/schemas/DebtorAccount"
        externalId:
          $ref: "#/components/schemas/ExternalId"
        validationStage:
          $ref: "#/components/schemas/EnumValidationStage"
        businessEntity:
          $ref: "#/components/schemas/BusinessEntity"
      additionalProperties: false
    PaymentValidation:
      type: object
      required:
        - requestMeta
        - requestBody
      properties:
        requestMeta:
          $ref: "#/components/schemas/RequestMeta"
        requestBody:
          type: object
          description: Payload para validación del pago.
          required:
            - data
          properties:
            data:
              oneOf:
                - $ref: "#/components/schemas/ValidatePaymentConsentPaymentValidation"
                - $ref: "#/components/schemas/ValidatePaymentRecurringConsent"
            paymentType:
              $ref: "#/components/schemas/PaymentType"
      additionalProperties: false
    RequestMetaPayment:
      type: object
      description: Objeto que contiene datos referentes al contexto en el cual la solicitud
        fue recibida
      required:
        - correlationId
        - brandId
      properties:
        correlationId:
          type: string
          description: UUID que identifica el correlation ID de la solicitud realizada. Debe
            ser propagado para todas las llamadas hechas entre sistemas y registrado
            siempre que sea posible para facilitar el rastreo de errores
          pattern: ^(localID:)?[0-9a-fA-F]{8}-[0-9a-fA-F]{4}-[0-9a-fA-F]{4}-[0-9a-fA-F]{4}-[0-9a-fA-F]{12}$
          example: 97623ed1-4732-4bf2-8d4b-ae7aced5443b
        brandId:
          $ref: "#/components/schemas/BrandId"
        nfcHeader:
          type: string
          description: El campo representa una transacción iniciada vía NFC. El envío de este
            campo es obligatorio en este escenario. Las titulares deben almacenar la
            información y correlacionarla con el consentimiento y el pago
            originado.
          example: "true"
      additionalProperties: false
    RecurringConsentId:
      type: string
      pattern: ^urn:[a-zA-Z0-9][a-zA-Z0-9\-]{0,31}:[a-zA-Z0-9()+,\-.:=@;$_!*'%\/?#]+$
      maxLength: 256
      description: "Identificador único del consentimiento de larga duración creado para
        la iniciación de pago solicitada. Deberá ser un URN - Uniform Resource
        Name.\ 


        Un URN, conforme definido en la
        [RFC8141](https://tools.ietf.org/html/rfc8141) es un Uniform Resource\ 


        Identifier - URI - que es asignado bajo el URI scheme \"urn\" y un
        namespace URN específico, con la intención de que el URN\ 


        sea un identificador de recurso persistente e independiente de la
        ubicación.\ 


        \ Considerando la string urn:bancoex:C1DD33123 como ejemplo para
        `recurringConsentId` tenemos:


        - el namespace(urn)


        - el identificador asociado al namespace de la institución transmisora
        (bancoex)


        - el identificador específico dentro del namespace (C1DD33123).


        Informaciones más detalladas sobre la construcción de namespaces deben ser
        consultadas en la [RFC8141](https://tools.ietf.org/html/rfc8141).

        \\



        [Restricción] Este campo es de llenado obligatorio cuando el valor del
        campo authorisationFlow sea igual a FIDO_FLOW.

        \n"
    PaymentData:
      type: object
      description: Objeto que contiene datos del pago como moneda y valor
      required:
        - amount
        - currency
      properties:
        amount:
          description: "Valor de la transacción con 2 casas decimales. El valor debe ser el mismo
            enviado en el consentimiento.\ 




            Para Código QR estático con valor predeterminado en el Código QR o para
            Código QR dinámico con indicación de que el valor no puede ser alterado:
            El campo amount debe ser llenado con el valor establecido en el Código
            QR.\ 


            Si se llena con valor divergente del Código QR, debe ser
            retornado un error HTTP Status 422.

            \n"
          type: string
          pattern: ^((\d{1,16}\.\d{2}))$
          minLength: 4
          maxLength: 19
          example: "100000.04"
        currency:
          type: string
          maxLength: 3
          description: Código de la moneda nacional según modelo ISO-4217, o sea, 'BRL'.
            Todos los valores monetarios informados están representados con la
            moneda vigente de Brasil.
          pattern: ^([A-Z]{3})$
          example: BRL
      additionalProperties: false
    Date:
      type: string
      description: "Fecha en que se realizará el pago. Una cadena con la
        utilización de timezone UTC-3 (UTC time format).

        \n"
      format: date
      maxLength: 10
      example: "2021-01-01"
    Document:
      type: object
      description: "Informaciones del documento identificador del receptor de la transacción.

        \n"
      required:
        - identification
        - rel
      properties:
        identification:
          type: string
          minLength: 11
          maxLength: 14
          description: Número del documento de identificación oficial del titular persona
            natural o jurídica.
          example: "11111111111111"
          pattern: ^([0-9]{11})$|^([0-9A-Z]{12}[0-9]{2})$
        rel:
          type: string
          enum:
            - CPF
            - CNPJ
          example: CNPJ
          description: Tipo del documento de identificación oficial del titular persona
            natural o jurídica.
    RiskSignalsPayments:
      type: object
      description: "Señales de riesgo para iniciación de pagos automáticos



        \\

        [Restricción] Debe ser enviado cuando el consentimiento sea para el producto
        Sweeping Accounts (El objeto \"/data/recurringConfiguration/sweeping\"
        usado en el oneOf)

        \n"
      properties:
        manual:
          type: object
          required:
            - deviceId
            - isRootedDevice
            - screenBrightness
            - elapsedTimeSinceBoot
            - osVersion
            - userTimeZoneOffset
            - language
            - screenDimensions
            - accountTenure
          description: "Representa la recolección de señales de riesgo con la presencia del usuario

            \\



            [Restricción] Obligatorio de ser enviado cuando la transacción ocurra en la
            presencia del usuario

            \n"
          properties:
            deviceId:
              type: string
              description: ID único del dispositivo generado por la plataforma.
              example: 00000000-54b3-e7c7-0000-000046bffd97
            isRootedDevice:
              type: boolean
              description: Indica si el dispositivo actualmente tiene permiso de “root”.
              example: false
            screenBrightness:
              type: number
              format: double
              description: "Indica el nivel de brillo de la pantalla del dispositivo. \ 


                \ En dispositivos Android el valor es un entero, entre 0 y 255,
                inclusive; \ 


                En dispositivos iOS el valor es un punto flotante entre 0.0 y
                1.0.

                \n"
            elapsedTimeSinceBoot:
              type: integer
              format: int64
              description: Indica por cuánto tiempo (en milisegundos) el dispositivo está
                encendido.
            osVersion:
              type: string
              description: Versión del sistema operativo.
            userTimeZoneOffset:
              type: string
              description: "Indica la configuración de huso horario del dispositivo del usuario,
                con el formato UTC offset: ±hh[:mm]

                \n"
            language:
              type: string
              description: Indica el idioma del dispositivo en el formato ISO 639-1.
            screenDimensions:
              type: object
              description: Dimensiones de la pantalla del dispositivo
              required:
                - height
                - width
              properties:
                height:
                  type: integer
                  format: int64
                  description: Altura de la pantalla, en píxeles.
                width:
                  type: integer
                  format: int64
                  description: Anchura de la pantalla, en píxeles.
            accountTenure:
              type: string
              format: date
              pattern: ^(\d{4})-(1[0-2]|0?[1-9])-(3[01]|[12][0-9]|0?[1-9])$
              description: Fecha de registro del cliente en el iniciador.
            geolocation:
              type: object
              description: Datos de geolocalización del cliente mientras está logueado en el iniciador
              properties:
                latitude:
                  type: number
                  format: double
                  description: Coordenada latitudinal del cliente mientras está logueado en el iniciador
                longitude:
                  type: number
                  format: double
                  description: Coordenada longitudinal del cliente mientras está logueado en el iniciador
                type:
                  type: string
                  description: "Tipo de mecanismo utilizado en la generación de la geolocalización

                    \n"
                  enum:
                    - COARSE
                    - FINE
                    - INFERRED
            isCallInProgress:
              type: boolean
              description: "Indica llamada activa en el momento del vínculo.




                [Restricción] Si la señal de riesgo está disponible (cliente
                permitió que fuera recolectada), la misma deberá ser enviada

                \n"
            isDevModeEnabled:
              type: boolean
              description: Indica si el dispositivo está en modo de desarrollador.
            isMockGPS:
              type: boolean
              description: Indica si el dispositivo está usando un GPS falso.
            isEmulated:
              type: boolean
              description: Indica si el dispositivo es emulado o real.
            isMonkeyRunner:
              type: boolean
              description: Indica el uso del MonkeyRunner.
            isCharging:
              type: boolean
              description: Indica si la batería del dispositivo está siendo cargada.
            antennaInformation:
              type: string
              description: Indica en qué antena está conectado el dispositivo.
            isUsbConnected:
              type: boolean
              description: Indica si el dispositivo está conectado a otro dispositivo vía USB.
            integrity:
              type: object
              description: "Informa la integridad del dispositivo y app. \ 


                En Android, conforme documentación Play API Integrity -
                [Android](https://developer.android.com/google/play/integrity/o\
                verview?hl=pt-br). \ 


                En iOS, conforme documentación App Attest
                [iOS](https://developer.apple.com/documentation/devicecheck/est\
                ablishing_your_app_s_integrity)

                \n"
              properties:
                appRecognitionVerdict:
                  type: string
                  description: Informa la integridad de la app
                deviceRecognitionVerdict:
                  type: string
                  description: Informa la integridad del dispositivo
        automatic:
          type: object
          required:
            - lastLoginDateTime
            - pixKeyRegistrationDateTime
          description: "Representa la recolección de señales de riesgo con la presencia del usuario

            \\



            [Restricción] Obligatorio de ser enviado cuando la transacción no
            ocurra en la presencia del usuario

            \n"
          properties:
            lastLoginDateTime:
              type: string
              description: Fecha y hora del último inicio de sesión del cliente en el iniciador
              pattern: ^(\d{4})-(1[0-2]|0?[1-9])-(3[01]|[12][0-9]|0?[1-9])T(?:[01]\d|2[0123]):(?:[012345]\d):(?:[012345]\d)Z$
            pixKeyRegistrationDateTime:
              type: string
              description: Fecha y hora de registro de la clave Pix del receptor en el iniciador
              pattern: ^(\d{4})-(1[0-2]|0?[1-9])-(3[01]|[12][0-9]|0?[1-9])T(?:[01]\d|2[0123]):(?:[012345]\d):(?:[012345]\d)Z$
    LegacyId:
      description: Array de clave y valor con la clave de identificación del recurso en el
        sistema de origen (legado), permitiendo claves compuestas
      type: array
      items:
        type: object
        required:
          - key
        properties:
          key:
            description: Nombre del campo del identificador en el sistema de origen
            type: string
            example: internalPaymentId
          value:
            description: Valor del campo del identificador en el sistema de origen
            type: string
            example: "1234"
      minItems: 1
      maxItems: 10
    PaymentReference:
      type: string
      example: 23-07-2025/P1W
      minLength: 4
      maxLength: 14
      pattern: ^zero$|^\d{2}-\d{2}-\d{4}/P(1W|1M|3M|6M|1Y)$|^W\d{1,2}-\d{4}$|^M\d{2}-\d{4}$|^Q\d-\d{4}$|^S\d-\d{4}$|^Y\d{4}$
      description: "[Restricción] Campo de llenado obligatorio si se trata de un
        pago de Pix automático y debe ser enviado para criterios de recolección
        de métricas del ecosistema. Si esta regla no es respetada, la
        institución titular de la cuenta debe retornar un error HTTP 422 con el
        código DETALHE_PAGAMENTO_INVALIDO. \ 


        - El llenado debe seguir la siguiente lógica: \ 


        \  - Primer Pago: Si se trata del pago inicial aislado,
        especificado en el campo “/data/firstPayment”, el valor de este campo debe ser
        llenado con la string fija \"zero\". \ 


        \  - Pagos Recurrentes (Subsecuentes): Para todos los pagos
        recurrentes realizados después del pago inicial, el campo
        paymentReference debe ser llenado con una string de Intervalo ISO
        8601 en el formato ```<start>/<duration>```, que representa el ciclo exacto
        al cual el pago se refiere. \ 


        \    - El componente ```<start>``` debe indicar la fecha de inicio del ciclo
        específico al cual se refiere el pago enviado. \ 


        \    - El componente ```<duration>``` debe corresponder al código de la
        periodicidad del consentimiento (P1W para semanal, P1M para mensual, P3M
        para trimestral, P6M para semestral y P1Y para anual) \ 


        \    - Ejemplos:


        \      - 1: Fecha de inicio del ciclo definido en el consentimiento: 23/07/25


        \        - Periodicidad definida en el consentimiento: Semanal


        \        - Llenado del paymentReference:


        \        - Primer ciclo: 23-07-2025/P1W


        \        - Segundo ciclo: 30-07-2025/P1W


        \        - Tercer ciclo: 06-07-2025/P1W


        \      - 2: Fecha de inicio del ciclo definido en el consentimiento: 23/07/25


        \        - Periodicidad definida en el consentimiento: Mensual


        \        - Llenado del paymentReference:


        \        - Primer ciclo: 23-07-2025/P1M


        \        - Segundo ciclo: 23-08-2025/P1M


        \        - Tercer ciclo: 23-09-2025/P1M

        \n"
    CreatePixPaymentData:
      type: object
      description: Objeto que contiene datos del pago y del receptor (creditor).
      required:
        - localInstrument
        - payment
        - cnpjInitiator
        - endToEndId
        - creditorAccount
      properties:
        endToEndId:
          $ref: "#/components/schemas/EndToEndIdWithoutRestriction"
        recurringConsentId:
          $ref: "#/components/schemas/RecurringConsentId"
        localInstrument:
          $ref: "#/components/schemas/EnumLocalInstrument"
        payment:
          $ref: "#/components/schemas/PaymentData"
        creditorAccount:
          $ref: "#/components/schemas/CreditorAccount"
        remittanceInformation:
          $ref: "#/components/schemas/RemittanceInformation"
        qrCode:
          $ref: "#/components/schemas/QrCode"
        proxy:
          $ref: "#/components/schemas/Proxy"
        cnpjInitiator:
          $ref: "#/components/schemas/CnpjInitiator"
        transactionIdentification:
          $ref: "#/components/schemas/TransactionIdentification"
        ibgeTownCode:
          $ref: "#/components/schemas/IbgeTownCode"
        date:
          $ref: "#/components/schemas/Date"
        document:
          $ref: "#/components/schemas/Document"
        authorisationFlow:
          type: string
          enum:
            - HYBRID_FLOW
            - CIBA_FLOW
            - FIDO_FLOW
          example: HYBRID_FLOW
          description: "Campo condicional utilizado para identificar el flujo de
            autorización en que fue solicitado el pago.




            [Restricción] Si CIBA o FIDO, llenado obligatorio. Si el campo
            no está presente en el payload, se entiende que el flujo de
            autorización utilizado es el HYBRID_FLOW.

            \n"
        riskSignals:
          $ref: "#/components/schemas/RiskSignalsPayments"
        originalRecurringPaymentId:
          $ref: "#/components/schemas/LegacyId"
        paymentReference:
          $ref: "#/components/schemas/PaymentReference"
      additionalProperties: false
    CreatePixPayment:
      type: object
      required:
        - requestMeta
        - consent
        - idempotencyKey
        - requestBody
      properties:
        requestMeta:
          $ref: "#/components/schemas/RequestMetaPayment"
        consent:
          oneOf:
            - $ref: "#/components/schemas/ConsentPayment"
            - $ref: "#/components/schemas/ConsentRecurringPayment"
        idempotencyKey:
          type: string
          description: Identificador de solicitud exclusivo para soportar la idempotencia
            enviado por el ITP.
          maxLength: 40
          pattern: ^(?!\s)(.*)(\S)$
          example: TXpRMU9UQTROMWhZV2xSU1FUazJSMDl
        internalIdempotencyKey:
          type: string
          description: Identificador de solicitud interno que, si está presente, debe ser
            utilizado para tratar reintentos de crear el mismo pago. Será
            siempre enviado para pagos agendados con múltiples cuotas como
            forma de identificar cada una de ellas. Si la variable de entorno
            feature.all-payments-async.enabled está activa, este campo será
            enviado para todos los tipos de pagos.
          maxLength: 40
          pattern: ^(?!\s)(.*)(\S)$
          example: TXpRMU9UQTROMWhZV2xSU1FUazJSMDl
        requestBody:
          type: object
          required:
            - data
          properties:
            data:
              $ref: "#/components/schemas/CreatePixPaymentData"
        paymentType:
          $ref: "#/components/schemas/PaymentType"
      additionalProperties: false
    PaymentId:
      description: Array de clave y valor con la clave de identificación del recurso en el
        sistema de origen (legado), permitiendo claves compuestas
      type: array
      items:
        type: object
        required:
          - key
        properties:
          key:
            description: Nombre del campo del identificador en el sistema de origen
            type: string
            example: internalPaymentId
          value:
            description: Valor del campo del identificador en el sistema de origen
            type: string
            example: "1234"
      minItems: 1
      maxItems: 10
    FindPixPayment:
      type: object
      required:
        - requestMeta
        - consent
        - paymentId
      properties:
        requestMeta:
          $ref: "#/components/schemas/RequestMeta"
        paymentId:
          $ref: "#/components/schemas/PaymentId"
        consent:
          oneOf:
            - $ref: "#/components/schemas/ConsentPayment"
            - $ref: "#/components/schemas/ConsentRecurringPayment"
        paymentType:
          $ref: "#/components/schemas/PaymentType"
        requestBody:
          type: object
          required:
            - data
          properties:
            data:
              $ref: "#/components/schemas/PatchPixRecurringPaymentData"
          additionalProperties: false
      additionalProperties: false
    EnumPaymentCancellationStatusType:
      type: string
      enum:
        - CANC
        - REJECTED
      example: CANC
      description: "Utilizado para informar a qué estado debe ir el pago. \ 


        Actualmente el único valor posible es CANC.

        \n"
    PatchPixPaymentData:
      type: object
      required:
        - status
        - cancellation
      properties:
        status:
          $ref: "#/components/schemas/EnumPaymentCancellationStatusType"
        cancellation:
          type: object
          description: "Objeto que agrupa las informaciones de cuál fue el usuario pagador que
            solicitó el cancelamiento de la transacción. \ 


            Observación: este campo es necesario porque, en casos de múltiples
            instancias de autorización, es posible que el pago sea solicitado
            por un usuario pagador y cancelado por otro.

            \n"
          required:
            - cancelledBy
          properties:
            cancelledBy:
              type: object
              description: Información relacionada al usuario pagador que solicitó el
                cancelamiento del pago.
              required:
                - document
              properties:
                document:
                  type: object
                  description: Objeto que consolida los datos del documento del usuario que solicitó
                    el cancelamiento.
                  required:
                    - identification
                    - rel
                  properties:
                    identification:
                      type: string
                      maxLength: 11
                      description: Número del documento del usuario pagador responsable del
                        cancelamiento del pago.
                      example: "11111111111"
                      pattern: ^\d{11}$
                    rel:
                      type: string
                      maxLength: 3
                      description: Tipo del documento del usuario pagador responsable del cancelamiento
                        del pago.
                      example: CPF
                      pattern: ^[A-Z]{3}$
    EnumRecurringPaymentCancellationStatusType:
      type: string
      enum:
        - REJECTED
      example: REJECTED
      description: "Estado hacia el cual el pago deberá transitar

        \n"
    PatchPixRecurringPaymentData:
      type: object
      required:
        - status
        - cancellation
      properties:
        status:
          $ref: "#/components/schemas/EnumRecurringPaymentCancellationStatusType"
        cancellation:
          type: object
          description: "Informaciones generales sobre el cancelamiento.

            \n"
          required:
            - cancelledBy
          properties:
            cancelledBy:
              type: object
              description: Informaciones generales sobre el usuario que solicitó el cancelamiento.
              required:
                - document
              properties:
                document:
                  type: object
                  description: Objeto que consolida los datos del documento del usuario que solicitó
                    el cancelamiento.
                  required:
                    - identification
                    - rel
                  properties:
                    identification:
                      type: string
                      maxLength: 14
                      description: Número del documento de identificación oficial del usuario.
                      example: "11111111111"
                      pattern: ^([0-9]{11})$|^([0-9A-Z]{12}[0-9]{2})$
                    rel:
                      type: string
                      maxLength: 3
                      description: Tipo del documento de identificación oficial del usuario.
                      example: CPF
                      pattern: ^[A-Z]{3}$
    CancellationPixPayment:
      type: object
      required:
        - requestMeta
        - consent
        - paymentId
      properties:
        requestMeta:
          $ref: "#/components/schemas/RequestMeta"
        paymentId:
          $ref: "#/components/schemas/PaymentId"
        idempotencyKey:
          type: string
          description: Identificador de solicitud exclusivo para soportar la idempotencia.
          maxLength: 40
          pattern: ^(?!\s)(.*)(\S)$
          example: TXpRMU9UQTROMWhZV2xSU1FUazJSMDl
        consent:
          oneOf:
            - $ref: "#/components/schemas/ConsentPayment"
            - $ref: "#/components/schemas/ConsentRecurringPayment"
        paymentType:
          $ref: "#/components/schemas/PaymentType"
        requestBody:
          type: object
          required:
            - data
          properties:
            data:
              oneOf:
                - $ref: "#/components/schemas/PatchPixPaymentData"
                - $ref: "#/components/schemas/PatchPixRecurringPaymentData"
      additionalProperties: false
    DiscoveryPaymentsResponse:
      description: Retorno del discovery de recursos
      type: object
      required:
        - resources
      properties:
        resources:
          description: Lista de recursos relacionados al discovery
          type: array
          items:
            type: object
            required:
              - resourceName
              - resourceLegacyId
              - authorizers
              - debtorAccount
            properties:
              resourceName:
                description: "Array de clave y valor con el nombre del recurso, estos datos serán
                  presentados en los frontends en el formato: 'Key1: Value1 Key2:
                  Value2 ...'"
                type: array
                items:
                  type: object
                  required:
                    - key
                  properties:
                    key:
                      description: Clave del caption del nombre del recurso
                      type: string
                      example: Número de cuenta
                    value:
                      description: Valor del caption del nombre del recurso
                      type: string
                      example: 1234-5
                minItems: 1
                maxItems: 10
              resourceLegacyId:
                description: Array de clave y valor con la clave de identificación del recurso en el
                  sistema de origen (legado), permitiendo claves compuestas
                type: array
                items:
                  type: object
                  required:
                    - key
                  properties:
                    key:
                      description: Nombre del campo del identificador en el sistema de origen
                      type: string
                      example: internalAccountId
                    value:
                      description: Valor del campo del identificador en el sistema de origen
                      type: string
                      example: "1234"
                minItems: 1
                maxItems: 10
              resourceBalanceCurrency:
                description: Moneda del saldo del recurso. Opcional para presentación en la selección del
                  recurso en el consentimiento de pago.
                type: string
                maxLength: 3
                pattern: ^([A-Z]{3})$
                example: BRL
              resourceBalanceAmount:
                description: Valor del saldo del recurso. Opcional para presentación en la selección del
                  recurso en el consentimiento de pago.
                type: string
                pattern: ^((\d{1,16}\.\d{2}))$
                minLength: 4
                maxLength: 19
                example: "100000.04"
              authorizers:
                description: Lista de los autorizadores para el recurso para casos de múltiple
                  instancia. Si el recurso es seleccionado, todos los
                  autorizadores deberán aceptar el consentimiento del que el recurso
                  forma parte
                type: array
                items:
                  type: object
                  required:
                    - cpf
                    - name
                  properties:
                    cpf:
                      description: CPF del autorizador
                      type: string
                      minLength: 11
                      maxLength: 11
                      pattern: ^\d{11}$
                      example: "11111111111"
                    name:
                      description: Nombre del autorizador
                      type: string
                      example: Marco Antonio de Brito
                minItems: 1
              defaultSelected:
                description: "Indica si el recurso debe estar seleccionado por defecto en la pantalla de
                  consentimiento. Valor por defecto: false"
                type: boolean
                example: "false"
              debtorAccount:
                type: object
                description: "Objeto que contiene la identificación de la cuenta de origen del pagador.
                  \ 




                  Las informaciones sobre la cuenta de origen del pagador podrán ser
                  traídas en el consentimiento para la titular, caso el iniciador
                  haya recolectado estas informaciones del cliente. De lo contrario,
                  será recolectada en la titular y traída para el iniciador como
                  respuesta a la creación del pago.



                  \n"
                required:
                  - ispb
                  - number
                  - accountType
                properties:
                  ispb:
                    type: string
                    minLength: 8
                    maxLength: 8
                    pattern: ^[0-9A-Z]{8}$
                    example: "12345678"
                    description: "Debe ser llenado con el ISPB (Identificador del Sistema de
                      Pagamentos Brasileños) del participante del SPI (Sistema de
                      pagos instantáneos) solo con números.



                      \n"
                  issuer:
                    type: string
                    minLength: 1
                    maxLength: 4
                    pattern: ^[0-9]{1,4}$
                    example: "1774"
                    description: "Código de la Agencia emisora de la cuenta sin dígito.\ 




                      (Agencia es la dependencia destinada a la atención al
                      cliente, al público en general y a los asociados de
                      cooperativas de crédito,\ 




                      en el ejercicio de actividades de la institución, no pudiendo ser
                      móvil o transitoria).








                      [Restricción] Llenado obligatorio para los siguientes
                      tipos de cuenta: CACC (CONTA_DEPOSITO_A_VISTA) y SVGS
                      (CONTA_POUPANCA).



                      \n"
                  number:
                    type: string
                    minLength: 1
                    maxLength: 20
                    pattern: ^[0-9]{1,20}$
                    example: "1234567890"
                    description: "Debe ser llenado con el número de la cuenta transaccional del usuario
                      pagador, con dígito verificador (si este existe), \ 




                      si hay valor alfanumérico, este debe ser convertido
                      a 0.



                      \n"
                  accountType:
                    type: string
                    enum:
                      - CACC
                      - SVGS
                      - TRAN
                    example: CACC
                    description: "Tipos de cuentas usadas para pago.




                      Modalidades tradicionales previstas por la Resolución 4.753,
                      no contemplando cuentas vinculadas,\ 




                      cuenta de domiciliados en el exterior, cuentas en monedas
                      extranjeras y cuenta correspondiente moneda electrónica.

                      \\



                      Sigue descripción de cada valor del ENUM.








                      \ - CACC - Current - Cuenta Corriente.




                      - SVGS - Savings - Cuenta de Ahorro.




                      - TRAN - TransactingAccount - Cuenta de Pago prepaga.



                      \n"
              useOverdraftLimit:
                type: boolean
                default: true
                example: true
                description: Indica si el usuario pagador autorizó la utilización de límite
                  preaprobado (cheque especial) en su cuenta para realización de
                  pagos, caso el cliente posea el producto.
    ResponseDiscoveryAccountsPayment:
      type: object
      required:
        - data
      properties:
        data:
          $ref: "#/components/schemas/DiscoveryPaymentsResponse"
      additionalProperties: false
    ResponsePaymentValidation:
      type: object
      additionalProperties: false
    ResponseCreatePixPayment:
      type: object
      required:
        - data
      properties:
        data:
          type: object
          description: Objeto que contiene datos del pago y de la cuenta del receptor
            (creditor).
          required:
            - paymentId
            - endToEndId
            - creationDateTime
            - statusUpdateDateTime
            - status
            - localInstrument
            - payment
            - creditorAccount
            - cnpjInitiator
            - debtorAccount
          properties:
            paymentId:
              description: Array de clave y valor con la clave de identificación del recurso en el
                sistema de origen (legado), permitiendo claves compuestas
              type: array
              items:
                type: object
                properties:
                  key:
                    description: Nombre del campo del identificador en el sistema de origen
                    type: string
                  value:
                    description: Valor del campo del identificador en el sistema de origen
                    type: string
                required:
                  - key
              example:
                - key: pk_CampoUm
                  value: ABC
                - key: pk_CampoDois
                  value: "123"
            endToEndId:
              type: string
              minLength: 32
              maxLength: 32
              pattern: ^([E])([0-9]{8})([0-9]{4})(0[1-9]|1[0-2])(0[1-9]|[1-2][0-9]|3[0-1])(2[0-3]|[01][0-9])([0-5][0-9])([a-zA-Z0-9]{11})$
              example: E9040088820210128000800123873170
              description: "Se trata de un identificador único, generado en la institución
                iniciadora de pago y recibido en la institución titular de
                cuenta, permeando toda la jornada del pago Pix.




                [Restricción] La titular debe obligatoriamente retornar el campo
                con el mismo valor recibido del iniciador.

                \n"
            creationDateTime:
              type: string
              pattern: ^(\d{4})-(1[0-2]|0?[1-9])-(3[01]|[12][0-9]|0?[1-9])T(?:[01]\d|2[0123]):(?:[012345]\d):(?:[012345]\d)Z$
              example: "2020-07-21T08:30:00Z"
              description: "Fecha y hora en que el recurso fue creado.


                Una cadena con fecha y hora conforme especificación RFC-3339,


                siempre con la utilización de timezone UTC(UTC time format).

                \n"
            statusUpdateDateTime:
              type: string
              pattern: ^(\d{4})-(1[0-2]|0?[1-9])-(3[01]|[12][0-9]|0?[1-9])T(?:[01]\d|2[0123]):(?:[012345]\d):(?:[012345]\d)Z$
              example: "2020-07-21T08:30:00Z"
              description: "Fecha y hora de la última actualización de la iniciación de pago.

                \\

                Una cadena con fecha y hora conforme especificación RFC-3339,


                \ siempre con la utilización de timezone UTC(UTC time format).

                \n"
            proxy:
              type: string
              maxLength: 77
              pattern: "[\\w\\W\\s]*"
              example: "12345678901"
              description: "Clave registrada en el DICT perteneciente al receptor. Los tipos de
                claves pueden ser: teléfono, correo electrónico, cpf/cnpj o clave aleatoria.

                \\

                En caso de teléfono celular debe ser informado en el estándar E.1641.

                \\

                Para correo electrónico debe tener el formato xxxxxxxx@xxxxxxx.xxx(.xx) y
                máximo 77 caracteres.


                En caso de CPF deberá ser informado con 11 números, sin puntos
                o guiones.


                Para el caso de CNPJ deberá ser informado con 14 números, sin
                puntos o guiones.


                En caso de clave aleatoria debe ser informado el UUID generado por el
                DICT, conforme formato especificado en la RFC41223.


                Si se informa, la titular de la cuenta debe validar el proxy en el DICT
                cuando localInstrument sea igual a DICT, QRDN o QRES y validar
                el campo creditorAccount.


                Esta validación es opcional si el localInstrument es igual a
                INIC.


                [Restricción] Si localInstrument es igual a MANU, el campo proxy
                no debe ser llenado. Si localInstrument es igual INIC,
                DICT, QRDN o QRES, el campo proxy debe ser siempre llenado con
                la clave Pix.

                \n"
            ibgeTownCode:
              type: string
              minLength: 7
              maxLength: 7
              pattern: ^\d{7}$
              example: "5300108"
              description: "Trae el código de la ciudad según el IBGE (Instituto Brasileño de
                Geografía y Estadística).


                Para el llenado de este campo, el Iniciador de Pagos debe
                seguir la orientación del esquema de la forma de pago.


                El llenado del campo tanto en pix/payments como /consents
                debe ser igual. En caso de divergencia de los valores, la institución
                debe retornar HTTP 422 con el código de error
                PAGAMENTO_DIVERGENTE_DO_CONSENTIMENTO.

                \\

                Este campo hace referencia al campo CodMun del esquema Pix.




                \ [Restricción] Debe obligatoriamente retornar el campo con el mismo
                valor recibido del iniciador, si este ha sido enviado en la
                solicitud de pago.

                \n"
            status:
              type: string
              enum:
                - RCVD
                - PATC
                - CANC
                - ACCP
                - ACPD
                - RJCT
                - ACSC
                - PDNG
                - SCHD
              example: PDNG
              description: "Estado actual de la iniciación de pago. El estado evoluciona en la
                siguiente orden: \ 




                1.  RCVD (Received) - Indica que la solicitud de pago fue
                recibida con éxito por la titular, pero aún hay validaciones
                a ser hechas antes de ser sometida para liquidación.




                2.  PATC (Partially Accepted Technical Correct) - Indica que la
                transacción necesita la confirmación de más autorizadores para que
                el procesamiento del pago pueda proseguir. \ 




                3.  CANC (Cancelled) - Indica que la transacción Pix pendiente fue
                cancelada con éxito por el usuario antes de que fuera confirmada
                (ACCP) o rechazada (RJCT) por la titular.




                4.  ACCP( Accepted Customer Profile) - Indica que todas las
                verificaciones necesarias ya han sido realizadas por la titular y
                que la transacción está lista para ser enviada para liquidación (en
                el SPI si es Pix para otra institución o internamente si es
                para otra cuenta en la misma institución).




                5.  ACPD (Accepted Clearing Processed) - Indica que la titular
                ya ha sometido la transacción para liquidación, pero aún no tiene la
                confirmación de si fue liquidada o rechazada.




                6.  RJCT (Rejected) Indica que la transacción fue rechazada por la
                titular o por el SPI.




                7.  ACSC (Accepted Settlement Completed Debitor Account) -
                Indica que la transacción fue efectivada por la titular o por el SPI.




                8.  PDNG (Pending) - Indica que la titular retuvo
                temporalmente la transacción Pix para análisis.




                9.  SCHD (Scheduled) - Indica que la transacción Pix fue agendada
                con éxito en la titular.

                \\



                En caso de fracaso:\ 


                \\


                RJCT (REJECTED) - Instrucción de pago rechazada.


                [Restricción] El estado PATC no deberá ser retornado para
                pagos de consentimiento de versión mayor a V4.

                \n"
            rejectionReason:
              type: object
              description: "Motivo del rechazo del pago. Informaciones complementarias sobre
                el motivo del estado


                [Restricción] Este motivo deberá ser enviado cuando el campo
                /data/status sea igual a RJCT (REJECTED)."
              required:
                - code
                - detail
              properties:
                code:
                  type: string
                  enum:
                    - SALDO_INSUFICIENTE
                    - VALOR_ACIMA_LIMITE
                    - VALOR_INVALIDO
                    - COBRANCA_INVALIDA
                    - NAO_INFORMADO
                    - PAGAMENTO_DIVERGENTE_CONSENTIMENTO
                    - DETALHE_PAGAMENTO_INVALIDO
                    - PAGAMENTO_RECUSADO_DETENTORA
                    - PAGAMENTO_RECUSADO_SPI
                    - FALHA_INFRAESTRUTURA
                    - FALHA_INFRAESTRUTURA_SPI
                    - FALHA_INFRAESTRUTURA_DICT
                    - FALHA_INFRAESTRUTURA_ICP
                    - FALHA_INFRAESTRUTURA_PSP_RECEBEDOR
                    - FALHA_INFRAESTRUTURA_DETENTORA
                    - CONTAS_ORIGEM_DESTINO_IGUAIS
                  example: SALDO_INSUFICIENTE
                  description: "Define el código de la razón por la cual el pago fue rechazado




                    - SALDO_INSUFICIENTE - La cuenta seleccionada no tiene saldo
                    suficiente para realizar el pago.




                    - VALOR_ACIMA_LIMITE - El valor supera el límite
                    establecido [en la institución/en el esquema/otro] para permitir
                    la realización de transacciones por el cliente.

                    \\



                    - VALOR_INVALIDO - El valor enviado no es válido para el Código
                    QR informado.




                    - COBRANCA_INVALIDA - Validación de expiración, validación de
                    vencimiento o Estado Válido.




                    - NAO_INFORMADO - No reportado/identificado por la
                    institución titular de cuenta.

                    \\



                    - PAGAMENTO_DIVERGENTE_CONSENTIMENTO - Datos del pago
                    divergentes de los datos del consentimiento.




                    - DETALHE_PAGAMENTO_INVALIDO - Parámetro [nombre_campo] no
                    obedece las reglas de negocio.


                    \\


                    - PAGAMENTO_RECUSADO_DETENTORA - [Descripción del motivo de
                    rechazo].

                    \\



                    - PAGAMENTO_RECUSADO_SPI - [Código de error conforme tabla
                    de dominios reason PACS.002].




                    - FALHA_INFRAESTRUTURA - [Descripción de cuál falla en la
                    infraestructura inviabilizó el procesamiento].

                    \\



                    - FALHA_INFRAESTRUTURA_SPI - Indica una falla en el Sistema de
                    Pagos Instantáneos (SPI).




                    - FALHA_INFRAESTRUTURA_DICT - Indica una falla en el Directorio
                    de Identificadores de Cuentas Transaccionales (DICT).




                    - FALHA_INFRAESTRUTURA_ICP - Indica una falla en la
                    Infraestructura de Claves Públicas (ICP).




                    - FALHA_INFRAESTRUTURA_PSP_RECEBEDOR - Indica una falla en la
                    infraestructura del Proveedor de Servicio de Pago (PSP)
                    que recibe el pago.




                    - FALHA_INFRAESTRUTURA_DETENTORA - Indica una falla en la
                    infraestructura de la institución titular de las informaciones o
                    recursos.




                    - CONTAS_ORIGEM_DESTINO_IGUAIS - Indica un intento de
                    pago donde la cuenta origen y la cuenta de destino son
                    iguales.




                    El rejectionReason FALHA_INFRAESTRUTURA no será excluido,
                    solo dejará de ser utilizado, permitiendo así,
                    retrocompatibilidad e integridad entre los participantes.

                    \n"
                detail:
                  type: string
                  pattern: "[\\w\\W\\s]*"
                  maxLength: 2048
                  description: Contiene informaciones adicionales al pago rechazado
            localInstrument:
              type: string
              enum:
                - MANU
                - DICT
                - QRDN
                - QRES
                - INIC
                - AUTO
              example: DICT
              description: "Especifica la forma de iniciación del pago:


                - MANU - Inserción manual de datos de la cuenta transaccional


                - DICT - Inserción manual de clave Pix


                - QRDN - Código QR dinámico


                - QRES - Código QR estático


                - INIC - Indica que el receptor (creditor) contrató al Iniciador
                de Pagos específicamente para realizar iniciaciones de pago en que
                el beneficiario es previamente conocido.


                - AUTO - Indica el pago de una recurrencia de Pix
                automático, donde el consentimiento fue previamente autorizado por el
                pagador y el pago es realizado automáticamente por el Iniciador
                de Pagos bajo comando del receptor.


                [Restricción] Si /data/payment/schedule enviado con valor
                diferente de single durante la creación del consentimiento, solo
                los métodos MANU, DICT o QRES son permitidos.

                \n"
            cnpjInitiator:
              type: string
              pattern: ^[0-9A-Z]{12}[0-9]{2}$
              maxLength: 14
              example: "50685362000135"
              description: CNPJ del Iniciador de Pago debidamente habilitado para la
                prestación de Servicio de Iniciación en el Pix.
            payment:
              type: object
              description: Objeto que contiene datos del pago como moneda y valor.
              required:
                - amount
                - currency
              properties:
                amount:
                  type: string
                  minLength: 4
                  maxLength: 19
                  pattern: ^((\d{1,16}\.\d{2}))$
                  example: "100000.12"
                  description: "Valor de la transacción con 2 casas decimales. El valor debe ser el mismo
                    enviado en el consentimiento.\ 




                    Para Código QR estático con valor predeterminado en el Código QR
                    o para Código QR dinámico con indicación de que el valor no
                    puede ser alterado: El campo amount debe ser llenado con el
                    valor establecido en el Código QR.\ 


                    \ Si se llena con valor divergente del Código QR, debe
                    ser retornado un error HTTP Status 422.

                    \n"
                currency:
                  type: string
                  maxLength: 3
                  pattern: ^([A-Z]{3})$
                  example: BRL
                  description: "Código de la moneda nacional según modelo ISO-4217, o sea, 'BRL'.
                    \ 


                    Todos los valores monetarios informados están representados
                    con la moneda vigente de Brasil.

                    \n"
            transactionIdentification:
              type: string
              pattern: ^[a-zA-Z0-9]{1,35}$
              maxLength: 35
              example: E00038166201907261559y6j6
              description: "Se trata de un identificador de transacción que debe ser
                retransmitido intacto por el PSP del pagador al generar la orden de
                pago.

                \\



                [Restricción] La titular debe obligatoriamente retornar el campo
                con el mismo valor recibido del iniciador, si este ha sido enviado en la
                solicitud de la iniciación del pago.

                \n"
            remittanceInformation:
              type: string
              maxLength: 140
              pattern: "[\\w\\W\\s]*"
              example: Pago de la nota RSTO035-002.
              description: "Debe ser llenado siempre que el usuario pagador inserte alguna
                información adicional en un pago, a ser enviada al receptor

                \\



                [Restricción] Debe obligatoriamente retornar el campo con el mismo
                valor recibido del iniciador, si este ha sido enviado en la
                solicitud de pago.

                \n"
            creditorAccount:
              type: object
              description: "Objeto que contiene la identificación de la cuenta de destino del
                beneficiario/receptor.




                [Restricción]Si el pago ha sido creado utilizando versión
                2.0.0 o superior, el retorno de este objeto es obligatorio por la
                institución titular."
              required:
                - ispb
                - number
                - accountType
              properties:
                ispb:
                  type: string
                  minLength: 8
                  maxLength: 8
                  pattern: ^[0-9A-Z]{8}$
                  example: "12345678"
                  description: "Debe ser llenado con el ISPB (Identificador del Sistema de
                    Pagamentos Brasileños) del participante del SPI (Sistema de
                    pagos instantáneos) solo con números.

                    \n"
                issuer:
                  type: string
                  minLength: 1
                  maxLength: 4
                  pattern: ^[0-9]{1,4}$
                  example: "1774"
                  description: "Código de la Agencia emisora de la cuenta sin dígito.\ 

                    \\

                    (Agencia es la dependencia destinada a la atención al
                    cliente, al público en general y a los asociados de
                    cooperativas de crédito,\ 


                    en el ejercicio de actividades de la institución, no pudiendo ser
                    móvil o transitoria).




                    [Restricción] Llenado obligatorio para los siguientes
                    tipos de cuenta: CACC (CONTA_DEPOSITO_A_VISTA) y SVGS
                    (CONTA_POUPANCA).

                    \n"
                number:
                  type: string
                  minLength: 1
                  maxLength: 20
                  pattern: ^[0-9]{1,20}$
                  example: "1234567890"
                  description: "Debe ser llenado con el número de la cuenta del usuario receptor,
                    con dígito verificador (si este existe), \ 


                    si hay valor alfanumérico, este debe ser convertido a
                    0.

                    \n"
                accountType:
                  type: string
                  enum:
                    - CACC
                    - SVGS
                    - TRAN
                  example: CACC
                  description: "Tipos de cuentas usadas para pago.


                    Modalidades tradicionales previstas por la Resolución 4.753, no
                    contemplando cuentas vinculadas,\ 


                    cuenta de domiciliados en el exterior, cuentas en monedas
                    extranjeras y cuenta correspondiente moneda electrónica.

                    \\

                    Sigue descripción de cada valor del ENUM.




                    - CACC - Current - Cuenta Corriente.


                    - SVGS - Savings - Cuenta de Ahorro.


                    \ - TRAN - TransactingAccount - Cuenta de Pago prepaga.

                    \n"
            debtorAccount:
              type: object
              description: "Objeto que contiene la identificación de la cuenta de origen del pagador.
                \ 


                Las informaciones sobre la cuenta de origen del pagador podrán ser
                traídas en el consentimiento para la titular, caso el iniciador
                haya recolectado estas informaciones del cliente. De lo contrario, será
                recolectada en la titular y traída para el iniciador como respuesta
                a la creación del pago.

                \n"
              required:
                - ispb
                - number
                - accountType
              properties:
                ispb:
                  type: string
                  minLength: 8
                  maxLength: 8
                  pattern: ^[0-9A-Z]{8}$
                  example: "12345678"
                  description: "Debe ser llenado con el ISPB (Identificador del Sistema de
                    Pagamentos Brasileños) del participante del SPI (Sistema de
                    pagos instantáneos) solo con números.

                    \n"
                issuer:
                  type: string
                  minLength: 1
                  maxLength: 4
                  pattern: ^[0-9]{1,4}$
                  example: "1774"
                  description: "Código de la Agencia emisora de la cuenta sin dígito.\ 

                    \\

                    (Agencia es la dependencia destinada a la atención al
                    cliente, al público en general y a los asociados de
                    cooperativas de crédito,\ 


                    en el ejercicio de actividades de la institución, no pudiendo ser
                    móvil o transitoria).




                    [Restricción] Llenado obligatorio para los siguientes
                    tipos de cuenta: CACC (CONTA_DEPOSITO_A_VISTA) y SVGS
                    (CONTA_POUPANCA).

                    \n"
                number:
                  type: string
                  minLength: 1
                  maxLength: 20
                  pattern: ^[0-9]{1,20}$
                  example: "1234567890"
                  description: "Debe ser llenado con el número de la cuenta transaccional del usuario
                    pagador, con dígito verificador (si este existe), \ 


                    si hay valor alfanumérico, este debe ser convertido a
                    0.

                    \n"
                accountType:
                  type: string
                  enum:
                    - CACC
                    - SVGS
                    - TRAN
                  example: CACC
                  description: "Tipos de cuentas usadas para pago.


                    Modalidades tradicionales previstas por la Resolución 4.753, no
                    contemplando cuentas vinculadas,\ 


                    cuenta de domiciliados en el exterior, cuentas en monedas
                    extranjeras y cuenta correspondiente moneda electrónica.

                    \\

                    Sigue descripción de cada valor del ENUM.




                    - CACC - Current - Cuenta Corriente.


                    - SVGS - Savings - Cuenta de Ahorro.


                    \ - TRAN - TransactingAccount - Cuenta de Pago prepaga.

                    \n"
            authorisationFlow:
              type: string
              enum:
                - HYBRID_FLOW
                - CIBA_FLOW
                - FIDO_FLOW
              example: HYBRID_FLOW
              description: "Campo condicional utilizado para identificar el flujo de
                autorización en que fue solicitado el pago.




                [Restricción] Si CIBA o FIDO, llenado obligatorio. Si el
                campo no está presente en el payload, se entiende que el flujo
                de autorización utilizado es el HYBRID_FLOW.

                \n"
            document:
              type: object
              description: "Informaciones del documento identificador del receptor de la transacción.




                [Restricción] Debe ser enviado solo si el campo `paymentType` del
                cuerpo de la solicitud es PAYMENT_RECURRING_CONSENT."
              required:
                - identification
                - rel
              properties:
                identification:
                  type: string
                  minLength: 11
                  maxLength: 14
                  description: Número del documento de identificación oficial del titular persona
                    natural o jurídica.
                  example: "11111111111111"
                  pattern: ^([0-9]{11})$|^([0-9A-Z]{12}[0-9]{2})$
                rel:
                  type: string
                  enum:
                    - CPF
                    - CNPJ
                  example: CNPJ
                  description: Tipo del documento de identificación oficial del titular persona
                    natural o jurídica.
            date:
              type: string
              description: "Fecha en que se realizará el pago. Una cadena con la
                utilización de timezone UTC-3 (UTC time format).




                [Restricción] Debe ser enviado solo si el campo `paymentType` del
                cuerpo de la solicitud es PAYMENT_RECURRING_CONSENT."
              format: date
              maxLength: 10
              example: "2021-01-01"
        meta:
          type: object
          description: Meta información referente a la API solicitada.
          required:
            - hasMoreRecords
            - requestDateTime
          properties:
            hasMoreRecords:
              type: boolean
              description: Indica si hay más registros a ser retornados (true) o no
                (false).
              example: true
    ResponseFindPixPayment:
      type: object
      required:
        - data
      properties:
        data:
          type: object
          description: Objeto que contiene datos del pago y de la cuenta del receptor
            (creditor).
          required:
            - paymentId
            - endToEndId
            - creationDateTime
            - statusUpdateDateTime
            - status
            - localInstrument
            - payment
            - cnpjInitiator
            - debtorAccount
            - creditorAccount
          properties:
            paymentId:
              description: Array de clave y valor con la clave de identificación del recurso en el
                sistema de origen (legado), permitiendo claves compuestas
              type: array
              items:
                type: object
                properties:
                  key:
                    description: Nombre del campo del identificador en el sistema de origen
                    type: string
                  value:
                    description: Valor del campo del identificador en el sistema de origen
                    type: string
                required:
                  - key
              example:
                - key: pk_CampoUm
                  value: ABC
                - key: pk_CampoDois
                  value: "123"
            endToEndId:
              type: string
              minLength: 32
              maxLength: 32
              pattern: ^([E])([0-9]{8})([0-9]{4})(0[1-9]|1[0-2])(0[1-9]|[1-2][0-9]|3[0-1])(2[0-3]|[01][0-9])([0-5][0-9])([a-zA-Z0-9]{11})$
              example: E9040088820210128000800123873170
              description: "Se trata de un identificador único, generado en la institución
                iniciadora de pago y recibido en la institución titular de
                cuenta, permeando toda la jornada del pago Pix.




                [Restricción] La titular debe obligatoriamente retornar el campo
                con el mismo valor recibido del iniciador.

                \n"
            document:
              type: object
              description: "Informaciones del documento identificador del receptor de la transacción.




                [Restricción] Debe ser enviado solo si el campo `paymentType` del
                cuerpo de la solicitud es PAYMENT_RECURRING_CONSENT."
              required:
                - identification
                - rel
              properties:
                identification:
                  type: string
                  minLength: 11
                  maxLength: 14
                  description: Número del documento de identificación oficial del titular persona
                    natural o jurídica.
                  example: "11111111111111"
                  pattern: ^([0-9]{11})$|^([0-9A-Z]{12}[0-9]{2})$
                rel:
                  type: string
                  enum:
                    - CPF
                    - CNPJ
                  example: CNPJ
                  description: Tipo del documento de identificación oficial del titular persona
                    natural o jurídica.
            creationDateTime:
              type: string
              pattern: ^(\d{4})-(1[0-2]|0?[1-9])-(3[01]|[12][0-9]|0?[1-9])T(?:[01]\d|2[0123]):(?:[012345]\d):(?:[012345]\d)Z$
              example: "2020-07-21T08:30:00Z"
              description: "Fecha y hora en que el recurso fue creado.


                Una cadena con fecha y hora conforme especificación RFC-3339,


                siempre con la utilización de timezone UTC(UTC time format).

                \n"
            statusUpdateDateTime:
              type: string
              pattern: ^(\d{4})-(1[0-2]|0?[1-9])-(3[01]|[12][0-9]|0?[1-9])T(?:[01]\d|2[0123]):(?:[012345]\d):(?:[012345]\d)Z$
              example: "2020-07-21T08:30:00Z"
              description: "Fecha y hora de la última actualización de la iniciación de pago.

                \\

                Una cadena con fecha y hora conforme especificación RFC-3339,


                \ siempre con la utilización de timezone UTC(UTC time format).

                \n"
            proxy:
              type: string
              maxLength: 77
              pattern: "[\\w\\W\\s]*"
              example: "12345678901"
              description: "Clave registrada en el DICT perteneciente al receptor. Los tipos de
                claves pueden ser: teléfono, correo electrónico, cpf/cnpj o clave aleatoria.

                \\

                En caso de teléfono celular debe ser informado en el estándar E.1641.

                \\

                Para correo electrónico debe tener el formato xxxxxxxx@xxxxxxx.xxx(.xx) y
                máximo 77 caracteres.


                En caso de CPF deberá ser informado con 11 números, sin puntos
                o guiones.


                Para el caso de CNPJ deberá ser informado con 14 números, sin
                puntos o guiones.


                En caso de clave aleatoria debe ser informado el UUID generado por el
                DICT, conforme formato especificado en la RFC41223.


                Si se informa, la titular de la cuenta debe validar el proxy en el DICT
                cuando localInstrument sea igual a DICT, QRDN o QRES y validar
                el campo creditorAccount.


                Esta validación es opcional si el localInstrument es igual a
                INIC.


                [Restricción] Si localInstrument es igual a MANU, el campo proxy
                no debe ser llenado. Si localInstrument es igual INIC,
                DICT, QRDN o QRES, el campo proxy debe ser siempre llenado con
                la clave Pix.

                \n"
            ibgeTownCode:
              type: string
              minLength: 7
              maxLength: 7
              pattern: ^\d{7}$
              example: "5300108"
              description: "Trae el código de la ciudad según el IBGE (Instituto Brasileño de
                Geografía y Estadística).


                Para el llenado de este campo, el Iniciador de Pagos debe
                seguir la orientación del esquema de la forma de pago.


                El llenado del campo tanto en pix/payments como /consents
                debe ser igual. En caso de divergencia de los valores, la institución
                debe retornar HTTP 422 con el código de error
                PAGAMENTO_DIVERGENTE_DO_CONSENTIMENTO.

                \\

                Este campo hace referencia al campo CodMun del esquema Pix.




                \ [Restricción] Debe obligatoriamente retornar el campo con el mismo
                valor recibido del iniciador, si este ha sido enviado en la
                solicitud de pago.

                \n"
            status:
              type: string
              enum:
                - RCVD
                - PATC
                - CANC
                - ACCP
                - ACPD
                - RJCT
                - ACSC
                - PDNG
                - SCHD
              example: PDNG
              description: "Estado actual de la iniciación de pago. El estado evoluciona en la
                siguiente orden: \ 




                1.  RCVD (Received) - Indica que la solicitud de pago fue
                recibida con éxito por la titular, pero aún hay validaciones
                a ser hechas antes de ser sometida para liquidación.




                2.  PATC (Partially Accepted Technical Correct) - Indica que la
                transacción necesita la confirmación de más autorizadores para que
                el procesamiento del pago pueda proseguir. \ 




                3.  CANC (Cancelled) - Indica que la transacción Pix pendiente fue
                cancelada con éxito por el usuario antes de que fuera confirmada
                (ACCP) o rechazada (RJCT) por la titular.




                4.  ACCP( Accepted Customer Profile) - Indica que todas las
                verificaciones necesarias ya han sido realizadas por la titular y
                que la transacción está lista para ser enviada para liquidación (en
                el SPI si es Pix para otra institución o internamente si es
                para otra cuenta en la misma institución).




                5.  ACPD (Accepted Clearing Processed) - Indica que la titular
                ya ha sometido la transacción para liquidación, pero aún no tiene la
                confirmación de si fue liquidada o rechazada.




                6.  RJCT (Rejected) Indica que la transacción fue rechazada por la
                titular o por el SPI.




                7.  ACSC (Accepted Settlement Completed Debitor Account) -
                Indica que la transacción fue efectivada por la titular o por el SPI.




                8.  PDNG (Pending) - Indica que la titular retuvo
                temporalmente la transacción Pix para análisis.




                9.  SCHD (Scheduled) - Indica que la transacción Pix fue agendada
                con éxito en la titular.

                \\



                En caso de fracaso:\ 


                \\


                RJCT (REJECTED) - Instrucción de pago rechazada.


                [Restricción] El estado PATC no deberá ser retornado para
                pagos de consentimiento de versión mayor a V4.

                \n"
            rejectionReason:
              type: object
              description: "Motivo del rechazo del pago. Informaciones complementarias sobre
                el motivo del estado


                [Restricción] Este motivo deberá ser enviado cuando el campo
                /data/status sea igual a RJCT (REJECTED)."
              required:
                - code
                - detail
              properties:
                code:
                  type: string
                  enum:
                    - SALDO_INSUFICIENTE
                    - VALOR_ACIMA_LIMITE
                    - VALOR_INVALIDO
                    - COBRANCA_INVALIDA
                    - NAO_INFORMADO
                    - PAGAMENTO_DIVERGENTE_CONSENTIMENTO
                    - DETALHE_PAGAMENTO_INVALIDO
                    - PAGAMENTO_RECUSADO_DETENTORA
                    - PAGAMENTO_RECUSADO_SPI
                    - FALHA_INFRAESTRUTURA
                    - FALHA_INFRAESTRUTURA_SPI
                    - FALHA_INFRAESTRUTURA_DICT
                    - FALHA_INFRAESTRUTURA_ICP
                    - FALHA_INFRAESTRUTURA_PSP_RECEBEDOR
                    - FALHA_INFRAESTRUTURA_DETENTORA
                    - FALHA_AGENDAMENTO_PAGAMENTOS
                    - CONTAS_ORIGEM_DESTINO_IGUAIS
                    - CONSENTIMENTO_INVALIDO
                  example: SALDO_INSUFICIENTE
                  description: "Define el código de la razón por la cual el pago fue rechazado




                    - SALDO_INSUFICIENTE - La cuenta seleccionada no tiene saldo
                    suficiente para realizar el pago.




                    - VALOR_ACIMA_LIMITE - El valor supera el límite
                    establecido [en la institución/en el esquema/otro] para permitir
                    la realización de transacciones por el cliente.

                    \\



                    - VALOR_INVALIDO - El valor enviado no es válido para el Código
                    QR informado.




                    - COBRANCA_INVALIDA - Validación de expiración, validación de
                    vencimiento o Estado Válido.




                    - NAO_INFORMADO - No reportado/identificado por la
                    institución titular de cuenta.

                    \\



                    - PAGAMENTO_DIVERGENTE_CONSENTIMENTO - Datos del pago
                    divergentes de los datos del consentimiento.




                    - DETALHE_PAGAMENTO_INVALIDO - Parámetro [nombre_campo] no
                    obedece las reglas de negocio.


                    \\


                    - PAGAMENTO_RECUSADO_DETENTORA - [Descripción del motivo de
                    rechazo].

                    \\



                    - PAGAMENTO_RECUSADO_SPI - [Código de error conforme tabla
                    de dominios reason PACS.002].




                    - FALHA_INFRAESTRUTURA - [Descripción de cuál falla en la
                    infraestructura inviabilizó el procesamiento].

                    \\



                    - FALHA_INFRAESTRUTURA_SPI - Indica una falla en el Sistema de
                    Pagos Instantáneos (SPI).




                    - FALHA_INFRAESTRUTURA_DICT - Indica una falla en el Directorio
                    de Identificadores de Cuentas Transaccionales (DICT).




                    - FALHA_INFRAESTRUTURA_ICP - Indica una falla en la
                    Infraestructura de Claves Públicas (ICP).




                    - FALHA_INFRAESTRUTURA_PSP_RECEBEDOR - Indica una falla en la
                    infraestructura del Proveedor de Servicio de Pago (PSP)
                    que recibe el pago.




                    - FALHA_INFRAESTRUTURA_DETENTORA - Indica una falla en la
                    infraestructura de la institución titular de las informaciones o
                    recursos.




                    - CONTAS_ORIGEM_DESTINO_IGUAIS - Indica un intento de
                    pago donde la cuenta origen y la cuenta de destino son
                    iguales.




                    - FALHA_AGENDAMENTO_PAGAMENTOS - Falla al agendar
                    pagamentos.




                    El rejectionReason FALHA_INFRAESTRUTURA no será excluido,
                    solo dejará de ser utilizado, permitiendo así,
                    retrocompatibilidad e integridad entre los participantes.

                    \n"
                detail:
                  type: string
                  pattern: "[\\w\\W\\s]*"
                  maxLength: 2048
                  description: Contiene informaciones adicionales al pago rechazado
            date:
              type: string
              description: "Fecha en que se realizará el pago. Una cadena con la
                utilización de timezone UTC-3 (UTC time format).




                [Restricción] Debe ser enviado solo si el campo `paymentType` del
                cuerpo de la solicitud es PAYMENT_RECURRING_CONSENT."
              format: date
              maxLength: 10
              example: "2021-01-01"
            localInstrument:
              type: string
              enum:
                - MANU
                - DICT
                - QRDN
                - QRES
                - INIC
                - AUTO
              example: DICT
              description: "Especifica la forma de iniciación del pago:


                - MANU - Inserción manual de datos de la cuenta transaccional


                - DICT - Inserción manual de clave Pix


                - QRDN - Código QR dinámico


                - QRES - Código QR estático


                - INIC - Indica que el receptor (creditor) contrató al Iniciador
                de Pagos específicamente para realizar iniciaciones de pago en que
                el beneficiario es previamente conocido.


                \ AUTO - Indica el pago de una recurrencia de Pix
                automático, donde el consentimiento fue previamente autorizado por el
                pagador y el pago es realizado automáticamente por el Iniciador
                de Pagos bajo comando del receptor


                [Restricción] Si /data/payment/schedule enviado con valor
                diferente de single durante la creación del consentimiento, solo
                los métodos MANU, DICT o QRES son permitidos.

                \n"
            cnpjInitiator:
              type: string
              pattern: ^[0-9A-Z]{12}[0-9]{2}$
              maxLength: 14
              example: "50685362000135"
              description: CNPJ del Iniciador de Pago debidamente habilitado para la
