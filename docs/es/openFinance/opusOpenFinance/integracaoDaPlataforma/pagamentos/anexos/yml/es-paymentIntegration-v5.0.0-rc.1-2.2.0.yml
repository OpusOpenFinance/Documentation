openapi: 3.0.0
info:
  title: API Payment Initiation - Integration Layer - Opus Open Finance Brasil
  description: |
    API de Iniciación de Pagos, responsable de viabilizar las operaciones
    de iniciación de pagos para Opus Open Finance Brasil.

    Debe ser disponible por la Institución Titular de Cuenta y recibirá solicitudes realizadas por Opus Open
    Finance Brasil.

    # Escenarios de Pagos a Cubrir por la Integración

    En la implementación de la integración de pagos, es necesario cubrir la creación y la consulta de pagos en cada uno de los escenarios siguientes.

    Para pagos retenidos para análisis (estado "PDNG" en Open Finance) o agendados, también es necesario contemplar la posibilidad de revocación del pago.

    ## Escenarios por Tipo de Usuario Logueado

    - **Persona Física (PF)**
    - **Persona Jurídica (PJ)** *(cuando sea soportado por el backend de la institución financiera)*

    ## Escenarios por Fecha de Efectivación del Pago

    - **Instantáneo**: Pagos a ser efectivados el mismo día de la solicitud.
    - **Agendado**: Pagos a ser efectivados en fecha futura.

    ## Escenarios por Forma de Iniciación del Pago

    - **MANU**: Iniciado por inserción manual de los datos bancarios.
    - **INIC**: Iniciado por el receptor (*creditor*).
    - **DICT**: Iniciado por uso de clave Pix.
    - **QRES**: Iniciado por Código QR Estático (excepto NFC).
    - **QRDN**: Iniciado por Código QR Dinámico (excepto NFC).
    - **APES**: Iniciado por Código QR Estático vía NFC.
    - **APDN**: Iniciado por Código QR Dinámico vía NFC.

    ## Escenarios por Finalidad de Transacción

    - **IMMEDIATE**: Debe ser utilizado cuando el pago generado por el consentimiento sea único e inmediato y no sea un Pix Retiro o Pix Cambio.
    - **SINGLE_SCHEDULED**: Debe ser utilizado cuando el pago generado por el consentimiento sea único y agendado.
    - **RECURRENT_SCHEDULED**: Debe ser utilizado cuando el pago generado por el consentimiento no es único y es agendado.
    - **WITHDRAW**: Debe ser utilizado cuando el pago sea único, inmediato y represente una operación de retiro.
    - **CHANGE**: Debe ser utilizado cuando el pago sea único, inmediato y represente una operación de cambio.

    ## Escenarios por Tipo de Intento de Pago

    El Esquema Pix posibilita reintentos para pagos específicos, como el Pix automático.  
    Al realizar un Pix por Open Finance, la integración debe tratar adecuadamente los siguientes intentos de pago:

    - **Solicitud Original:** El primer intento de ejecución del pago, que ocurre para todos los pagos.
    - **Reintento Extradía:** Solo soportado para pagos específicos (ej.: Pix automático). Es un nuevo intento realizado en un día diferente al intento original.

    **⚠️ Importante:** El reintento intradía (realizado el mismo día), cuando sea aplicable, debe ser identificado y tratado por el sistema de backend de la institución financiera.

    ---

    ## Cómo Identificar los Escenarios

    A continuación, se presenta una visión más técnica de las reglas de identificación de los escenarios de pagos descritos anteriormente.

    El análisis de campos abajo se realiza para el payload de la solicitud de creación de pagos.

    ### Cómo Identificar el Tipo de Usuario Logueado

    | Campo `consent.businessDocumentType.document.identification` | Interpretación |
    | ------------------------------------------------------------ | ------------- |
    | Ausente                                                      | Usuario PF    |
    | Rellenado                                                    | Usuario PJ    |

    ---

    **ℹ️ Observación:** Independientemente del tipo de usuario, su CPF estará disponible en el campo `consent.loggedUser.document.identification`.

    <br>

    ### Cómo Identificar la Fecha de Efectivación del Pago

    El campo que define la fecha del pago varía según el tipo de pago (campo `paymentType`):

    - Caso `paymentType` sea `PAYMENT_CONSENT`

    | Campo `consent.payment.schedule`          | Escenario     | Fecha de Pago                          |
    | ----------------------------------------- | ----------- | -------------------------------------- |
    | **Ausente**                               | Instantáneo | Fecha actual                             |
    | Posee subcampo `single`                  | Agendado    | `consent.payment.schedule.single.date` |
    | Posee subcampo **diferente** de `single` | Agendado    | `requestBody.data.date`                |

    ---

    - Caso `paymentType` sea `PAYMENT_RECURRING_CONSENT`

    | Campo `requestBody.data.date` | Escenario     | Fecha de Pago       |
    | ----------------------------- | ----------- | ----------------------- |
    | Es fecha **actual**              | Instantáneo | Fecha actual              |
    | Es fecha **futura**             | Agendado    | `requestBody.data.date` |

    ---

    <br>

    ### Cómo Identificar la Forma de Iniciación y el Receptor (creditor)

    La **forma de iniciación** del pago está determinada por el valor del campo `requestBody.data.localInstrument`.  
    La forma de identificación del **receptor (creditor)** varía según el tipo de iniciación informado.

    La tabla siguiente resume los campos para la identificación de cada escenario:

    | Forma de Iniciación | Campos utilizados para identificar al receptor                     |
    | :----------------: | ------------------------------------------------------------------ |
    |        MANU        | `creditorAccount` (Objeto con informaciones bancarias)               |
    |        INIC        | `creditorAccount` + `proxy` (Clave Pix)                            |
    |        DICT        | `creditorAccount` + `proxy`                                        |
    |        QRES        | `creditorAccount` + `proxy` + `qrCode` (String con el Código QR leído) |
    |        QRDN        | `creditorAccount` + `proxy` + `qrCode`                             |
    |        APES        | `creditorAccount` + `proxy` + `qrCode` (String con el Código QR leído) |
    |        APDN        | `creditorAccount` + `proxy` + `qrCode`                             |

    ---

    **⚠️ Importante:** Cuando haya más de una forma de identificación, se debe validar la consistencia entre ellas.
    Ejemplo: la clave Pix debe referirse a la misma cuenta indicada en el campo creditorAccount.

    **ℹ️ Observación:** Todos los campos mencionados en la tabla anterior están ubicados dentro de `requestBody.data`.

    <br>

    ### Cómo Identificar la Finalidad de Transacción (purpose)

    La **finalidad de transacción** del pago está determinada por el valor del campo `consent.payment.purpose`.  

    La tabla siguiente resume los campos para la identificación de cada escenario:

    | Finalidad de transacción       | Valor del campo purpose |
    | :---------------------------: | :----------------------: |
    |        Inmediato               | IMMEDIATE                |
    |        Agendado Único         | SINGLE_SCHEDULED         |
    |        Agendado Recurrente    | RECURRENT_SCHEDULED      |
    |        Retiro                  | WITHDRAW                 |
    |        Cambio                  | CHANGE                   |               

    ---

    <br>

    ### Cómo Identificar el Intento de Pago

    | Campo `requestBody.data.originalRecurringPaymentId` | Interpretación        |
    | --------------------------------------------------- | -------------------- |
    | Ausente                                             | Intento Original   |
    | Rellenado con el ID del pago original           | Reintento Extradía |

    ---

    <br>

    # Validaciones Obligatorias para Pagos

    Las siguientes validaciones deben ser implementadas en la ruta específica para la validación de datos del pago.

    Para cada validación, el error listado en la respuesta de la integración debe presentar en el campo `code` el código correspondiente, según lo indicado.

    ## Validación del Valor Máximo del Pago

    **ℹ️ Observaciones:**

    - Validación realizada para pagos del tipo `PAYMENT_CONSENT` (valor del campo `requestBody.paymentType`).
    - Todos los demás campos abajo están ubicados dentro de `requestBody.data.payment`.

    ### Regla

    El valor de la transacción (campo `amount`) debe estar por debajo:

    - Del límite establecido por la Institución Titular (si existe).
    - Del valor máximo absoluto, en reales, de `999999999.99` (esto es, hasta 9 dígitos antes del punto decimal y 2 después).
        - El valor **no** puede ser igual al límite máximo.

    **Código de error:** `VALOR_ACIMA_LIMITE`

    ## Validaciones de Código QR

    **ℹ️ Observaciones:**

    - Validaciones realizadas para pagos del tipo `PAYMENT_CONSENT` (valor del campo `requestBody.paymentType`).
    - Todos los demás campos abajo están ubicados dentro de `requestBody.data.payment`.

    ### Reglas Generales

    1. El tipo de Código QR debe ser coherente con la forma de iniciación del pago (campo `details.localInstrument`):
        - Si la forma de iniciación es **QRES**, el Código QR debe ser **Estático**.
        - Si la forma de iniciación es **QRDN**, el Código QR debe ser **Dinámico**.
        - Si la forma de iniciación es **APES**, el Código QR debe ser **Estático**.
        - Si la forma de iniciación es **APDN**, el Código QR debe ser **Dinámico**.
        - **Código de error:** `QRCODE_INVALIDO`

    ### Caso el Código QR sea **Estático**

    1. El valor presente en el Código QR Estático debe ser el mismo informado en el payload del pago (campo `amount`).
        - **Código de error:** `VALOR_INVALIDO`

    2. La clave Pix presente en el Código QR Estático debe ser idéntica a la clave Pix informada en el payload del pago (campo `details.proxy`).
        - **Código de error:** `QRCODE_INVALIDO`

    ### Caso el Código QR sea **Dinámico**

    1. El estado del Código QR Dinámico debe ser válido para uso.
        - **Código de error:** `QRCODE_INVALIDO`

    # Integración - Preguntas Frecuentes

    ## Sobre Descubrimiento de Recursos

    Preguntas referentes al proceso de descubrimiento de recursos en Opus Open Finance. Para más información, consulte `pt-br/integração-plugin/consent/readme.md` de la documentación del producto.

    **¿Qué es un "recurso"?**

    En Open Finance, "recursos" son componentes de datos o servicio que puede ser consumido por APIs, respetando los criterios de seguridad y consentimiento.
    En la práctica, un "recurso" puede ser una cuenta transaccional, una tarjeta, una inversión, entre otros.

    **¿Qué debo retornar en los campos `key` de `resourceLegacyId` y `resourceName`?**

    Los campos `resourceLegacyId` y `resourceName` funcionan como identificadores internos en el backend de la institución financiera y deben ser definidos para uso en esta capa. Ambos están estructurados como listas de pares *key-value* para ofrecer soporte a identificadores compuestos.

    Para el `resourceLegacyId`, si el ID es simple, es suficiente retornar algo como:

    ```json
    "resourceLegacyId": [
        { "key": "id", "value": "<valor del id>" }
    ]
    ```

    Ya para el `resourceName`, es importante retornar valores que ayuden al usuario final a reconocer el recurso. Por ejemplo, en el caso de una cuenta bancaria, se puede retornar algo como:

    ```json
    "resourceName": [
        { "key": "agencia", "value": "<número de la agencia>" },
        { "key": "cuenta", "value": "<número de la cuenta>" }
    ]
    ```

    **El usuario no posee cuentas a ser retornadas. ¿Debo retornar error o lista vacía?**

    En caso de que el usuario no posea cuentas, el retorno debe ser éxito (HTTP 200) con una lista vacía de recursos (`{ "data": { "resources": [] } }`).

    **En el descubrimiento de cuentas del flujo de pagos, ¿qué cuenta debe venir como "seleccionada por defecto"?**

    Si el campo `debtorAccount` del consentimiento está rellenado con una cuenta válida para pagos, esa cuenta debe ser marcada como "seleccionada por defecto" (`"defaultSelected": true`). Independientemente de esto, todas las cuentas disponibles para pago deben ser retornadas.

    ## Sobre Validación de los Datos de Pago

    **¿Qué debe ser validado en la ruta específica para la validación de datos del pago?**

    Consultar la sección ["Validaciones Obligatorias para Pagos"](#validaciones-obligatorias-para-pagos).

    ## Sobre Solicitudes de Creación de Pagos

    **¿Cómo identificar la cuenta elegida por el titular para realizar el débito?**

    Después de la aprobación del consentimiento de pago, la lista `consent.resources` enviada en el payload de la solicitud de pago siempre contendrá solo un único recurso, representando la cuenta seleccionada.  
    El campo `consent.debtorAccount` también estará siempre rellenado con las informaciones de la cuenta elegida.

    **¿Dónde encontrar la fecha del pago para cada escenario o tipo de pago?**

    Consultar la sección ["Escenarios por Fecha de Efectivación del Pago"](#escenarios-por-fecha-de-efectivación-del-pago).

    **¿El backend de la institución financiera necesita soportar Agendamientos Recurrentes?**

    No. El producto realizará una solicitud separada para cada fecha de recurrencia.

    Por ejemplo, al recibir una solicitud de agendamiento recurrente por 5 meses, un débito por mes, el producto solicitará al backend de la institución financiera 5 agendamientos independientes.  
    La fecha de cada agendamiento debe ser determinada conforme se describe en la sección ["Escenarios por Fecha de Efectivación del Pago"](#escenarios-por-fecha-de-efectivación-del-pago).
