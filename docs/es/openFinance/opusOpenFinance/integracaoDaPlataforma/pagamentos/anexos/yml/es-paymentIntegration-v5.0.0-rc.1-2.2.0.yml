components:
  schemas:
    BrandId:
      type: string
      description: Identificador de la marca reportada por el participante del Open Banking
      minLength: 1
      maxLength: 50
      example: cbanco
    RequestMeta:
      type: object
      description: Objeto que contiene datos referentes al contexto en el cual la solicitud
        fue recibida
      required:
        - correlationId
        - brandId
      properties:
        correlationId:
          type: string
          description: UUID que identifica el correlation ID de la solicitud realizada. Debe
            ser propagado para todas las llamadas hechas entre sistemas y registrado
            siempre que sea posible para facilitar el rastreo de errores
          pattern: ^(localID:)?[0-9a-fA-F]{8}-[0-9a-fA-F]{4}-[0-9a-fA-F]{4}-[0-9a-fA-F]{4}-[0-9a-fA-F]{12}$
          example: 97623ed1-4732-4bf2-8d4b-ae7aced5443b
        brandId:
          $ref: "#/components/schemas/BrandId"
      additionalProperties: false
    CreationDateTime:
      description: Fecha y hora en que el consentimiento fue creado. Una cadena con fecha
        y hora según especificación RFC-3339, siempre con la utilización de
        timezone UTC (UTC time format).
      type: string
      pattern: ^(\d{4})-(1[0-2]|0?[1-9])-(3[01]|[12][0-9]|0?[1-9])T(?:[01]\d|2[0123]):(?:[012345]\d):(?:[012345]\d)Z$
      maxLength: 20
      example: "2021-05-21T08:30:00Z"
    TPP:
      type: object
      description: Detalles del TPP que solicitó el consentimiento
      additionalProperties: false
      required:
        - name
      properties:
        name:
          type: string
          description: Nombre del TPP que solicitó el consentimiento
          maxLength: 100
          example: GuiaBolsa
    ExternalId:
      type: string
      description: Identificador del consentimiento utilizado fuera de la plataforma OOB
      maxLength: 100
      example: urn:oob-bank:2f710909-4ccd-4998-8679-3d8de00e5ccf
    LoggedUser:
      type: object
      description: Usuario (persona natural) que se encuentra logueado en la institución
        Iniciadora de Pago.
      additionalProperties: false
      required:
        - document
      properties:
        document:
          type: object
          description: Documento de identificación oficial del usuario.
          additionalProperties: false
          required:
            - identification
            - rel
          properties:
            identification:
              type: string
              maxLength: 11
              description: Número del documento de identificación oficial del usuario.
              pattern: ^\d{11}$
              example: "11111111111"
            rel:
              type: string
              maxLength: 3
              description: Tipo del documento de identificación oficial del usuario.
              pattern: ^[A-Z]{3}$
              example: CPF
    BusinessEntity:
      type: object
      description: Usuario (persona jurídica) que se encuentra logueado en la institución
        Iniciadora de Pago. [Restricción] Relleno obligatorio si
        usuario logueado en la institución Iniciadora de Pago es un CNPJ
        (persona jurídica).
      additionalProperties: false
      required:
        - document
      properties:
        document:
          type: object
          description: Documento de identificación oficial del titular persona jurídica.
          additionalProperties: false
          required:
            - identification
            - rel
          properties:
            identification:
              type: string
              maxLength: 14
              description: Número del documento de identificación oficial del titular persona
                jurídica.
              pattern: ^\d{14}$
              example: "11111111111111"
            rel:
              type: string
              maxLength: 4
              description: Tipo del documento de identificación oficial del titular persona
                jurídica.
              pattern: ^[A-Z]{4}$
              example: CNPJ
    AcceptedResources:
      description: Lista de recursos permitidos por el cliente para ser usados en el
        consentimiento. Objeto de uso interno, en conectores
      type: array
      items:
        type: object
        description: Recursos seleccionados por el cliente
        required:
          - type
          - resourceLegacyId
        properties:
          type:
            description: Tipo del recurso
            type: string
            enum:
              - ACCOUNT
              - CREDIT_CARD_ACCOUNT
              - LOAN
              - FINANCING
              - UNARRANGED_ACCOUNT_OVERDRAFT
              - INVOICE_FINANCING
              - PAYMENT
              - BANK_FIXED_INCOME
              - CREDIT_FIXED_INCOME
              - VARIABLE_INCOME
              - TREASURE_TITLE
              - FUND
            example: PAYMENT
          resourceLegacyId:
            description: Array de clave y valor con la clave de identificación del recurso en el
              sistema de origen (legado), permitiendo claves compuestas
            type: array
            items:
              type: object
              required:
                - key
              properties:
                key:
                  description: Nombre del campo del identificador en el sistema de origen
                  type: string
                  example: internalAccountId
                value:
                  description: Valor del campo del identificador en el sistema de origen
                  type: string
                  example: "1234"
            minItems: 1
            maxItems: 10
          authorizers:
            deprecated: true
            description: Lista de los autorizadores para el recurso para casos de múltiple
              instancia. Si el recurso es seleccionado, todos los autorizadores
              deberán aceptar el consentimiento del que el recurso forma parte
            type: array
            items:
              type: object
              required:
                - cpf
                - name
              properties:
                cpf:
                  description: CPF del autorizador
                  type: string
                  minLength: 11
                  maxLength: 11
                  pattern: ^\d{11}$
                  example: "11111111111"
                name:
                  description: Nombre del autorizador
                  type: string
                  example: Marco Antonio de Brito
            minItems: 1
          hasMultipleAuthorisers:
            deprecated: true
            type: boolean
            example: "false"
        additionalProperties: false
      maxItems: 1000
    Version:
      type: string
      description: Versión del consentimiento relacionado al pago.
      enum:
        - V1
        - V2
        - V3
        - V4
      example: V1
    ExpirationDateTime:
      description: Fecha y hora de expiración del permiso. De relleno
        obligatorio, refleja la fecha límite de validez del consentimiento. Una
        cadena con fecha y hora según especificación RFC-3339, siempre con la
        utilización de timezone UTC (UTC time format).
      type: string
      maxLength: 20
      pattern: ^(\d{4})-(1[0-2]|0?[1-9])-(3[01]|[12][0-9]|0?[1-9])T(?:[01]\d|2[0123]):(?:[012345]\d):(?:[012345]\d)Z$
      example: "2021-05-21T08:30:00Z"
    EnumPaymentPersonType:
      type: string
      maxLength: 15
      enum:
        - PESSOA_NATURAL
        - PESSOA_JURIDICA
      description: "Titular, persona natural o jurídica a quien se refieren los datos de
        receptor (creditor).

        \n"
      example: PESSOA_NATURAL
    Identification:
      type: object
      description: Solo para consentimientos de pago. Objeto que contiene los datos
        del receptor (creditor).
      required:
        - personType
        - cpfCnpj
        - name
      properties:
        personType:
          $ref: "#/components/schemas/EnumPaymentPersonType"
        cpfCnpj:
          type: string
          minLength: 11
          maxLength: 14
          pattern: ^\d{11}$|^\d{14}$
          description: "Identificación de la persona involucrada en la transacción. \ 


            Rellenar con el CPF o CNPJ, de acuerdo con el valor elegido en el
            campo type. \ 


            \ El CPF será utilizado con 11 números y deberá ser informado sin
            puntos o guiones. \ 


            El CNPJ será utilizado con 14 números y deberá ser informado sin
            puntos o guiones.

            \n"
          example: "58764789000137"
        name:
          type: string
          maxLength: 140
          pattern: ^([A-Za-z\u00C0-\u00D6\u00D8-\u00F6\u00F8-\u00FF,.@:&*+_<>()!?/\\$%\d'
            -]+)$
          description: "En caso de persona natural debe ser informado el nombre completo del
            titular de la cuenta del receptor. \ 


            En caso de persona jurídica debe ser informada la razón social o el
            nombre comercial de la cuenta del receptor.

            \n"
          example: Marco Antonio de Brito
      additionalProperties: false
    EnumPaymentType:
      type: string
      maxLength: 3
      enum:
        - PIX
      description: "Este campo define el tipo de pago que será iniciado después de la
        autorización del consentimiento.

        \n"
      example: PIX
    Schedule:
      type: object
      required:
        - single
      properties:
        single:
          type: object
          description: Define la política de agendamiento único.
          required:
            - date
          properties:
            date:
              type: string
              format: date
              maxLength: 10
              example: "2021-01-01"
              description: "Define la fecha objetivo de la liquidación del pago.


                El huso horario de Brasilia debe ser utilizado para la creación y
                racionalización sobre los datos de este campo.




                [Restricción] Este campo deberá siempre ser como mínimo D+1 corrido,
                o sea, la fecha inmediatamente posterior en relación a la fecha del
                consentimiento considerando el huso horario de Brasilia y deberá
                ser como máximo D+730 corridos a partir de la fecha del consentimiento,
                también considerando el huso horario de Brasilia."
    ScheduleDaily:
      type: object
      required:
        - daily
      properties:
        daily:
          type: object
          description: Define la política de agendamiento diario.
          required:
            - startDate
            - quantity
          properties:
            startDate:
              type: string
              format: date
              pattern: ^(\d{4})-(1[0-2]|0?[1-9])-(3[01]|[12][0-9]|0?[1-9])$
              maxLength: 10
              example: "2023-08-23"
              description: Define la fecha del primer pago de recurrencia diaria
            quantity:
              type: integer
              format: int32
              minimum: 2
              maximum: 60
              example: 3
              description: Define la cantidad de pagos que serán enviados para liquidación.
    ScheduleWeekly:
      type: object
      required:
        - weekly
      properties:
        weekly:
          type: object
          description: Define la política de agendamiento semanal.
          required:
            - dayOfWeek
            - startDate
            - quantity
          properties:
            dayOfWeek:
              type: string
              description: Día de la semana en que ocurrirá el pago
              enum:
                - SEGUNDA_FEIRA
                - TERCA_FEIRA
                - QUARTA_FEIRA
                - QUINTA_FEIRA
                - SEXTA_FEIRA
                - SABADO
                - DOMINGO
              example: QUINTA_FEIRA
            startDate:
              type: string
              format: date
              pattern: ^(\d{4})-(1[0-2]|0?[1-9])-(3[01]|[12][0-9]|0?[1-9])$
              maxLength: 10
              example: "2023-08-23"
            quantity:
              type: integer
              format: int32
              minimum: 2
              maximum: 60
              example: 10
              description: Define la cantidad de pagos que serán enviados para liquidación.
    ScheduleMonthly:
      type: object
      required:
        - monthly
      properties:
        monthly:
          type: object
          description: Define la política de agendamiento mensual.
          required:
            - dayOfMonth
            - startDate
            - quantity
          properties:
            dayOfMonth:
              type: integer
              minimum: 1
              maximum: 31
              example: 10
            startDate:
              type: string
              format: date
              pattern: ^(\d{4})-(1[0-2]|0?[1-9])-(3[01]|[12][0-9]|0?[1-9])$
              maxLength: 10
              example: "2023-08-23"
            quantity:
              type: integer
              format: int32
              minimum: 2
              maximum: 24
              example: 24
              description: Define la cantidad de pagos que serán enviados para liquidación.
    ScheduleCustom:
      type: object
      required:
        - custom
      properties:
        custom:
          type: object
          description: "[Restricción] Las fechas enviadas en la lista de fechas (array “dates”)
            no pueden ser repetidas.


            Si se envían fechas repetidas, el titular debe rechazar la
            creación del consentimiento, informando el error PARAMETRO_INVALIDO."
          required:
            - dates
            - additionalInformation
          properties:
            dates:
              type: array
              maxItems: 60
              minItems: 2
              example:
                - "2023-08-23"
                - "2023-09-26"
              items:
                type: string
                format: date
                pattern: ^(\d{4})-(1[0-2]|0?[1-9])-(3[01]|[12][0-9]|0?[1-9])$
                maxLength: 10
                example: "2023-08-23"
            additionalInformation:
              type: string
              description: "Texto libre para que el Iniciador complete de forma comprensible para el
                usuario aprobador/pagador.


                El texto puede ser utilizado por el titular para mostrar el resumen
                de la transacción durante la aprobación del usuario aprobador/pagador."
              pattern: "[\\w\\W\\s]*"
              maxLength: 255
              example: Todos los jueves y domingos por 6 meses
    PaymentConsent:
      type: object
      description: Solo para consentimientos de pago. Objeto que contiene datos de
        pago para consentimiento.
      required:
        - type
        - currency
        - amount
      properties:
        type:
          $ref: "#/components/schemas/EnumPaymentType"
        date:
          type: string
          format: date
          maxLength: 10
          description: "[Restricción] Mutuamente excluyente con el objeto schedule.\ 

            \\



            Este campo es obligatorio en caso de pago único.\ 




            En este caso, el objeto schedule no debe ser informado.

            \n"
          example: "2021-01-01"
        currency:
          type: string
          maxLength: 3
          pattern: ^([A-Z]{3})$
          description: "Código de la moneda nacional según modelo ISO-4217, o sea, 'BRL'.


            Todos los valores monetarios informados están representados con la
            moneda vigente de Brasil.

            \n"
          example: BRL
        amount:
          type: string
          minLength: 4
          maxLength: 19
          pattern: ^((\d{1,16}\.\d{2}))$
          description: "Valor de la transacción con 2 casas decimales. El valor debe ser el mismo
            enviado en el consentimiento.\ 




            Para Código QR estático con valor predeterminado en el Código QR o para
            Código QR dinámico con indicación de que el valor no puede ser alterado:
            El campo amount debe ser rellenado con el valor establecido en el Código QR.\ 


            Si se rellena con valor divergente del Código QR, debe ser
            retornado un error HTTP Status 422.

            \n"
          example: "100000.12"
        schedule:
          description: "[Restricción] Mutuamente excluyente con el campo date.\ 



            \\

            Este campo es obligatorio en caso de agendamiento.\ 




            En este caso, el campo date no debe ser informado.

            \n"
          oneOf:
            - $ref: "#/components/schemas/Schedule"
            - $ref: "#/components/schemas/ScheduleDaily"
            - $ref: "#/components/schemas/ScheduleWeekly"
            - $ref: "#/components/schemas/ScheduleMonthly"
            - $ref: "#/components/schemas/ScheduleCustom"
    EnumPaymentCancellationReasonType:
      type: string
      enum:
        - CANCELADO_PENDENCIA
        - CANCELADO_AGENDAMENTO
        - CANCELADO_MULTIPLAS_ALCADAS
      example: CANCELADO_PENDENCIA
      description: "El llenado de este campo para retorno, debe ocurrir por la
        institución titular de cuentas a partir del estado en que el pago esté en
        el momento de la solicitud de cancelación (ej. Estado de pago = PDNG,
        campo debe ser llenado con enum CANCELADO_PENDENCIA)




        Valores posibles:




        CANCELADO_PENDENCIA - Pago cancelado mientras estaba en la situación
        PDNG




        CANCELADO_AGENDAMENTO - Pago cancelado mientras estaba en la situación
        SCHD




        CANCELADO_MULTIPLAS_ALCADAS - Pago cancelado mientras estaba en la
        situación PATC

        \n"
    EnumPaymentCancellationFromType:
      type: string
      enum:
        - INICIADORA
        - DETENTORA
      example: INICIADORA
      description: "Campo utilizado para informar el medio por el cual fue realizado el
        cancelamiento.




        Valores posibles:




        INICIADORA - Pago cancelado por el usuario pagador en los canales de la
        iniciadora




        DETENTORA - Pago cancelado por el usuario pagador en los canales de la
        titular

        \n"
    PixPaymentCancellation:
      type: object
      description: "Objeto que contiene los datos referentes al usuario pagador que
        solicitó el cancelamiento, el canal utilizado por él y el motivo. \ 




        [Restricción] El objeto cancellation será obligatorio solo cuando el valor
        del campo status sea igual a CANC.\ 

        \n"
      required:
        - cancelledAt
        - cancelledBy
        - reason
        - cancelledFrom
      properties:
        reason:
          $ref: "#/components/schemas/EnumPaymentCancellationReasonType"
        cancelledFrom:
          $ref: "#/components/schemas/EnumPaymentCancellationFromType"
        cancelledAt:
          type: string
          description: Fecha y hora en que fue realizado el cancelamiento, conforme
            especificación RFC-3339, formato UTC.
          format: date-time
          maxLength: 20
          example: "2021-05-21T08:30:00Z"
        cancelledBy:
          type: object
          description: Información relacionada al usuario pagador que solicitó el
            cancelamiento del pago.
          required:
            - document
          properties:
            document:
              type: object
              description: Objeto que consolida los datos del documento del usuario que solicitó
                el cancelamiento.
              required:
                - identification
                - rel
              properties:
                identification:
                  type: string
                  maxLength: 11
                  description: Número del documento del usuario pagador responsable del
                    cancelamiento del pago.
                  example: "11111111111"
                  pattern: ^\d{11}$
                rel:
                  type: string
                  maxLength: 3
                  description: Tipo del documento del usuario pagador responsable del cancelamiento
                    del pago.
                  example: CPF
                  pattern: ^[A-Z]{3}$
    IbgeTownCode:
      type: string
      minLength: 7
      maxLength: 7
      pattern: ^\d{7}$
      description: "Trae el código de la ciudad según el IBGE (Instituto Brasileño de
        Geografía y Estadística).


        Para el llenado de este campo, el Iniciador de Pagos debe seguir
        la orientación del esquema de la forma de pago.

        \\

        El llenado del campo tanto en pix/payments como /consents debe ser
        igual. En caso de divergencia de los valores, la institución debe retornar
        HTTP 422 con el código de error PAGAMENTO_DIVERGENTE_DO_CONSENTIMENTO.


        Este campo hace referencia al campo CodMun del esquema Pix.

        \n"
      example: "5300108"
    EnumLocalInstrument:
      type: string
      maxLength: 4
      enum:
        - MANU
        - DICT
        - QRDN
        - QRES
        - INIC
        - AUTO
      description: "Especifica la forma de iniciación del pago:


        - MANU - Inserción manual de datos de la cuenta transaccional


        - DICT - Inserción manual de clave Pix


        - QRDN - Código QR dinámico


        - QRES - Código QR estático


        - INIC - Indica que el receptor (creditor) contrató al Iniciador de
        Pagos específicamente para realizar iniciaciones de pago en que
        el beneficiario es previamente conocido.


        \ AUTO - Indica el pago de una recurrencia de Pix automático, donde el
        consentimiento fue previamente autorizado por el pagador y el pago es
        realizado automáticamente por el Iniciador de Pagos bajo comando del
        receptor

        \\

        [Restricción] Si /data/payment/schedule enviado con valor diferente de
        single durante la creación del consentimiento, solo los métodos MANU, DICT
        o QRES son permitidos.

        \n"
      example: DICT
    QrCode:
      type: string
      maxLength: 512
      pattern: "[\\w\\W\\s]*"
      description: "Secuencia de caracteres que corresponde al Código QR disponible
        para el pagador.


        Es la secuencia de caracteres que sería leída por el lector de Código QR, y
        debe propiciar el retorno de los datos del pagador después de consulta en la DICT.


        Esta funcionalidad es posible tanto para Código QR estático como para
        Código QR dinámico.


        En el esquema del Pix esta es la misma secuencia generada y/o leída por la
        funcionalidad Pix Copia y Pega.


        Este campo deberá estar en formato UTF-8.


        [Restricción] Llenado obligatorio para pagos por Código QR,
        observado el tamaño máximo de 512 bytes.

        \n"
      example: "00020104141234567890123426660014BR.GOV.BCB.PIX014466756C616E6F3230313\
        9406578616D706C652E636F6D27300012


        BR.COM.OUTRO011001234567895204000053039865406123.455802BR5915NOMEDORECE\
        BEDOR6008BRASILIA61087007490062


        530515RP12345678-201950300017BR.GOV.BCB.BRCODE01051.0.080450014BR.GOV.B\
        CB.PIX0123PADRAO.URL.PIX/0123AB


        CD81390012BR.COM.OUTRO01190123.ABCD.3456.WXYZ6304EB76

        \n"
    Proxy:
      description: "Clave registrada en el DICT perteneciente al receptor. Los tipos de
        claves pueden ser: teléfono, correo electrónico, cpf/cnpj o clave aleatoria. En caso
        de teléfono celular debe ser informado en el estándar E.1641. Para correo electrónico
        debe tener el formato xxxxxxxx@xxxxxxx.xxx(.xx) y máximo 77 caracteres.
        En caso de CPF deberá ser informado con 11 números, sin puntos o
        guiones. Para el caso de CNPJ deberá ser informado con 14 números, sin
        puntos o guiones. En caso de clave aleatoria debe ser informado el UUID
        generado por el DICT, conforme formato especificado en la RFC41223. [Restricción]
        Obligatorio cuando el campo localInstrument sea igual a DICT."
      type: string
      pattern: "[\\w\\W\\s]*"
      maxLength: 77
      example: "12345678901"
    EnumAccountPaymentsType:
      type: string
      enum:
        - CACC
        - SVGS
        - TRAN
      example: CACC
      description: "Tipos de cuentas usadas para pago.


        Modalidades tradicionales previstas por la Resolución 4.753, no
        contemplando cuentas vinculadas,\ 


        cuenta de domiciliados en el exterior, cuentas en monedas extranjeras y cuenta
        correspondiente moneda electrónica.


        Sigue descripción de cada valor del ENUM.




        - CACC - Current - Cuenta Corriente.


        - SVGS - Savings - Cuenta de Ahorro.


        - TRAN - TransactingAccount - Cuenta de Pago prepaga.

        \n"
    CreditorAccount:
      type: object
      description: "Objeto que contiene la identificación de la cuenta de destino del
        beneficiario/receptor. \ 

        \n"
      required:
        - ispb
        - number
        - accountType
      properties:
        ispb:
          type: string
          minLength: 8
          maxLength: 8
          pattern: ^[0-9A-Z]{8}$
          description: "Debe ser llenado con el ISPB (Identificador del Sistema de
            Pagamentos Brasileños) del participante del SPI (Sistema de
            pagos instantáneos) solo con números.

            \n"
          example: "12345678"
        issuer:
          type: string
          minLength: 1
          maxLength: 4
          pattern: ^[0-9]{1,4}$
          description: "Código de la Agencia emisora de la cuenta sin dígito. \ 


            (Agencia es la dependencia destinada a la atención al cliente, al
            público en general y a los asociados de cooperativas de crédito, \ 


            en el ejercicio de actividades de la institución, no pudiendo ser móvil o
            transitoria). \ 


            [Restricción] Llenado obligatorio para los siguientes tipos de
            cuenta: CACC (CONTA_DEPOSITO_A_VISTA), SVGS (CONTA_POUPANCA) y SLRY
            (CONTA_SALARIO).

            \n"
          example: "1774"
        number:
          type: string
          minLength: 1
          maxLength: 20
          pattern: ^[0-9]{1,20}$
          description: "Debe ser llenado con el número de la cuenta del usuario receptor,
            con dígito verificador (si este existe), \ 


            si hay valor alfanumérico, este debe ser convertido a 0.

            \n"
          example: "1234567890"
        accountType:
          $ref: "#/components/schemas/EnumAccountPaymentsType"
      additionalProperties: false
    Details:
      type: object
      description: "Objeto que contiene los detalles del pago.

        \n"
      required:
        - localInstrument
        - creditorAccount
      properties:
        localInstrument:
          $ref: "#/components/schemas/EnumLocalInstrument"
        qrCode:
          $ref: "#/components/schemas/QrCode"
        proxy:
          $ref: "#/components/schemas/Proxy"
        creditorAccount:
          $ref: "#/components/schemas/CreditorAccount"
      additionalProperties: false
    PixPaymentConsent:
      allOf:
        - $ref: "#/components/schemas/PaymentConsent"
      type: object
      description: Solo para consentimientos de pago pix. Objeto que contiene datos
        de pago para consentimiento.
      required:
        - details
      properties:
        cancellation:
          $ref: "#/components/schemas/PixPaymentCancellation"
        ibgeTownCode:
          $ref: "#/components/schemas/IbgeTownCode"
        details:
          $ref: "#/components/schemas/Details"
