    patch:
      tags:
        - Vínculo de dispositivo
      operationId: deleteEnrollment
      description: |
        Método para revocar o rechazar un vínculo de cuenta. Tras la ejecución exitosa de este método irreversible, el vínculo de cuenta
        no podrá volver a utilizarse para autenticación ni autorización de iniciación de pagos.
        Los conceptos de revocación y rechazo están asociados a la máquina de estados del vínculo de cuenta\:
        
        • Revocación: Cancelación de un vínculo de cuenta en estado "AUTHORISED";
        
        • Rechazo: Cancelación del vínculo de cuenta en los estados "AWATING_RISK_SIGNALS", "AWATING_ENROLLMENT" y "AWAITING_ACCOUNT_HOLDER_VALIDATION"
        
        Corresponde al cliente de esta API distinguir entre los dos escenarios para determinar el motivo adecuado.
      summary: Revocar o rechazar vínculo de cuenta.
      externalDocs:
        description: Open Finance - API Enrollments for Payment Initiation
        url: https://openfinancebrasil.atlassian.net/wiki/spaces/OF/pages/141557761/SV+API+-+Pagamentos+sem+Redirecionamento
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PatchEnrollmentRequest'
      parameters:
        - $ref: '#/components/parameters/applicationId'
        - $ref: '#/components/parameters/authorisationServerId'
        - $ref: '#/components/parameters/enrollmentId'
      responses:
        '502':
          description: Error en el Opus Open Client al comunicarse con el titular de la cuenta
          headers:
            x-origin-error:
              $ref: '#/components/headers/xOriginError'
            x-error-source-url:
              $ref: '#/components/headers/xErrorSourceUrl'
            x-selected-regulatory-v:
                $ref: '#/components/headers/xSelectedRegulatoryV'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResponseError'
        '504':
          description: Tiempo límite de conexión excedido al comunicarse con el titular de la cuenta
          headers:
            x-origin-error:
              $ref: '#/components/headers/xOriginError'
            x-error-source-url:
              $ref: '#/components/headers/xErrorSourceUrl'
            x-selected-regulatory-v:
                $ref: '#/components/headers/xSelectedRegulatoryV'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResponseError'
        '204':
          description: Vínculo de cuenta revocado con éxito.
          headers:
              x-selected-regulatory-v:
                $ref: '#/components/headers/xSelectedRegulatoryV'
        '400':
          description: Error enviado por el titular de la cuenta, respetando el estándar definido por el BACEN
          headers:
            x-origin-error:
              $ref: '#/components/headers/xOriginError'
            x-error-source-url:
