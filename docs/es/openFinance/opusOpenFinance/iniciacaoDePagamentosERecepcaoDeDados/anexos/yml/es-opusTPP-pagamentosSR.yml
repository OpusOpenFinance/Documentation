openapi: 3.0.0
info:
  title: OpusTPP - Pagos sin Redireccionamiento
  description: |-
    OpusTPP - Core de gestión de dispositivos vinculados a las cuentas

    # Iniciación de Transacción de Pagos sin redireccionamiento

    Familia de API para permitir el pago sin redireccionamiento vía Open Finance Brasil.  
    Permite tanto la gestión de los dispositivos vinculados a las cuentas como la autorización de consentimientos creados vía flujo sin redireccionamiento.

  version: 1.0.0
tags:
  - name: Vínculo de dispositivo
    description: |-
      Gestión de los dispositivos vinculados a las cuentas
  - name: Consentimento
    description: |-
      Autorización de consentimientos creados vía flujo sin redireccionamiento.
  - name: Pix Automático
    description: |-
      Autorización de consentimientos de Pix Automático creados vía flujo sin redireccionamiento.
servers:
  - url: https://open-finance-core.instituicao.com.br
paths:
  /opus-open-finance/enrollments/v1/enrollments:
    post:
      tags:
        - Vínculo de dispositivo
      operationId: postEnrollments
      description: Método para crear un nuevo vínculo de cuenta. Devuelve un enrollment en estado AWAITING_RISK_SIGNALS.
      summary: Crear vínculo de cuenta.
      externalDocs:
        description: Open Finance - API Enrollments for Payment Initiation
        url: https://openfinancebrasil.atlassian.net/wiki/spaces/OF/pages/141557761/SV+API+-+Pagamentos+sem+Redirecionamento
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateEnrollmentRequest'
      parameters:
        - $ref: '#/components/parameters/applicationId'
        - $ref: '#/components/parameters/authorisationServerId'
        - $ref: '#/components/parameters/regulatoryV'
      responses:
        '502':
          description: Error en el Opus Open Client al comunicarse con el titular de la cuenta
          headers:
            x-origin-error:
              $ref: '#/components/headers/xOriginError'
            x-error-source-url:
              $ref: '#/components/headers/xErrorSourceUrl'
            x-selected-regulatory-v:
                $ref: '#/components/headers/xSelectedRegulatoryV'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResponseError'
        '504':
          description: Tiempo límite de conexión excedido al comunicarse con el titular de la cuenta
          headers:
            x-origin-error:
              $ref: '#/components/headers/xOriginError'
            x-error-source-url:
              $ref: '#/components/headers/xErrorSourceUrl'
            x-selected-regulatory-v:
                $ref: '#/components/headers/xSelectedRegulatoryV'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResponseError'
        '201':
          description: Datos del vínculo de cuenta obtenidos con éxito.
          headers:
            x-selected-regulatory-v:
                $ref: '#/components/headers/xSelectedRegulatoryV'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CreateEnrollmentResponse'
        '400':
          description: Error enviado por el titular de la cuenta, respetando el estándar definido por el BACEN
          headers:
            x-origin-error:
              $ref: '#/components/headers/xOriginError'
            x-error-source-url:
              $ref: '#/components/headers/xErrorSourceUrl'
            x-selected-regulatory-v:
                $ref: '#/components/headers/xSelectedRegulatoryV'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResponseError'
        default:
          description: Error enviado por el titular de la cuenta, respetando el estándar definido por el BACEN
          headers:
            x-origin-error:
              $ref: '#/components/headers/xOriginError'
            x-error-source-url:
              $ref: '#/components/headers/xErrorSourceUrl'
            x-selected-regulatory-v:
                $ref: '#/components/headers/xSelectedRegulatoryV'
          content:
            application/jwt:
              schema:
