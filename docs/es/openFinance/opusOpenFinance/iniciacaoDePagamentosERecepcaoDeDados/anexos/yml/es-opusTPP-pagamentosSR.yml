            x-selected-regulatory-v:
                $ref: '#/components/headers/xSelectedRegulatoryV'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResponseError'
        default:
          description: Error enviado por el titular de la cuenta, respetando el estándar definido por el BACEN
          headers:
            x-origin-error:
              $ref: '#/components/headers/xOriginError'
            x-error-source-url:
              $ref: '#/components/headers/xErrorSourceUrl'
            x-selected-regulatory-v:
                $ref: '#/components/headers/xSelectedRegulatoryV'
          content:
            application/jwt:
              schema:
                $ref: '#/components/schemas/ResponseError'
