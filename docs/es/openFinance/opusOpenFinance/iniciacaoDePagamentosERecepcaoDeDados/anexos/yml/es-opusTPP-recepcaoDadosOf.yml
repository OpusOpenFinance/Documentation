                Considerando la cadena urn:bancoex:C1DD33123 como ejemplo para consentId tenemos:
                - el namespace(urn)
                - el identificador asociado al namespace de la institución transmisora (bancoex)
                - el identificador específico dentro del namespace (C1DD33123).
                Información más detallada sobre la construcción de namespaces debe consultarse en la [RFC8141](https://tools.ietf.org/html/rfc8141).
              type: string
              pattern: '^urn:[a-zA-Z0-9][a-zA-Z0-9-]{0,31}:[a-zA-Z0-9()+,\-.:=@;$_!*''%\/?#]+$'
              maxLength: 256
              example: 'urn:bancoex:C1DD33123'
            consent:
              type: object
              description: Objeto de consentimiento devuelto por la transmisora conforme al estándar definido por el BACEN - https://openfinancebrasil.atlassian.net/wiki/spaces/OF/pages/17369335/API+-+Consentimento
    CreateConsentResponse:
      type: object
      required:
        - data
      properties:
        data:
          type: object
          required:
            - redirectUrl
            - consentId
            - consent
          properties:
            redirectUrl:
              type: string
              format: uri
              maxLength: 2000
              description: URI de redirección al authorisation Server de la transmisora con el fin de solicitar la aprobación del consentimiento
