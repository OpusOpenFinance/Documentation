openapi: 3.0.0
info:
  title: OpusTPP - Recepción de Datos
  description: |-
    OpusTPP - Core de gestión de consentimientos

    # Datos Registrales y Transaccionales

  version: 1.0.0
tags:
  - name: Opus Open Finance
    description: |-
      Endpoints de gestión de consentimientos
  - name: Resources
    description: |-
      Endpoints de listado de recursos vinculados al consentimiento. Los modelos de datos esperados y retornados son los mismos que los definidos por la documentación oficial ([Open Finance - API Resources](https://openfinancebrasil.atlassian.net/wiki/spaces/OF/pages/17369706/API+-+Resources)).
  - name: Dados Cadastrais
    description: |-
      Endpoints de consulta de datos registrales del cliente. Los modelos de datos esperados y retornados son los mismos que los definidos por la documentación oficial ([Open Finance - API Customers](https://openfinancebrasil.atlassian.net/wiki/spaces/OF/pages/17370003/API+-+Dados+Cadastrais)).
  - name: Cartões de Crédito
    description: |-
      Endpoints de consulta de datos de cuentas pospago (tarjetas de crédito). Los modelos de datos esperados y retornados son los mismos que los definidos por la documentación oficial ([Open Finance - API Credit-cards-account](https://openfinancebrasil.atlassian.net/wiki/spaces/OF/pages/17370864/API+-+Cart+o+de+Cr+dito)).
  - name: Contas
    description: |-
      Endpoints de consulta de datos de cuentas. Los modelos de datos esperados y retornados son los mismos que los definidos por la documentación oficial ([Open Finance - API Accounts](https://openfinancebrasil.atlassian.net/wiki/spaces/OF/pages/17371726/API+-+Contas)).
  - name: Empréstimos
    description: |-
      Endpoints de consulta de datos de préstamos. Los modelos de datos esperados y retornados son los mismos que los definidos por la documentación oficial ([Open Finance - API Loans](https://openfinancebrasil.atlassian.net/wiki/spaces/OF/pages/17372520/API+-+Opera+es+de+Cr+dito+-+Empr+stimos)).
  - name: Financiamentos
    description: |-
      Endpoints de consulta de datos de financiamientos. Los modelos de datos esperados y retornados son los mismos que los definidos por la documentación oficial ([Open Finance - API Financings](https://openfinancebrasil.atlassian.net/wiki/spaces/OF/pages/17373362/API+-+Opera+es+de+Cr+dito+-+Financiamento)).
  - name: Adiantamentos
    description: |-
      Endpoints de consulta de datos de adelanto a depositantes. Los modelos de datos esperados y retornados son los mismos que los definidos por la documentación oficial ([Open Finance - API Unarranged-accounts-overdraft](https://openfinancebrasil.atlassian.net/wiki/spaces/OF/pages/17374226/API+-+Opera+es+de+Cr+dito+-+Adiantamento+a+Depositantes)).
  - name: Direitos Creditórios
    description: |-
      Endpoints de consulta de datos de derechos crediticios descontados. Los modelos de datos esperados y retornados son los mismos que los definidos por la documentación oficial ([Open Finance - API Invoice-financings](https://openfinancebrasil.atlassian.net/wiki/spaces/OF/pages/17375055/API+-+Opera+es+de+Cr+dito+-+Direitos+Credit+rios+Descontados)).
  - name: Investimentos - Renda Fixa Bancária
    description: |-
      Endpoints de consulta de datos de renta fija bancaria. Los modelos de datos esperados y retornados son los mismos que los definidos por la documentación oficial ([Open Finance - API Bank-fixed-incomes](https://openfinancebrasil.atlassian.net/wiki/spaces/OF/pages/75006394/API+-+Investimentos+-+Renda+Fixa+Banc+ria)).
  - name: Investimentos - Renda Fixa Crédito
    description: |-
      Endpoints de consulta de datos de renta fija crédito. Los modelos de datos esperados y retornados son los mismos que los definidos por la documentación oficial ([Open Finance - API Credit-fixed-incomes](https://openfinancebrasil.atlassian.net/wiki/spaces/OF/pages/75005953/API+-+Investimentos+-+Renda+Fixa+Cr+dito)).
  - name: Investimentos - Renda Variável
    description: |-
      Endpoints de consulta de datos de renta variable. Los modelos de datos esperados y retornados son los mismos que los definidos por la documentación oficial ([Open Finance - API Variable-incomes](https://openfinancebrasil.atlassian.net/wiki/spaces/OF/pages/82378753/API+-+Investimentos+-+Renda+Vari+vel)).
  - name: Investimentos - Títulos do Tesouro Direto
    description: |-
      Endpoints de consulta de datos de títulos del tesoro directo. Los modelos de datos esperados y retornados son los mismos que los definidos por la documentación oficial ([Open Finance - API Treasure-titles](https://openfinancebrasil.atlassian.net/wiki/spaces/OF/pages/86605826/API+-+Investimentos+-+T+tulos+do+Tesouro+Direto)).
  - name: Investimentos - Fundos de Investimento
    description: |-
      Endpoints de consulta de datos de fondos de inversión. Los modelos de datos esperados y retornados son los mismos que los definidos por la documentación oficial ([Open Finance - API Funds](https://openfinancebrasil.atlassian.net/wiki/spaces/OF/pages/89784321/API+-+Investimentos+-+Fundos+de+Investimento)).
  - name: Deeplinks
    description: |-
      Endpoints para la obtención de las configuraciones de iOS Universal Links y Android App Links para que la aplicación de la Institución receptora pueda interceptar URLs.
  - name: Câmbio
    description: |-
      Endpoints de consulta de datos de cambio de divisas. Los modelos de datos esperados y retornados son los mismos que los definidos por la documentación oficial ([Open Finance - API Exchanges](https://openfinancebrasil.atlassian.net/wiki/spaces/OF/pages/114032641/DC+API+-+C+mbio)).
servers:
  - url: https://open-finance-core.instituicao.com.br
paths:
  /.well-known/assetlinks.json:
    get:
      tags:
        - Deeplinks
      operationId: oofcDeeplinksGetAssetLinks
      description: Método para la obtención del contenido del archivo assetlinks.json
      summary: Obtener archivo de configuración Android App Links
      responses:
        '200':
          description: Respuesta exitosa
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AssetLinks'
  /.well-known/apple-app-site-association:
    get:
      tags:
        - Deeplinks
      operationId: oofcDeeplinksGetAppleAppSiteAssociation
      description: Método para la obtención del contenido del archivo apple-app-site-association
      summary: Obtener archivo de configuración Apple App Site Association
      responses:
        '200':
          description: Respuesta exitosa
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AppleAppSiteAssociation'
  /opus-open-finance/consents/v1/consents:
    post:
      tags:
        - Opus Open Finance
      operationId: oofcConsentsPostConsents
      description: Método para la creación de una nueva solicitud de consentimiento.
      summary: Crear nueva solicitud de consentimiento.
      externalDocs:
        description: Open Finance - API Consentimiento
        url: https://openfinancebrasil.atlassian.net/wiki/spaces/OF/pages/17369335/API+-+Consentimento
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateConsentRequest'
      parameters:
        - $ref: '#/components/parameters/applicationId'
        - $ref: '#/components/parameters/authorisationServerId'
        - $ref: '#/components/parameters/regulatoryV'
      responses:
        '502':
          description: Error en el Opus Open Client al comunicarse con la transmisora
          headers:
            x-origin-error:
              $ref: '#/components/headers/xOriginError'
            x-error-source-url:
              $ref: '#/components/headers/xErrorSourceUrl'
            x-selected-regulatory-v:
              $ref: '#/components/headers/xSelectedRegulatoryV'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResponseError'
        '504':
          headers:
            x-origin-error:
              $ref: '#/components/headers/xOriginError'
            x-error-source-url:
              $ref: '#/components/headers/xErrorSourceUrl'
            x-selected-regulatory-v:
              $ref: '#/components/headers/xSelectedRegulatoryV'
          description: Tiempo límite de conexión excedido al comunicarse con la transmisora
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResponseError'
        '201':
          description: Respuesta exitosa
          headers:
            x-selected-regulatory-v:
              $ref: '#/components/headers/xSelectedRegulatoryV'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CreateConsentResponse'
        default:
          headers:
            x-origin-error:
              $ref: '#/components/headers/xOriginError'
            x-error-source-url:
              $ref: '#/components/headers/xErrorSourceUrl'
            x-selected-regulatory-v:
              $ref: '#/components/headers/xSelectedRegulatoryV'
          description: Error enviado por la transmisora, respetando el estándar definido por el BACEN
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResponseError'
  /opus-open-finance/consents/v1/consents/{consentId}/authorisation-retry:
    post:
      tags:
        - Opus Open Finance
      operationId: oofcConsentsPostConsentsConsentIdAuthorisationRetry
      description: Método de generación de una nueva URL de autorización para el consentimiento identificado por consentId
      summary: Generar nueva URL de autorización para el consentimiento identificado por consentId.
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RetryConsentRequest'
      parameters:
        - $ref: '#/components/parameters/applicationId'
        - $ref: '#/components/parameters/authorisationServerId'
        - $ref: '#/components/parameters/consentId'
        - $ref: '#/components/parameters/regulatoryV'
      responses:
        '502':
          description: Error en el Opus Open Client al comunicarse con la transmisora
          headers:
            x-origin-error:
              $ref: '#/components/headers/xOriginError'
            x-error-source-url:
              $ref: '#/components/headers/xErrorSourceUrl'
            x-selected-regulatory-v:
              $ref: '#/components/headers/xSelectedRegulatoryV'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResponseError'
        '504':
          headers:
            x-origin-error:
              $ref: '#/components/headers/xOriginError'
            x-error-source-url:
              $ref: '#/components/headers/xErrorSourceUrl'
            x-selected-regulatory-v:
              $ref: '#/components/headers/xSelectedRegulatoryV'
          description: Tiempo límite de conexión excedido al comunicarse con la transmisora
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResponseError'
        '200':
          description: Respuesta exitosa
          headers:
            x-selected-regulatory-v:
              $ref: '#/components/headers/xSelectedRegulatoryV'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RetryConsentResponse'
  /opus-open-finance/consents/v1/consents/{consentId}/extends:
    post:
      tags:
        - Opus Open Finance
      operationId: oofcConsentsPostConsentsConsentIdExtends
      description: Método de extensión del período del consentimiento
      summary: Renovar un consentimiento ya existente por consentId.
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateConsentExtends'
      parameters:
        - $ref: '#/components/parameters/applicationId'
        - $ref: '#/components/parameters/authorisationServerId'
        - $ref: '#/components/parameters/consentId'
        - $ref: '#/components/parameters/customerUserAgent'
        - $ref: '#/components/parameters/fapiCustomerIpAddress'
        - $ref: '#/components/parameters/regulatoryV'
      responses:
        '502':
          description: Error en el Opus Open Client al comunicarse con la transmisora
          headers:
            x-origin-error:
              $ref: '#/components/headers/xOriginError'
            x-error-source-url:
              $ref: '#/components/headers/xErrorSourceUrl'
            x-selected-regulatory-v:
              $ref: '#/components/headers/xSelectedRegulatoryV'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResponseError'
        '504':
          headers:
            x-origin-error:
              $ref: '#/components/headers/xOriginError'
            x-error-source-url:
              $ref: '#/components/headers/xErrorSourceUrl'
            x-selected-regulatory-v:
              $ref: '#/components/headers/xSelectedRegulatoryV'
          description: Tiempo límite de conexión excedido al comunicarse con la transmisora
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResponseError'
        '200':
          description: Respuesta exitosa
          headers:
            x-selected-regulatory-v:
              $ref: '#/components/headers/xSelectedRegulatoryV'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResponseConsentExtends'
  /opus-open-finance/consents/v1/consents/{consentId}/extensions:
    get:
      tags:
        - Opus Open Finance
      operationId: oofcConsentsGetConsentsConsentIdExtends
      description: Método para obtener detalles de las extensiones del consentimiento identificado por consentId.
      summary: Obtener detalles de las extensiones realizadas en el consentimiento identificado por consentId.
      parameters:
        - $ref: '#/components/parameters/applicationId'
        - $ref: '#/components/parameters/authorisationServerId'
        - $ref: '#/components/parameters/consentId'
        - $ref: '#/components/parameters/page'
        - $ref: '#/components/parameters/pageSize'
        - $ref: '#/components/parameters/regulatoryV'
      responses:
        '502':
          description: Error en el Opus Open Client al comunicarse con la transmisora
          headers:
            x-origin-error:
              $ref: '#/components/headers/xOriginError'
            x-error-source-url:
              $ref: '#/components/headers/xErrorSourceUrl'
            x-selected-regulatory-v:
              $ref: '#/components/headers/xSelectedRegulatoryV'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResponseError'
        '504':
          headers:
            x-origin-error:
              $ref: '#/components/headers/xOriginError'
            x-error-source-url:
              $ref: '#/components/headers/xErrorSourceUrl'
            x-selected-regulatory-v:
              $ref: '#/components/headers/xSelectedRegulatoryV'
          description: Tiempo límite de conexión excedido al comunicarse con la transmisora
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResponseError'
        '200':
          description: Respuesta exitosa
          headers:
            x-selected-regulatory-v:
              $ref: '#/components/headers/xSelectedRegulatoryV'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResponseConsentReadExtends'
  /opus-open-finance/consents/v1/consents/{consentId}:
    get:
      tags:
        - Opus Open Finance
      operationId: oofcConsentsGetConsentsConsentId
      description: Método de detalle de un consentimiento identificado por consentId
      summary: Obtener detalles del consentimiento identificado por consentId.
      externalDocs:
        description: Open Finance - API Consentimiento
        url: https://openfinancebrasil.atlassian.net/wiki/spaces/OF/pages/17369335/API+-+Consentimento
      parameters:
        - $ref: '#/components/parameters/applicationId'
        - $ref: '#/components/parameters/authorisationServerId'
        - $ref: '#/components/parameters/consentId'
        - $ref: '#/components/parameters/regulatoryV'
      responses:
        '200':
          description: Consentimiento consultado con éxito.
          headers:
            x-selected-regulatory-v:
              $ref: '#/components/headers/xSelectedRegulatoryV'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GetConsentResponse'
        '502':
          description: Error en el Opus Open Client al comunicarse con la transmisora
          headers:
            x-origin-error:
              $ref: '#/components/headers/xOriginError'
            x-error-source-url:
              $ref: '#/components/headers/xErrorSourceUrl'
            x-selected-regulatory-v:
              $ref: '#/components/headers/xSelectedRegulatoryV'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResponseError'
        '504':
          headers:
            x-origin-error:
              $ref: '#/components/headers/xOriginError'
            x-error-source-url:
              $ref: '#/components/headers/xErrorSourceUrl'
            x-selected-regulatory-v:
              $ref: '#/components/headers/xSelectedRegulatoryV'
          description: Tiempo límite de conexión excedido al comunicarse con la transmisora
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResponseError'
        default:
          headers:
            x-origin-error:
              $ref: '#/components/headers/xOriginError'
            x-error-source-url:
              $ref: '#/components/headers/xErrorSourceUrl'
            x-selected-regulatory-v:
              $ref: '#/components/headers/xSelectedRegulatoryV'
          description: Error enviado por la transmisora, respetando el estándar definido por el BACEN
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResponseError'
    delete:
      tags:
        - Opus Open Finance
      operationId: oofcConsentsDeleteConsentsConsentId
      description: Método para eliminar / revocar el consentimiento identificado por consentId
      summary: Eliminar / Revocar el consentimiento identificado por consentId.
      externalDocs:
        description: Open Finance - API Consentimiento
        url: https://openfinancebrasil.atlassian.net/wiki/spaces/OF/pages/17369335/API+-+Consentimento
      parameters:
        - $ref: '#/components/parameters/applicationId'
        - $ref: '#/components/parameters/authorisationServerId'
        - $ref: '#/components/parameters/consentId'
        - $ref: '#/components/parameters/regulatoryV'
      responses:
        '204':
          description: Consentimiento revocado con éxito.
          headers:
            x-selected-regulatory-v:
              $ref: '#/components/headers/xSelectedRegulatoryV'
        '502':
          description: Error en el Opus Open Client al comunicarse con la transmisora
          headers:
            x-origin-error:
              $ref: '#/components/headers/xOriginError'
            x-error-source-url:
              $ref: '#/components/headers/xErrorSourceUrl'
            x-selected-regulatory-v:
              $ref: '#/components/headers/xSelectedRegulatoryV'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResponseError'
        '504':
          headers:
            x-origin-error:
              $ref: '#/components/headers/xOriginError'
            x-error-source-url:
              $ref: '#/components/headers/xErrorSourceUrl'
            x-selected-regulatory-v:
              $ref: '#/components/headers/xSelectedRegulatoryV'
          description: Tiempo límite de conexión excedido al comunicarse con la transmisora
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResponseError'
        default:
          headers:
            x-origin-error:
              $ref: '#/components/headers/xOriginError'
            x-error-source-url:
              $ref: '#/components/headers/xErrorSourceUrl'
            x-selected-regulatory-v:
              $ref: '#/components/headers/xSelectedRegulatoryV'
          description: Error enviado por la transmisora, respetando el estándar definido por el BACEN
          content:
            application/jwt:
              schema:
                $ref: '#/components/schemas/ResponseError'
  /opus-open-finance/participants:
    get:
      tags:
        - Opus Open Finance
      operationId: oofcGetParticipants
      description: Método para la obtención de los participantes registrados en el directorio
      summary: Detalle de los participantes registrados en el directorio, identificando sus APIs
      externalDocs:
        description: Open Finance - Funciones regulatorias para mapeos OpenID y OAuth 2.0
        url: https://openbanking-brasil.github.io/specs-seguranca/open-banking-brasil-dynamic-client-registration-1_ID2-ptbr.html#section-7.2
      parameters:
        - in: query
          name: role
          schema:
            type: string
          description: Filtra OrgDomainRoleClaims que contengan el role informado. Los tipos de role están sujetos a cambios, verificar en la externalDocs descrita.
        - in: query
          name: familyType
          schema:
            type: string
          description: Filtra ApiResources que contengan el familyType informado
      responses:
        '200':
          description: Respuesta exitosa
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ParticipantsResponse'
        '502':
          description: Error en el Opus Open Client al comunicarse con la API de participantes del BACEN
          headers:
            x-origin-error:
              $ref: '#/components/headers/xOriginError'
            x-error-source-url:
              $ref: '#/components/headers/xErrorSourceUrl'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResponseError'
        '504':
          headers:
            x-origin-error:
              $ref: '#/components/headers/xOriginError'
            x-error-source-url:
              $ref: '#/components/headers/xErrorSourceUrl'
          description: Tiempo límite de conexión excedido al comunicarse con la API de participantes del BACEN
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResponseError'
  /opus-open-finance/dcm:
    get:
      operationId: oofcGetDcm
      description: Método para la obtención de los datos de dcm de todas las brand clients de la aplicación.
      tags:
        - Opus Open Finance
      summary: Detalle de la situación de dcm de los brand clients.
      responses:
        '200':
          description: Respuesta exitosa
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DcmData'
        '502':
          description: Error en el Opus Open Client al comunicarse con la titular de la cuenta
          headers:
            x-origin-error:
              $ref: '#/components/headers/xOriginError'
            x-error-source-url:
              $ref: '#/components/headers/xErrorSourceUrl'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResponseError'
        '504':
          headers:
            x-origin-error:
              $ref: '#/components/headers/xOriginError'
            x-error-source-url:
              $ref: '#/components/headers/xErrorSourceUrl'
          description: Tiempo límite de conexión excedido al comunicarse con la API de participantes del BACEN
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResponseError'
    put:
      operationId: oofcPutDcm
      description: Método para la actualización de los datos de dcm de todas las brand clients de la aplicación.
      tags:
        - Opus Open Finance
      summary: Actualización de los datos de dcm de los brand clients.
      parameters:
        - $ref: '#/components/parameters/applicationId'
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PutDcmRequest'
      responses:
        '200':
          description: Respuesta exitosa
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DcmData'
        '502':
          description: Error en el Opus Open Client al comunicarse con la titular de la cuenta
          headers:
            x-origin-error:
              $ref: '#/components/headers/xOriginError'
            x-error-source-url:
              $ref: '#/components/headers/xErrorSourceUrl'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResponseError'
        '504':
          headers:
            x-origin-error:
              $ref: '#/components/headers/xOriginError'
            x-error-source-url:
              $ref: '#/components/headers/xErrorSourceUrl'
          description: Tiempo límite de conexión excedido al comunicarse con la API de participantes del BACEN
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResponseError'
  /opus-open-finance/authorization-result:
    post:
      tags:
        - Opus Open Finance
      operationId: oofcAppToAppAuthorizationResult
      description: Método utilizado en el flujo App-To-App para que se realice el intercambio del authorization code devuelto por los tokens o para que ocurra el tratamiento de eventuales errores de autorización.
      summary: Enviar retorno del flujo OIDC al Opus TPP.
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AppToAppAuthorizationResultRequest'
      responses:
        '204':
          description: Éxito en el proceso de autorización
        '422':
          headers:
            x-origin-error:
              $ref: '#/components/headers/xOriginError'
            x-error-source-url:
              $ref: '#/components/headers/xErrorSourceUrl'
          description: Error en el proceso de autorización
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AppToAppAuthorizationErrorResponse'
  /proxy/open-banking/resources/v3/resources:
    get:
      tags:
        - Resources
      parameters:
        - $ref: '#/components/parameters/applicationId'
        - $ref: '#/components/parameters/authorisationServerId'
