    CreateConsentExtends:
      type: object
      required:
        - data
      properties:
        data:
          type: object
          required:
            - loggedUser
          properties:
            expirationDateTime:
              description: Fecha y hora de expiración del permiso. De cumplimentación obligatoria, refleja la fecha límite de validez del consentimiento. Una cadena con fecha y hora conforme a la especificación RFC-3339, siempre con la utilización de timezone UTC (UTC time format). Para consentimientos con plazo indeterminado, completar con el valor ''2300-01-01T00:00:00Z''. Este valor debe reflejarse en el expirationDateTime del consentimiento relacionado.
