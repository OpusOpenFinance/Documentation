openapi: 3.0.0
info:
  title: OpusTPP - Webhooks
  version: 1.0.0
  description: |2-
     Opus Open Client - Core de gestión de información
    # Webhooks de pagos

tags:
  - name: Webhooks de Pagamentos
    description: |-
      Endpoints para recibir notificaciones de cambios de estado de los pagos y
      consentimientos de pagos de los usuarios. Oficial ([Open Finance - API
      Webhooks
      Payment](https://openfinancebrasil.atlassian.net/wiki/spaces/OF/pages/105021457/Webhook))
paths:
  /open-banking/webhook/v1/payments/{versionApi}/pix/payments/{paymentId}:
    post:
      tags:
        - Webhooks
      summary: Notificar cambios de estado de pagos Pix
      description: |-
        Método para recibir notificaciones de cambios de estado de los pagos
        Pix
      operationId: oofcWebhookPostPixPayments
      parameters:
        - name: versionApi
          in: path
          required: true
          schema:
            type: string
        - name: paymentId
          in: path
          required: true
          schema:
            type: string
        - name: x-webhook-interaction-id
          in: header
          required: true
          schema:
            type: string
      responses:
        '202':
          description: Accepted
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/webhookRequest'
  /open-banking/webhook/v1/automatic-payments/{versionApi}/pix/recurring-payments/{recurringPaymentId}:
    post:
      tags:
        - Webhooks
      summary: Notificar cambios de estado de pagos automáticos Pix
      description: |-
        Método para recibir notificaciones de cambios de estado de los pagos
        automáticos Pix
      operationId: oofcWebhookPostPixRecurringPayments
      parameters:
        - name: versionApi
          in: path
          required: true
          schema:
            type: string
        - name: recurringPaymentId
          in: path
          required: true
          schema:
            type: string
        - name: x-webhook-interaction-id
          in: header
          required: true
          schema:
            type: string
      responses:
        '202':
          description: Accepted
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/webhookRequest'
  /open-banking/webhook/v1/payments/{versionApi}/consents/{consentId}:
    post:
      tags:
        - Webhooks
      summary: Notificar cambios de estado de consentimientos de los pagos Pix
      description: |-
        Método para recibir notificaciones de cambios de estado de consentimientos
        de los pagos Pix
      operationId: oofcWebhookPostConsentPixPayments
      parameters:
        - name: versionApi
          in: path
          required: true
          schema:
            type: string
        - name: consentId
          in: path
          required: true
          schema:
            type: string
        - name: x-webhook-interaction-id
          in: header
          required: true
          schema:
            type: string
      responses:
        '202':
          description: Accepted
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/webhookRequest'
  /open-banking/webhook/v1/automatic-payments/{versionApi}/recurring-consents/{recurringConsentId}:
    post:
      tags:
        - Webhooks
      summary: |-
        Notificar cambios de estado de consentimientos de los pagos
        automáticos Pix
      description: |-
        Método para recibir notificaciones de cambios de estado de consentimientos
        de los pagos automáticos Pix
      operationId: oofcWebhookPostConsentPixRecurringPayments
      parameters:
        - name: versionApi
          in: path
          required: true
          schema:
            type: string
        - name: recurringConsentId
          in: path
          required: true
          schema:
            type: string
        - name: x-webhook-interaction-id
          in: header
          required: true
          schema:
            type: string
      responses:
        '202':
          description: Accepted
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/webhookRequest'
  /open-banking/webhook/v1/enrollments/{versionApi}/enrollments/{enrollmentId}:
    post:
      tags:
        - Webhooks
      summary: |-
        Notificar cambios de estado de vínculo de cuenta
      description: |-
        Método para recibir notificaciones de cambios de estado de vínculo de cuenta
      operationId: oofcWebhookPostEnrollments
      parameters:
        - name: versionApi
          in: path
          required: true
          schema:
            type: string
        - name: enrollmentId
          in: path
          required: true
          schema:
            type: string
        - name: x-webhook-interaction-id
          in: header
          required: true
          schema:
            type: string
        - name: x-authorization-server-id
          in: header
          required: true
          schema:
            type: string
      responses:
        '202':
          description: Accepted
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/webhookRequest'
components:
  schemas:
    webhookRequest:
      type: object
      properties:
        data:
          type: object
          properties:
            timestamp:
              type: string
              example: '2024-09-02T08:30:00Z'
            eventType:
              $ref: '#/components/schemas/EventType'
          required:
            - timestamp
            - eventType
      required:
        - data
    webhookResponse:
      type: object
      properties:
        data:
          type: object
          properties:
            timestamp:
              type: string
              example: '2024-09-02T08:30:00Z'
          required:
            - timestamp
      required:
        - data
    EventType:
      type: string
      enum:
        - STATE_CHANGED
        - DATA_CHANGED
      description:  |
        Tipo de evento que disparó la notificación vía webhook.
        - STATE_CHANGED: Indica que el estado del consentimiento, del pago o del vínculo de dispositivo fue alterado.
        - DATA_CHANGED: Indica que datos del consentimiento o del vínculo de dispositivo fueron alterados.
