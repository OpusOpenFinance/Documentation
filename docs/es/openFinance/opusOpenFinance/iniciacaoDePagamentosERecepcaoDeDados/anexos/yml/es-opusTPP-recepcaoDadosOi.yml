openapi: 3.0.0
info:
  title: OpusTPP - Recepción de Datos
  description: |-
    OpusTPP - Core de gestión de consentimientos

    # Datos de Registro y Transaccionales

  version: 1.0.0
tags:
  - name: Opus Open Insurance
    description: |-
      Endpoints de gestión de consentimientos
  - name: Resources
    description: |-
      Endpoints de listado de recursos vinculados al consentimiento. Los modelos de datos esperados y retornados son los mismos que los definidos por la documentación oficial ([Open Insurance - API Resources](https://br-openinsurance.github.io/areadesenvolvedor/#api-resources)).
  - name: Dados Cadastrais
    description: |-
      Endpoints de consulta de datos de registro del cliente. Los modelos de datos esperados y retornados son los mismos que los definidos por la documentación oficial ([Open Insurance - API Customers](https://br-openinsurance.github.io/areadesenvolvedor/#api-customers)).
  - name: Aceitação e Sucursal
    description: |-
      Endpoints de consulta de datos de información de póliza, prima y siniestro. Los modelos de datos esperados y retornados son los mismos que los definidos por la documentación oficial ([Open Insurance - API AcceptanceAndBranchesAbroad](https://br-openinsurance.github.io/areadesenvolvedor/#api-acceptance-and-branches-abroad)).
  - name: Automóvel
    description: |-
      Endpoints de consulta de datos de información de póliza, prima y siniestro. Los modelos de datos esperados y retornados son los mismos que los definidos por la documentación oficial ([Open Insurance - API Auto](https://br-openinsurance.github.io/areadesenvolvedor/#api-insurance-auto)).
  - name: Riscos Financeiros
    description: |-
      Endpoints de consulta de datos de información de póliza, prima y siniestro. Los modelos de datos esperados y retornados son los mismos que los definidos por la documentación oficial ([Open Insurance - API FinancialRisk](https://br-openinsurance.github.io/areadesenvolvedor/#api-insurance-financial-risk)).
  - name: Habitacional
    description: |-
      Endpoints de consulta de datos de información de póliza, prima y siniestro. Los modelos de datos esperados y retornados son los mismos que los definidos por la documentación oficial ([Open Insurance - API Housing](https://br-openinsurance.github.io/areadesenvolvedor/#api-insurance-housing)).
  - name: Patrimonial
    description: |-
      Endpoints de consulta de datos de información de póliza, prima y siniestro. Los modelos de datos esperados y retornados son los mismos que los definidos por la documentación oficial ([Open Insurance - API Patrimonial](https://br-openinsurance.github.io/areadesenvolvedor/#api-insurance-patrimonial)).
  - name: Transportes
    description: |-
      Endpoints de consulta de datos de información de póliza, prima y siniestro. Los modelos de datos esperados y retornados son los mismos que los definidos por la documentación oficial ([Open Insurance - API Transport](https://br-openinsurance.github.io/areadesenvolvedor/#api-insurance-transport)).
  - name: Responsabilidade
    description: |-
      Endpoints de consulta de datos de información de póliza, prima y siniestro. Los modelos de datos esperados y retornados son los mismos que los definidos por la documentación oficial ([Open Insurance - API Responsibility](https://br-openinsurance.github.io/areadesenvolvedor/#api-insurance-responsibility)).
  - name: Rural
    description: |-
      Endpoints de consulta de datos de información de póliza, prima y siniestro. Los modelos de datos esperados y retornados son los mismos que los definidos por la documentación oficial ([Open Insurance - API Rural](https://br-openinsurance.github.io/areadesenvolvedor/#api-insurance-rural)).
  - name: Previdência Risco
    description: |-
      Endpoints de consulta de datos de información de póliza, prima y siniestro. Los modelos de datos esperados y retornados son los mismos que los definidos por la documentación oficial ([Open Insurance - API PensionPlan](https://br-openinsurance.github.io/areadesenvolvedor/#api-insurance-pension-plan)).
  - name: Previdência Sobrevivência
    description: |-
      Endpoints de consulta de datos de información de póliza, prima y siniestro. Los modelos de datos esperados y retornados son los mismos que los definidos por la documentación oficial ([Open Insurance - API LifePension](https://br-openinsurance.github.io/areadesenvolvedor/#api-insurance-life-pension)).
  - name: Pessoas
    description: |-
      Endpoints de consulta de datos de información de póliza, prima y siniestro. Los modelos de datos esperados y retornados son los mismos que los definidos por la documentación oficial ([Open Insurance - API Person](https://br-openinsurance.github.io/areadesenvolvedor/#api-insurance-person)).
  - name: Deeplinks
    description: |-
      Endpoints para obtención de las configuraciones de iOS Universal Links y Android App Links para que la aplicación de la Institución receptora pueda interceptar URLs.
servers:
  - url: https://open-insurance-core.instituicao.com.br
paths:
  /.well-known/assetlinks.json:
    get:
      tags:
        - Deeplinks
      operationId: ooicDeeplinksGetAssetLinks
      description: Método para obtención del contenido del archivo assetlinks.json
      summary: Obtener archivo de configuración Android App Links
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AssetLinks'
  /.well-known/apple-app-site-association:
    get:
      tags:
        - Deeplinks
      operationId: ooicDeeplinksGetAppleAppSiteAssociation
      description: Método para obtención del contenido del archivo apple-app-site-association
      summary: Obtener archivo de configuración Apple App Site Association
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AppleAppSiteAssociation'
  /opus-open-insurance/open-insurance/consents/v1/consents:
    post:
      tags:
        - Opus Open Insurance
      operationId: ooicConsentsPostConsents
      description: Método para creación de una nueva solicitud de consentimiento.
      summary: Crear nueva solicitud de consentimiento.
      externalDocs:
        description: Open Insurance - API Consentimiento
        url: https://br-openinsurance.github.io/areadesenvolvedor/#api-consents
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateConsentRequest'
      parameters:
        - $ref: '#/components/parameters/applicationId'
        - $ref: '#/components/parameters/authorisationServerId'
        - $ref: '#/components/parameters/regulatoryV'
      responses:
        '502':
          description: Error en el Opus Open Client al comunicarse con la transmisora
          headers:
            x-origin-error:
              $ref: '#/components/headers/xOriginError'
            x-error-source-url:
              $ref: '#/components/headers/xErrorSourceUrl'
            x-selected-regulatory-v:
                $ref: '#/components/headers/xSelectedRegulatoryV'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResponseError'
        '504':
          description: Tiempo límite de conexión excedido al comunicarse con la transmisora
          headers:
            x-origin-error:
              $ref: '#/components/headers/xOriginError'
            x-error-source-url:
              $ref: '#/components/headers/xErrorSourceUrl'
            x-selected-regulatory-v:
                $ref: '#/components/headers/xSelectedRegulatoryV'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResponseError'
        '201':
          description: Successful response
          headers:
              x-selected-regulatory-v:
                $ref: '#/components/headers/xSelectedRegulatoryV'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CreateConsentResponse'
        default:
          description: Error enviado por la transmisora, respetando el estándar definido por la Susep
          headers:
            x-origin-error:
              $ref: '#/components/headers/xOriginError'
            x-error-source-url:
              $ref: '#/components/headers/xErrorSourceUrl'
            x-selected-regulatory-v:
                $ref: '#/components/headers/xSelectedRegulatoryV'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResponseError'
  /opus-open-insurance/open-insurance/consents/v1/consents/{consentId}/authorisation-retry:
    post:
      tags:
        - Opus Open Insurance
      operationId: ooicConsentsPostConsentsConsentIdAuthorisationRetry
      description: Método de generación de una nueva URL de autorización para el consentimiento identificado por consentId
      summary: Generar nueva URL de autorización para el consentimiento identificado por consentId.
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RetryConsentRequest'
      parameters:
        - $ref: '#/components/parameters/applicationId'
        - $ref: '#/components/parameters/authorisationServerId'
        - $ref: '#/components/parameters/consentId'
        - $ref: '#/components/parameters/regulatoryV'
      responses:
        '502':
          description: Error en el Opus Open Client al comunicarse con la transmisora
          headers:
            x-origin-error:
              $ref: '#/components/headers/xOriginError'
            x-error-source-url:
              $ref: '#/components/headers/xErrorSourceUrl'
            x-selected-regulatory-v:
                $ref: '#/components/headers/xSelectedRegulatoryV'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResponseError'
        '504':
          description: Tiempo límite de conexión excedido al comunicarse con la transmisora
          headers:
            x-origin-error:
              $ref: '#/components/headers/xOriginError'
            x-error-source-url:
              $ref: '#/components/headers/xErrorSourceUrl'
            x-selected-regulatory-v:
                $ref: '#/components/headers/xSelectedRegulatoryV'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResponseError'
        '200':
          description: Successful response
          headers:
              x-selected-regulatory-v:
                $ref: '#/components/headers/xSelectedRegulatoryV'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RetryConsentResponse'
  /opus-open-insurance/open-insurance/consents/v1/consents/{consentId}:
    get:
      tags:
        - Opus Open Insurance
      operationId: ooicConsentsGetConsentsConsentId
      description: Método de detalle de un consentimiento identificado por consentId
      summary: Obtener detalles del consentimiento identificado por consentId.
      externalDocs:
        description: Open Insurance - API Consentimiento
        url: https://br-openinsurance.github.io/areadesenvolvedor/#api-consents
      parameters:
        - $ref: '#/components/parameters/applicationId'
        - $ref: '#/components/parameters/authorisationServerId'
        - $ref: '#/components/parameters/consentId'
        - $ref: '#/components/parameters/regulatoryV'
      responses:
        '200':
          description: Consentimiento consultado con éxito.
          headers:
              x-selected-regulatory-v:
                $ref: '#/components/headers/xSelectedRegulatoryV'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GetConsentResponse'
        '502':
          description: Error en el Opus Open Client al comunicarse con la transmisora
          headers:
            x-origin-error:
              $ref: '#/components/headers/xOriginError'
            x-error-source-url:
              $ref: '#/components/headers/xErrorSourceUrl'
            x-selected-regulatory-v:
                $ref: '#/components/headers/xSelectedRegulatoryV'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResponseError'
        '504':
          description: Tiempo límite de conexión excedido al comunicarse con la transmisora
          headers:
            x-origin-error:
              $ref: '#/components/headers/xOriginError'
            x-error-source-url:
              $ref: '#/components/headers/xErrorSourceUrl'
            x-selected-regulatory-v:
                $ref: '#/components/headers/xSelectedRegulatoryV'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResponseError'
        default:
          description: Error enviado por la transmisora, respetando el estándar definido por la Susep
          headers:
            x-origin-error:
              $ref: '#/components/headers/xOriginError'
            x-error-source-url:
              $ref: '#/components/headers/xErrorSourceUrl'
            x-selected-regulatory-v:
                $ref: '#/components/headers/xSelectedRegulatoryV'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResponseError'
    delete:
      tags:
        - Opus Open Insurance
      operationId: ooicConsentsDeleteConsentsConsentId
      description: Método para eliminar / revocar el consentimiento identificado por consentId
      summary: Eliminar / Revocar el consentimiento identificado por consentId.
      externalDocs:
        description: Open Insurance - API Consentimiento
        url: https://br-openinsurance.github.io/areadesenvolvedor/#api-consents
      parameters:
        - $ref: '#/components/parameters/applicationId'
        - $ref: '#/components/parameters/authorisationServerId'
        - $ref: '#/components/parameters/consentId'
      responses:
        '204':
          description: Consentimiento revocado con éxito.
          headers:
              x-selected-regulatory-v:
                $ref: '#/components/headers/xSelectedRegulatoryV'
        '502':
          description: Error en el Opus Open Client al comunicarse con la transmisora
          headers:
            x-origin-error:
              $ref: '#/components/headers/xOriginError'
            x-error-source-url:
              $ref: '#/components/headers/xErrorSourceUrl'
            x-selected-regulatory-v:
                $ref: '#/components/headers/xSelectedRegulatoryV'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResponseError'
        '504':
          description: Tiempo límite de conexión excedido al comunicarse con la transmisora
          headers:
            x-origin-error:
              $ref: '#/components/headers/xOriginError'
            x-error-source-url:
              $ref: '#/components/headers/xErrorSourceUrl'
            x-selected-regulatory-v:
                $ref: '#/components/headers/xSelectedRegulatoryV'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResponseError'
        default:
          description: Error enviado por la transmisora, respetando el estándar definido por la Susep
          headers:
            x-origin-error:
              $ref: '#/components/headers/xOriginError'
            x-error-source-url:
              $ref: '#/components/headers/xErrorSourceUrl'
            x-selected-regulatory-v:
                $ref: '#/components/headers/xSelectedRegulatoryV'
          content:
            application/jwt:
              schema:
                $ref: '#/components/schemas/ResponseError'
  /opus-open-insurance/participants:
    get:
      tags:
        - Opus Open Insurance
      operationId: ooicGetParticipants
      description: Método para obtención de los participantes registrados en el directorio
      summary: Detalle de los participantes registrados en el directorio, identificando sus APIs
      parameters:
       - in: query
         name: role
         schema:
           type: string
         description: Filtra OrgDomainRoleClaims que contengan el role informado. Los tipos de role están sujetos a cambios.
       - in: query
         name: familyType
         schema:
           type: string
         description: Filtra ApiResources que contengan el familyType informado
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ParticipantsResponse'
        '502':
          description: Error en el Opus Open Client al comunicarse con la API de participantes de la Susep
          headers:
            x-origin-error:
              $ref: '#/components/headers/xOriginError'
            x-error-source-url:
              $ref: '#/components/headers/xErrorSourceUrl'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResponseError'
        '504':
          description: Tiempo límite de conexión excedido al comunicarse con la API de participantes de la Susep
          headers:
            x-origin-error:
              $ref: '#/components/headers/xOriginError'
            x-error-source-url:
              $ref: '#/components/headers/xErrorSourceUrl'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResponseError'
  /opus-open-insurance/dcm:
    get:
      operationId: oofiGetDcm
      description: Método para obtención de los datos de dcm de todas las brand clients de la aplicación.
      tags:
        - Opus Open Insurance
      summary: Detalle de la situación de dcm de los brand clients.
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DcmData'
        '502':
          description: Error en el Opus Open Client al comunicarse con la titular de cuenta
          headers:
            x-origin-error:
              $ref: '#/components/headers/xOriginError'
            x-error-source-url:
              $ref: '#/components/headers/xErrorSourceUrl'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResponseError'
        '504':
          description: Tiempo límite de conexión excedido al comunicarse con la API de participantes del BACEN
          headers:
            x-origin-error:
              $ref: '#/components/headers/xOriginError'
            x-error-source-url:
              $ref: '#/components/headers/xErrorSourceUrl'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResponseError'
    put:
      operationId: ooicPutDcm
      description: Método para actualización de los datos de dcm de todas las brand clients de la aplicación.
      tags:
        - Opus Open Insurance
      summary: Actualización de los datos de dcm de los brand clients.
      parameters:
        - $ref: '#/components/parameters/applicationId'
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PutDcmRequest'
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DcmData'
        '502':
          description: Error en el Opus Open Client al comunicarse con la titular de cuenta
          headers:
            x-origin-error:
              $ref: '#/components/headers/xOriginError'
            x-error-source-url:
              $ref: '#/components/headers/xErrorSourceUrl'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResponseError'
        '504':
          description: Tiempo límite de conexión excedido al comunicarse con la API de participantes del BACEN
          headers:
            x-origin-error:
              $ref: '#/components/headers/xOriginError'
            x-error-source-url:
              $ref: '#/components/headers/xErrorSourceUrl'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResponseError'
  /opus-open-insurance/authorization-result:
    post:
      tags:
        - Opus Open Insurance
      operationId: ooicAppToAppAuthorizationResult
      description: Método utilizado en el flujo App-To-App para que haya intercambio del authorization code retornado por los tokens o para que se realice el tratamiento de eventuales errores de autorización.
      summary: Enviar retorno del flujo OIDC al Opus TPP.
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AppToAppAuthorizationResultRequest'
      responses:
        '204':
          description: Éxito en el proceso de autorización
        '422':
          description: Error en el proceso de autorización
          headers:
            x-origin-error:
              $ref: '#/components/headers/xOriginError'
            x-error-source-url:
              $ref: '#/components/headers/xErrorSourceUrl'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AppToAppAuthorizationErrorResponse'
  /proxy/open-insurance/resources/v1/resources:
    get:
      tags:
        - Resources
      parameters:
        - $ref: '#/components/parameters/applicationId'
        - $ref: '#/components/parameters/authorisationServerId'
        - $ref: '#/components/parameters/headerConsentId'
      description: Método de proxy para obtener la lista de recursos mantenidos por el cliente en la institución transmisora y para los cuales haya otorgado consentimiento.
      responses:
        '502':
          description: Error en el Opus Open Client al comunicarse con la transmisora
          headers:
            x-origin-error:
              $ref: '#/components/headers/xOriginError'
            x-error-source-url:
              $ref: '#/components/headers/xErrorSourceUrl'
            x-selected-regulatory-v:
                $ref: '#/components/headers/xSelectedRegulatoryV'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResponseError'
        '504':
          description: Tiempo límite de conexión excedido al comunicarse con la transmisora
          headers:
            x-origin-error:
              $ref: '#/components/headers/xOriginError'
            x-error-source-url:
              $ref: '#/components/headers/xErrorSourceUrl'
            x-selected-regulatory-v:
                $ref: '#/components/headers/xSelectedRegulatoryV'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResponseError'
        default:
          description: Sigue el estándar de respuesta definido por la Susep
          headers:
            x-origin-error:
              $ref: '#/components/headers/xOriginError'
            x-error-source-url:
              $ref: '#/components/headers/xErrorSourceUrl'
            x-selected-regulatory-v:
                $ref: '#/components/headers/xSelectedRegulatoryV'
  /proxy/open-insurance/customers/v1/personal/identifications:
