  /proxy/open-insurance/customers/v1/personal/qualifications:
    get:
      tags:
        - Dados Cadastrais
      parameters:
        - $ref: '#/components/parameters/applicationId'
        - $ref: '#/components/parameters/authorisationServerId'
        - $ref: '#/components/parameters/headerConsentId'
      description: 'Método de proxy para obtener los registros de calificación de la persona física mantenidos en la institución transmisora.'
      responses:
        '502':
          description: Error en el Opus Open Client al comunicarse con la transmisora
