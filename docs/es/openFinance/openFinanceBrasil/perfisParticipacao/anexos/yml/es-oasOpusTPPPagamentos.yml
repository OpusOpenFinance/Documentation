        type: string
      required: false
    xRegulatoryV:
      description: Versión regulatoria deseada para la llamada al participante (disponible solo en rutas no-proxy).
      schema:
        $ref: '#/components/schemas/RegulatoryVersion'
      required: false
    xSelectedRegulatoryV:
      description: Versión regulatoria efectivamente utilizada en la solicitud al participante.
      schema:
        $ref: '#/components/schemas/SelectedRegulatoryVersion'
      required: true
