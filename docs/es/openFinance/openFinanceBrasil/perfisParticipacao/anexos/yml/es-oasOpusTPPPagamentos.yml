  /opus-open-finance/dcm:
    get:
      operationId: oofcGetDcm
      description: Método para la obtención de los datos de dcm de todos los brand clients de la aplicación.
      tags:
        - Opus Open Finance
      summary: Detalle de la situación de dcm de los brand clients.
      responses:
        '200':
          description: Respuesta exitosa
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DcmData'
        '502':
          description: Error en Opus Open Client al comunicarse con la institución poseedora de la cuenta
          headers:
            x-origin-error:
              $ref: '#/components/headers/xOriginError'
            x-error-source-url:
              $ref: '#/components/headers/xErrorSourceUrl'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResponseError'
        '504':
          description: Tiempo límite de conexión excedido al comunicarse con la API de participantes del BACEN
          headers:
            x-origin-error:
              $ref: '#/components/headers/xOriginError'
            x-error-source-url:
              $ref: '#/components/headers/xErrorSourceUrl'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResponseError'
    put:
      operationId: oofcPutDcm
      description: Método para la actualización de los datos de dcm de todos los brand clients de la aplicación.
      tags:
        - Opus Open Finance
      summary: Actualización de los datos de dcm de los brand clients.
      parameters:
        - $ref: '#/components/parameters/applicationId'
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PutDcmRequest'
      responses:
        '200':
          description: Respuesta exitosa
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DcmData'
        '502':
          description: Error en Opus Open Client al comunicarse con la institución poseedora de la cuenta
          headers:
            x-origin-error:
              $ref: '#/components/headers/xOriginError'
            x-error-source-url:
              $ref: '#/components/headers/xErrorSourceUrl'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResponseError'
        '504':
          description: Tiempo límite de conexión excedido al comunicarse con la API de participantes del BACEN
          headers:
            x-origin-error:
              $ref: '#/components/headers/xOriginError'
            x-error-source-url:
              $ref: '#/components/headers/xErrorSourceUrl'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResponseError'
  /opus-open-finance/authorization-result:
    post:
      tags:
        - Opus Open Finance
      operationId: oofcAppToAppAuthorizationResult
      description: Método utilizado en el flujo App-To-App para que se intercambie el authorization code devuelto por los tokens o para que ocurra el tratamiento de eventuales errores de autorización.
      summary: Enviar el retorno del flujo OIDC al Opus TPP.
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AppToAppAuthorizationResultRequest'
      responses:
        '204':
          description: Éxito en el proceso de autorización
        '422':
          description: Error en el proceso de autorización
