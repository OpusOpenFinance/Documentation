        Identifier - URI - que se asigna bajo el URI scheme "urn" y un namespace URN específico, con la intención de que el URN
        sea un identificador de recurso persistente e independiente de la ubicación.
        Considerando la string urn:prudential:C1DD93123 como ejemplo para consentId tenemos:
        - el namespace (urn)
        - el identificador asociado al namespace de la institución transmisora (bancox)
        - el identificador específico dentro del namespace (f865cd66-392a-420b-9ff0-1b6d7cc60ee0).
        Información más detallada sobre la construcción de namespaces debe consultarse en la [RFC8141](https://tools.ietf.org/html/rfc8141).
      schema:
        type: string
        pattern: '^urn:[a-zA-Z0-9][a-zA-Z0-9-]{0,31}:[a-zA-Z0-9()+,\-.:=@;$_!*''%\/?#]+$'
        maxLength: 256
      example: 'urn:bancox:f865cd66-392a-420b-9ff0-1b6d7cc60ee0'
    authorisationFlowIntent:
      name: x-authorisation-flow-intent
      required: false
      description: Indicador de cuál será el modelo de aprobación del consentimiento de pago
      in: header
      schema:
        $ref: '#/components/schemas/EnumAuthorisationFlowIntent'
    regulatoryV:
        name: x-regulatory-v
        required: false
        description: Versión regulatoria deseada para la llamada al participante (disponible solo en rutas no-proxy).
        in: header
        schema:
          $ref: '#/components/schemas/RegulatoryVersion'
