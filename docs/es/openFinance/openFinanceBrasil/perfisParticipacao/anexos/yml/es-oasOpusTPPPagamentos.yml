              $ref: '#/components/headers/xOriginError'
            x-error-source-url:
              $ref: '#/components/headers/xErrorSourceUrl'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AppToAppAuthorizationErrorResponse'
components:
  schemas:
    PutDcmRequest:
      type: object
      required:
        - data
      properties:
        data:
          type: object
          required:
            - version
          properties:
            version:
              description: 'No existe un estándar fijo para el valor de este campo: puede ser una fecha, un nombre, un número o cualquier string definido por el responsable del cambio en el directorio. La versión sirve solo como referencia interna para el control y la trazabilidad de los cambios aplicados vía DCM, sin que haya validación o consulta automática por otros sistemas. **Importante**: en caso de que se haga una solicitud con un valor de versión igual al de una solicitud anterior, no habrá solicitud de DCM para ningún participante.'
