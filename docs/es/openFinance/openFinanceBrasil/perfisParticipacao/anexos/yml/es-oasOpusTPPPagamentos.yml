          type: string
          maxLength: 20
          format: date-time
          example: '2021-05-21T08:30:00Z'
      additionalProperties: false
    CreatePaymentConsentRequest:
      type: object
      required:
        - data
      properties:
        data:
          type: object
          description: Objeto que contiene las informaciones de consentimiento para la iniciación de pago individual. Para los demás campos sigue el estándar de solicitud definido en la documentación oficial ([Open Finance - API Payment Initiation](https://openfinancebrasil.atlassian.net/wiki/spaces/OF/pages/17375943/SV+API+-+Pagamentos)).
