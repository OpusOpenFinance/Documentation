        - $ref: '#/components/parameters/applicationId'
        - $ref: '#/components/parameters/authorisationServerId'
        - $ref: '#/components/parameters/headerConsentId'
        - name: paymentId
          in: path
          description: Identificador de la operación de pago
          schema:
            type: string
          required: true
          example: D730A10D6784379085391417F3EF657C1247B2B3645210DD97F739B33B349376
      description: Método de proxy para consultar una iniciación de pago.
      responses:
        '502':
          description: Error en Opus Open Client al comunicarse con la institución poseedora de la cuenta
          headers:
            x-origin-error:
              $ref: '#/components/headers/xOriginError'
            x-error-source-url:
              $ref: '#/components/headers/xErrorSourceUrl'
            x-selected-regulatory-v:
              $ref: '#/components/headers/xSelectedRegulatoryV'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResponseError'
        '504':
          description: Tiempo límite de conexión excedido al comunicarse con la institución poseedora de la cuenta
          headers:
            x-origin-error:
              $ref: '#/components/headers/xOriginError'
            x-error-source-url:
              $ref: '#/components/headers/xErrorSourceUrl'
            x-selected-regulatory-v:
              $ref: '#/components/headers/xSelectedRegulatoryV'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResponseError'
        default:
          description: Sigue el estándar de respuesta definido por el BACEN
          headers:
            x-origin-error:
              $ref: '#/components/headers/xOriginError'
            x-error-source-url:
              $ref: '#/components/headers/xErrorSourceUrl'
            x-selected-regulatory-v:
              $ref: '#/components/headers/xSelectedRegulatoryV'
    patch:
      tags:
        - Pagamento
      parameters:
        - $ref: '#/components/parameters/applicationId'
        - $ref: '#/components/parameters/authorisationServerId'
        - $ref: '#/components/parameters/headerConsentId'
        - name: paymentId
          in: path
          description: Identificador de la operación de pago
          schema:
            type: string
          required: true
          example: D730A10D6784379085391417F3EF657C1247B2B3645210DD97F739B33B349376
      description: Método de proxy para revocar una iniciación de pago.
      requestBody:
        content:
          application/json:
            schema:
              description: 'Sigue el estándar de solicitud definido en la documentación oficial ([Open Finance - API Payment Initiation](https://openfinancebrasil.atlassian.net/wiki/spaces/OF/pages/347079010/Informa+es+T+cnicas+-+SV+Pagamentos+-+v4.0.0)).'
              example: {}
      responses:
        '502':
          description: Error en Opus Open Client al comunicarse con la institución poseedora de la cuenta
          headers:
