openapi: 3.0.0
info:
  title: oofc-core
  description: |-
    Opus Open Client - Núcleo de gestión de consentimientos

    # Iniciación de Transacción de Pagos

  version: 1.0.0
tags:
  - name: Opus Open Finance
    description: |-
      Endpoints de gestión de consentimientos
  - name: Pagamento
    description: |-
      Endpoints de iniciación de pago relacionados con el consentimiento. Los modelos de datos esperados y devueltos son los mismos definidos por la documentación oficial ([Open Finance - API Payment Initiation](https://openfinancebrasil.atlassian.net/wiki/spaces/OF/pages/17375943/API+-+Pagamentos)).
  - name: Deeplinks
    description: |-
      Endpoints para la obtención de las configuraciones de iOS Universal Links y Android App Links para que la aplicación de la Institución receptora pueda interceptar URLs.
servers:
  - url: https://open-finance-core.instituicao.com.br
paths:
  /.well-known/assetlinks.json:
    get:
      tags:
        - Deeplinks
      operationId: oofcDeeplinksGetAssetLinks
      description: Método para la obtención del contenido del archivo assetlinks.json
      summary: Obtener archivo de configuración de Android App Links
      responses:
        '200':
          description: Respuesta exitosa
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AssetLinks'
  /.well-known/apple-app-site-association:
    get:
      tags:
        - Deeplinks
      operationId: oofcDeeplinksGetAppleAppSiteAssociation
      description: Método para la obtención del contenido del archivo apple-app-site-association
      summary: Obtener archivo de configuración de Apple App Site Association
      responses:
        '200':
          description: Respuesta exitosa
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AppleAppSiteAssociation'
  /opus-open-finance/payments/v1/consents:
    post:
      tags:
        - Opus Open Finance
      operationId: oofcPaymentsPostConsents
      description: Método para crear una nueva solicitud de consentimiento de pago
      summary: Crear una nueva solicitud de consentimiento de pago
      externalDocs:
        description: Open Finance - API Payment Initiation
        url: https://openfinancebrasil.atlassian.net/wiki/spaces/OF/pages/17375943/API+-+Pagamentos
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreatePaymentConsentRequest'
      parameters:
        - $ref: '#/components/parameters/applicationId'
        - $ref: '#/components/parameters/authorisationServerId'
        - $ref: '#/components/parameters/authorisationFlowIntent'
        - $ref: '#/components/parameters/regulatoryV'
      responses:
        '502':
          description: Error en Opus Open Client al comunicarse con la institución poseedora de la cuenta
          headers:
            x-origin-error:
              $ref: '#/components/headers/xOriginError'
            x-error-source-url:
              $ref: '#/components/headers/xErrorSourceUrl'
            x-selected-regulatory-v:
              $ref: '#/components/headers/xSelectedRegulatoryV'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResponseError'
        '504':
          description: Tiempo límite de conexión excedido al comunicarse con la institución poseedora de la cuenta
          headers:
            x-origin-error:
              $ref: '#/components/headers/xOriginError'
            x-error-source-url:
              $ref: '#/components/headers/xErrorSourceUrl'
            x-selected-regulatory-v:
              $ref: '#/components/headers/xSelectedRegulatoryV'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResponseError'
        '201':
          description: Consentimiento de pago creado con éxito.
          headers:
            x-selected-regulatory-v:
              $ref: '#/components/headers/xSelectedRegulatoryV'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CreatePaymentConsentResponse'
        '400':
          description: Error enviado por la institución poseedora de la cuenta, respetando el estándar definido por el BACEN
          headers:
            x-origin-error:
              $ref: '#/components/headers/xOriginError'
            x-error-source-url:
              $ref: '#/components/headers/xErrorSourceUrl'
            x-selected-regulatory-v:
              $ref: '#/components/headers/xSelectedRegulatoryV'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResponseError'
        default:
          description: Error enviado por la institución poseedora de la cuenta, respetando el estándar definido por el BACEN
          headers:
            x-origin-error:
              $ref: '#/components/headers/xOriginError'
            x-error-source-url:
              $ref: '#/components/headers/xErrorSourceUrl'
            x-selected-regulatory-v:
              $ref: '#/components/headers/xSelectedRegulatoryV'
          content:
            application/jwt:
              schema:
                $ref: '#/components/schemas/ResponseError'
  /opus-open-finance/payments/v1/consents/{consentId}/authorisation-retry:
    post:
      tags:
        - Opus Open Finance
      operationId: oofcPaymentsPostConsentsConsentIdAuthorisationRetry
      description: Método de generación de una nueva URL de autorización para el consentimiento identificado por consentId
      summary: Generar una nueva URL de autorización para el consentimiento identificado por consentId.
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RetryPaymentConsentRequest'
      parameters:
        - $ref: '#/components/parameters/applicationId'
        - $ref: '#/components/parameters/authorisationServerId'
        - $ref: '#/components/parameters/consentId'
        - $ref: '#/components/parameters/regulatoryV'
      responses:
        '502':
          description: Error en Opus Open Client al comunicarse con la institución poseedora de la cuenta
          headers:
            x-origin-error:
              $ref: '#/components/headers/xOriginError'
            x-error-source-url:
              $ref: '#/components/headers/xErrorSourceUrl'
            x-selected-regulatory-v:
              $ref: '#/components/headers/xSelectedRegulatoryV'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResponseError'
        '504':
          description: Tiempo límite de conexión excedido al comunicarse con la institución poseedora de la cuenta
          headers:
            x-origin-error:
              $ref: '#/components/headers/xOriginError'
            x-error-source-url:
              $ref: '#/components/headers/xErrorSourceUrl'
            x-selected-regulatory-v:
              $ref: '#/components/headers/xSelectedRegulatoryV'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResponseError'
        '200':
          description: Respuesta exitosa
          headers:
            x-selected-regulatory-v:
              $ref: '#/components/headers/xSelectedRegulatoryV'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RetryPaymentConsentResponse'
  /opus-open-finance/payments/v1/consents/{consentId}:
    get:
      operationId: oofcPaymentsGetConsentsConsentId
      description: Método para obtener el detalle del consentimiento de pago identificado por consentId
      tags:
        - Opus Open Finance
      summary: Obtener detalles del consentimiento identificado por consentId.
      externalDocs:
        description: Open Finance - API Payment Initiation
        url: https://openfinancebrasil.atlassian.net/wiki/spaces/OF/pages/17375943/API+-+Pagamentos
      parameters:
        - $ref: '#/components/parameters/applicationId'
        - $ref: '#/components/parameters/authorisationServerId'
        - $ref: '#/components/parameters/consentId'
        - $ref: '#/components/parameters/regulatoryV'
      responses:
        '502':
          description: Error en Opus Open Client al comunicarse con la institución poseedora de la cuenta
          headers:
            x-origin-error:
              $ref: '#/components/headers/xOriginError'
            x-error-source-url:
              $ref: '#/components/headers/xErrorSourceUrl'
            x-selected-regulatory-v:
              $ref: '#/components/headers/xSelectedRegulatoryV'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResponseError'
        '504':
          description: Tiempo límite de conexión excedido al comunicarse con la institución poseedora de la cuenta
          headers:
            x-origin-error:
              $ref: '#/components/headers/xOriginError'
            x-error-source-url:
              $ref: '#/components/headers/xErrorSourceUrl'
            x-selected-regulatory-v:
              $ref: '#/components/headers/xSelectedRegulatoryV'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResponseError'
        '200':
          description: Respuesta exitosa
          headers:
            x-selected-regulatory-v:
              $ref: '#/components/headers/xSelectedRegulatoryV'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GetPaymentConsentResponse'
        '400':
          description: Error enviado por la institución poseedora de la cuenta, respetando el estándar definido por el BACEN
          headers:
            x-origin-error:
              $ref: '#/components/headers/xOriginError'
            x-error-source-url:
              $ref: '#/components/headers/xErrorSourceUrl'
            x-selected-regulatory-v:
              $ref: '#/components/headers/xSelectedRegulatoryV'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResponseError'
        default:
          description: Error enviado por la institución poseedora de la cuenta, respetando el estándar definido por el BACEN
          headers:
            x-origin-error:
              $ref: '#/components/headers/xOriginError'
            x-error-source-url:
              $ref: '#/components/headers/xErrorSourceUrl'
            x-selected-regulatory-v:
              $ref: '#/components/headers/xSelectedRegulatoryV'
          content:
            application/jwt:
              schema:
                $ref: '#/components/schemas/ResponseError'
  /opus-open-finance/participants:
    get:
      operationId: oofcGetParticipants
      description: Método para la obtención de los participantes registrados en el directorio
      tags:
        - Opus Open Finance
      summary: Detalle de los participantes registrados en el directorio, identificando sus APIs
      externalDocs:
        description: Open Finance - Funciones regulatorias para mapeos de OpenID y OAuth 2.0
        url: https://openbanking-brasil.github.io/specs-seguranca/open-banking-brasil-dynamic-client-registration-1_ID2-ptbr.html#section-7.2
      parameters:
       - in: query
         name: role
         schema:
           type: string
         description: Filtra los OrgDomainRoleClaims que contienen el role indicado. Los tipos de role están sujetos a cambios, verificar en la externalDocs descrita.
       - in: query
         name: familyType
         schema:
           type: string
         description: Filtra los ApiResources que contienen el familyType indicado
      responses:
        '200':
          description: Respuesta exitosa
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ParticipantsResponse'
        '502':
          description: Error en Opus Open Client al comunicarse con la API de participantes del BACEN
          headers:
            x-origin-error:
              $ref: '#/components/headers/xOriginError'
            x-error-source-url:
              $ref: '#/components/headers/xErrorSourceUrl'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResponseError'
        '504':
          description: Tiempo límite de conexión excedido al comunicarse con la API de participantes del BACEN
          headers:
            x-origin-error:
              $ref: '#/components/headers/xOriginError'
            x-error-source-url:
              $ref: '#/components/headers/xErrorSourceUrl'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResponseError'
  /proxy/open-banking/payments/v5/pix/payments:
    post:
      tags:
        - Pagamento
      parameters:
        - $ref: '#/components/parameters/applicationId'
        - $ref: '#/components/parameters/authorisationServerId'
        - $ref: '#/components/parameters/headerConsentId'
      description: 'Método de proxy para crear una iniciación de pago.'
      requestBody:
        content:
          application/json:
            schema:
              description: 'Sigue el estándar de solicitud definido en la documentación oficial ([Open Finance - API Payment Initiation](https://openfinancebrasil.atlassian.net/wiki/spaces/OF/pages/347079010/Informa+es+T+cnicas+-+SV+Pagamentos+-+v4.0.0)).'
              example: {}
      responses:
        '502':
          description: Error en Opus Open Client al comunicarse con la institución poseedora de la cuenta
          headers:
            x-origin-error:
              $ref: '#/components/headers/xOriginError'
            x-error-source-url:
              $ref: '#/components/headers/xErrorSourceUrl'
            x-selected-regulatory-v:
              $ref: '#/components/headers/xSelectedRegulatoryV'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResponseError'
        '504':
          description: Tiempo límite de conexión excedido al comunicarse con la institución poseedora de la cuenta
          headers:
            x-origin-error:
              $ref: '#/components/headers/xOriginError'
            x-error-source-url:
              $ref: '#/components/headers/xErrorSourceUrl'
            x-selected-regulatory-v:
              $ref: '#/components/headers/xSelectedRegulatoryV'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResponseError'
        default:
          description: Sigue el estándar de respuesta definido por el BACEN
          headers:
            x-origin-error:
              $ref: '#/components/headers/xOriginError'
            x-error-source-url:
              $ref: '#/components/headers/xErrorSourceUrl'
            x-selected-regulatory-v:
              $ref: '#/components/headers/xSelectedRegulatoryV'
  /proxy/open-banking/payments/v5/pix/payments/{paymentId}:
    get:
      tags:
        - Pagamento
